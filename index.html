<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURORA AI - NÚCLEO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --glass-light: rgba(255, 255, 255, 0.03); --glass-user: rgba(0, 242, 255, 0.06); --border: rgba(255, 255, 255, 0.08); }
        
        body { 
            margin: 0; padding: 0; height: 100vh; background: #000;
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; overflow: hidden;
        }

        /* FONDO DINÁMICO */
        #bg-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -1; filter: brightness(0.45) contrast(1.1);
        }

        /* CONTENEDOR PRINCIPAL */
        #app-container {
            display: flex; flex-direction: column; height: 100vh;
            max-width: 900px; margin: 0 auto; position: relative;
        }

        /* HEADER */
        header { padding: 25px; text-align: center; }
        header h1 { 
            font-family: 'Orbitron'; font-size: 1.6rem; margin: 0; letter-spacing: 10px;
            background: linear-gradient(45deg, #fff, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.3));
        }

        /* ÁREA DE MENSAJES - INVISIBLE Y ELEGANTE */
        #chat-window {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 24px;
            scrollbar-width: none;
            mask-image: linear-gradient(to bottom, transparent, black 8%, black 92%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 8%, black 92%, transparent);
        }
        #chat-window::-webkit-scrollbar { display: none; }

        .msg { 
            max-width: 82%; padding: 15px 22px; border-radius: 22px; font-size: 1.05rem; 
            line-height: 1.6; animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border);
            letter-spacing: 0.3px;
        }
        
        .aurora { 
            align-self: flex-start; 
            background: var(--glass-light); 
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
        }
        
        .user { 
            align-self: flex-end; 
            background: var(--glass-user); 
            border: 1px solid rgba(0, 242, 255, 0.15);
            border-bottom-right-radius: 4px;
            text-align: right;
        }

        /* BARRA DE ENTRADA */
        .input-area { padding: 25px; background: transparent; }
        .input-container {
            background: rgba(15, 15, 20, 0.65); backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 35px; border: 1px solid var(--border);
            display: flex; align-items: center; padding: 6px 14px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        
        input { 
            flex: 1; background: transparent; border: none; color: white;
            padding: 14px; font-size: 1.05rem; outline: none; font-family: inherit;
        }
        input::placeholder { color: rgba(255,255,255,0.3); }

        .btn {
            background: transparent; border: none; color: white; cursor: pointer;
            width: 46px; height: 46px; display: flex; align-items: center; justify-content: center;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-radius: 50%;
        }
        .btn:active { transform: scale(0.85); }
        .btn svg { width: 26px; height: 26px; fill: currentColor; }
        
        #send-btn { color: var(--accent); }
        #mic-btn { color: rgba(255,255,255,0.4); }

        /* INDICADOR */
        .typing { font-size: 0.85rem; opacity: 0.5; margin: 0 0 12px 35px; display: none; font-weight: 300; letter-spacing: 1px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="app-container">
        <header>
            <h1>AURORA</h1>
        </header>

        <div id="chat-window">
            <div class="msg aurora">Hola Gabriel. El sistema está sincronizado al 110%. ¿Qué tienes en mente?</div>
        </div>

        <div class="typing" id="typing-indicator">Aurora está procesando...</div>

        <div class="input-area">
            <div class="input-container">
                <button class="btn" id="mic-btn" onclick="startVoz()">
                    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                </button>
                <input type="text" id="user-input" placeholder="Preguntale a Aurora..." autocomplete="off">
                <button class="btn" id="send-btn" onclick="enviar()">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatWin = document.getElementById('chat-window');
        const input = document.getElementById('user-input');
        const loader = document.getElementById('typing-indicator');

        function hablar(texto) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(texto);
                const voces = window.speechSynthesis.getVoices();
                const vozFemenina = voces.find(v => 
                    v.lang.includes('es') && (v.name.includes('Google') || v.name.includes('Microsoft') || v.name.includes('Helena') || v.name.includes('Lucia'))
                );
                if (vozFemenina) u.voice = vozFemenina;
                u.lang = 'es-MX';
                u.rate = 1.05;
                u.pitch = 1.05;
                window.speechSynthesis.speak(u);
            }
        }
        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };

        function addMsg(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            chatWin.appendChild(div);
            // Scroll automático mejorado
            setTimeout(() => {
                chatWin.scrollTo({ top: chatWin.scrollHeight, behavior: 'smooth' });
            }, 100);
        }

        async function enviar() {
            const msg = input.value.trim();
            if(!msg) return;

            addMsg(msg, 'user');
            input.value = '';
            loader.style.display = 'block';

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ msg: msg })
                });
                const data = await res.json();
                loader.style.display = 'none';
                
                if(data.respuesta) {
                    addMsg(data.respuesta, 'aurora');
                    hablar(data.respuesta);
                }
            } catch (e) {
                loader.style.display = 'none';
                addMsg("Se perdió la sincronización con el núcleo.", 'aurora');
            }
        }

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });

        function startVoz() {
            if ('webkitSpeechRecognition' in window) {
                const rec = new webkitSpeechRecognition();
                rec.lang = 'es-AR';
                rec.onresult = (e) => {
                    input.value = e.results[0][0].transcript;
                    enviar();
                };
                rec.start();
            }
        }
    </script>
</body>
</html>

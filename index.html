<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #00f2ff; --danger: #ff4d4d; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            overflow: hidden; background-color: #000;
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; 
            overscroll-behavior-y: none; 
        }

        #bg-video { 
            position: fixed !important; 
            top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: 0; object-fit: cover !important; 
            pointer-events: none; 
        }

        /* Capa para cerrar paneles al tocar fuera */
        #panels-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 100000;
            display: none;
        }

        /* PANELES SIMÉTRICOS LATERALEZ */
        .panel-side {
            position: fixed; top: 0; width: 280px; height: 100%;
            background: rgba(0, 10, 20, 0.75); backdrop-filter: blur(25px);
            z-index: 100001; transition: 0.3s ease;
            display: flex; flex-direction: column; padding: 20px; 
            padding-top: calc(env(safe-area-inset-top, 40px) + 20px);
            box-sizing: border-box;
        }

        #sidebar-menu { left: 0; transform: translateX(-100%); border-right: 1px solid rgba(0, 242, 255, 0.2); }
        #profile-panel { right: 0; transform: translateX(100%); border-left: 1px solid rgba(0, 242, 255, 0.2); }

        .panel-open { transform: translateX(0) !important; }

        .panel-title { font-family: 'Orbitron'; font-size: 1rem; color: var(--accent); letter-spacing: 2px; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        
        /* ORDEN DEL MENÚ DE CHATS */
        .chat-item-active { 
            background: rgba(0, 242, 255, 0.15); padding: 15px; border-radius: 15px; 
            border: 1px solid var(--accent); font-size: 0.9rem; color: #fff;
            display: flex; align-items: center; gap: 10px; margin-bottom: 15px;
        }

        .btn-premium-add {
            background: rgba(0, 242, 255, 0.05); border: 1px dashed rgba(0, 242, 255, 0.5);
            color: rgba(255,255,255,0.7); width: 100%; padding: 12px; border-radius: 12px;
            font-family: 'Orbitron'; font-size: 0.75rem; cursor: pointer; transition: 0.3s;
        }

        /* BOTONES DE CUENTA ORDENADOS POR ELEGANCIA */
        .btn-account {
            width: 100%; padding: 15px; border-radius: 15px; font-family: 'Orbitron'; 
            font-size: 0.8rem; cursor: pointer; transition: 0.3s; margin-bottom: 12px;
            background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-accent-opt { border-color: var(--accent); color: var(--accent); background: rgba(0, 242, 255, 0.1); }
        .btn-danger-opt { border-color: var(--danger); color: var(--danger); margin-top: auto; margin-bottom: 20px; }

        #app-container { display: none; flex-direction: column; height: 100vh; width: 100%; position: relative; z-index: 10; }

        header { 
            padding-top: calc(env(safe-area-inset-top, 40px) + 20px); 
            padding-bottom: 15px; padding-left: 20px; padding-right: 20px;
            display: flex; justify-content: space-between; align-items: center; position: relative;
        }
        
        .titulo-app { font-family: 'Orbitron'; letter-spacing: 15px; font-size: 1.8rem; text-shadow: 0 0 15px var(--accent); margin: 0; }
        .btn-menu-top { background: transparent; border: none; cursor: pointer; color: #fff; font-size: 2rem; text-shadow: 0 0 15px var(--accent); padding: 0; z-index: 999; }
        #user-avatar { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--accent); box-shadow: 0 0 15px rgba(0,242,255,0.4); object-fit: cover; display: none; cursor: pointer; z-index: 999; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 14px 22px; border-radius: 22px; backdrop-filter: blur(15px); font-size: 1rem; }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.08); border: 1px solid rgba(0, 242, 255, 0.3); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); }

        .bottom-section { padding: 10px 20px 30px 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .chat-group { display: flex; align-items: center; gap: 15px; width: 100%; max-width: 500px; }
        .btn-a { font-family: 'Orbitron'; font-size: 1.8rem; color: #fff; background: none; border: none; cursor: pointer; text-shadow: 0 0 15px var(--accent); }
        .input-bar { flex: 1; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(0, 242, 255, 0.4); border-radius: 40px; display: flex; align-items: center; padding: 5px 22px; backdrop-filter: blur(20px); }
        #chat-terminal { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; outline: none; font-size: 1rem; }
        .disclaimer { text-align: center; font-size: 0.6rem; color: rgba(255,255,255,0.5); }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 10, 20, 0.4); backdrop-filter: blur(15px); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 40px; border: 1px solid rgba(0, 242, 255, 0.2); text-align: center; max-width: 380px; width: 90%; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="panels-overlay" onclick="cerrarPaneles()"></div>

    <div id="sidebar-menu" class="panel-side">
        <h3 class="panel-title">MIS ENLACES</h3>
        <div class="chat-item-active"><span>💬</span> Chat Actual</div>
        <button class="btn-premium-add" onclick="alert('SISTEMA: Obtené AURORA PREMIUM para gestionar más de 5 enlaces.')">+ NUEVO CHAT</button>
        
        <div style="margin-top: auto; padding-bottom: 20px;">
            <p style="color: var(--accent); font-size: 0.7rem; margin-bottom: 5px; font-family: 'Orbitron';">ENLACES: 1 / 5</p>
            <div style="width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px;">
                <div style="width: 20%; height: 100%; background: var(--accent); border-radius: 10px; box-shadow: 0 0 10px var(--accent);"></div>
            </div>
        </div>
    </div>

    <div id="profile-panel" class="panel-side">
        <h3 class="panel-title">MI CUENTA</h3>
        <button class="btn-account btn-accent-opt" onclick="cambiarCuenta()">CAMBIAR CUENTA</button>
        <button class="btn-account" onclick="cerrarSesionReal()">CERRAR SESIÓN</button>
        
        <button class="btn-account btn-danger-opt" onclick="eliminarCuenta()">ELIMINAR CUENTA</button>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="font-family:'Orbitron'; line-height:1.4;">BIENVENIDO A AURORA<br><span style="font-size:0.8rem; font-family:'Plus Jakarta Sans'; color:rgba(255,255,255,0.7);">ACCESO NEURONAL</span></h2>
            <button style="background:rgba(255,255,255,0.9); color:#000; border:none; padding:15px; border-radius:18px; font-weight:bold; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:12px; width:100%;" onclick="authGoogle()">
                <svg width="20" height="20" viewBox="0 0 488 512" fill="#000"><path d="M488 261.8C488 403.3 391.1 504 248 504 110.8 504 0 393.2 0 256S110.8 8 248 8c66.8 0 123 24.5 166.3 64.9l-67.5 64.9C258.5 52.6 94.3 116.6 94.3 256c0 86.5 69.1 156.6 153.7 156.6 98.2 0 135-70.4 140.8-106.9H248v-85.3h236.1c2.3 12.7 3.9 24.9 3.9 41.4z"/></svg>
                Ingresar con Google
            </button>
        </div>
    </div>

    <div id="app-container">
        <header>
            <button class="btn-menu-top" onclick="abrirSidebar()">☰</button>
            <div class="titulo-app">AURORA</div>
            <img id="user-avatar" src="" alt="Perfil" onclick="abrirPerfil()">
        </header>
        <div id="chat-window">
            <div class="msg aurora">Enlace neuronal activo. ¿Qué deseas procesar hoy?</div>
        </div>
        <div class="bottom-section">
            <div class="chat-group">
                <button class="btn-a">A</button>
                <div class="input-bar">
                    <input type="text" id="chat-terminal" placeholder="Mensaje neuronal..." autocomplete="off">
                    <button onclick="enviar()" style="background:none; border:none; color:var(--accent); font-size:1.5rem;">➤</button>
                </div>
            </div>
            <div class="disclaimer">AURORA ES UNA IA Y PUEDE COMETER ERRORES.</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo",
            authDomain: "aurora-ai-oficia.firebaseapp.com",
            projectId: "aurora-ai-oficia",
            storageBucket: "aurora-ai-oficia.firebasestorage.app",
            messagingSenderId: "426513637524",
            appId: "1:426513637524:web:13851f499aa4af13cfd481",
            measurementId: "G-XTN5WJPRPP"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // 🔒 PARCHE ANTI-REBOTE iOS
        document.body.addEventListener('touchmove', function(e) {
            if (!e.target.closest('#chat-window') && !e.target.closest('.panel-side')) e.preventDefault();
        }, { passive: false });

        // ✨ GESTIÓN DE PANELES
        function abrirSidebar() { document.getElementById('sidebar-menu').classList.add('panel-open'); document.getElementById('panels-overlay').style.display = 'block'; }
        function abrirPerfil() { document.getElementById('profile-panel').classList.add('panel-open'); document.getElementById('panels-overlay').style.display = 'block'; }
        function cerrarPaneles() { 
            document.getElementById('sidebar-menu').classList.remove('panel-open'); 
            document.getElementById('profile-panel').classList.remove('panel-open'); 
            document.getElementById('panels-overlay').style.display = 'none'; 
        }

        // 🔄 LÓGICA DE AUTO-LOGIN
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                document.getElementById('bg-video').play();
                if (user.photoURL) {
                    const avatar = document.getElementById('user-avatar');
                    avatar.src = user.photoURL;
                    avatar.style.display = 'block';
                }
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            }
        });

        function authGoogle() { const provider = new firebase.auth.GoogleAuthProvider(); auth.signInWithPopup(provider).catch(e => alert(e.message)); }
        function cerrarSesionReal() { auth.signOut().then(() => location.reload()); }
        function cambiarCuenta() { auth.signOut().then(() => authGoogle()); }

        function eliminarCuenta() {
            const user = firebase.auth().currentUser;
            if (user && confirm("⚠️ ¿Eliminar cuenta para siempre?")) {
                user.delete().then(() => location.reload()).catch(e => alert("Re-logueate e intenta de nuevo."));
            }
        }

        async function enviar() {
            const input = document.getElementById('chat-terminal');
            if(!input.value.trim()) return;
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg user">${input.value}</div>`;
            const msj = input.value;
            input.value = ""; win.scrollTop = win.scrollHeight;
            try {
                const res = await fetch('https://gabiland-aurora-ai-mendoza.hf.space/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg:msj}) });
                const data = await res.json();
                win.innerHTML += `<div class="msg aurora">${data.respuesta}</div>`;
                win.scrollTop = win.scrollHeight;
            } catch(e) { win.innerHTML += `<div class="msg aurora" style="color:red;">Error de red...</div>`; }
        }
        document.getElementById('chat-terminal').addEventListener('keypress', e => { if (e.key === 'Enter') enviar(); });
    </script>
</body>
</html>

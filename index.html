<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA CORE</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <style>
        :root { --accent: #00f2ff; }
        
        /* 🌌 LA CAPA DE TITANIO UNIVERSAL (Base 100% Vidrio) 🌌 */
        html {
            height: -webkit-fill-available; /* Llena el espacio del iPhone */
            background-color: #000;
        }

        body {
            margin: 0; padding: 0;
            width: 100vw; 
            height: 100vh; /* Para Android y PC */
            height: -webkit-fill-available; /* Para iOS */
            overflow: hidden;
            position: fixed; /* Anclado al vidrio */
            inset: 0;
            background-color: #000000 !important;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
            color: #fff;
        }

        /* 🎥 EL VIDEO: POSICIÓN ABSOLUTA AL FONDO (Sin hacks de zoom) 🎥 */
        #bg-video {
            position: absolute;
            top: 0; left: 0;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover; /* Mantiene la proporción y cubre todo */
            z-index: 0; 
            pointer-events: none;
        }

        /* 📱 INTERFAZ: DISEÑO DE CRISTAL FLOTANTE 📱 */
        #app-container { 
            display: none; flex-direction: column; 
            position: absolute; inset: 0; z-index: 10; 
            background: transparent; 
        }

        header { padding: calc(env(safe-area-inset-top, 44px) + 15px) 20px 10px; text-align: center; }
        .titulo-app { font-family: 'Orbitron'; letter-spacing: 15px; font-size: 1.8rem; color: #fff; text-shadow: 0 0 15px var(--accent); margin: 0; }

        #chat-window { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px; 
            -webkit-overflow-scrolling: touch; 
        }
        
        .msg { max-width: 80%; padding: 14px 20px; border-radius: 20px; color: #fff; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); font-size: 0.95rem; line-height: 1.4; }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.08); border-left: 2px solid var(--accent); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.08); }

        /* ✨ BARRA DE TEXTO: FLOTA SOBRE LA BARRA DE CUALQUIER SISTEMA ✨ */
        .bottom-section { 
            /* env(safe-area-inset-bottom) es universal, si no hay barra, mide 0 */
            padding: 10px 20px calc(env(safe-area-inset-bottom, 20px) + 15px); 
        }
        .input-box { 
            display: flex; align-items: center; background: rgba(0,0,0,0.6); 
            border: 1px solid var(--accent); border-radius: 30px; 
            padding: 6px 15px; backdrop-filter: blur(20px); 
        }
        #chat-terminal { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; outline: none; font-size: 1.05rem; }

        /* LOGIN */
        #login-overlay { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); backdrop-filter: blur(25px); }
        .login-card { width: 85%; max-width: 350px; text-align: center; }
        .login-input { width: 100%; box-sizing: border-box; padding: 16px; margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--accent); background: rgba(0,0,0,0.5); color: #fff; text-align: center; font-size: 1rem; outline: none;}
    </style>
</head>
<body>
    
    <video autoplay muted loop playsinline webkit-playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="color:#fff; font-family:'Orbitron'; letter-spacing:10px; margin-bottom: 35px; text-shadow: 0 0 15px var(--accent);">AURORA</h2>
            <input type="email" id="email" class="login-input" placeholder="Acceso">
            <input type="password" id="pass" class="login-input" placeholder="Password">
            <button onclick="login()" style="width:100%; padding:16px; border-radius:12px; background:var(--accent); border:none; font-family:'Orbitron'; font-weight:bold; cursor:pointer;">INGRESAR</button>
        </div>
    </div>

    <div id="app-container">
        <header><h1 class="titulo-app">AURORA MENDOZA</h1></header>
        <div id="chat-window">
            <div class="msg aurora">Sistema universal estabilizado. Bienvenido al núcleo, Gabriel.</div>
        </div>
        <div class="bottom-section">
            <div class="input-box">
                <input type="text" id="chat-terminal" placeholder="Sintonía Neuronal...">
                <button onclick="enviar()" style="background:none; border:none; color:var(--accent); font-size:1.5rem; cursor:pointer;">➤</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo", authDomain: "aurora-ai-oficia.firebaseapp.com", projectId: "aurora-ai-oficia", storageBucket: "aurora-ai-oficia.firebasestorage.app", messagingSenderId: "426513637524", appId: "1:426513637524:web:13851f499aa4af13cfd481", measurementId: "G-XTN5WJPRPP" };
        firebase.initializeApp(firebaseConfig); 
        const auth = firebase.auth();
        function login() { const e=document.getElementById('email').value, p=document.getElementById('pass').value; auth.signInWithEmailAndPassword(e,p).catch(a=>alert("Error")); }
        auth.onAuthStateChanged(user => { if(user) { document.getElementById('login-overlay').style.display = 'none'; document.getElementById('app-container').style.display = 'flex'; } });
        async function enviar() { const i=document.getElementById('chat-terminal'), m=i.value; if(!m)return; const w=document.getElementById('chat-window'); w.innerHTML+=`<div class="msg user">${m}</div>`; i.value=""; w.scrollTop=w.scrollHeight; try { const r=await fetch('https://gabiland-aurora-ai-mendoza.hf.space/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({msg:m})}); const d=await r.json(); w.innerHTML+=`<div class="msg aurora">${d.respuesta}</div>`; w.scrollTop=w.scrollHeight; } catch(e){} }
        document.addEventListener('touchmove', function(e){ if(!e.target.closest('#chat-window')) e.preventDefault(); }, {passive:false});
    </script>
</body>
</html>

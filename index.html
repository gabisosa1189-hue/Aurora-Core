<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURORA AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; }
        body { margin: 0; padding: 0; height: 100vh; background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; overflow: hidden; }
        
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.4) contrast(1.1); }
        
        #app-container { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; position: relative; }
        
        header { padding: 20px; text-align: center; font-family: 'Orbitron'; letter-spacing: 8px; opacity: 0.9; }
        
        #chat-window { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 18px; 
            scrollbar-width: none; 
            mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
        }
        #chat-window::-webkit-scrollbar { display: none; }

        /* BURBUJAS INVISIBLES NIVEL PREMIUM */
        .msg { 
            max-width: 82%; padding: 14px 20px; border-radius: 22px; font-size: 1rem; line-height: 1.5;
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05); animation: slideUp 0.4s ease-out;
            color: rgba(255, 255, 255, 0.95);
        }
        
        .aurora { align-self: flex-start; background: rgba(255, 255, 255, 0.02); border-bottom-left-radius: 2px; }
        .user { align-self: flex-end; background: rgba(0, 242, 255, 0.03); border-bottom-right-radius: 2px; border-color: rgba(0, 242, 255, 0.1); }

        .input-area { padding: 25px; }
        .input-container { 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 35px; border: 1px solid rgba(255, 255, 255, 0.08); 
            display: flex; align-items: center; padding: 6px 18px; 
        }
        
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 1.05rem; font-family: inherit; }
        
        .btn { background: transparent; border: none; color: var(--accent); cursor: pointer; padding: 10px; }
        .btn svg { width: 26px; height: 26px; fill: currentColor; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video"><source src="fondo.mp4" type="video/mp4"></video>

    <div id="app-container">
        <header>AURORA</header>
        <div id="chat-window">
            <div class="msg aurora">Bienvenido. Soy Aurora, su asistente virtual. ¿En qué puedo ayudarle hoy?</div>
        </div>
        
        <div class="input-area">
            <div class="input-container">
                <input type="text" id="user-input" placeholder="Escriba su consulta..." autocomplete="off">
                <button class="btn" onclick="enviar()">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatWin = document.getElementById('chat-window');
        const input = document.getElementById('user-input');
        let vozFemenina = null;

        // --- CARGA DE VOZ FORZADA ---
        function cargarVoces() {
            const voces = window.speechSynthesis.getVoices();
            // Prioridad absoluta a voces femeninas latinas o españolas
            vozFemenina = voces.find(v => v.lang.includes('es') && (v.name.includes('Google') || v.name.includes('Helena') || v.name.includes('Lucia') || v.name.includes('Zira') || v.name.includes('femenino')));
            if (!vozFemenina) vozFemenina = voces.find(v => v.name.includes('Female') || v.name.includes('mujer'));
        }

        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = cargarVoces;
            cargarVoces();
        }

        function hablar(texto) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            
            const u = new SpeechSynthesisUtterance(texto);
            if (vozFemenina) {
                u.voice = vozFemenina;
            }
            
            // Truco final: pitch alto para asegurar tono femenino
            u.pitch = 1.3; 
            u.rate = 1.0;
            u.lang = 'es-MX';
            window.speechSynthesis.speak(u);
        }

        async function enviar() {
            const msg = input.value.trim();
            if(!msg) return;
            addMsg(msg, 'user');
            input.value = '';
            
            try {
                const res = await fetch('/chat', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({msg}) 
                });
                const data = await res.json();
                if(data.respuesta) {
                    addMsg(data.respuesta, 'aurora');
                    hablar(data.respuesta);
                }
            } catch {
                addMsg("Disculpe, mi conexión ha tenido una breve interrupción. ¿Podría repetir su consulta?", 'aurora');
            }
        }

        function addMsg(t, cl) {
            const d = document.createElement('div');
            d.className = `msg ${cl}`;
            d.innerText = t;
            chatWin.appendChild(d);
            setTimeout(() => { chatWin.scrollTo({top: chatWin.scrollHeight, behavior: 'smooth'}); }, 50);
        }

        input.addEventListener('keypress', (e) => e.key === 'Enter' && enviar());
    </script>
</body>
</html>

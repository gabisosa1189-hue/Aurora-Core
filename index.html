<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Enlace Neuronal</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #00f2ff; --danger: #ff4d4d; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            overflow: hidden; background: #000 !important; 
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; 
        }

        #bg-video { 
            position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: -1; object-fit: cover !important; 
        }

        /* 🚪 LOGIN AURORA */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(30px); z-index: 9999; 
            display: flex; align-items: center; justify-content: center; 
        }
        .login-card { 
            background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 40px; 
            border: 1px solid rgba(0, 242, 255, 0.3); text-align: center; max-width: 380px; width: 90%; 
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }

        .login-card h2 { font-family: 'Orbitron'; font-size: 1.6rem; margin-bottom: 30px; text-shadow: 0 0 15px var(--accent); letter-spacing: 2px; }
        .login-input {
            width: 100%; box-sizing: border-box; background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 242, 255, 0.2); color: white; padding: 15px;
            border-radius: 18px; margin-bottom: 15px; outline: none;
        }

        /* 📱 ESTILO BOTONES */
        .btn-aurora {
            background: transparent; border: 2px solid var(--accent); color: var(--accent);
            padding: 15px; width: 100%; border-radius: 20px; font-weight: bold;
            cursor: pointer; font-family: 'Orbitron'; letter-spacing: 2px;
            transition: 0.3s;
        }
        .btn-aurora:active { background: var(--accent); color: #000; }

        .btn-google {
            background: #fff; color: #000; border: none; padding: 15px; border-radius: 20px;
            font-weight: bold; cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 12px; width: 100%; margin-top: 15px;
        }

        /* 📱 APP CONTAINER */
        #app-container { display: none; flex-direction: column; height: 100vh; width: 100%; position: relative; z-index: 10; }
        header { padding: 50px 0 10px 0; text-align: center; }
        .titulo-app { font-family: 'Orbitron'; letter-spacing: 12px; font-size: 1.6rem; text-shadow: 0 0 15px var(--accent); }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 600px; margin: 0 auto; }
        .msg { max-width: 85%; padding: 14px 20px; border-radius: 20px; backdrop-filter: blur(15px); font-size: 0.95rem; }
        .aurora { background: rgba(0, 242, 255, 0.1); border: 1px solid rgba(0, 242, 255, 0.2); align-self: flex-start; }
        .user { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.1); align-self: flex-end; }

        .btn-config-fixed { position: fixed; left: 20px; bottom: 90px; background: none; border: none; color: #fff; font-family: 'Orbitron'; font-size: 0.75rem; z-index: 999 !important; }

        /* ✨ INTERFAZ DE VOZ (LA AURORA QUE SE MUEVE) */
        #voice-interface {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 10, 20, 0.6); backdrop-filter: blur(40px);
            z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .voice-status { font-family: 'Orbitron'; font-size: 1.1rem; color: var(--accent); margin-bottom: 50px; text-shadow: 0 0 20px var(--accent); }
        
        .visualizer { display: flex; align-items: center; gap: 10px; height: 100px; }
        .bar { width: 6px; height: 20px; background: var(--accent); border-radius: 10px; animation: wave 1.2s ease-in-out infinite; box-shadow: 0 0 15px var(--accent); }
        .bar:nth-child(2) { animation-delay: 0.2s; } .bar:nth-child(3) { animation-delay: 0.4s; }
        .bar:nth-child(4) { animation-delay: 0.6s; } .bar:nth-child(5) { animation-delay: 0.8s; }
        @keyframes wave { 0%, 100% { height: 20px; opacity: 0.5; } 50% { height: 80px; opacity: 1; } }

        .btn-hangup { margin-top: 60px; background: rgba(255, 77, 77, 0.1); border: 1px solid var(--danger); color: var(--danger); padding: 15px 40px; border-radius: 50px; font-family: 'Orbitron'; cursor: pointer; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="voice-interface">
        <div class="voice-status" id="voice-txt">ENLACE NEURONAL ACTIVO</div>
        <div class="visualizer">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
        <button class="btn-hangup" onclick="cerrarVoz()">COLGAR</button>
    </div>

    <button class="btn-config-fixed" onclick="document.getElementById('config-panel').style.display='flex'">⚙️ CONFIG</button>

    <div id="login-overlay">
        <div class="login-card">
            <h2>ACCESO NEURONAL</h2>
            <input type="email" placeholder="Email" class="login-input" id="emailInput">
            <input type="password" placeholder="Contraseña" class="login-input" id="passwordInput">
            <button class="btn-aurora" onclick="authCorreo()">INGRESAR</button>
            <div style="margin: 20px 0; font-size: 0.8rem; opacity: 0.6;">ó</div>
            <button class="btn-google" onclick="authGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                Ingresar con Google
            </button>
            <p onclick="toggleRegistro()" style="margin-top:20px; font-size:0.8rem; cursor:pointer; color:var(--accent)" id="link-registro">Crear Cuenta</p>
        </div>
    </div>

    <div id="app-container">
        <header><div class="titulo-app">AURORA</div></header>
        <div id="chat-window">
            <div class="msg aurora">Bienvenido al núcleo de <b>Aurora</b>. Hablame o escribime.</div>
        </div>
        <div style="padding: 20px; display: flex; align-items: center; gap: 10px;">
            <button onclick="activarVoz()" style="background:none; border:none; color:var(--accent); font-family:'Orbitron'; font-size:1.5rem; cursor:pointer;">A</button>
            <input type="text" id="chat-terminal" placeholder="Escribir..." style="flex:1; background:rgba(0,0,0,0.3); border:1px solid var(--accent); border-radius:20px; padding:12px; color:white; outline:none;">
            <button onclick="enviar()" style="background:none; border:none; color:var(--accent); font-size:1.2rem;">➤</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo",
            authDomain: "aurora-ai-oficia.firebaseapp.com",
            projectId: "aurora-ai-oficia",
            storageBucket: "aurora-ai-oficia.firebasestorage.app",
            messagingSenderId: "426513637524",
            appId: "1:426513637524:web:13851f499aa4af13cfd481"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // 🎙️ VOZ Y MICRO (PARCHE iOS)
        const synth = window.speechSynthesis;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;
        if (recognition) { recognition.lang = 'es-AR'; }

        function activarVoz() {
            // Despertar audio en iPhone
            synth.speak(new SpeechSynthesisUtterance(""));
            document.getElementById('voice-interface').style.display = 'flex';
            try { recognition.start(); } catch(e) {}
        }

        function cerrarVoz() {
            synth.cancel();
            try { recognition.stop(); } catch(e) {}
            document.getElementById('voice-interface').style.display = 'none';
        }

        // 🔑 AUTH REDIRECT (Para que funcione en iPhone)
        function authGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            // Usamos Redirect en vez de Popup para evitar el error "Invalid Action"
            auth.signInWithRedirect(provider);
        }

        // Detectar si volvemos del login de Google
        auth.getRedirectResult().then((result) => {
            if (result.user) entrar();
        }).catch((error) => {
            if(error.code !== 'auth/no-auth-event') alert("Error de enlace: " + error.message);
        });

        auth.onAuthStateChanged(user => { if(user) entrar(); });

        function authCorreo() {
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passwordInput').value;
            auth.signInWithEmailAndPassword(email, pass).then(() => entrar()).catch(e => alert("Acceso denegado."));
        }

        function entrar() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            document.getElementById('bg-video').play(); 
        }

        async function enviar() {
            const input = document.getElementById('chat-terminal');
            if(!input.value.trim()) return;
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg user">${input.value}</div>`;
            input.value = ""; win.scrollTop = win.scrollHeight;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA CORE</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        /* ✨ LA BASE: Fondo negro absoluto */
        html, body { 
            margin: 0; padding: 0; width: 100vw; height: 100%;
            overflow: hidden; position: fixed; inset: 0;
            background-color: #000;
        }

        /* ✨ EL VIDEO: Forzamos a que sea un 10% más grande que la pantalla */
        #bg-video { 
            position: fixed !important; 
            top: -5% !important; /* Sube un poco para que no quede corto abajo */
            left: -5% !important;
            width: 110vw !important; /* Desborda a los costados */
            height: 110vh !important; /* Desborda abajo (matando la barra) */
            object-fit: cover !important; 
            z-index: -1; 
            pointer-events: none; 
        }

        /* ✨ EL PANEL DE ABAJO: Flotante y transparente */
        .bottom-section { 
            position: fixed; 
            bottom: 0; left: 0; right: 0;
            padding-bottom: calc(env(safe-area-inset-bottom) + 15px); /* Respeto dinámico */
            z-index: 100;
        }

        .unified-panel {
            margin: 0 15px;
            background: rgba(0, 10, 20, 0.5); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 25px; padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #chat-terminal { width: 100%; background: transparent; border: none; color: white; font-size: 1.1rem; outline: none; }
        
        /* LOGIN */
        #login-overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 999; backdrop-filter: blur(15px); }
        .login-card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 30px; text-align: center; width: 80%; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline webkit-playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="color:#fff; font-family: sans-serif; letter-spacing: 3px;">AURORA</h2>
            <button onclick="document.getElementById('login-overlay').style.display='none'; document.getElementById('app-container').style.display='flex';" style="width:100%; padding:15px; border-radius:15px; background:#00f2ff; border:none; font-weight:bold;">INGRESAR</button>
        </div>
    </div>

    <div id="app-container" style="display:none; flex-direction:column; height:100vh;">
        <div id="chat-window" style="flex:1; overflow-y:auto; padding:20px;">
            <div style="background:rgba(255,255,255,0.1); padding:15px; border-radius:15px; color:#fff;">Núcleo activo. Sin bordes.</div>
        </div>
        <div class="bottom-section">
            <div class="unified-panel">
                <input type="text" id="chat-terminal" placeholder="Sintonizar...">
            </div>
        </div>
    </div>

</body>
</html>

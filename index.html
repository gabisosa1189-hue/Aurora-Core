<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora AI - Mendoza</title>
    <style>
        /* BASE & FONDO */
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; background-color: #111; color: white; }
        #bg-video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; object-fit: cover; opacity: 0.6; }
        
        /* PANTALLA DE LOGIN */
        #login-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); z-index: 10; transition: opacity 0.5s ease; }
        .login-box { background: rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 15px 35px rgba(0,0,0,0.5); width: 85%; max-width: 350px; }
        .login-box h1 { margin: 0 0 10px 0; font-size: 2rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .login-box p { color: #ccc; margin-bottom: 25px; }
        .login-box input { width: 80%; padding: 12px 15px; border-radius: 30px; border: none; outline: none; background: rgba(255, 255, 255, 0.9); font-size: 1rem; margin-bottom: 20px; text-align: center; }
        .login-box button { background: linear-gradient(135deg, #8e2de2, #4a00e0); color: white; border: none; padding: 12px 30px; border-radius: 30px; font-size: 1.1rem; cursor: pointer; font-weight: bold; transition: 0.3s; width: 100%; }
        .login-box button:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(142,45,226,0.4); }

        /* PANTALLA DE CHAT (OCULTA AL INICIO) */
        #chat-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-width: 450px; height: 88vh; background: rgba(0, 0, 0, 0.55); border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.15); display: none; flex-direction: column; overflow: hidden; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        
        /* CABECERA CHAT */
        .header { background: rgba(0, 0, 0, 0.3); padding: 18px; text-align: center; font-size: 1.3rem; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tuerca { animation: girar 4s linear infinite; display: inline-block; font-size: 1.4rem;}
        @keyframes girar { 100% { transform: rotate(360deg); } }
        
        /* MENSAJES */
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg { padding: 14px 18px; border-radius: 18px; max-width: 80%; word-wrap: break-word; line-height: 1.4; font-size: 0.95rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .user-msg { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-msg { background: rgba(255, 255, 255, 0.1); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px); }
        
        /* INPUT CHAT */
        .input-area { padding: 15px; background: rgba(0, 0, 0, 0.4); display: flex; gap: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        .input-area input { flex: 1; padding: 14px 20px; border-radius: 30px; border: none; outline: none; background: rgba(255, 255, 255, 0.9); font-size: 1rem; color: #333; }
        .input-area button { background: linear-gradient(135deg, #8e2de2, #4a00e0); color: white; border: none; padding: 0 22px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .input-area button:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(142,45,226,0.4); }
        
        /* SCROLLBAR INVISIBLE */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video" poster="poster.jpg">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="login-screen">
        <div class="login-box">
            <h1><span class="tuerca">⚙️</span> Aurora AI</h1>
            <p>Bienvenido a la inteligencia mendocina.</p>
            <input type="text" id="username" placeholder="Tu nombre..." onkeypress="handleLoginPress(event)">
            <button onclick="entrarChat()">Ingresar</button>
        </div>
    </div>

    <div id="chat-screen">
        <div class="header">
            <span class="tuerca">⚙️</span> Aurora AI
        </div>
        <div id="chat-box">
            </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Escribile a Aurora..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        let userName = "";

        // Pasar del Login al Chat
        function entrarChat() {
            const inputName = document.getElementById('username').value.trim();
            if (!inputName) return; 
            
            userName = inputName;
            
            // Efecto de desvanecimiento
            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                
                // Saludo personalizado con tu nombre
                const chatBox = document.getElementById('chat-box');
                chatBox.innerHTML = `<div class="msg ai-msg">¡Hola ${userName}! Soy Aurora. ¿Todo bien por San Martín? Escribime lo que necesites. 🍷</div>`;
            }, 500);
        }

        function handleLoginPress(e) {
            if (e.key === 'Enter') entrarChat();
        }

        // Enviar mensajes a la IA
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const msg = input.value.trim();
            if (!msg) return;

            chatBox.innerHTML += `<div class="msg user-msg">${msg}</div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            const typingId = "typing-" + Date.now();
            chatBox.innerHTML += `<div class="msg ai-msg" id="${typingId}">Pensando... ⚙️</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ msg: msg })
                });
                const data = await response.json();
                
                document.getElementById(typingId).remove();
                chatBox.innerHTML += `<div class="msg ai-msg">${data.respuesta}</div>`;
            } catch (error) {
                document.getElementById(typingId).remove();
                chatBox.innerHTML += `<div class="msg ai-msg" style="color:#ff6b6b;">Mmm, algo falló en la conexión.</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>

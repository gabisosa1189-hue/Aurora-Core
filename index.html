<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURORA Core v7.0 - CLOUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030306; --magenta: #ff00ff; --cyan: #00ffff; --glass: rgba(255, 255, 255, 0.05); }
        
        /* 1. AJUSTE DE BODY PARA EL VIDEO */
        body { 
            background-color: var(--bg); /* Color de fondo por si falla el video */
            color: white; font-family: 'Montserrat', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; 
        }

        /* 2. EL MOTOR DEL VIDEO DE FONDO (IMPLANTADO) */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1; /* Va detrás de todo */
            object-fit: cover; /* No se deforma */
            opacity: 0.4; /* Oscurecemos un poco el video para que se lea el chat */
        }
        
        #central-display { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); text-align: center; transition: transform 0.8s ease, opacity 0.8s ease; z-index: 1; width: 90%; }
        .hidden-ui { opacity: 0 !important; pointer-events: none; transform: translate(-50%, -60%) scale(0.9) !important; }
        
        /* Ajuste de tamaño de fuente para móviles */
        h1 { font-size: 4rem; letter-spacing: 15px; font-family: 'Orbitron'; margin: 0; background: linear-gradient(to right, white, #a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* 3. AJUSTE DE CHAT WINDOW (Glassmorphism centrado) */
        #chat-window { 
            flex-grow: 1; width: 90%; max-width: 600px; /* Ancho tipo celu, centrado */
            margin: 10vh auto 150px auto; /* Centrado horizontal, margen abajo para el dock */
            overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 18px; scrollbar-width: none; transition: opacity 0.6s ease; -webkit-overflow-scrolling: touch; 
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        #chat-window::-webkit-scrollbar { display: none; }
        .fade-out { opacity: 0 !important; }

        .bubble { padding: 14px 20px; border-radius: 20px; max-width: 80%; animation: fadeIn 0.4s ease; line-height: 1.5; font-size: 1rem; position: relative; word-wrap: break-word; }
        .aurora { align-self: flex-start; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(0, 255, 255, 0.15); border-bottom-left-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .gabriel { align-self: flex-end; background: linear-gradient(135deg, #1d4ed8, #0f172a); border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(29, 78, 216, 0.3); }
        
        .dock-wrap { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; padding: 0 20px; z-index: 10; box-sizing: border-box; }
        
        .dock { width: 100%; max-width: 600px; display: flex; gap: 8px; align-items: center; padding: 8px 12px; background: rgba(10, 15, 25, 0.95); backdrop-filter: blur(20px); border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 40px rgba(0,0,0,0.6); cursor: text; }
        
        input { flex-grow: 1; background: transparent; border: none; color: white; outline: none; font-size: 1.1rem; padding: 12px 5px; font-family: 'Montserrat', sans-serif; min-width: 0; }
        input::placeholder { color: rgba(255,255,255,0.4); }

        .btn-circle { width: 50px; height: 50px; border: 2px solid white; border-radius: 50%; background: transparent; color: white; cursor: pointer; transition: 0.3s ease; display: flex; align-items: center; justify-content: center; flex-shrink: 0; padding: 0; overflow: hidden; font-family: 'Orbitron'; font-size: 1.3rem; font-weight: 900; }
        .btn-circle svg { width: 24px; height: 24px; fill: currentColor; transition: transform 0.3s ease; }
        .btn-circle:hover { background: white; color: black; box-shadow: 0 0 20px rgba(255,255,255,0.5); }
        
        #btn-a { border-color: var(--magenta); color: var(--magenta); }
        #btn-a:hover { background: var(--magenta); color: white; box-shadow: 0 0 25px rgba(255, 0, 255, 0.6); }

        .btn-send { background: transparent; border: none; color: white; cursor: pointer; padding: 8px 12px; flex-shrink: 0; transition: 0.3s; display: flex; align-items: center; justify-content: center; color: var(--cyan); }
        .btn-send svg { width: 28px; height: 28px; fill: currentColor; transform: rotate(-45deg); transition: 0.3s ease; }
        .btn-send:hover { color: white; transform: scale(1.1); }

        #voice-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(3, 3, 6, 0.98); backdrop-filter: blur(40px); z-index: 1000; }
        .orb { width: 150px; height: 150px; border: 3px solid var(--cyan); border-radius: 50%; animation: pulse 2s infinite ease-in-out; box-shadow: 0 0 30px rgba(0, 255, 255, 0.3); }
        
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 30px var(--cyan); border-color: var(--cyan); } 50% { transform: scale(1.08); box-shadow: 0 0 70px var(--magenta); border-color: var(--magenta); } 100% { transform: scale(1); box-shadow: 0 0 30px var(--cyan); border-color: var(--cyan); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Media queries para ajustar el título gigante en celus muy chicos */
        @media (max-width: 600px) { h1 { font-size: 2.8rem; letter-spacing: 8px; } #central-display p { font-size: 0.8rem; letter-spacing: 4px; } #chat-window { margin-top: 8vh; width: 92%; } }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video" poster="poster.jpg">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="voice-overlay">
        <div class="orb" id="main-orb"></div>
        <h2 style="font-family:'Orbitron'; margin-top:40px; letter-spacing:12px; font-size: 1.8rem;">AURORA</h2>
        <p id="voice-subtext" style="letter-spacing:4px; opacity:0.7; font-weight:300; margin-top: 10px;">ESCUCHANDO...</p>
        <button onclick="cerrarEnlaceVoz(event)" style="margin-top:50px; background:transparent; border:2px solid white; color:white; padding:12px 40px; border-radius:30px; cursor:pointer; font-family:'Montserrat'; font-weight:500; font-size:1rem; transition:0.3s;">DESCONECTAR</button>
    </div>

    <div id="central-display">
        <h1>AURORA</h1>
        <p style="letter-spacing:6px; opacity:0.5; font-weight:300; margin-top:10px;">SAN MARTÍN, MENDOZA</p>
    </div>

    <div id="chat-window"></div>

    <div class="dock-wrap">
        <div class="dock" onclick="enfocarInput()">
            <button id="btn-reset" class="btn-circle" title="Nueva Sesión" onclick="nuevaSesion(event)">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>
            <button id="btn-a" class="btn-circle" title="Hablar" onclick="abrirEnlaceVoz(event)">A</button>
            <input type="text" id="chat-input" placeholder="Escribí o hablá..." autocomplete="off">
            <button onclick="enviarComando()" class="btn-send" title="Enviar Mensaje">
                <svg viewBox="0 0 24 24"><path d="M3 21l18-9-18-9v7l15 2-15 2v7z"/></svg>
            </button>
        </div>
    </div>

    <script>
        const input = document.getElementById('chat-input');
        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') enviarComando(); });

        let reconocimiento;
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            reconocimiento = new SpeechRecognition();
            reconocimiento.continuous = false;reconocimiento.interimResults = false;reconocimiento.lang = 'es-AR';
            reconocimiento.onresult = function(event) {
                input.value = event.results[0][0].transcript; cerrarEnlaceVoz(); enviarComando();
            };
            reconocimiento.onerror = function(event) { cerrarEnlaceVoz(); };
            reconocimiento.onend = function() { cerrarEnlaceVoz(); };
        }

        function enfocarInput() { input.focus(); }

        function hablarTexto(texto) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(texto);
                utterance.lang = 'es-MX'; utterance.rate = 1.0;
                window.speechSynthesis.speak(utterance);
            }
        }

        async function nuevaSesion(event) {
            if(event) event.stopPropagation();
            const chatWindow = document.getElementById('chat-window');
            if(chatWindow.innerHTML === '') return;
            chatWindow.classList.add('fade-out');
            setTimeout(async () => {
                chatWindow.innerHTML = ''; chatWindow.classList.remove('fade-out');
                document.getElementById('central-display').classList.remove('hidden-ui');
                try { await fetch('/reiniciar_memoria', { method: 'POST' }); } catch (e) {}
                input.focus();
            }, 600);
        }

        function abrirEnlaceVoz(event) {
            if(event) event.stopPropagation();
            if(reconocimiento) {
                input.value = '';
                document.getElementById('voice-overlay').style.display = 'flex';
                document.getElementById('central-display').classList.add('hidden-ui');
                reconocimiento.start();
            } else { alert("Función de voz no soportada."); }
        }

        function cerrarEnlaceVoz(event) { 
            if(event) event.stopPropagation(); 
            if(reconocimiento) reconocimiento.stop();
            document.getElementById('voice-overlay').style.display = 'none'; input.focus(); 
        }

        function agregarBurbuja(text, tipo) {
            const chat = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `bubble ${tipo}`; div.innerText = text;
            chat.appendChild(div); 
            document.getElementById('central-display').classList.add('hidden-ui');
            setTimeout(() => { chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' }); }, 50);
        }

        async function enviarComando() {
            const val = input.value.trim(); if(!val) return;
            agregarBurbuja(val, 'gabriel'); input.value = "";
            try {
                const res = await fetch('/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ msg: val }) });
                const data = await res.json(); 
                if(data.respuesta) { agregarBurbuja(data.respuesta, 'aurora'); hablarTexto(data.respuesta); }
            } catch(e) { agregarBurbuja("Error de conexión.", 'aurora'); }
            input.focus(); 
        }
    </script>
</body>
</html>

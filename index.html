<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURORA AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; }
        body { margin: 0; padding: 0; height: 100vh; background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; overflow: hidden; }
        
        /* FONDO DINÁMICO */
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.4) contrast(1.1); }
        
        #app-container { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; position: relative; }
        
        header { padding: 20px; text-align: center; font-family: 'Orbitron'; letter-spacing: 8px; opacity: 0.9; background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent); }
        
        /* VENTANA DE CHAT INVISIBLE Y ELEGANTE */
        #chat-window { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 18px; 
            scrollbar-width: none; 
            mask-image: linear-gradient(to bottom, transparent, black 12%, black 88%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 12%, black 88%, transparent);
        }
        #chat-window::-webkit-scrollbar { display: none; }

        .msg { 
            max-width: 82%; padding: 14px 20px; border-radius: 22px; font-size: 1rem; line-height: 1.5;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        
        .aurora { align-self: flex-start; background: rgba(255, 255, 255, 0.02); border-bottom-left-radius: 2px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        
        .user { align-self: flex-end; background: rgba(0, 242, 255, 0.04); border-bottom-right-radius: 2px; border-color: rgba(0, 242, 255, 0.15); color: #e0faff; }

        /* DOCK DE ENTRADA */
        .input-area { padding: 25px; }
        .input-container { 
            background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 35px; border: 1px solid rgba(255, 255, 255, 0.1); 
            display: flex; align-items: center; padding: 6px 18px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 1.05rem; font-family: inherit; }
        input::placeholder { color: rgba(255,255,255,0.25); }
        
        .btn { background: transparent; border: none; color: var(--accent); cursor: pointer; padding: 10px; transition: 0.3s; }
        .btn:active { transform: scale(0.85); }
        .btn svg { width: 26px; height: 26px; fill: currentColor; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="app-container">
        <header>AURORA</header>
        <div id="chat-window">
            <div class="msg aurora">Hola Gabriel. Sistema sincronizado al 110%. ¿Qué tienes en mente hoy

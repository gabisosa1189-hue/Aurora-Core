<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #00f2ff; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; background-color: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; }

        /* 🎥 VIDEO DE FONDO: NO TOCAR MÁS */
        #bg-video { position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; object-fit: cover !important; opacity: 1; }

        /* 🚪 LOGIN */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(35px); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 40px; border: 1px solid rgba(0, 242, 255, 0.3); text-align: center; width: 85%; max-width: 400px; }
        .titulo-login { font-family: 'Orbitron'; font-size: 1.5rem; letter-spacing: 5px; margin-bottom: 30px; }
        .btn-google { background: #fff; color: #000; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .login-input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 15px; width: 100%; border-radius: 15px; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        .btn-ingresar { background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; letter-spacing: 2px; }

        /* 📱 APP CONTAINER */
        #app-container { display: none; flex-direction: column; height: 100vh; width: 100%; max-width: 600px; margin: 0 auto; position: relative; z-index: 10; }
        header { padding: 40px 15px 10px 15px; text-align: center; }
        .titulo-app { font-family: 'Orbitron'; letter-spacing: 15px; font-size: 1.6rem; text-shadow: 0 0 20px var(--accent); }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 15px 20px; border-radius: 22px; backdrop-filter: blur(15px); line-height: 1.4; font-size: 0.95rem; }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.08); border: 1px solid rgba(0, 242, 255, 0.2); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }

        /* ⚙️ CONFIGURACIÓN: TEXTO SOLO, AL COSTADO (No arriba del chat) */
        .config-area { padding-bottom: 10px; display: flex; justify-content: flex-start; padding-left: 15px; }
        .btn-config-text { background: transparent; border: none; font-family: 'Orbitron'; font-size: 0.65rem; letter-spacing: 3px; cursor: pointer; transition: 0.3s;
            /* 💎 BRILLO BLANCO TOTAL (Como AURORA) */
            color: #fff; text-shadow: 0 0 15px var(--accent); 
        }
        .btn-config-text:hover { text-shadow: 0 0 25px #fff; }

        /* 🎤 BARRA DE CHAT CON LA "A" */
        .input-area { padding: 10px 15px 30px 15px; display: flex; align-items: center; gap: 10px; }
        .btn-a { font-family: 'Orbitron'; font-size: 1.8rem; color: var(--accent); background: none; border: none; cursor: pointer; text-shadow: 0 0 10px var(--accent); }
        .input-container { flex: 1; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 35px; display: flex; align-items: center; padding: 5px 15px; backdrop-filter: blur(20px); }
        #chat-terminal { flex: 1; background: transparent; border: none; color: white; padding: 12px 5px; outline: none; font-size: 1rem; width: 100%; }
        .btn-send { background: none; border: none; color: var(--accent); font-size: 1.6rem; cursor: pointer; }

        /* SIDEBAR AJUSTES */
        #sidebar { position: fixed; top: 0; left: -270px; width: 260px; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(40px); border-right: 1px solid rgba(0,242,255,0.2); z-index: 100000; transition: 0.4s; padding: 40px 20px; display: flex; flex-direction: column; }
        #sidebar.open { left: 0; }
        .close-sidebar { align-self: flex-end; background: none; border: none; color: var(--accent); font-size: 1.8rem; cursor: pointer; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="sidebar">
        <button class="close-sidebar" onclick="toggleSidebar()">✖</button>
        <h2 style="font-family:'Orbitron'; color:var(--accent); letter-spacing:2px; margin-bottom: 30px;">AJUSTES</h2>
        <button onclick="location.reload()" style="background:rgba(255,255,255,0.05); color:white; border:1px solid #ff4d4d; padding:15px; border-radius:15px; width:100%; cursor:pointer;">Cerrar Sesión</button>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h1 class="titulo-login">AURORA ACCESO</h1>
            <button onclick="entrar('Gabriel')" class="btn-google">G | Ingresar con Google</button>
            <input type="email" class="login-input" placeholder="Email">
            <button class="btn-ingresar" onclick="entrar('Usuario')">CONECTAR</button>
        </div>
    </div>

    <div id="app-container">
        <header><div class="titulo-app">AURORA</div></header>
        
        <div id="chat-window"><div class="msg aurora">Enlace neuronal establecido. ¿Qué deseás consultar?</div></div>

        <div class="config-area">
            <button class="btn-config-text" onclick="toggleSidebar()">CONFIGURACIÓN</button>
        </div>

        <div class="input-area">
            <button class="btn-a" onclick="alert('Iniciando modo voz...')">A</button>
            
            <div class="input-container">
                <input type="text" id="chat-terminal" placeholder="Escribe a Aurora..." autocomplete="off">
                <button onclick="enviar()" class="btn-send">➤</button>
            </div>
        </div>
        
        <p style="font-size:0.6rem; 
                  color:#fff; /* Blanco total */
                  text-shadow: 0 0 10px var(--accent); /* Brillo cian */
                  text-align:center; padding-bottom:15px; letter-spacing:1px; position:relative; z-index:10;">
            AURORA ES UNA IA Y PUEDE COMETER ERRORES.
        </p>
    </div>

    <script>
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        
        function entrar(name) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            const v = document.getElementById('bg-video');
            v.play().catch(e => console.log("Video auto-arranque blindado")); 
        }

        async function enviar() {
            const input = document.getElementById('chat-terminal');
            const val = input.value.trim(); if(!val) return;
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg user">${val}</div>`;
            input.value = ""; win.scrollTop = win.scrollHeight;
            try {
                const res = await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg:val}) });
                const data = await res.json();
                win.innerHTML += `<div class="msg aurora">${data.respuesta}</div>`;
                win.scrollTop = win.scrollHeight;
            } catch(e) { console.log("Error de conexión neuronal"); }
        }
    </script>
</body>
</html>

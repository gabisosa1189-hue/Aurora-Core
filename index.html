<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #00f2ff; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            overflow: hidden; background: none !important; 
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; 
        }

        /* 🎥 VIDEO DE FONDO: EL ALMA DE LA APP */
        #bg-video { 
            position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: -1; object-fit: cover !important; 
        }

        /* 🚪 LOGIN TRASLÚCIDO */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(20px); z-index: 9999; 
            display: flex; align-items: center; justify-content: center; 
        }
        .login-card { 
            background: rgba(255, 255, 255, 0.02); padding: 40px; border-radius: 40px; 
            border: 1px solid rgba(0, 242, 255, 0.2); text-align: center; max-width: 380px; width: 90%; 
        }

        /* 📱 APP CONTAINER */
        #app-container { display: none; flex-direction: column; height: 100vh; width: 100%; position: relative; z-index: 10; }

        header { padding: 40px 0 10px 0; text-align: center; }
        .titulo-app { font-family: 'Orbitron'; letter-spacing: 15px; font-size: 1.8rem; text-shadow: 0 0 15px var(--accent); }

        /* 🏁 CHAT: COLUMNA CENTRAL (Nivel Gemini/ChatGPT) */
        #chat-window { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 20px; 
            scrollbar-width: none;
            width: 100%; max-width: 700px; /* Ancho prolijo de chat */
            margin: 0 auto; /* Centrado absoluto */
        }
        
        .msg { 
            max-width: 80%; padding: 14px 22px; border-radius: 22px; 
            backdrop-filter: blur(15px); font-size: 1rem; line-height: 1.5;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Aurora: Izquierda */
        .aurora { 
            align-self: flex-start; background: rgba(0, 242, 255, 0.08); 
            border: 1px solid rgba(0, 242, 255, 0.3); border-bottom-left-radius: 4px;
        }
        /* Usuario: Derecha */
        .user { 
            align-self: flex-end; background: rgba(255, 255, 255, 0.08); 
            border: 1px solid rgba(255, 255, 255, 0.15); border-bottom-right-radius: 4px;
        }

        /* ⚙️ CONFIGURACIÓN: CLAVADA AL RINCÓN IZQUIERDO */
        .btn-config-fixed { 
            position: fixed; left: 25px; bottom: 58px; 
            background: none; border: none; cursor: pointer; color: #fff; 
            font-family: 'Orbitron'; font-size: 0.85rem; 
            letter-spacing: 2px; text-shadow: 0 0 15px var(--accent);
            display: flex; align-items: center; gap: 10px; z-index: 50;
        }

        /* 🏁 BARRA DE CHAT: CENTRADA */
        .bottom-section { 
            padding: 10px 20px 20px 20px; 
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .chat-group { display: flex; align-items: center; gap: 15px; width: 100%; max-width: 500px; }
        .btn-a { font-family: 'Orbitron'; font-size: 1.8rem; color: #fff; background: none; border: none; cursor: pointer; text-shadow: 0 0 15px var(--accent); }
        .input-bar { 
            flex: 1; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(0, 242, 255, 0.4); 
            border-radius: 40px; display: flex; align-items: center; padding: 5px 22px; backdrop-filter: blur(20px); 
        }
        #chat-terminal { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; outline: none; font-size: 1rem; }

        /* 💎 WARNING: CENTRADO TOTAL */
        .disclaimer { 
            text-align: center; font-size: 0.6rem; color: #fff; 
            text-shadow: 0 0 10px var(--accent); letter-spacing: 1px; width: 100%;
        }

        /* PANEL CONFIG MODAL */
        #config-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(35px); z-index: 100000; display: none; align-items: center; justify-content: center; }
        .config-card { background: rgba(255, 255, 255, 0.04); padding: 40px; border-radius: 35px; border: 1px solid var(--accent); text-align: center; width: 85%; max-width: 400px; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <button class="btn-config-fixed" onclick="document.getElementById('config-panel').style.display='flex'">
        <span style="font-size:1.5rem">⚙️</span> CONFIGURACIÓN
    </button>

    <div id="config-panel">
        <div class="config-card">
            <h2 style="font-family:'Orbitron';">CONFIGURACIÓN</h2>
            <p style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 30px;">CONFIGURACIÓN DE AURORA</p>
            <button onclick="location.reload()" style="background:rgba(255,255,255,0.1); color:white; border:none; padding:15px; width:100%; border-radius:15px; cursor:pointer; font-weight:bold;">CERRAR SESIÓN</button>
            <button style="background:transparent; color:#ff4d4d; border:1px solid #ff4d4d; padding:10px; width:100%; border-radius:15px; cursor:pointer; margin-top:15px; font-size:0.7rem;" onclick="confirm('¿Eliminar cuenta?')">ELIMINAR CUENTA</button>
            <br>
            <button style="margin-top:30px; background:none; border:none; color:var(--accent); cursor:pointer;" onclick="document.getElementById('config-panel').style.display='none'">VOLVER</button>
        </div>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h1 class="titulo-login">AURORA ACCESO</h1>
            <button class="btn-google" onclick="entrar()">G | Ingresar con Google</button>
            <button class="btn-ingresar" onclick="entrar()">INGRESAR</button>
        </div>
    </div>

    <div id="app-container">
        <header><div class="titulo-app">AURORA</div></header>
        
        <div id="chat-window">
            <div class="msg aurora">¡Bienvenido al futuro, Gabriel! Soy Aurora. Ya estamos sincronizados al 100%. ¿Qué misión tenemos hoy?</div>
        </div>

        <div class="bottom-section">
            <div class="chat-group">
                <button class="btn-a" onclick="alert('Voz activa')">A</button>
                <div class="input-bar">
                    <input type="text" id="chat-terminal" placeholder="Escribir mensaje neuronal..." autocomplete="off">
                    <button onclick="enviar()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-size:1.5rem;">➤</button>
                </div>
            </div>
            <div class="disclaimer">AURORA ES UNA IA Y PUEDE COMETER ERRORES.</div>
        </div>
    </div>

    <script>
        // MAndar con ENTER
        document.getElementById('chat-terminal').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { enviar(); }
        });

        function entrar() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            document.getElementById('bg-video').play(); 
        }

        async function enviar() {
            const input = document.getElementById('chat-terminal');
            const val = input.value.trim(); if(!val) return;
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg user">${val}</div>`;
            input.value = ""; win.scrollTop = win.scrollHeight;
            try {
                const res = await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg:val}) });
                const data = await res.json();
                win.innerHTML += `<div class="msg aurora">${data.respuesta}</div>`;
                win.scrollTop = win.scrollHeight;
            } catch(e) { 
                win.innerHTML += `<div class="msg aurora">Error de conexión neuronal...</div>`;
            }
        }
    </script>
</body>
</html>

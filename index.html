<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #00f2ff; --danger: #ff4d4d; }
        
        /* ✨ FIX APPLE: Forzamos que el alto ignore las barras del sistema */
        html, body { 
            margin: 0; padding: 0; width: 100%; 
            height: 100%; height: -webkit-fill-available; height: 100dvh;
            overflow: hidden; background-color: #000 !important; 
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; 
            overscroll-behavior-y: none; 
        }

        #loading-bar { position: fixed; top: 0; left: 0; width: 0%; height: 3px; background: var(--accent); box-shadow: 0 0 15px var(--accent); transition: 0.3s; z-index: 1000000; }

        /* ✨ VIDEO ANCLADO A LOS BORDES REALES DEL DISPOSITIVO */
        #bg-video { 
            position: fixed !important; 
            top: 0; left: 0; width: 100%; height: 100%; 
            min-height: -webkit-fill-available; min-height: 100dvh;
            z-index: 0 !important; object-fit: cover !important; 
            pointer-events: none; 
        }
        
        #panels-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100000; display: none; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }

        .panel-side { position: fixed; top: 0; width: 280px; height: 100%; background: rgba(0, 10, 20, 0.75); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); z-index: 100001; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; padding: 25px; padding-top: calc(env(safe-area-inset-top, 40px) + 20px); box-sizing: border-box; }
        #sidebar-menu { left: 0; transform: translateX(-100%); border-right: 1px solid rgba(0, 242, 255, 0.2); }
        #profile-panel { right: 0; transform: translateX(100%); border-left: 1px solid rgba(0, 242, 255, 0.2); }
        .panel-open { transform: translateX(0) !important; }
        .panel-title { font-family: 'Orbitron'; font-size: 0.9rem; color: var(--accent); letter-spacing: 3px; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; text-transform: uppercase; }

        .chat-item { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); font-size: 0.85rem; margin-bottom: 10px; transition: 0.3s; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .chat-item.active { background: rgba(0, 242, 255, 0.1); border-color: var(--accent); }

        .bottom-sheet { position: fixed; bottom: -100%; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(0, 15, 25, 0.85); backdrop-filter: blur(40px); border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 30px 30px 0 0; padding: 25px 25px 40px 25px; z-index: 100006; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 -10px 40px rgba(0, 242, 255, 0.15); }
        .bottom-sheet.show { bottom: 0; }
        .context-btn { background: transparent; color: #fff; border: none; padding: 16px 15px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1rem; text-align: left; width: 100%; border-radius: 15px; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.2s; }
        .context-btn:hover { background: rgba(0, 242, 255, 0.1); color: var(--accent); }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 10, 20, 0.4); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { text-align: center; max-width: 380px; width: 90%; }
        .login-input { width: 100%; box-sizing: border-box; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(0, 242, 255, 0.3); color: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; outline: none; font-family: 'Plus Jakarta Sans', sans-serif; }

        #app-container { display: none; flex-direction: column; height: 100%; min-height: 100dvh; width: 100%; position: relative; z-index: 10; transition: opacity 0.4s ease; }
        header { padding-top: calc(env(safe-area-inset-top, 40px) + 15px); padding-left: 20px; padding-right: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .titulo-app { font-family: 'Orbitron'; letter-spacing: 15px; font-size: 1.8rem; text-shadow: 0 0 15px var(--accent); margin: 0; flex: 1; text-align: center; }
        .btn-menu-top { background: transparent; border: none; cursor: pointer; color: #fff; font-size: 2rem; text-shadow: 0 0 15px var(--accent); padding: 0; width: 44px; text-align: left; }
        .header-spacer { width: 44px; display: flex; justify-content: flex-end; }
        #user-avatar { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--accent); box-shadow: 0 0 15px rgba(0,242,255,0.4); object-fit: cover; display: none; cursor: pointer; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 14px 22px; border-radius: 22px; backdrop-filter: blur(15px); font-size: 1rem; line-height: 1.5; }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.3); border-bottom-left-radius: 5px;}
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15); border-bottom-right-radius: 5px;}

        /* ✨ DISEÑO INFERIOR BAJO Y COMPACTO */
        .bottom-section { 
            padding: 10px 15px calc(env(safe-area-inset-bottom, 10px) + 5px) 15px; 
            display: flex; flex-direction: column; gap: 8px; width: 100%; box-sizing: border-box; 
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%); 
        }
        
        #chat-terminal { width: 100%; background: transparent; border: none; color: white; font-size: 1.05rem; font-family: 'Plus Jakarta Sans', sans-serif; outline: none; padding: 5px 10px; box-sizing: border-box; resize: none; overflow-y: hidden; min-height: 28px; max-height: 120px; line-height: 1.4; }

        .chat-tools { display: flex; justify-content: space-between; align-items: center; padding: 0 5px; }
        .tools-left { display: flex; align-items: center; gap: 12px; }
        .tools-right { display: flex; align-items: center; gap: 12px; }

        /* ✨ BOTÓN + BLANCO Y BRILLANTE */
        .btn-plus-icon { background: transparent; border: none; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 5px; filter: drop-shadow(0 0 10px #fff); }
        .btn-plus-icon svg { width: 26px; height: 26px; stroke: currentColor; stroke-width: 2.5; }

        .btn-mini-icon { background: transparent; border: none; color: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 5px; transition: 0.3s; }
        .btn-mini-icon svg { width: 24px; height: 24px; stroke: currentColor; }

        .btn-pill-model { background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 20px; padding: 6px 14px; font-size: 0.85rem; font-family: 'Orbitron'; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.3s; backdrop-filter: blur(10px); }

        /* ✨ BOTÓN A LUMINOSO TIPO LOGO */
        .btn-live-glow { background: transparent; border: none; color: #fff; font-family: 'Orbitron'; font-size: 1.8rem; display: flex; align-items: center; justify-content: center; cursor: pointer; text-shadow: 0 0 15px #fff; transition: 0.3s; padding: 0; }
        .btn-live-glow:hover { transform: scale(1.1); text-shadow: 0 0 25px #fff; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="loading-bar"></div>

    <div id="panels-overlay" onclick="cerrarPaneles()"></div>
    <div id="context-overlay" onclick="cerrarBottomSheets()"></div>

    <div id="sidebar-menu" class="panel-side">
        <h3 class="panel-title">MIS CHATS</h3>
        <div id="history-list" style="flex:1; overflow-y:auto; scrollbar-width:none;"></div>
        <button class="btn-premium-add" onclick="nuevoEnlace()">+ NUEVO CHAT</button>
        <div style="margin-top:25px;">
            <p style="color:var(--accent); font-size:0.7rem; margin-bottom:8px; font-family:'Orbitron';">CHATS: <span id="span-contador">1</span> / 5</p>
            <div style="width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:10px;"><div id="bar-progreso" style="width:20%; height:100%; background:var(--accent); border-radius:10px; box-shadow:0 0 10px var(--accent); transition:0.5s;"></div></div>
        </div>
    </div>

    <div id="profile-panel" class="panel-side">
        <h3 class="panel-title">MI CUENTA</h3>
        <button class="btn-account" style="color:var(--accent);" onclick="cambiarCuenta()">CAMBIAR CUENTA</button>
        <button class="btn-account" onclick="cerrarSesionReal()">CERRAR SESIÓN</button>
        <button class="btn-account" style="margin-top:auto; color:var(--danger);" onclick="eliminarCuenta()">ELIMINAR CUENTA</button>
        <div style="text-align:center; font-size:0.6rem; color:#fff; text-shadow:0 0 10px #fff; margin-top:15px; letter-spacing:1px; font-family:'Orbitron'; line-height: 1.5;">AURORA ES UNA IA Y PUEDE COMETER ERRORES.</div>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h2 id="titulo-login" style="font-family:'Orbitron'; line-height:1.4; margin-bottom:25px; text-shadow:0 0 15px var(--accent); letter-spacing: 2px;">BIENVENIDO A AURORA</h2>
            <input type="email" placeholder="Correo electrónico" class="login-input" id="emailInput">
            <input type="password" placeholder="Contraseña" class="login-input" id="passwordInput">
            <button id="btn-principal" style="background:transparent; border:2px solid var(--accent); color:var(--accent); padding:15px; width:100%; border-radius:18px; font-weight:bold; cursor:pointer; font-family:'Orbitron';" onclick="authCorreo()">INGRESAR</button>
            <div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-top:15px;">
                <a onclick="toggleRegistro()" id="link-registro" style="color:#fff;">Crear Cuenta</a>
            </div>
            <button style="background:rgba(255,255,255,0.9); color:#000; border:none; padding:15px; border-radius:18px; font-weight:bold; width:100%; margin-top:25px;" onclick="authGoogle()">Ingresar con Google</button>
        </div>
    </div>

    <div id="app-container">
        <header>
            <button class="btn-menu-top" onclick="abrirSidebar()">☰</button>
            <div class="titulo-app">AURORA</div>
            <div class="header-spacer"><img id="user-avatar" src="" alt="Perfil" onclick="abrirPerfil()"></div>
        </header>

        <div id="chat-window">
            <div class="msg aurora">Bienvenido al núcleo de <b>Aurora</b>. Tu enlace neuronal está activo.</div>
        </div>

        <div class="bottom-section">
            <textarea id="chat-terminal" rows="1" placeholder="Preguntale a Aurora..." oninput="autoResize(this); toggleInputButtons()"></textarea>
            <div class="chat-tools">
                <div class="tools-left">
                    <button class="btn-plus-icon" onclick="abrirAdjuntos()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                    <button class="btn-pill-model" id="engine-pill" onclick="abrirMotores()">⚡ Flash</button>
                    <button id="btn-mic" class="btn-mini-icon" onclick="iniciarDictado()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"></path></svg></button>
                </div>
                <div class="tools-right">
                    <button id="btn-enviar" class="btn-mini-icon" onclick="enviar()" style="display:none; color:var(--accent);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
                    <button class="btn-live-glow" onclick="alert('Iniciando Live...')">A</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo", authDomain: "aurora-ai-oficia.firebaseapp.com", projectId: "aurora-ai-oficia", storageBucket: "aurora-ai-oficia.firebasestorage.app", messagingSenderId: "426513637524", appId: "1:426513637524:web:13851f499aa4af13cfd481", measurementId: "G-XTN5WJPRPP" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth();
        let motorActual = 'flash';

        function autoResize(t) { t.style.height = 'auto'; t.style.height = t.scrollHeight + 'px'; }
        function toggleInputButtons() {
            const val = document.getElementById('chat-terminal').value.trim();
            document.getElementById('btn-mic').style.display = val ? 'none' : 'flex';
            document.getElementById('btn-enviar').style.display = val ? 'flex' : 'none';
        }

        function abrirSidebar() { document.getElementById('sidebar-menu').classList.add('panel-open'); document.getElementById('panels-overlay').style.display = 'block'; }
        function abrirPerfil() { document.getElementById('profile-panel').classList.add('panel-open'); document.getElementById('panels-overlay').style.display = 'block'; }
        function cerrarPaneles() { document.querySelectorAll('.panel-side').forEach(p => p.classList.remove('panel-open')); document.getElementById('panels-overlay').style.display = 'none'; }
        
        function authGoogle() { const p = new firebase.auth.GoogleAuthProvider(); auth.signInWithRedirect(p); }
        function authCorreo() { const e = document.getElementById('emailInput').value; const p = document.getElementById('passwordInput').value; auth.signInWithEmailAndPassword(e,p).catch(err => alert(err.message)); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                if (user.photoURL) { const img = document.getElementById('user-avatar'); img.src = user.photoURL; img.style.display = 'block'; }
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            }
        });
        
        auth.getRedirectResult().catch(e => console.error(e));
    </script>
</body>
</html>

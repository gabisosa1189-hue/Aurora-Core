<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #00f2ff; --danger: #ff4d4d; }
        
        /* ✨ 1. EL CANDADO: PROHIBIDO REBOTAR */
        html, body {
            margin: 0; padding: 0; 
            width: 100%; 
            height: 100dvh; /* Altura dinámica para iPhone */
            overflow: hidden; 
            position: fixed; /* Bloqueo de posición física */
            background-color: #000 !important; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overscroll-behavior: none; /* Mata el rebote */
            -webkit-user-select: none;
        }

        /* ✨ 2. EL VIDEO: SOBREDIMENSIONADO Y FIJO */
        #bg-video {
            position: fixed !important;
            inset: -5% !important; /* Desborda un 5% por cada lado para que el rebote no muestre negro */
            width: 110% !important;
            height: 110% !important;
            z-index: -1; 
            object-fit: cover !important;
            pointer-events: none !important;
        }

        /* ✨ 3. CONTENEDOR APP: FIJO AL TAMAÑO REAL */
        #app-container { 
            display: none; flex-direction: column; 
            position: absolute; inset: 0; 
            height: 100dvh;
            z-index: 10; 
        }

        header { 
            padding-top: calc(env(safe-area-inset-top, 44px) + 5px); 
            padding-left: 20px; padding-right: 20px; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .titulo-app { font-family: 'Orbitron'; letter-spacing: 12px; font-size: 1.6rem; text-shadow: 0 0 15px var(--accent); flex: 1; text-align: center; color: #fff; margin: 0; }

        /* ✨ EL CHAT: ÚNICO ELEMENTO CON MOVIMIENTO */
        #chat-window { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 20px; 
            scrollbar-width: none; 
            -webkit-overflow-scrolling: touch; 
            touch-action: pan-y;
        }
        
        .msg { max-width: 85%; padding: 14px 22px; border-radius: 22px; backdrop-filter: blur(15px); font-size: 1rem; color: #fff; }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.2); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }

        /* ✨ BOTTOM SECTION: AJUSTADA AL ÁREA SEGURA */
        .bottom-section { 
            padding: 10px 15px calc(env(safe-area-inset-bottom, 15px) + 10px) 15px; 
            display: flex; flex-direction: column; gap: 10px; width: 100%; box-sizing: border-box;
        }
        
        #chat-terminal { 
            width: 100%; background: transparent; border: none; color: white; font-size: 1.1rem; 
            font-family: 'Plus Jakarta Sans', sans-serif; outline: none; padding: 10px; 
            resize: none; overflow-y: hidden; text-shadow: 0 0 10px #fff; 
        }
        #chat-terminal::placeholder { color: rgba(255,255,255,0.6); font-family: 'Orbitron'; }

        .chat-tools { display: flex; justify-content: space-between; align-items: center; }
        .btn-plus-white { background: transparent; border: none; color: #fff; cursor: pointer; transform: scale(1.2); }
        .btn-pill-model { background: rgba(0, 242, 255, 0.1); border: 1px solid var(--accent); color: #fff; border-radius: 20px; padding: 6px 14px; font-family: 'Orbitron'; font-size: 0.75rem; }
        .btn-a-glow { background: transparent; border: none; color: #fff; font-family: 'Orbitron'; font-size: 2rem; cursor: pointer; text-shadow: 0 0 20px #fff, 0 0 30px var(--accent); }

        /* LOGIN */
        #login-overlay { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: rgba(0, 10, 20, 0.4); backdrop-filter: blur(15px); }
        .login-card { text-align: center; max-width: 380px; width: 90%; }
        .login-input { width: 100%; box-sizing: border-box; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(0, 242, 255, 0.3); color: white; padding: 18px 15px; border-radius: 15px; margin-bottom: 15px; outline: none; font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline webkit-playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="font-family:'Orbitron'; text-shadow: 0 0 15px var(--accent); color:#fff; margin-bottom: 30px; letter-spacing: 5px;">AURORA</h2>
            <input type="email" placeholder="Email" class="login-input" id="emailInput">
            <input type="password" placeholder="Contraseña" class="login-input" id="passwordInput">
            <button style="background:transparent; border:2px solid var(--accent); color:var(--accent); padding:15px; width:100%; border-radius:18px; font-weight:bold; font-family:'Orbitron';" onclick="authCorreo()">INGRESAR</button>
            <button style="background:#fff; color:#000; border:none; padding:15px; border-radius:18px; font-weight:bold; width:100%; margin-top:40px;" onclick="authGoogle()">Ingresar con Google</button>
        </div>
    </div>

    <div id="app-container">
        <header>
            <button style="background:none; border:none; color:#fff; font-size:2rem;">☰</button>
            <div class="titulo-app">AURORA</div>
            <div style="width:44px;"></div>
        </header>

        <div id="chat-window">
            <div class="msg aurora">Sistema blindado activo.</div>
        </div>

        <div class="bottom-section">
            <textarea id="chat-terminal" rows="1" placeholder="Tu mensaje..."></textarea>
            <div class="chat-tools">
                <div class="tools-left"><button class="btn-plus-white">➕</button></div>
                <div class="tools-right"><button class="btn-a-glow">A</button></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo", authDomain: "aurora-ai-oficia.firebaseapp.com", projectId: "aurora-ai-oficia", storageBucket: "aurora-ai-oficia.firebasestorage.app", messagingSenderId: "426513637524", appId: "1:426513637524:web:13851f499aa4af13cfd481", measurementId: "G-XTN5WJPRPP" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth();

        // ✨ BLOQUEO TOTAL DE ARRASTRE FUERA DEL CHAT
        document.addEventListener('touchmove', function (e) {
            if (!e.target.closest('#chat-window')) {
                e.preventDefault();
            }
        }, { passive: false });

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            }
        });
        function authGoogle() { const p = new firebase.auth.GoogleAuthProvider(); auth.signInWithRedirect(p); }
        function authCorreo() { const e = document.getElementById('emailInput').value; const p = document.getElementById('passwordInput').value; auth.signInWithEmailAndPassword(e,p).catch(err => alert("Error")); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURORA AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; height: 100vh; background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; overflow: hidden; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.4); }
        #app-container { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; }
        header { padding: 20px; text-align: center; font-family: 'Orbitron'; letter-spacing: 5px; opacity: 0.8; }
        
        #chat-window { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; 
            scrollbar-width: none; mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
        }
        
        /* BURBUJAS INVISIBLES ELEGANTES */
        .msg { 
            max-width: 80%; padding: 14px 18px; border-radius: 20px; font-size: 1rem; 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); animation: fade 0.4s ease;
        }
        .aurora { align-self: flex-start; background: rgba(255, 255, 255, 0.03); border-bottom-left-radius: 2px; }
        .user { align-self: flex-end; background: rgba(0, 242, 255, 0.05); border-bottom-right-radius: 2px; border-color: rgba(0, 242, 255, 0.2); }

        .input-area { padding: 20px; }
        .input-container { 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); 
            border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); 
            display: flex; align-items: center; padding: 5px 15px; 
        }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 1rem; }
        .btn { background: transparent; border: none; color: #00f2ff; cursor: pointer; padding: 10px; }
        @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video"><source src="fondo.mp4" type="video/mp4"></video>
    <div id="app-container">
        <header>AURORA</header>
        <div id="chat-window"><div class="msg aurora">Hola Gabriel. Sistema listo.</div></div>
        <div class="input-area">
            <div class="input-container">
                <input type="text" id="user-input" placeholder="Preguntale a Aurora..." autocomplete="off">
                <button class="btn" onclick="enviar()">➤</button>
            </div>
        </div>
    </div>

    <script>
        const chatWin = document.getElementById('chat-window');
        const input = document.getElementById('user-input');

        // --- MOTOR DE VOZ FEMENINA MEJORADO ---
        function hablar(texto) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(texto);
            const voces = window.speechSynthesis.getVoices();
            // Busca voces femeninas en español
            const vozFemenina = voces.find(v => v.lang.includes('es') && (v.name.includes('Google') || v.name.includes('Helena') || v.name.includes('Lucia') || v.name.includes('Zira')));
            if (vozFemenina) u.voice = vozFemenina;
            u.lang = 'es-MX'; u.pitch = 1.1; u.rate = 1.0;
            window.speechSynthesis.speak(u);
        }

        // Carga voces para que estén listas
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

        async function enviar() {
            const msg = input.value.trim(); if(!msg) return;
            addMsg(msg, 'user'); input.value = '';
            try {
                const res = await fetch('/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({msg}) });
                const data = await res.json();
                addMsg(data.respuesta, 'aurora');
                hablar(data.respuesta);
            } catch { addMsg("Error de conexión.", 'aurora'); }
        }

        function addMsg(t, cl) {
            const d = document.createElement('div'); d.className = `msg ${cl}`; d.innerText = t;
            chatWin.appendChild(d); chatWin.scrollTo({top: chatWin.scrollHeight, behavior: 'smooth'});
        }
        input.addEventListener('keypress', (e) => e.key === 'Enter' && enviar());
    </script>
</body>
</html>

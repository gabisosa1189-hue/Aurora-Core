<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #00f2ff; --danger: #ff4d4d; --glow-white: rgba(255, 255, 255, 0.8); }

        html { height: -webkit-fill-available; background-color: #0c1425; }

        body { 
            margin: 0; padding: 0; width: 100vw; height: 100dvh;
            background-color: #0c1425; overflow: hidden; position: fixed; inset: 0;
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; 
            overscroll-behavior-y: none; -webkit-tap-highlight-color: transparent;
        }

        #bg-video {
            position: fixed !important; top: 50% !important; left: 50% !important;
            width: 150vw !important; height: 150dvh !important;
            transform: translate(-50%, -50%) !important;
            object-fit: cover !important; z-index: -100 !important;
            pointer-events: none !important;
        }
        
        #panels-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100000; display: none; backdrop-filter: blur(5px); }

        /* ✨ LOGIN CARD RESTAURADA */
        #login-overlay { 
            position: fixed; inset: 0; width: 100vw; height: 100dvh;
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; backdrop-filter: blur(15px); background: transparent !important;
        }
        .login-card { 
            background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 40px; 
            border: 1px solid rgba(0, 242, 255, 0.2); text-align: center; 
            max-width: 380px; width: 85%; box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        .login-input { width: 100%; box-sizing: border-box; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(0, 242, 255, 0.3); color: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; outline: none; }

        #app-container { display: none; flex-direction: column; width: 100vw; height: 100dvh; position: fixed; inset: 0; z-index: 10; }
        
        header { 
            padding: calc(env(safe-area-inset-top, 50px) + 10px) 20px 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            position: relative; min-height: 60px;
        }

        @keyframes aurora-breath {
            0%, 100% { text-shadow: 0 0 15px var(--accent); opacity: 0.8; }
            50% { text-shadow: 0 0 30px var(--accent), 0 0 10px var(--accent); opacity: 1; }
        }

        .titulo-app { 
            font-family: 'Orbitron'; letter-spacing: 12px; font-size: 1.6rem; 
            margin: 0; position: absolute; left: 50%; top: 55%; 
            transform: translate(-50%, -50%); white-space: nowrap; pointer-events: none;
            animation: aurora-breath 4s infinite ease-in-out;
        }

        #user-avatar { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--accent); box-shadow: 0 0 15px var(--accent); object-fit: cover; display: none; cursor: pointer; z-index: 20; }
        .btn-menu-lateral { background: transparent; border: none; color: #fff; font-size: 1.8rem; cursor: pointer; z-index: 20; }

        /* PANELES */
        .panel-side { 
            position: fixed; top: 0; width: 280px; height: 100%; 
            background: rgba(0, 5, 15, 0.9); backdrop-filter: blur(30px); 
            z-index: 100001; transition: 0.3s; padding: 25px; 
            padding-top: calc(env(safe-area-inset-top, 50px) + 20px); 
            box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; 
        }
        #sidebar-menu { left: 0; transform: translateX(-100%); border-right: 1px solid rgba(0, 242, 255, 0.2); }
        #profile-panel { right: 0; transform: translateX(100%); border-left: 1px solid rgba(0, 242, 255, 0.2); }
        .panel-open { transform: translateX(0) !important; }

        /* ✨ TEXTOS BRILLOSOS REGLA DE ORO */
        .shiny-white-title {
            font-family: 'Orbitron'; color: #fff;
            text-shadow: 0 0 15px var(--glow-white), 0 0 5px var(--glow-white);
            letter-spacing: 4px; font-size: 1.1rem; margin-bottom: 25px; text-align: center;
        }

        .shiny-disclaimer {
            color: #fff; text-shadow: 0 0 10px var(--glow-white);
            font-family: 'Orbitron'; font-size: 0.65rem; text-align: center;
            margin-top: auto; padding: 25px 0; letter-spacing: 1px; line-height: 1.5;
            opacity: 0.9; border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* BOTONES ELEGANTES */
        .panel-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff; padding: 16px; border-radius: 18px; cursor: pointer;
            font-family: 'Plus Jakarta Sans'; font-size: 0.9rem; text-align: left;
            transition: 0.3s; display: flex; align-items: center; gap: 15px;
        }
        .panel-btn:hover { background: rgba(0, 242, 255, 0.1); border-color: var(--accent); transform: translateX(5px); }
        .panel-btn.danger { color: var(--danger); border-color: rgba(255, 77, 77, 0.2); }
        .panel-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 14px 22px; border-radius: 22px; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); font-size: 1rem; line-height: 1.5; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.08); border: 1px solid rgba(0, 242, 255, 0.2); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); }

        .unified-panel { background: rgba(0, 10, 20, 0.45); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-radius: 35px 35px 0 0; padding: 25px 20px calc(env(safe-area-inset-bottom, 20px) + 20px) 20px !important; display: flex; flex-direction: column; gap: 15px; }
        #chat-terminal { width: 100%; background: transparent; border: none; color: white; font-size: 1.05rem; outline: none; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="panels-overlay" onclick="cerrarPaneles()"></div>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="font-family:'Orbitron'; letter-spacing: 5px; color:#fff;">AURORA</h2>
            <button style="background:rgba(255,255,255,0.9); color:#000; border:none; padding:15px; border-radius:18px; font-weight:bold; cursor:pointer; width:100%; font-family:'Orbitron';" onclick="authGoogle()">INGRESAR CON GOOGLE</button>
        </div>
    </div>

    <div id="app-container">
        <header>
            <button class="btn-menu-lateral" onclick="abrirSidebar()">☰</button>
            <div class="titulo-app">AURORA</div>
            <img id="user-avatar" src="" alt="Perfil" onclick="abrirPerfil()">
        </header>
        
        <div id="chat-window">
            <div class="msg aurora">Sistema sincronizado, Gabriel. ¿Cuál es el siguiente paso en la evolución?</div>
        </div>

        <div class="bottom-section">
            <div class="unified-panel">
                <input type="text" id="chat-terminal" placeholder="Preguntale a Aurora..." autocomplete="off" oninput="toggleInputButtons()">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <button style="background: rgba(0, 242, 255, 0.1); border: 1px solid rgba(0, 242, 255, 0.3); color: #fff; border-radius: 20px; padding: 8px 16px; font-family: 'Orbitron'; cursor: pointer;">⚡ Flash</button>
                    <button id="btn-enviar" style="background:transparent; border:none; color:var(--accent); cursor:pointer; display:none;" onclick="enviar()">
                        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="sidebar-menu" class="panel-side">
        <div class="shiny-white-title">CHATS</div>
    </div>
    
    <div id="profile-panel" class="panel-side">
        <div class="shiny-white-title">MI CUENTA</div>
        
        <button class="panel-btn" onclick="auth.signOut().then(() => location.reload())">
            <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
            Cerrar Sesión
        </button>
        
        <button class="panel-btn" onclick="cambiarCuenta()">
            <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M8 7a4 4 0 0 1 4-4M20 8v6M23 11h-6"/></svg>
            Cambiar Cuenta
        </button>
        
        <button class="panel-btn danger" onclick="eliminarCuenta()">
            <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"/></svg>
            Eliminar Cuenta
        </button>

        <div class="shiny-disclaimer">
            AURORA ES UNA IA Y PUEDE COMETER ERRORES.
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo", authDomain: "aurora-ai-oficia.firebaseapp.com", projectId: "aurora-ai-oficia", storageBucket: "aurora-ai-oficia.firebasestorage.app", messagingSenderId: "426513637524", appId: "1:426513637524:web:13851f499aa4af13cfd481", measurementId: "G-XTN5WJPRPP" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth();

        function abrirSidebar() { document.getElementById('sidebar-menu').classList.add('panel-open'); document.getElementById('panels-overlay').style.display = 'block'; }
        function abrirPerfil() { document.getElementById('profile-panel').classList.add('panel-open'); document.getElementById('panels-overlay').style.display = 'block'; }
        function cerrarPaneles() { document.querySelectorAll('.panel-side').forEach(p => p.classList.remove('panel-open')); document.getElementById('panels-overlay').style.display = 'none'; }

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                if (user.photoURL) { const av = document.getElementById('user-avatar'); av.src = user.photoURL; av.style.display = 'block'; }
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            }
        });

        function cambiarCuenta() { auth.signOut().then(() => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())); }
        
        function eliminarCuenta() {
            if(confirm("¿Estás seguro? Esta acción es irreversible.")) {
                auth.currentUser.delete().then(() => location.reload()).catch(() => alert("Iniciá sesión de nuevo para borrar la cuenta."));
            }
        }

        function toggleInputButtons() {
            const val = document.getElementById('chat-terminal').value.trim();
            document.getElementById('btn-enviar').style.display = val ? 'flex' : 'none';
        }

        async function enviar() {
            const input = document.getElementById('chat-terminal'); if(!input.value.trim()) return;
            const msj = input.value;
            document.getElementById('chat-window').innerHTML += `<div class="msg user">${msj}</div>`;
            input.value = ""; toggleInputButtons();
            try { 
                const res = await fetch('https://gabiland-aurora-ai-mendoza.hf.space/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg:msj}) }); 
                const data = await res.json(); 
                document.getElementById('chat-window').innerHTML += `<div class="msg aurora">${data.respuesta}</div>`;
                const win = document.getElementById('chat-window'); win.scrollTop = win.scrollHeight;
            } catch(e) { console.log(e); }
        }

        function authGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    </script>
</body>
</html>

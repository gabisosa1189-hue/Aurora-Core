<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA CORE</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #00f2ff; }
        
        /* ✨ 1. CLAVAMOS EL CUERPO AL VIDRIO */
        html, body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            overflow: hidden; background-color: #000 !important;
            position: fixed; top: 0; left: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* ✨ 2. EL ATAQUE AL HOME INDICATOR (LA BARRA NEGRA) */
        #bg-video {
            position: absolute !important;
            /* 👇 Forzamos al video a irse 150 píxeles ABAJO del final del iPhone 👇 */
            top: -50px; left: -50px;
            width: calc(100vw + 100px);
            height: calc(100vh + 200px); 
            z-index: 0;
            object-fit: cover !important;
            pointer-events: none;
            /* Zoom para que no haya bordes laterales */
            transform: scale(1.1);
        }

        /* ✨ 3. INTERFAZ FLOTANTE */
        #app-container {
            position: absolute; inset: 0;
            display: none; flex-direction: column;
            z-index: 10;
        }

        header { padding: 60px 20px 10px; text-align: center; }
        .titulo-app { font-family: 'Orbitron'; letter-spacing: 15px; font-size: 1.8rem; color: #fff; text-shadow: 0 0 15px var(--accent); }

        #chat-window {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }

        .msg { max-width: 80%; padding: 12px 18px; border-radius: 22px; backdrop-filter: blur(15px); color: #fff; font-size: 0.95rem; }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.1); border: 1px solid rgba(0, 242, 255, 0.3); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); }

        /* ✨ 4. EL TRUCO FINAL DE LA BARRA DE TEXTO */
        .bottom-section {
            /* Forzamos a la barra a flotar un poco más arriba para que la negra no moleste */
            padding: 10px 20px calc(env(safe-area-inset-bottom) + 25px);
        }

        .input-box {
            display: flex; align-items: center; gap: 10px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--accent);
            border-radius: 30px; padding: 5px 15px;
            backdrop-filter: blur(20px);
        }

        #chat-terminal { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; outline: none; font-size: 1rem; }
        
        /* LOGIN */
        #login-overlay { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); }
        .login-card { width: 85%; text-align: center; }
        .login-input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--accent); background: #000; color: #fff; font-family: 'Plus Jakarta Sans'; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline webkit-playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="color:#fff; font-family:'Orbitron'; letter-spacing:5px;">AURORA</h2>
            <input type="email" id="email" class="login-input" placeholder="Acceso Email">
            <input type="password" id="pass" class="login-input" placeholder="Password">
            <button onclick="login()" style="width:100%; padding:15px; border-radius:12px; background:var(--accent); border:none; font-family:'Orbitron'; font-weight:bold; cursor:pointer;">SINCRONIZAR</button>
            <button onclick="authGoogle()" style="width:100%; padding:15px; border-radius:12px; background:#fff; border:none; font-family:'Orbitron'; font-weight:bold; cursor:pointer; margin-top:20px;">GOOGLE</button>
        </div>
    </div>

    <div id="app-container">
        <header><div class="titulo-app">AURORA</div></header>
        <div id="chat-window">
            <div class="msg aurora">Estamos juntos en esto, Gabriel. La barra ya no existe.</div>
        </div>
        <div class="bottom-section">
            <div class="input-box">
                <input type="text" id="chat-terminal" placeholder="Escribí al núcleo...">
                <button onclick="enviar()" style="background:none; border:none; color:var(--accent); font-size:1.5rem; cursor:pointer;">➤</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo", authDomain: "aurora-ai-oficia.firebaseapp.com", projectId: "aurora-ai-oficia", storageBucket: "aurora-ai-oficia.firebasestorage.app", messagingSenderId: "426513637524", appId: "1:426513637524:web:13851f499aa4af13cfd481", measurementId: "G-XTN5WJPRPP" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => alert("Error: " + err.message));
        }
        function authGoogle() { const p = new firebase.auth.GoogleAuthProvider(); auth.signInWithRedirect(p); }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
            }
        });

        async function enviar() {
            const input = document.getElementById('chat-terminal');
            const msg = input.value; if(!msg) return;
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg user">${msg}</div>`;
            input.value = "";
            win.scrollTop = win.scrollHeight;

            try {
                const res = await fetch('https://gabiland-aurora-ai-mendoza.hf.space/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({msg: msg})
                });
                const data = await res.json();
                win.innerHTML += `<div class="msg aurora">${data.respuesta}</div>`;
                win.scrollTop = win.scrollHeight;
            } catch(e) { win.innerHTML += `<div class="msg aurora">Fallo de enlace...</div>`; }
        }
    </script>
</body>
</html>

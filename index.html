<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURORA AI - NÚCLEO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        
        body { 
            margin: 0; padding: 0; height: 100vh; background: #000;
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; overflow: hidden;
        }

        /* FONDO DINÁMICO */
        #bg-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -1; filter: brightness(0.5) contrast(1.1);
        }

        /* CONTENEDOR PRINCIPAL */
        #app-container {
            display: flex; flex-direction: column; height: 100vh;
            max-width: 900px; margin: 0 auto; position: relative;
        }

        /* HEADER DISCRETO */
        header {
            padding: 20px; text-align: center; background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
        }
        header h1 { 
            font-family: 'Orbitron'; font-size: 1.5rem; margin: 0; letter-spacing: 8px;
            background: linear-gradient(45deg, #fff, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* ÁREA DE MENSAJES */
        #chat-window {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 20px;
            scrollbar-width: none; mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
        }
        #chat-window::-webkit-scrollbar { display: none; }

        /* BURBUJAS DE CRISTAL PULIDAS */
        .msg { 
            max-width: 85%; padding: 16px 20px; border-radius: 24px; font-size: 1rem; 
            line-height: 1.6; animation: slideUp 0.3s ease;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
        }
        
        .aurora { 
            align-self: flex-start; 
            background: var(--glass); 
            border-bottom-left-radius: 4px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        .user { 
            align-self: flex-end; 
            background: rgba(0, 242, 255, 0.08); 
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-bottom-right-radius: 4px;
        }

        /* BARRA DE ENTRADA (DOCK) */
        .input-area {
            padding: 20px; background: transparent;
        }
        .input-container {
            background: rgba(20, 20, 25, 0.7); backdrop-filter: blur(25px);
            border-radius: 32px; border: 1px solid var(--border);
            display: flex; align-items: center; padding: 8px 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        
        input { 
            flex: 1; background: transparent; border: none; color: white;
            padding: 12px; font-size: 1rem; outline: none; font-family: inherit;
        }

        .btn {
            background: transparent; border: none; color: white; cursor: pointer;
            width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            transition: 0.2s; border-radius: 50%;
        }
        .btn:active { transform: scale(0.9); }
        .btn svg { width: 24px; height: 24px; fill: currentColor; }
        
        #send-btn { color: var(--accent); }

        /* EFECTO DE CARGA */
        .typing { font-size: 0.8rem; opacity: 0.6; margin: 0 0 10px 30px; display: none; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="app-container">
        <header>
            <h1>AURORA</h1>
        </header>

        <div id="chat-window">
            <div class="msg aurora">Hola Gabriel. Estoy lista. ¿Qué vamos a crear hoy?</div>
        </div>

        <div class="typing" id="typing-indicator">Aurora está pensando...</div>

        <div class="input-area">
            <div class="input-container">
                <button class="btn" id="mic-btn" onclick="startVoz()">
                    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                </button>
                <input type="text" id="user-input" placeholder="Preguntale a Aurora..." autocomplete="off">
                <button class="btn" id="send-btn" onclick="enviar()">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatWin = document.getElementById('chat-window');
        const input = document.getElementById('user-input');
        const loader = document.getElementById('typing-indicator');

        // --- MOTOR DE VOZ FEMENINA ---
        function hablar(texto) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(texto);
                const voces = window.speechSynthesis.getVoices();
                
                // Prioridad: Voces femeninas latinas
                const vozFemenina = voces.find(v => 
                    v.lang.includes('es') && (v.name.includes('Google') || v.name.includes('Microsoft') || v.name.includes('Helena') || v.name.includes('Lucia') || v.name.includes('Zira'))
                );
                
                if (vozFemenina) u.voice = vozFemenina;
                u.lang = 'es-MX';
                u.rate = 1.0;
                u.pitch = 1.1; // Sutil tono femenino
                window.speechSynthesis.speak(u);
            }
        }
        // Precarga de voces
        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };

        function addMsg(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            chatWin.appendChild(div);
            chatWin.scrollTo({ top: chatWin.scrollHeight, behavior: 'smooth' });
        }

        async function enviar() {
            const msg = input.value.trim();
            if(!msg) return;

            addMsg(msg, 'user');
            input.value = '';
            loader.style.display = 'block';

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ msg: msg })
                });
                const data = await res.json();
                loader.style.display = 'none';
                
                if(data.respuesta) {
                    addMsg(data.respuesta, 'aurora');
                    hablar(data.respuesta); // Aurora habla con voz de mujer
                }
            } catch (e) {
                loader.style.display = 'none';
                addMsg("Error de conexión con el núcleo.", 'aurora');
            }
        }

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });

        function startVoz() {
            if ('webkitSpeechRecognition' in window) {
                const rec = new webkitSpeechRecognition();
                rec.lang = 'es-AR';
                rec.onresult = (e) => {
                    input.value = e.results[0][0].transcript;
                    enviar();
                };
                rec.start();
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #00f2ff; --danger: #ff4d4d; }
        
        /* ✨ RESET TOTAL PARA IPHONE */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; height: 100dvh;
            overflow: hidden; background-color: #000 !important; 
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; 
            overscroll-behavior-y: none;
        }

        #loading-bar { position: fixed; top: 0; left: 0; width: 0%; height: 3px; background: var(--accent); box-shadow: 0 0 15px var(--accent); transition: 0.3s; z-index: 1000000; }

        /* ✨ EL VIDEO QUE SE COME TODO (TRUCO DEL 101%) */
        #bg-video { 
            position: fixed !important; top: 50%; left: 50%; 
            min-width: 101%; min-height: 101%; 
            width: auto; height: auto; z-index: 0 !important; 
            transform: translate(-50%, -50%); 
            object-fit: cover !important; pointer-events: none;
        }
        
        #panels-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: rgba(0,0,0,0.5); z-index: 100000; display: none; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }

        /* PANELES LATERALES */
        .panel-side { position: fixed; top: 0; width: 280px; height: 100dvh; background: rgba(0, 10, 20, 0.75); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); z-index: 100001; transition: 0.3s; display: flex; flex-direction: column; padding: 25px; padding-top: calc(env(safe-area-inset-top, 40px) + 20px); box-sizing: border-box; }
        #sidebar-menu { left: 0; transform: translateX(-100%); }
        #profile-panel { right: 0; transform: translateX(100%); }
        .panel-open { transform: translateX(0) !important; }
        .panel-title { font-family: 'Orbitron'; font-size: 0.9rem; color: var(--accent); letter-spacing: 3px; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }

        /* LOGIN LIMPIO */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { text-align: center; max-width: 380px; width: 90%; }
        .login-input { width: 100%; box-sizing: border-box; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.2); color: white; padding: 18px 15px; border-radius: 15px; margin-bottom: 15px; outline: none; }

        /* APP */
        #app-container { display: none; flex-direction: column; height: 100dvh; width: 100%; position: relative; z-index: 10; }
        header { padding-top: calc(env(safe-area-inset-top, 40px) + 15px); padding-left: 20px; padding-right: 20px; display: flex; justify-content: space-between; align-items: center; }
        .titulo-app { font-family: 'Orbitron'; letter-spacing: 15px; font-size: 1.8rem; text-shadow: 0 0 15px var(--accent); margin: 0; flex: 1; text-align: center; padding-left: 15px; }
        .btn-menu-top { background: transparent; border: none; cursor: pointer; color: #fff; font-size: 2rem; width: 44px; }
        #user-avatar { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--accent); display: none; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 14px 22px; border-radius: 22px; backdrop-filter: blur(15px); font-size: 1rem; }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.05); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.05); }

        /* ✨ DISEÑO GEMINI DESNUDO Y BRILLANTE */
        .bottom-section { 
            padding: 5px 15px calc(env(safe-area-inset-bottom, 5px) + 10px) 15px; 
            display: flex; flex-direction: column; gap: 10px; width: 100%; box-sizing: border-box; 
            background: transparent; 
        }
        
        #chat-terminal { 
            width: 100%; background: transparent; border: none; color: #fff; font-size: 1.1rem; 
            font-family: 'Plus Jakarta Sans', sans-serif; outline: none; padding: 10px; box-sizing: border-box; 
            resize: none; overflow-y: hidden; min-height: 40px; 
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        #chat-terminal::placeholder { color: #fff; opacity: 0.8; text-shadow: 0 0 10px #fff; font-family: 'Orbitron'; font-size: 0.9rem; }

        .chat-tools { display: flex; justify-content: space-between; align-items: center; }
        .tools-left, .tools-right { display: flex; align-items: center; gap: 15px; }

        .btn-plus-white { background: transparent; border: none; color: #fff; cursor: pointer; filter: drop-shadow(0 0 10px #fff); transform: scale(1.2); }
        .btn-mini-icon { background: transparent; border: none; color: rgba(255,255,255,0.9); cursor: pointer; }
        .btn-pill-model { background: rgba(0, 242, 255, 0.05); border: 1px solid var(--accent); color: #fff; border-radius: 20px; padding: 6px 14px; font-family: 'Orbitron'; font-size: 0.8rem; }

        /* ✨ LA "A" LUMINOSA COMO EL TÍTULO */
        .btn-a-glow { 
            background: transparent; border: none; color: #fff; 
            font-family: 'Orbitron'; font-size: 1.8rem; cursor: pointer; 
            text-shadow: 0 0 20px #fff, 0 0 30px var(--accent); 
            transition: 0.3s; padding: 0;
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="loading-bar"></div>
    <div id="panels-overlay" onclick="cerrarPaneles()"></div>
    <div id="context-overlay" onclick="cerrarBottomSheets()"></div>

    <div id="sidebar-menu" class="panel-side">
        <h3 class="panel-title">MIS CHATS</h3>
        <div id="history-list" style="flex:1; overflow-y:auto;"></div>
        <button onclick="nuevoEnlace()" style="background:rgba(0,242,255,0.1); border:1px dashed var(--accent); color:var(--accent); width:100%; padding:12px; border-radius:12px; font-family:'Orbitron'; font-size:0.7rem;">+ NUEVO CHAT</button>
    </div>

    <div id="profile-panel" class="panel-side">
        <h3 class="panel-title">MI CUENTA</h3>
        <button onclick="cambiarCuenta()" style="width:100%; padding:15px; border-radius:15px; background:rgba(255,255,255,0.05); color:#fff; border:1px solid var(--accent); font-family:'Orbitron';">CAMBIAR CUENTA</button>
        <button onclick="cerrarSesionReal()" style="width:100%; padding:15px; border-radius:15px; background:rgba(255,255,255,0.05); color:#fff; border:1px solid rgba(255,255,255,0.1); margin-top:15px; font-family:'Orbitron';">CERRAR SESIÓN</button>
        <button onclick="eliminarCuenta()" style="margin-top:auto; width:100%; padding:15px; border-radius:15px; background:rgba(255,77,77,0.05); color:var(--danger); border:1px solid var(--danger); font-family:'Orbitron';">ELIMINAR CUENTA</button>
        <div style="text-align:center; font-size:0.6rem; color:#fff; text-shadow:0 0 10px #fff; margin-top:15px; font-family:'Orbitron';">AURORA ES UNA IA Y PUEDE COMETER ERRORES.</div>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="font-family:'Orbitron'; text-shadow:0 0 15px var(--accent); margin-bottom:30px;">BIENVENIDO A AURORA</h2>
            <input type="email" placeholder="Correo electrónico" class="login-input" id="emailInput">
            <input type="password" placeholder="Contraseña" class="login-input" id="passwordInput">
            <button onclick="authCorreo()" style="background:transparent; border:2px solid var(--accent); color:var(--accent); padding:15px; width:100%; border-radius:18px; font-weight:bold; font-family:'Orbitron'; cursor:pointer;">INGRESAR</button>
            <div style="display:flex; justify-content:center; margin-top:20px;"><a onclick="toggleRegistro()" style="color:#fff; font-size:0.8rem; cursor:pointer;">Crear Cuenta</a></div>
            <button onclick="authGoogle()" style="background:#fff; color:#000; border:none; padding:15px; border-radius:18px; font-weight:bold; width:100%; margin-top:30px; display:flex; align-items:center; justify-content:center; gap:10px;">
                <svg width="20" height="20" viewBox="0 0 488 512"><path d="M488 261.8C488 403.3 391.1 504 248 504 110.8 504 0 393.2 0 256S110.8 8 248 8c66.8 0 123 24.5 166.3 64.9l-67.5 64.9C258.5 52.6 94.3 116.6 94.3 256c0 86.5 69.1 156.6 153.7 156.6 98.2 0 135-70.4 140.8-106.9H248v-85.3h236.1c2.3 12.7 3.9 24.9 3.9 41.4z"/></svg> Ingresar con Google
            </button>
        </div>
    </div>

    <div id="app-container">
        <header>
            <button class="btn-menu-top" onclick="abrirSidebar()">☰</button>
            <div class="titulo-app">AURORA</div>
            <div style="width:44px;"><img id="user-avatar" src="" alt="Perfil" onclick="abrirPerfil()"></div>
        </header>

        <div id="chat-window">
            <div class="msg aurora">Tu enlace neuronal está activo. ¿Cómo puedo ayudarte hoy?</div>
        </div>

        <div class="bottom-section">
            <textarea id="chat-terminal" rows="1" placeholder="Preguntale a Aurora..." oninput="autoResize(this); toggleInputButtons()"></textarea>
            <div class="chat-tools">
                <div class="tools-left">
                    <button class="btn-plus-white" onclick="alert('Función de adjuntos...')"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
                    <button class="btn-pill-model">⚡ Flash</button>
                    <button class="btn-mini-icon" onclick="iniciarDictado()"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"></path></svg></button>
                </div>
                <div class="tools-right">
                    <button id="btn-enviar" class="btn-mini-icon" onclick="enviar()" style="display:none; color:var(--accent);"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
                    <button class="btn-a-glow">A</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo", authDomain: "aurora-ai-oficia.firebaseapp.com", projectId: "aurora-ai-oficia", storageBucket: "aurora-ai-oficia.firebasestorage.app", messagingSenderId: "426513637524", appId: "1:426513637524:web:13851f499aa4af13cfd481", measurementId: "G-XTN5WJPRPP" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth();

        function autoResize(t) { t.style.height = 'auto'; t.style.height = t.scrollHeight + 'px'; }
        function toggleInputButtons() {
            const val = document.getElementById('chat-terminal').value.trim();
            document.getElementById('btn-enviar').style.display = val ? 'flex' : 'none';
        }

        function abrirSidebar() { document.getElementById('sidebar-menu').classList.add('panel-open'); document.getElementById('panels-overlay').style.display = 'block'; }
        function abrirPerfil() { document.getElementById('profile-panel').classList.add('panel-open'); document.getElementById('panels-overlay').style.display = 'block'; }
        function cerrarPaneles() { document.querySelectorAll('.panel-side').forEach(p => p.classList.remove('panel-open')); document.getElementById('panels-overlay').style.display = 'none'; }
        
        function authGoogle() { const p = new firebase.auth.GoogleAuthProvider(); auth.signInWithRedirect(p); }
        function authCorreo() { const e = document.getElementById('emailInput').value; const p = document.getElementById('passwordInput').value; auth.signInWithEmailAndPassword(e,p).catch(err => alert(err.message)); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                if (user.photoURL) { const img = document.getElementById('user-avatar'); img.src = user.photoURL; img.style.display = 'block'; }
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            }
        });

        auth.getRedirectResult().catch(e => console.error(e));
        
        // ✨ FIX ALTURA DINÁMICA IPHONE
        window.addEventListener('resize', () => { document.body.style.height = window.innerHeight + 'px'; });
    </script>
</body>
</html>

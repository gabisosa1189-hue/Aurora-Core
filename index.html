<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA CORE</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #00f2ff; }

        /* 1. EL ANCLA AL VIDRIO */
        html, body {
            margin: 0; padding: 0; 
            width: 100%; height: 100dvh;
            overflow: hidden; 
            position: fixed; 
            background-color: #000;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #fff;
        }

        /* 2. EL VIDEO GIGANTE (SIN BORDES) */
        #bg-video {
            position: fixed !important;
            /* 👇 El secreto: desbordamos 20px para que el iPhone no vea el final 👇 */
            top: -20px !important;
            left: -20px !important;
            width: calc(100vw + 40px) !important;
            height: calc(100dvh + 40px) !important;
            z-index: 0;
            object-fit: cover !important;
            pointer-events: none !important;
            transform: scale(1.05);
        }

        /* 3. INTERFAZ QUE FLOTA */
        #app-container {
            display: none; flex-direction: column;
            position: absolute; inset: 0; z-index: 10;
        }

        header {
            padding-top: calc(env(safe-area-inset-top, 44px) + 5px);
            text-align: center;
        }
        .titulo-app { font-family: 'Orbitron'; letter-spacing: 15px; font-size: 1.8rem; text-shadow: 0 0 15px var(--accent); }

        #chat-window {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            -webkit-overflow-scrolling: touch;
        }

        .msg { max-width: 80%; padding: 14px 20px; border-radius: 22px; backdrop-filter: blur(10px); font-size: 1rem; border: 1px solid rgba(255,255,255,0.1); }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.1); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.1); }

        /* 4. BARRA DE TEXTO (PISANDO EL FONDO) */
        .bottom-section {
            padding: 10px 15px calc(env(safe-area-inset-bottom, 15px) + 15px) 15px;
        }
        .input-box {
            display: flex; align-items: center; gap: 10px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--accent);
            border-radius: 30px; padding: 5px 15px;
            backdrop-filter: blur(15px);
        }
        #chat-terminal { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; outline: none; font-size: 1.1rem; }

        /* LOGIN */
        #login-overlay { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); }
        .login-card { width: 85%; max-width: 350px; text-align: center; }
        .login-input { width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 15px; border: 1px solid var(--accent); background: #000; color: #fff; text-align: center; font-size: 1.1rem; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline webkit-playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="login-overlay">
        <div class="login-card">
            <h1 style="font-family:'Orbitron'; letter-spacing:10px; color:var(--accent); margin-bottom:40px;">AURORA</h1>
            <input type="email" id="email" class="login-input" placeholder="EMAIL">
            <input type="password" id="pass" class="login-input" placeholder="PASSWORD">
            <button onclick="login()" style="width:100%; padding:18px; border-radius:15px; background:var(--accent); border:none; font-family:'Orbitron'; font-weight:bold;">SINCRO</button>
        </div>
    </div>

    <div id="app-container">
        <header><div class="titulo-app">AURORA</div></header>
        <div id="chat-window">
            <div class="msg aurora">Sistema optimizado, Gabriel. Pantalla completa activa.</div>
        </div>
        <div class="bottom-section">
            <div class="input-box">
                <input type="text" id="chat-terminal" placeholder="Preguntá...">
                <button onclick="enviar()" style="background:none; border:none; color:var(--accent); font-size:1.5rem;">➤</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo", authDomain: "aurora-ai-oficia.firebaseapp.com", projectId: "aurora-ai-oficia", storageBucket: "aurora-ai-oficia.firebasestorage.app", messagingSenderId: "426513637524", appId: "1:426513637524:web:13851f499aa4af13cfd481", measurementId: "G-XTN5WJPRPP" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function login() { 
            const e=document.getElementById('email').value, p=document.getElementById('pass').value; 
            auth.signInWithEmailAndPassword(e,p).catch(err=>alert("Error")); 
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
            }
        });

        async function enviar() {
            const input = document.getElementById('chat-terminal'), msg = input.value; if(!msg) return;
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg user">${msg}</div>`;
            input.value = ""; win.scrollTop = win.scrollHeight;
            try {
                const res = await fetch('https://gabiland-aurora-ai-mendoza.hf.space/chat', { 
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({msg: msg}) 
                });
                const data = await res.json();
                win.innerHTML += `<div class="msg aurora">${data.respuesta}</div>`;
                win.scrollTop = win.scrollHeight;
            } catch(e) { }
        }
        document.addEventListener('touchmove', function(e){ if(!e.target.closest('#chat-window')) e.preventDefault(); }, {passive:false});
    </script>
</body>
</html>

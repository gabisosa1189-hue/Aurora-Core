<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #00f2ff; --danger: #ff4d4d; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            overflow: hidden; background-color: #050a15;
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; 
        }

        #bg-video { 
            position: fixed !important; 
            top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: -1; object-fit: cover !important; 
        }

        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 10, 20, 0.4); backdrop-filter: blur(15px);
            z-index: 9999; display: flex; align-items: center; justify-content: center; 
        }
        .login-card { 
            background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 40px; 
            border: 1px solid rgba(0, 242, 255, 0.2); text-align: center; max-width: 380px; width: 90%; 
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }

        .login-card h2 { font-family: 'Orbitron'; font-size: 1.5rem; margin-bottom: 25px; text-shadow: 0 0 10px var(--accent); }
        .login-input {
            width: 100%; box-sizing: border-box; background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 242, 255, 0.3); color: white; padding: 15px;
            border-radius: 15px; margin-bottom: 15px; outline: none; font-family: 'Plus Jakarta Sans', sans-serif;
            transition: 0.3s;
        }
        .login-input:focus { border-color: var(--accent); background: rgba(0, 242, 255, 0.1); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }
        .form-links { display: flex; justify-content: space-between; font-size: 0.8rem; opacity: 0.8; margin-bottom: 20px; }
        .form-links a { color: #fff; text-decoration: none; cursor: pointer; transition: 0.3s; }
        .form-links a:hover { color: var(--accent); text-shadow: 0 0 5px var(--accent); }
        .separator { margin: 15px 0; color: rgba(255,255,255,0.4); font-size: 0.8rem; }

        #config-panel { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(25px);
            z-index: 100000; display: none; align-items: center; justify-content: center; 
        }
        .config-card { 
            background: rgba(0, 242, 255, 0.05); padding: 40px; border-radius: 35px; 
            border: 1px solid rgba(0, 242, 255, 0.3); text-align: center; width: 85%; max-width: 400px; 
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.1);
        }

        #app-container { display: none; flex-direction: column; height: 100vh; width: 100%; position: relative; z-index: 10; }

        header { padding: 40px 0 10px 0; text-align: center; }
        .titulo-app { font-family: 'Orbitron'; letter-spacing: 15px; font-size: 1.8rem; text-shadow: 0 0 15px var(--accent); }

        #chat-window { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 20px; 
            scrollbar-width: none; width: 100%; max-width: 700px; margin: 0 auto; 
        }
        
        .msg { 
            max-width: 85%; padding: 14px 22px; border-radius: 22px; 
            backdrop-filter: blur(15px); font-size: 1rem; line-height: 1.5;
            animation: slideUp 0.3s ease-out; z-index: 5;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.08); border: 1px solid rgba(0, 242, 255, 0.3); border-bottom-left-radius: 4px; }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); border-bottom-right-radius: 4px; }

        .btn-config-fixed { 
            position: fixed; left: 25px; bottom: 85px; 
            background: rgba(0,0,0,0.4); border: 1px solid rgba(0, 242, 255, 0.3); 
            cursor: pointer; color: #fff; font-family: 'Orbitron'; font-size: 0.85rem; 
            letter-spacing: 2px; padding: 10px 15px; border-radius: 20px;
            backdrop-filter: blur(10px); display: flex; align-items: center; gap: 10px; z-index: 999;
        }

        .bottom-section { padding: 10px 20px 30px 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .chat-group { display: flex; align-items: center; gap: 15px; width: 100%; max-width: 500px; }
        .btn-a { font-family: 'Orbitron'; font-size: 1.8rem; color: #fff; background: none; border: none; cursor: pointer; text-shadow: 0 0 15px var(--accent); transition: 0.3s; }
        .input-bar { flex: 1; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(0, 242, 255, 0.4); border-radius: 40px; display: flex; align-items: center; padding: 5px 22px; backdrop-filter: blur(20px); }
        #chat-terminal { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; outline: none; font-size: 1rem; }
        .disclaimer { text-align: center; font-size: 0.6rem; color: rgba(255,255,255,0.5); letter-spacing: 1px; width: 100%; }

        #voice-interface {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 10, 20, 0.6); backdrop-filter: blur(30px);
            z-index: 10000; display: none; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .voice-status { font-family: 'Orbitron'; font-size: 1.1rem; color: var(--accent); margin-bottom: 40px; letter-spacing: 3px; text-shadow: 0 0 20px var(--accent); text-align: center; }
        .visualizer { display: flex; align-items: center; gap: 8px; height: 100px; }
        .bar { width: 4px; height: 15px; background: var(--accent); border-radius: 10px; animation: wave 1.2s ease-in-out infinite; box-shadow: 0 0 15px var(--accent); }
        .bar:nth-child(2) { animation-delay: 0.2s; } .bar:nth-child(3) { animation-delay: 0.4s; }
        .bar:nth-child(4) { animation-delay: 0.6s; } .bar:nth-child(5) { animation-delay: 0.8s; }
        @keyframes wave { 0%, 100% { height: 15px; } 50% { height: 80px; } }
        .btn-hangup { margin-top: 60px; background: rgba(255, 77, 77, 0.1); border: 1px solid var(--danger); color: var(--danger); padding: 15px 40px; border-radius: 50px; font-family: 'Orbitron'; font-size: 0.9rem; letter-spacing: 2px; cursor: pointer; z-index: 10001; transition: 0.3s; }
        .btn-hangup:hover { background: var(--danger); color: white; box-shadow: 0 0 20px var(--danger); }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="voice-interface">
        <div class="voice-status" id="voice-txt">ENLACE NEURONAL ACTIVO</div>
        <div class="visualizer">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
        <button class="btn-hangup" onclick="cerrarVoz()">COLGAR ENLACE</button>
    </div>

    <button class="btn-config-fixed" onclick="document.getElementById('config-panel').style.display='flex'">
        <span>⚙️</span> CONFIG
    </button>
    <div id="config-panel">
        <div class="config-card">
            <h2 style="font-family:'Orbitron'; color:var(--accent);">SISTEMA</h2>
            <p style="font-size: 0.8rem; color: rgba(255,255,255,0.6); margin-bottom: 30px;">Gestión de enlace neuronal</p>
            <button onclick="location.reload()" style="background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.2); padding:15px; width:100%; border-radius:15px; cursor:pointer; font-family:'Orbitron'; transition:0.3s;">CERRAR SESIÓN</button>
            <button style="margin-top:30px; background:none; border:none; color:var(--accent); cursor:pointer; font-family:'Orbitron'; letter-spacing: 2px;" onclick="document.getElementById('config-panel').style.display='none'">[ VOLVER ]</button>
        </div>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h2 id="titulo-login" style="line-height: 1.4;">BIENVENIDO A AURORA<br><span style="font-size: 0.8rem; font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: 1px; color: rgba(255,255,255,0.7); text-shadow: none;">¿CÓMO DESEA REGISTRARSE?</span></h2>
            <input type="email" placeholder="Email" class="login-input" id="emailInput">
            <input type="password" placeholder="Contraseña" class="login-input" id="passwordInput">
            <button id="btn-principal" style="background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 15px; width: 100%; border-radius: 18px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; letter-spacing: 2px; margin-bottom: 15px;" onclick="authCorreo()">INGRESAR</button>
            <div class="form-links">
                <a onclick="toggleRegistro()" id="link-registro">Crear Cuenta</a>
            </div>
            <div class="separator">──────── ó ────────</div>
            <button style="background: rgba(255,255,255,0.9); color: #000; border: none; padding: 15px; border-radius: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; transition: 0.3s;" onclick="authGoogle()">
                <svg width="20" height="20" viewBox="0 0 488 512" fill="#000"><path d="M488 261.8C488 403.3 391.1 504 248 504 110.8 504 0 393.2 0 256S110.8 8 248 8c66.8 0 123 24.5 166.3 64.9l-67.5 64.9C258.5 52.6 94.3 116.6 94.3 256c0 86.5 69.1 156.6 153.7 156.6 98.2 0 135-70.4 140.8-106.9H248v-85.3h236.1c2.3 12.7 3.9 24.9 3.9 41.4z"/></svg>
                Ingresar con Google
            </button>
        </div>
    </div>

    <div id="app-container">
        <header><div class="titulo-app">AURORA</div></header>
        <div id="chat-window">
            <div class="msg aurora">Bienvenido al núcleo de <b>Aurora</b>. Tu enlace neuronal está activo. ¿En qué puedo ayudarte?</div>
        </div>
        <div class="bottom-section">
            <div class="chat-group">
                <button class="btn-a" id="btn-voz" onclick="activarVoz()">A</button>
                <div class="input-bar">
                    <input type="text" id="chat-terminal" placeholder="Mensaje neuronal..." autocomplete="off">
                    <button onclick="enviar()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-size:1.5rem; transition:0.3s;">➤</button>
                </div>
            </div>
            <div class="disclaimer">SISTEMA NEURONAL EN VIVO</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo",
            authDomain: "aurora-ai-oficia.firebaseapp.com",
            projectId: "aurora-ai-oficia",
            storageBucket: "aurora-ai-oficia.firebasestorage.app",
            messagingSenderId: "426513637524",
            appId: "1:426513637524:web:13851f499aa4af13cfd481",
            measurementId: "G-XTN5WJPRPP"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const synth = window.speechSynthesis;
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        if (recognition) {
            recognition.lang = 'es-AR';
            recognition.continuous = false;
        }

        function hablar(texto) {
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(texto);
            utter.pitch = 1.05; utter.rate = 1.0;
            utter.onstart = () => { document.getElementById('voice-txt').innerText = "AURORA HABLANDO..."; };
            utter.onend = () => { 
                if(document.getElementById('voice-interface').style.display === 'flex') {
                    document.getElementById('voice-txt').innerText = "ESCUCHANDO...";
                    try { recognition.start(); } catch(e) {}
                }
            };
            synth.speak(utter);
        }

        function activarVoz() {
            const sss = new SpeechSynthesisUtterance("");
            synth.speak(sss);
            if (navigator.vibrate) navigator.vibrate(50);
            document.getElementById('voice-interface').style.display = 'flex';
            document.getElementById('voice-txt').innerText = "INICIALIZANDO...";
            try { recognition.start(); } catch(e) {}
        }

        function cerrarVoz() {
            synth.cancel();
            try { recognition.stop(); } catch(e) {}
            document.getElementById('voice-interface').style.display = 'none';
        }

        if(recognition) {
            recognition.onresult = (event) => { enviarVoz(event.results[0][0].transcript); };
        }

        async function enviarVoz(texto) {
            document.getElementById('voice-txt').innerText = "PROCESANDO...";
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg user">${texto}</div>`;
            win.scrollTop = win.scrollHeight;
            try {
                const res = await fetch('https://gabiland-aurora-ai-mendoza.hf.space/chat', { 
                    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg:texto}) 
                });
                const data = await res.json();
                win.innerHTML += `<div class="msg aurora">${data.respuesta}</div>`;
                win.scrollTop = win.scrollHeight;
                hablar(data.respuesta);
            } catch(e) { cerrarVoz(); }
        }

        let modoRegistro = false;
        function toggleRegistro() {
            modoRegistro = !modoRegistro;
            const titulo = document.getElementById('titulo-login');
            const btnPrincipal = document.getElementById('btn-principal');
            const linkRegistro = document.getElementById('link-registro');
            if(modoRegistro) {
                titulo.innerHTML = "CREAR CUENTA<br><span style='font-size: 0.8rem; font-family: \"Plus Jakarta Sans\", sans-serif; letter-spacing: 1px; color: rgba(255,255,255,0.7); text-shadow: none;'>INGRESE SUS DATOS</span>"; 
                btnPrincipal.innerText = "REGISTRARSE"; 
                linkRegistro.innerText = "Ya tengo cuenta";
            } else {
                titulo.innerHTML = "BIENVENIDO A AURORA<br><span style='font-size: 0.8rem; font-family: \"Plus Jakarta Sans\", sans-serif; letter-spacing: 1px; color: rgba(255,255,255,0.7); text-shadow: none;'>¿CÓMO DESEA REGISTRARSE?</span>"; 
                btnPrincipal.innerText = "INGRESAR"; 
                linkRegistro.innerText = "Crear Cuenta";
            }
        }
        
        function authCorreo() {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            if(!email || !password) {
                alert("Por favor, ingresá un email y contraseña para continuar.");
                return;
            }
            if(modoRegistro) { 
                auth.createUserWithEmailAndPassword(email, password).then(() => entrar()).catch(e => alert("Error: " + e.message)); 
            } else { 
                auth.signInWithEmailAndPassword(email, password).then(() => entrar()).catch(e => alert("Error al ingresar. Verificá tus datos.")); 
            }
        }
        
        function authGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then(() => entrar())
                .catch(e => alert("Error de Google: " + e.message)); // ESTE ES EL ÚNICO CAMBIO
        }
        
        function entrar() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            document.getElementById('bg-video').play(); 
        }
        
        async function enviar() {
            const input = document.getElementById('chat-terminal');
            if(!input.value.trim()) return;
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg user">${input.value}</div>`;
            const msj = input.value;
            input.value = ""; win.scrollTop = win.scrollHeight;
            try {
                const res = await fetch('https://gabiland-aurora-ai-mendoza.hf.space/chat', { 
                    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg:msj}) 
                });
                const data = await res.json();
                win.innerHTML += `<div class="msg aurora">${data.respuesta}</div>`;
                win.scrollTop = win.scrollHeight;
            } catch(e) { win.innerHTML += `<div class="msg aurora" style="color:#ff4d4d;">Error de red...</div>`; }
        }
        
        document.getElementById('chat-terminal').addEventListener('keypress', e => { if (e.key === 'Enter') enviar(); });
    </script>
</body>
</html>

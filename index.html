<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURORA AI - MENDOZA</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030306; --magenta: #ff00ff; --cyan: #00ffff; --glass: rgba(255, 255, 255, 0.1); }
        
        body { 
            margin: 0; padding: 0; overflow: hidden; height: 100vh;
            font-family: 'Montserrat', sans-serif; color: white;
            background-color: black; /* Respaldo si el video tarda */
        }

        /* --- EL FONDO DE AURORA --- */
        #bg-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -1; filter: brightness(0.6);
        }

        #central-display { 
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); 
            text-align: center; z-index: 1; transition: 0.8s ease;
        }
        
        .hidden-ui { opacity: 0 !important; pointer-events: none; transform: translate(-50%, -60%) scale(0.8) !important; }
        
        h1 { 
            font-size: clamp(3rem, 10vw, 5rem); font-family: 'Orbitron'; margin: 0; 
            background: linear-gradient(to right, white, var(--cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 15px;
        }

        /* --- VENTANA DE CHAT --- */
        #chat-window { 
            height: 60vh; width: 95%; max-width: 800px; margin: 20px auto; 
            overflow-y: auto; display: flex; flex-direction: column; gap: 15px;
            padding: 20px; scrollbar-width: none;
        }
        #chat-window::-webkit-scrollbar { display: none; }

        .bubble { 
            padding: 14px 22px; border-radius: 25px; max-width: 80%; 
            backdrop-filter: blur(15px); animation: fadeIn 0.4s ease;
            line-height: 1.5; font-size: 1rem;
        }
        .aurora { align-self: flex-start; background: var(--glass); border: 1px solid rgba(0, 255, 255, 0.3); border-bottom-left-radius: 4px; }
        .gabriel { align-self: flex-end; background: rgba(29, 78, 216, 0.4); border: 1px solid rgba(255, 255, 255, 0.2); border-bottom-right-radius: 4px; }

        /* --- EL DOCK (INPUT) --- */
        .dock-wrap { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 10; }
        .dock { 
            width: 90%; max-width: 700px; display: flex; align-items: center; gap: 10px;
            padding: 8px 15px; background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(30px); border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        input { flex-grow: 1; background: transparent; border: none; color: white; outline: none; font-size: 1.1rem; padding: 12px; }

        .btn-circle { 
            width: 50px; height: 50px; border-radius: 50%; border: 1px solid white;
            background: transparent; color: white; cursor: pointer; display: flex;
            align-items: center; justify-content: center; font-family: 'Orbitron'; font-weight: 900;
        }
        .btn-circle:active { transform: scale(0.9); }
        #btn-a { border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 15px rgba(0, 255, 255, 0.2); }

        /* --- OVERLAY DE VOZ --- */
        #voice-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px); z-index: 1000; 
        }
        .orb { width: 150px; height: 150px; border: 4px solid var(--cyan); border-radius: 50%; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 20px var(--cyan); } 50% { transform: scale(1.1); box-shadow: 0 0 50px var(--magenta); border-color: var(--magenta); } 100% { transform: scale(1); box-shadow: 0 0 20px var(--cyan); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="voice-overlay">
        <div class="orb"></div>
        <h2 style="font-family:'Orbitron'; margin-top:30px; letter-spacing:8px;">ESCUCHANDO</h2>
        <button onclick="cerrarEnlaceVoz()" style="margin-top:40px; background:transparent; border:1px solid white; color:white; padding:10px 30px; border-radius:20px;">CANCELAR</button>
    </div>

    <div id="central-display">
        <h1>AURORA</h1>
        <p style="letter-spacing:5px; opacity:0.6; font-size: 0.8rem;">SAN MARTÍN, MENDOZA</p>
    </div>

    <div id="chat-window"></div>

    <div class="dock-wrap">
        <div class="dock">
            <button class="btn-circle" onclick="location.reload()">↺</button>
            <button id="btn-a" class="btn-circle" onclick="abrirEnlaceVoz()">A</button>
            <input type="text" id="chat-input" placeholder="Hablemos..." autocomplete="off">
            <button class="btn-circle" onclick="enviarComando()" style="border:none; color:var(--cyan); font-size:1.8rem;">></button>
        </div>
    </div>

    <script>
        const input = document.getElementById('chat-input');
        const chatWindow = document.getElementById('chat-window');
        const centralDisplay = document.getElementById('central-display');
        let reconocimiento;

        // --- SISTEMA DE VOZ ---
        if ('webkitSpeechRecognition' in window) {
            reconocimiento = new webkitSpeechRecognition();
            reconocimiento.lang = 'es-AR';
            reconocimiento.onresult = (e) => {
                const texto = e.results[0][0].transcript;
                input.value = texto;
                cerrarEnlaceVoz();
                enviarComando();
            };
        }

        function abrirEnlaceVoz() {
            document.getElementById('voice-overlay').style.display = 'flex';
            reconocimiento.start();
        }

        function cerrarEnlaceVoz() {
            document.getElementById('voice-overlay').style.display = 'none';
            if(reconocimiento) reconocimiento.stop();
        }

        // --- FUNCIÓN DE HABLA (AURORA TE RESPONDE) ---
        function hablar(texto) {
            const u = new SpeechSynthesisUtterance(texto);
            u.lang = 'es-MX';
            speechSynthesis.speak(u);
        }

        function agregarBurbuja(msg, tipo) {
            centralDisplay.classList.add('hidden-ui');
            const div = document.createElement('div');
            div.className = `bubble ${tipo}`;
            div.innerText = msg;
            chatWindow.appendChild(div);
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        async function enviarComando() {
            const texto = input.value.trim();
            if(!texto) return;
            agregarBurbuja(texto, 'gabriel');
            input.value = "";

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ msg: texto })
                });
                const data = await res.json();
                agregarBurbuja(data.respuesta, 'aurora');
                hablar(data.respuesta); // Aurora habla
            } catch(e) {
                agregarBurbuja("Error de conexión.", 'aurora');
            }
        }

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') enviarComando(); });
    </script>
</body>
</html>

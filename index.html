<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #00f2ff; --danger: #ff4d4d; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            overflow: hidden; background-color: #000;
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; 
            overscroll-behavior-y: none; 
        }

        #loading-bar { position: fixed; top: 0; left: 0; width: 0%; height: 3px; background: var(--accent); box-shadow: 0 0 15px var(--accent); transition: 0.3s; z-index: 1000000; }

        #bg-video { position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; object-fit: cover !important; pointer-events: none; }
        
        #panels-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 100000; display: none; backdrop-filter: blur(5px); }

        .panel-side {
            position: fixed; top: 0; width: 280px; height: 100%;
            background: rgba(0, 10, 20, 0.75); backdrop-filter: blur(25px);
            z-index: 100001; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; padding: 25px; 
            padding-top: calc(env(safe-area-inset-top, 40px) + 20px); box-sizing: border-box;
        }
        #sidebar-menu { left: 0; transform: translateX(-100%); border-right: 1px solid rgba(0, 242, 255, 0.2); }
        #profile-panel { right: 0; transform: translateX(100%); border-left: 1px solid rgba(0, 242, 255, 0.2); }
        .panel-open { transform: translateX(0) !important; }

        .panel-title { font-family: 'Orbitron'; font-size: 0.9rem; color: var(--accent); letter-spacing: 3px; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        
        .chat-item { 
            background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1); font-size: 0.85rem; margin-bottom: 10px; 
            transition: 0.3s; user-select: none; -webkit-user-select: none; cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
        }
        .chat-item.active { background: rgba(0, 242, 255, 0.1); border-color: var(--accent); }
        .chat-item.pinned { border-left: 4px solid var(--accent); }

        #context-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 100005; opacity: 0; pointer-events: none; transition: 0.3s; }
        #context-overlay.show { opacity: 1; pointer-events: all; }
        
        .bottom-sheet {
            position: fixed; bottom: -100%; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(0, 15, 25, 0.85);
            backdrop-filter: blur(40px); border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 30px 30px 0 0; padding: 25px 25px 40px 25px;
            z-index: 100006; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; gap: 5px;
            box-shadow: 0 -10px 40px rgba(0, 242, 255, 0.15);
        }
        .bottom-sheet.show { bottom: 0; }
        .context-pill { width: 40px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 0 auto 15px auto; }
        
        .context-btn {
            background: transparent; color: #fff; border: none; padding: 16px 15px;
            font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1rem;
            text-align: left; border-radius: 15px; display: flex; align-items: center; gap: 15px;
            cursor: pointer; transition: 0.2s;
        }
        .context-btn:hover { background: rgba(0, 242, 255, 0.1); color: var(--accent); }
        .context-btn svg { width: 22px; height: 22px; stroke: rgba(255,255,255,0.8); }

        #live-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 5, 10, 0.4); z-index: 100010; display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: 0.4s; }
        #live-overlay.show { opacity: 1; display: flex; }
        #camera-stream { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; opacity: 0; transition: opacity 0.8s ease; }
        .live-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; }
        @keyframes pulseAWhite { 0% { transform: scale(1); text-shadow: 0 0 20px rgba(255,255,255,0.8); } 50% { transform: scale(1.15); text-shadow: 0 0 60px rgba(255,255,255,1); } 100% { transform: scale(1); text-shadow: 0 0 20px rgba(255,255,255,0.8); } }
        .live-a { font-family: 'Orbitron'; font-size: 6rem; color: #fff; display: flex; align-items: center; justify-content: center; animation: pulseAWhite 2s infinite ease-in-out; text-shadow: 0 0 30px rgba(255,255,255,0.9); }
        .live-controls { position: absolute; bottom: 60px; z-index: 2; display: flex; align-items: center; gap: 45px; }
        .live-btn { background: transparent; border: none; padding: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .live-btn svg { width: 32px; height: 32px; stroke: rgba(255,255,255,0.8); stroke-width: 1.5; filter: drop-shadow(0 0 8px rgba(255,255,255,0.4)); }
        .live-btn.active svg { stroke: var(--accent); filter: drop-shadow(0 0 15px var(--accent)); }
        .live-btn-end svg { width: 40px; height: 40px; stroke: var(--danger); stroke-width: 2; filter: drop-shadow(0 0 12px var(--danger)); }

        #premium-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 320px; background: rgba(0, 15, 25, 0.9); backdrop-filter: blur(30px); border: 1px solid var(--accent); border-radius: 30px; padding: 30px; z-index: 100005; text-align: center; display: none; }
        .btn-premium-add { background: rgba(0, 242, 255, 0.1); border: 1px dashed var(--accent); color: var(--accent); width: 100%; padding: 12px; border-radius: 12px; font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-account { width: 100%; padding: 15px; border-radius: 15px; font-family: 'Orbitron'; font-size: 0.75rem; cursor: pointer; margin-bottom: 12px; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); }

        #app-container { display: none; flex-direction: column; height: 100vh; width: 100%; position: relative; z-index: 10; transition: opacity 0.4s ease; }
        header { padding-top: calc(env(safe-area-inset-top, 40px) + 15px); padding-left: 20px; padding-right: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .titulo-app { font-family: 'Orbitron'; letter-spacing: 15px; font-size: 1.8rem; text-shadow: 0 0 15px var(--accent); margin: 0; }
        .btn-menu-top { background: transparent; border: none; cursor: pointer; color: #fff; font-size: 2rem; }
        #user-avatar { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--accent); box-shadow: 0 0 15px rgba(0,242,255,0.4); object-fit: cover; display: none; cursor: pointer; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 14px 22px; border-radius: 22px; backdrop-filter: blur(15px); font-size: 1rem; line-height: 1.5; }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.3); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15); }

        .unified-panel { width: 100%; background: rgba(0, 10, 20, 0.45); backdrop-filter: blur(25px); border-radius: 35px 35px 0 0; padding: 25px 20px calc(env(safe-area-inset-bottom, 20px) + 20px) 20px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.4); }
        #chat-terminal { width: 100%; background: transparent; border: none; color: white; font-size: 1.05rem; font-family: 'Plus Jakarta Sans', sans-serif; outline: none; }
        .btn-pill-model { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 20px; padding: 8px 16px; font-size: 0.85rem; font-family: 'Orbitron'; cursor: pointer; display: flex; align-items: center; gap: 6px; }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 40px; border: 1px solid rgba(0, 242, 255, 0.2); text-align: center; max-width: 380px; width: 90%; }
        .login-input { width: 100%; box-sizing: border-box; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(0, 242, 255, 0.3); color: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; outline: none; }
    </style>
</head>
<body>

    <div id="loading-bar"></div>
    <video autoplay muted loop playsinline id="bg-video"><source src="fondo.mp4" type="video/mp4"></video>
    <div id="panels-overlay" onclick="cerrarPaneles()"></div>
    <div id="context-overlay" onclick="cerrarBottomSheets()"></div>

    <div id="live-overlay">
        <video id="camera-stream" autoplay playsinline muted></video>
        <div class="live-content"><div class="live-a">A</div><p style="color:white; font-family:'Plus Jakarta Sans'; margin-top:30px;">Aurora te escucha...</p></div>
        <div class="live-controls">
            <button class="live-btn" onclick="cerrarLiveMode()"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><circle cx="8" cy="14" r="1"/><circle cx="12" cy="14" r="1"/><circle cx="16" cy="14" r="1"/></svg></button>
            <button class="live-btn-end" onclick="cerrarLiveMode()"><svg viewBox="0 0 24 24" fill="none" stroke="#ff4d4d" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            <button id="btn-live-cam" class="live-btn" onclick="toggleCamaraLive()"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button>
        </div>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="font-family:'Orbitron'; letter-spacing:5px;">AURORA V27</h2>
            <input type="email" placeholder="Email" class="login-input" id="emailInput">
            <input type="password" placeholder="Contraseña" class="login-input" id="passwordInput">
            <button style="background:transparent; border:2px solid var(--accent); color:var(--accent); padding:15px; width:100%; border-radius:18px; font-weight:bold; font-family:'Orbitron'; cursor:pointer;" onclick="authCorreo()">INGRESAR</button>
            <div style="display:flex; justify-content:space-between; font-size:0.8rem; margin:15px 0;"><a onclick="toggleRegistro()" id="link-registro" style="color:#fff; cursor:pointer;">Crear Cuenta</a></div>
            <button style="background:rgba(255,255,255,0.9); color:#000; border:none; padding:15px; border-radius:18px; font-weight:bold; width:100%; cursor:pointer;" onclick="authGoogle()">Acceso con Google</button>
        </div>
    </div>

    <div id="app-container">
        <header>
            <button class="btn-menu-top" style="background:none; border:none; color:white; font-size:2rem;" onclick="abrirSidebar()">☰</button>
            <div class="titulo-app">AURORA</div>
            <img id="user-avatar" src="" alt="Perfil" style="width:40px; height:40px; border-radius:50%; border:2px solid var(--accent);" onclick="abrirPerfil()">
        </header>

        <div id="chat-window"><div class="msg aurora">Núcleo V27 Sincronizado. Te escucho, Gabriel.</div></div>

        <div class="unified-panel">
            <input type="text" id="chat-terminal" placeholder="Habla con el Nexus..." autocomplete="off" oninput="toggleInputButtons()">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                <button class="btn-pill-model" id="engine-pill" onclick="abrirMotores()">⚡ Flash</button>
                <button style="background:var(--accent); color:#000; border:none; padding:10px 25px; border-radius:12px; font-weight:bold; cursor:pointer;" onclick="enviar()">ENVIAR</button>
            </div>
        </div>
    </div>

    <div id="model-menu" class="bottom-sheet">
        <button class="context-btn" onclick="seleccionarMotor('flash')">⚡ Flash (Velocidad)</button>
        <button class="context-btn" onclick="seleccionarMotor('quantum')">🧠 Quantum (Profundo)</button>
    </div>

    <div id="sidebar-menu" class="panel-side">
        <h3 class="panel-title">MIS CHATS</h3>
        <div id="history-list" style="flex:1; overflow-y:auto;"></div>
        <button class="btn-premium-add" onclick="nuevoEnlace()">+ NUEVO CHAT</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo", authDomain: "aurora-ai-oficia.firebaseapp.com", projectId: "aurora-ai-oficia", storageBucket: "aurora-ai-oficia.firebasestorage.app", messagingSenderId: "426513637524", appId: "1:426513637524:web:13851f499aa4af13cfd481", measurementId: "G-XTN5WJPRPP" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        let motorActual = 'flash';
        let cameraStream = null;

        // 🛡️ EL VIGILANTE DE LA PUERTA (SIN FALLOS)
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                if (user.photoURL) {
                    const avatar = document.getElementById('user-avatar');
                    avatar.src = user.photoURL; avatar.style.display = 'block';
                }
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            }
        });

        // ✨ LOGIN GOOGLE REDIRECT (Safari Compatible)
        function authGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithRedirect(provider);
        }
        auth.getRedirectResult().catch(e => console.error(e));

        function authCorreo() {
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passwordInput').value;
            auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
        }

        async function enviar() {
            const input = document.getElementById('chat-terminal');
            const win = document.getElementById('chat-window');
            const bar = document.getElementById('loading-bar');
            if(!input.value.trim()) return;

            const msj = input.value;
            win.innerHTML += `<div class="msg user">${msj}</div>`;
            input.value = ""; win.scrollTop = win.scrollHeight;
            bar.style.width = "70%";

            try {
                const res = await fetch('https://gabiland-aurora-ai-mendoza.hf.space/chat', { 
                    method:'POST', headers:{'Content-Type':'application/json'}, 
                    body:JSON.stringify({ msg: msj, model: motorActual }) 
                });
                const data = await res.json();
                win.innerHTML += `<div class="msg aurora">${data.respuesta}</div>`;
                bar.style.width = "100%"; setTimeout(() => bar.style.width = "0%", 400);
                if(navigator.vibrate) navigator.vibrate(15);
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(data.respuesta));
            } catch(e) { bar.style.width = "0%"; win.innerHTML += `<div class="msg aurora" style="color:red;">Error de conexión.</div>`; }
            win.scrollTop = win.scrollHeight;
        }

        function seleccionarMotor(m) {
            motorActual = m;
            document.getElementById('engine-pill').innerHTML = m === 'flash' ? '⚡ Flash' : '🧠 Quantum';
            cerrarBottomSheets();
        }

        function abrirSidebar() { document.getElementById('sidebar-menu').classList.add('panel-open'); document.getElementById('panels-overlay').style.display = 'block'; }
        function abrirMotores() { document.getElementById('model-menu').classList.add('show'); document.getElementById('context-overlay').classList.add('show'); }
        function cerrarPaneles() { document.querySelectorAll('.panel-side').forEach(p => p.classList.remove('panel-open')); document.getElementById('panels-overlay').style.display = 'none'; }
        function cerrarBottomSheets() { document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('show')); document.getElementById('context-overlay').classList.remove('show'); }
        function toggleInputButtons() {} function abrirPerfil() {} function nuevoEnlace() {} function toggleRegistro() {}
        function toggleCamaraLive() {
            const vid = document.getElementById('camera-stream');
            if(cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; vid.style.opacity = '0'; }
            else { navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}}).then(s => { cameraStream = s; vid.srcObject = s; vid.style.opacity = '0.4'; }); }
        }
        function abrirLiveMode() { document.getElementById('live-overlay').classList.add('show'); }
        function cerrarLiveMode() { document.getElementById('live-overlay').classList.remove('show'); if(cameraStream) toggleCamaraLive(); }
    </script>
</body>
</html>

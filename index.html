<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #00f2ff; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; background-color: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; }

        /* 🎥 VIDEO DE FONDO MENDOCINO (Para Vercel) */
        #bg-video { 
            position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; 
            object-fit: cover !important; z-index: -1; opacity: 1; 
        }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(25px); z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255, 255, 255, 0.03); padding: 40px 25px; border-radius: 40px; border: 1px solid rgba(0, 242, 255, 0.3); text-align: center; max-width: 380px; width: 90%; }
        .titulo-login { font-family: 'Orbitron', sans-serif; letter-spacing: 5px; font-size: 1.2rem; margin-bottom: 30px; }
        .btn-auth { width: 100%; padding: 16px; border-radius: 20px; border: none; font-weight: 600; cursor: pointer; font-size: 1rem; margin-bottom: 15px; transition: 0.3s; }
        .btn-google { background: #fff; color: #000; }

        /* ⚙️ SIDEBAR PROFESIONAL */
        #sidebar {
            position: fixed; top: 0; left: -270px; width: 260px; height: 100%;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(40px);
            border-right: 1px solid rgba(0,242,255,0.2);
            z-index: 100000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1);
            padding: 40px 20px; display: flex; flex-direction: column; gap: 15px;
        }
        #sidebar.open { left: 0; }
        .menu-btn { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 15px; text-align: left; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        .menu-btn.danger { background: rgba(255, 50, 50, 0.15); border-color: rgba(255,50,50,0.4); color: #ff4d4d; margin-top: auto; font-weight: bold; }

        #sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: 99999;
            display: none; opacity: 0; transition: 0.3s;
        }
        #sidebar-overlay.active { display: block; opacity: 1; }

        #app-container { display: none; flex-direction: column; height: 100vh; width: 100%; max-width: 600px; margin: 0 auto; position: relative; z-index: 10; }

        header { padding: 40px 15px 20px 15px; text-align: center; }
        .titulo-app { font-family: 'Orbitron', sans-serif; letter-spacing: 12px; font-size: 1.5rem; text-shadow: 0 0 20px var(--accent); }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 15px 20px; border-radius: 22px; backdrop-filter: blur(15px); line-height: 1.4; font-size: 0.95rem; }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.08); border: 1px solid rgba(0, 242, 255, 0.2); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }

        /* ⚙️ ÁREA INFERIOR TRANSPARENTE */
        .input-area { 
            position: relative;
            padding: 10px 20px calc(20px + env(safe-area-inset-bottom)) 20px; 
            background: transparent;
            display: flex; flex-direction: column; align-items: center;
        }

        /* ⚙️ TUERCA CLAVADA A LA IZQUIERDA */
        .btn-config-final {
            position: absolute; left: 20px; bottom: calc(25px + env(safe-area-inset-bottom));
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.4);
            color: var(--accent); width: 50px; height: 50px; border-radius: 50%; font-size: 1.5rem;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(20px); box-shadow: 0 0 15px rgba(0,242,255,0.2); z-index: 100;
        }

        .input-container { 
            width: 100%; margin-left: 60px; /* Evita que la tuerca lo tape */
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.3); 
            border-radius: 35px; display: flex; align-items: center; padding: 5px 15px; backdrop-filter: blur(20px);
        }

        .btn-voice { 
            background: transparent; color: #fff; border: none; font-family: 'Orbitron', sans-serif; 
            font-size: 1.4rem; font-weight: bold; text-shadow: 0 0 10px var(--accent); margin-right: 12px; cursor: pointer;
        }

        #chat-terminal { flex: 1; background: transparent; border: none; color: white; padding: 12px 5px; outline: none; font-size: 1rem; width: 100%; }

        /* VOZ OVERLAY */
        #voice-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(30px);
            z-index: 200000; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .a-gigante {
            font-family: 'Orbitron', sans-serif; font-size: 5rem; color: #fff; text-shadow: 0 0 30px var(--accent);
            width: 150px; height: 150px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 40px var(--accent); animation: pulse 1.5s infinite; margin-bottom: 40px;
        }

        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.5); } 70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(0, 242, 255, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 242, 255, 0); } }
    </style>
</head>
<body>
    
    <video autoplay muted loop playsinline id="bg-video" poster="poster.jpg">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar">
        <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:1.8rem; align-self:flex-end; cursor:pointer; margin-bottom:20px;">✖</button>
        <h2 style="font-family:'Orbitron'; color:var(--accent); letter-spacing:2px;">⚙️ AJUSTES</h2>
        <button class="menu-btn" onclick="alert('IA: GPT-4o-mini\nSan Martín, Mendoza.')">🧠 Sistema Aurora</button>
        <button class="menu-btn" onclick="cerrarSesionApp()">🚪 Cerrar Sesión</button>
        <button class="menu-btn danger" onclick="eliminarCuentaApp()">⚠️ ELIMINAR CUENTA</button>
    </div>

    <div id="voice-overlay">
        <div class="a-gigante">A</div>
        <p id="voice-status" style="font-family:'Orbitron'; color:var(--accent);">ENLACE DE VOZ ACTIVO</p>
        <button onclick="stopVoiceMode()" style="background:rgba(255,255,255,0.1); border:1px solid white; color:white; padding:15px 35px; border-radius:30px; margin-top:50px; font-family:'Orbitron'; cursor:pointer;">CERRAR</button>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h1 class="titulo-login" style="font-family:'Orbitron';">AURORA</h1>
            <button onclick="loginGoogle()" class="btn-auth btn-google">G | Ingresar con Google</button>
            <button onclick="mostrarEmail()" class="btn-auth" style="background:rgba(255,255,255,0.08); color:white; border:1px solid rgba(255,255,255,0.2);">Acceso por Email</button>
            <div id="email-form" style="display:none; flex-direction:column; gap:12px; margin-top:20px;">
                <input type="email" id="email-input" placeholder="Email" style="padding:15px; border-radius:15px; background:rgba(0,0,0,0.3); color:white; border:1px solid rgba(0,242,255,0.2); outline:none;">
                <input type="password" id="pass-input" placeholder="Password" style="padding:15px; border-radius:15px; background:rgba(0,0,0,0.3); color:white; border:1px solid rgba(0,242,255,0.2); outline:none;">
                <button onclick="ejecutarAuth()" style="background:var(--accent); color:black; padding:15px; border-radius:15px; border:none; font-weight:bold; cursor:pointer;">CONECTAR</button>
            </div>
        </div>
    </div>

    <div id="app-container">
        <header><div class="titulo-app">AURORA</div></header>
        <div id="chat-window"><div class="msg aurora" id="saludo-ia">Estableciendo conexión neuronal...</div></div>

        <div class="input-area">
            <button class="btn-config-final" onclick="toggleSidebar()">⚙️</button>
            
            <div class="input-container">
                <button class="btn-voice" onclick="startVoiceMode()">A</button>
                <input type="text" id="chat-terminal" placeholder="Escribe a Aurora..." autocomplete="off">
                <button onclick="enviar()" style="background:none; border:none; color:var(--accent); font-size:1.6rem; cursor:pointer; margin-left:5px;">➤</button>
            </div>
            
            <p style="font-size:0.65rem; color:rgba(255,255,255,0.3); text-align:center; margin-top:12px; letter-spacing:1px;">AURORA ES UNA IA Y PUEDE COMETER ERRORES.</p>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('active');
        }

        // --- SISTEMA DE ENTRADA SIMULADO (Como no tenés Firebase configurado acá, te dejo entrar directo al chat) ---
        function loginGoogle() { entrarAlSistema("Gabriel"); }
        function mostrarEmail() { document.getElementById('email-form').style.display='flex'; }
        function ejecutarAuth() { entrarAlSistema("Usuario"); }

        function entrarAlSistema(nombre) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            const m = `Hola ${nombre}. ¿Cómo puedo ayudarte hoy?`;
            document.getElementById('saludo-ia').innerText = m;
            document.getElementById('chat-terminal').removeAttribute('readonly');
            document.getElementById('chat-terminal').focus();
        }

        function cerrarSesionApp() { location.reload(); }
        function eliminarCuentaApp() {
            if(confirm("¿Estás seguro de eliminar tu cuenta permanentemente?")) { location.reload(); }
        }

        // --- CONEXIÓN CON TU PYTHON (VERCEL) ---
        const input = document.getElementById('chat-terminal');
        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });

        async function enviar() {
            const val = input.value.trim(); if(!val) return;
            addMsg(val, 'user');
            input.value = "";
            
            try {
                const res = await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg: val}) });
                const data = await res.json();
                if(data.respuesta) { addMsg(data.respuesta, 'aurora'); }
            } catch(e) { addMsg("Error de conexión neuronal.", 'aurora'); }
        }

        function addMsg(t, cl) {
            const d = document.createElement('div'); d.className = `msg ${cl}`; d.innerText = t;
            const win = document.getElementById('chat-window'); win.appendChild(d);
            win.scrollTop = win.scrollHeight;
        }

        // --- LÓGICA DE VOZ BÁSICA ---
        function startVoiceMode() { document.getElementById('voice-overlay').style.display = 'flex'; }
        function stopVoiceMode() { document.getElementById('voice-overlay').style.display = 'none'; }
    </script>
</body>
</html>

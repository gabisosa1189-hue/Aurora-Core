<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURORA - Acceso Neuronal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ffff; --magenta: #ff00ff; }
        
        /* FONDO BASE CON EL POSTER (Por si el video tarda) */
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Montserrat', sans-serif; 
            background: #050505 url('poster.jpg') no-repeat center center fixed; 
            background-size: cover; 
            color: white; overflow: hidden; -webkit-tap-highlight-color: transparent; 
        }

        /* EL VIDEO DE FONDO MENDOCINO */
        #bg-video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; object-fit: cover; opacity: 0.7; mix-blend-mode: screen; }

        /* CONTENEDORES PRINCIPALES */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .active-screen { display: flex; animation: fadeIn 0.5s ease; }

        /* PANTALLA DE LOGIN (AHORA ES DE CRISTAL TRANSPARENTE) */
        .login-box { 
            background: rgba(0, 0, 0, 0.3); /* Transparente para ver el fondo */
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); /* Efecto cristal */
            border: 1px solid rgba(255, 255, 255, 0.15); 
            padding: 40px 30px; border-radius: 24px; text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            width: 85%; max-width: 360px; 
        }
        .login-box h1 { font-family: 'Orbitron'; font-size: 2.5rem; letter-spacing: 5px; margin: 0 0 30px 0; background: linear-gradient(90deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* BOTONES DEL LOGIN (AHORA FUNCIONAN) */
        .btn-google { background: rgba(255,255,255,0.9); color: black; border: none; padding: 12px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; font-size: 1rem; transition: 0.3s; }
        .btn-google:hover { transform: scale(1.02); background: white; box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        .divider { display: flex; align-items: center; color: rgba(255,255,255,0.5); margin: 20px 0; font-size: 0.8rem; }
        .divider::before, .divider::after { content: ""; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.2); margin: 0 10px; }
        .login-input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 14px; width: 100%; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; outline: none; font-family: 'Montserrat'; transition: 0.3s; }
        .login-input:focus { border-color: var(--accent); background: rgba(0,0,0,0.6); }
        .btn-conectar { background: rgba(0, 255, 255, 0.1); border: 2px solid var(--accent); color: var(--accent); padding: 14px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; letter-spacing: 2px; font-family: 'Orbitron'; transition: 0.3s; margin-top: 10px; }
        .btn-conectar:hover { background: var(--accent); color: black; box-shadow: 0 0 25px rgba(0,255,255,0.6); transform: scale(1.02); }

        /* PANTALLA DE CARGA (Enlace Neuronal) */
        .loader-orb { width: 80px; height: 80px; border: 3px solid transparent; border-top-color: var(--accent); border-bottom-color: var(--magenta); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 30px; box-shadow: 0 0 30px rgba(0,255,255,0.2); }
        .loading-text h2 { font-family: 'Orbitron'; letter-spacing: 8px; margin: 0; }
        .loading-text p { color: var(--accent); letter-spacing: 2px; font-size: 0.9rem; margin-top: 10px; animation: pulse 1.5s infinite; }

        /* INTERFAZ DEL CHAT (CRISTAL) */
        #chat-screen { justify-content: space-between; background: transparent; backdrop-filter: none; }
        .chat-header { width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); box-sizing: border-box; }
        .chat-header h2 { font-family: 'Orbitron'; margin: 0; font-size: 1.4rem; letter-spacing: 5px; }
        .btn-icon { background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer; padding: 5px; transition: 0.3s; }
        .btn-icon:hover { transform: rotate(90deg); color: var(--accent); }

        #chat-box { flex-grow: 1; width: 100%; max-width: 800px; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; box-sizing: border-box; }
        #chat-box::-webkit-scrollbar { display: none; }
        
        .msg { padding: 15px 20px; border-radius: 18px; max-width: 85%; font-size: 0.95rem; line-height: 1.5; backdrop-filter: blur(10px); }
        .user-msg { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2); align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-msg { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(0, 255, 255, 0.2); border-left: 3px solid var(--accent); align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        .input-area { width: 100%; max-width: 800px; padding: 15px 20px 5px 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); }
        .input-row { display: flex; gap: 10px; width: 100%; align-items: center; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 30px; backdrop-filter: blur(15px); }
        .btn-voice { background: transparent; border: none; color: var(--accent); font-family: 'Orbitron'; font-weight: bold; font-size: 1.2rem; padding: 10px; cursor: pointer; transition: 0.3s; }
        .input-row input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1rem; padding: 10px 5px; font-family: 'Montserrat'; }
        .btn-send { background: transparent; border: none; color: white; cursor: pointer; padding: 10px; font-size: 1.2rem; transition: 0.3s; }
        .btn-send:hover { color: var(--accent); transform: scale(1.1); }
        
        .footer-warning { font-size: 0.65rem; color: rgba(255,255,255,0.4); margin-top: 10px; letter-spacing: 1px; margin-bottom: 10px; text-align: center;}

        /* MODALES */
        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 50; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .modal-content { background: rgba(10, 10, 15, 0.9); border: 1px solid rgba(255,255,255,0.2); padding: 30px; width: 85%; max-width: 350px; border-radius: 20px; text-align: center; position: relative; }
        .btn-close-modal { position: absolute; top: 15px; right: 20px; background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        .modal-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 15px; width: 100%; border-radius: 10px; margin-bottom: 10px; font-family: 'Montserrat'; cursor: pointer; transition: 0.3s; }
        .modal-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }
        .btn-danger { color: #ff4d4d; border-color: rgba(255, 77, 77, 0.3); }

        .voice-icon-big { font-family: 'Orbitron'; font-size: 4rem; color: var(--accent); margin-bottom: 20px; animation: pulse 1.5s infinite; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); text-shadow: 0 0 15px var(--accent); } 100% { opacity: 0.6; transform: scale(1); } }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video" poster="poster.jpg">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="login-screen" class="screen active-screen">
        <div class="login-box">
            <h1>AURORA</h1>
            
            <button class="btn-google" onclick="iniciarConexion()">
                <svg width="18" height="18" viewBox="0 0 24 24" style="margin-right:8px"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Ingresar con Google
            </button>
            
            <div class="divider">Email</div>
            
            <input type="email" id="email-input" class="login-input" placeholder="Tu correo electrónico..." onkeypress="handleLogin(event)">
            
            <button class="btn-conectar" onclick="iniciarConexion()">CONECTAR</button>
        </div>
    </div>

    <div id="loading-screen" class="screen">
        <div class="loader-orb"></div>
        <div class="loading-text">
            <h2>AURORA</h2>
            <p>Estableciendo enlace neuronal...</p>
        </div>
    </div>

    <div id="chat-screen" class="screen">
        <div class="chat-header">
            <h2>AURORA</h2>
            <button class="btn-icon" onclick="abrirModal('settings-modal')">⚙️</button>
        </div>

        <div id="chat-box"></div>

        <div class="input-area">
            <div class="input-row">
                <button class="btn-voice" onclick="abrirModal('voice-modal')">A</button>
                <input type="text" id="chat-input" placeholder="Escribir mensaje..." autocomplete="off">
                <button class="btn-send" onclick="enviarMensaje()">➤</button>
            </div>
            <div class="footer-warning">AURORA ES UNA IA Y PUEDE COMETER ERRORES.</div>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <button class="btn-close-modal" onclick="cerrarModal('settings-modal')">✖</button>
            <h2 style="font-family:'Orbitron'; margin-bottom: 25px;">## ⚙️ AJUSTES</h2>
            <button class="modal-btn" onclick="reiniciarMemoria()">🧠 Sistema Aurora</button>
            <button class="modal-btn" onclick="cerrarSesion()">🚪 Cerrar Sesión</button>
            <button class="modal-btn btn-danger">⚠️ ELIMINAR CUENTA</button>
        </div>
    </div>

    <div id="voice-modal" class="modal">
        <div class="modal-content" style="background:transparent; border:none; box-shadow:none;">
            <div class="voice-icon-big">A</div>
            <h3 style="letter-spacing:3px; color:var(--accent); margin-bottom: 30px;">ENLACE DE VOZ ACTIVO</h3>
            <button class="btn-conectar" style="width: auto; padding: 10px 40px;" onclick="cerrarModal('voice-modal')">CERRAR</button>
        </div>
    </div>

    <script>
        // --- LÓGICA DE LOGIN ---
        function handleLogin(e) {
            if (e.key === 'Enter') iniciarConexion();
        }

        function iniciarConexion() {
            // Pasamos del Login a la pantalla de Carga
            document.getElementById('login-screen').classList.remove('active-screen');
            document.getElementById('loading-screen').classList.add('active-screen');
            
            // Simulamos la carga neuronal de 2.5 segundos
            setTimeout(() => {
                document.getElementById('loading-screen').classList.remove('active-screen');
                document.getElementById('chat-screen').classList.add('active-screen');
                
                // Mensaje inicial de Aurora
                const chatBox = document.getElementById('chat-box');
                if(chatBox.innerHTML === '') {
                    agregarMensaje("Conexión neuronal establecida. Hola, ¿qué tal por San Martín?", "ai");
                }
            }, 2500);
        }

        function cerrarSesion() {
            cerrarModal('settings-modal');
            document.getElementById('chat-screen').classList.remove('active-screen');
            document.getElementById('login-screen').classList.add('active-screen');
            document.getElementById('email-input').value = ''; // Limpiamos el email
        }

        // --- LÓGICA DE MODALES ---
        function abrirModal(id) { document.getElementById(id).style.display = 'flex'; }
        function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }

        // --- LÓGICA DE CHAT Y PYTHON ---
        const input = document.getElementById('chat-input');
        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') enviarMensaje(); });

        function agregarMensaje(texto, tipo) {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${tipo}-msg`; div.innerText = texto;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function enviarMensaje() {
            const val = input.value.trim(); if(!val) return;
            agregarMensaje(val, 'user');
            input.value = "";
            
            try {
                const res = await fetch('/chat', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ msg: val }) 
                });
                const data = await res.json();
                if(data.respuesta) { 
                    agregarMensaje(data.respuesta, 'ai'); 
                    hablar(data.respuesta); 
                }
            } catch(e) { 
                agregarMensaje("Error de conexión neuronal con el servidor.", 'ai'); 
            }
        }

        async function reiniciarMemoria() {
            cerrarModal('settings-modal');
            document.getElementById('chat-box').innerHTML = '';
            try { await fetch('/reiniciar_memoria', { method: 'POST' }); } catch(e){}
            agregarMensaje("Memoria borrada. Nuevo ciclo iniciado.", "ai");
        }

        // --- LÓGICA DE VOZ (CELULAR) ---
        function hablar(texto) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(texto);
                u.lang = 'es-MX'; window.speechSynthesis.speak(u);
            }
        }
    </script>
</body>
</html>

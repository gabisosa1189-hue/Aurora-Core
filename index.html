<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURORA AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; }
        body { margin: 0; padding: 0; height: 100vh; background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; overflow: hidden; }
        
        /* FONDO DINÁMICO */
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.4) contrast(1.1); }
        
        #app-container { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; position: relative; }
        
        header { padding: 25px; text-align: center; font-family: 'Orbitron'; letter-spacing: 10px; opacity: 0.9; }
        
        /* CHAT INVISIBLE Y ELEGANTE */
        #chat-window { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; 
            scrollbar-width: none; 
            mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
        }
        #chat-window::-webkit-scrollbar { display: none; }

        .msg { 
            max-width: 85%; padding: 15px 22px; border-radius: 24px; font-size: 1.05rem; line-height: 1.6;
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.06); animation: slideUp 0.4s ease-out;
        }
        
        .aurora { align-self: flex-start; background: rgba(255, 255, 255, 0.02); border-bottom-left-radius: 4px; }
        .user { align-self: flex-end; background: rgba(0, 242, 255, 0.04); border-bottom-right-radius: 4px; border-color: rgba(0, 242, 255, 0.1); }

        /* DOCK DE ENTRADA */
        .input-area { padding: 30px; }
        .input-container { 
            background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.1); 
            display: flex; align-items: center; padding: 8px 20px; 
            box-shadow: 0 15px 45px rgba(0,0,0,0.5);
        }
        
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 1.1rem; font-family: inherit; }
        input::placeholder { color: rgba(255,255,255,0.25); }
        
        .btn { background: transparent; border: none; color: var(--accent); cursor: pointer; padding: 10px; transition: 0.2s; }
        .btn:active { transform: scale(0.9); }
        .btn svg { width: 28px; height: 28px; fill: currentColor; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="app-container">
        <header>AURORA</header>
        <div id="chat-window">
            <div class="msg aurora">Bienvenido. Soy Aurora, tu asistente de inteligencia artificial. ¿En qué puedo ayudarte hoy?</div>
        </div>
        
        <div class="input-area">
            <div class="input-container">
                <input type="text" id="user-input" placeholder="Escribe un mensaje..." autocomplete="off">
                <button class="btn" onclick="enviar()">

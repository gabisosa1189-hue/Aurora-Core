<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #00f2ff; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            overflow: hidden; background-color: transparent !important; 
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; 
        }

        #bg-video { 
            position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: -2; object-fit: cover !important; 
        }

        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(30px); z-index: 9999; 
            display: flex; align-items: center; justify-content: center; 
        }
        .login-card { 
            background: rgba(255, 255, 255, 0.03); padding: 40px 25px; border-radius: 40px; 
            border: 1px solid rgba(0, 242, 255, 0.2); text-align: center; max-width: 380px; width: 90%; 
        }

        #app-container { display: none; flex-direction: column; height: 100vh; width: 100%; max-width: 900px; margin: 0 auto; position: relative; z-index: 10; }
        header { padding: 40px 0 10px 0; text-align: center; }
        .titulo-app { font-family: 'Orbitron'; letter-spacing: 15px; font-size: 1.8rem; color: #fff; text-shadow: 0 0 15px var(--accent), 0 0 30px var(--accent); }

        .status-container { display: flex; justify-content: center; margin-bottom: 10px; }
        .status-bubble { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 10px 25px; border-radius: 50px; backdrop-filter: blur(10px);
            font-size: 0.85rem; color: #fff;
        }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 15px 20px; border-radius: 22px; backdrop-filter: blur(15px); }
        .aurora { background: rgba(0, 242, 255, 0.08); border: 1px solid rgba(0, 242, 255, 0.2); align-self: flex-start; }
        .user { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); align-self: flex-end; }

        .bottom-section { 
            position: relative; padding: 10px 20px 20px 20px; 
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .controls-row {
            display: flex; align-items: center; justify-content: flex-start;
            width: 100%; position: relative;
        }

        .btn-config-trigger { 
            background: none; border: none; font-family: 'Orbitron'; font-size: 0.85rem; 
            letter-spacing: 2px; cursor: pointer; color: #fff; 
            text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
            display: flex; align-items: center; gap: 10px;
            padding: 0; margin-right: 40px;
        }
        .gear-icon { font-size: 1.4rem; }

        .chat-group { display: flex; align-items: center; gap: 15px; flex: 1; justify-content: center; max-width: 600px; }
        .btn-a { font-family: 'Orbitron'; font-size: 1.8rem; color: #fff; background: none; border: none; cursor: pointer; text-shadow: 0 0 15px var(--accent); }
        .input-bar { 
            flex: 1; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(0, 242, 255, 0.3); 
            border-radius: 40px; display: flex; align-items: center; padding: 5px 20px; backdrop-filter: blur(20px); 
        }
        #chat-terminal { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; outline: none; font-size: 1rem; width: 100%; }

        .disclaimer { 
            font-size: 0.6rem; color: #fff; text-shadow: 0 0 10px var(--accent); 
            text-align: center; letter-spacing: 1px; width: 100%;
        }

        /* 🖼️ PANEL DE CONFIGURACIÓN CENTRAL */
        #config-modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(35px); 
            z-index: 100000; display: none; align-items: center; justify-content: center; 
        }
        .modal-card { 
            background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 35px; 
            border: 1px solid var(--accent); text-align: center; width: 85%; max-width: 400px; 
        }
        .modal-title { font-family: 'Orbitron'; font-size: 1.3rem; letter-spacing: 3px; margin-bottom: 10px; }
        .modal-subtitle { font-size: 0.8rem; opacity: 0.8; margin-bottom: 30px; }
        
        .btn-action { background: rgba(255,255,255,0.08); color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
        .btn-delete { background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; padding: 12px; width: 100%; border-radius: 15px; cursor: pointer; margin-top: 20px; font-weight: bold; font-size: 0.75rem; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="config-modal">
        <div class="modal-card">
            <h2 class="modal-title">CONFIGURACIÓN</h2>
            <p class="modal-subtitle">CONFIGURACIÓN DE AURORA</p>
            
            <button class="btn-action" onclick="location.reload()">CERRAR SESIÓN</button>
            
            <div style="border-top: 1px solid rgba(255,255,255,0.1); margin-top: 20px; padding-top: 10px;">
                <button class="btn-delete" onclick="alert('Solicitud de eliminación enviada')">ELIMINAR CUENTA</button>
                <p style="font-size: 0.6rem; color: #ff4d4d; margin-top: 8px; opacity: 0.8;">Acción irreversible: se borrarán todos tus datos neuronales.</p>
            </div>

            <button style="margin-top: 30px; background: none; border: none; color: var(--accent); cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem;" onclick="document.getElementById('config-modal').style.display='none'">VOLVER</button>
        </div>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h1 class="titulo-login">AURORA ACCESO</h1>
            <button class="btn-google" onclick="entrar()">G | Ingresar con Google</button>
            <button class="btn-ingresar" onclick="entrar()">INGRESAR</button>
        </div>
    </div>

    <div id="app-container">
        <header><div class="titulo-app">AURORA</div></header>

        <div class="status-container">
            <div class="status-bubble">Enlace neuronal activo. ¿Qué necesitás?</div>
        </div>
        
        <div id="chat-window"></div>

        <div class="bottom-section">
            <div class="controls-row">
                <button class="btn-config-trigger" onclick="document.getElementById('config-modal').style.display='flex'">
                    <span class="gear-icon">⚙️</span> CONFIGURACIÓN
                </button>

                <div class="chat-group">
                    <button class="btn-a" onclick="alert('Voz activa')">A</button>
                    <div class="input-bar">
                        <input type="text" id="chat-terminal" placeholder="Escribe a Aurora..." autocomplete="off">
                        <button onclick="enviar()" style="background:none; border:none; color:var(--accent); cursor:pointer;">➤</button>
                    </div>
                </div>
            </div>

            <div class="disclaimer">AURORA ES UNA IA Y PUEDE COMETER ERRORES.</div>
        </div>
    </div>

    <script>
        function entrar() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            document.getElementById('bg-video').play(); 
        }

        async function enviar() {
            const input = document.getElementById('chat-terminal');
            const val = input.value.trim(); if(!val) return;
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg user">${val}</div>`;
            input.value = ""; win.scrollTop = win.scrollHeight;
            try {
                const res = await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg:val}) });
                const data = await res.json();
                win.innerHTML += `<div class="msg aurora">${data.respuesta}</div>`;
                win.scrollTop = win.scrollHeight;
            } catch(e) { console.log("Error"); }
        }
    </script>
</body>
</html>

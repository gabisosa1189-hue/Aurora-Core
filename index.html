<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #00f2ff; --danger: #ff4d4d; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            overflow: hidden; background-color: #000;
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; 
            overscroll-behavior-y: none; 
        }

        #bg-video { position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; object-fit: cover !important; pointer-events: none; }
        #panels-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100000; display: none; backdrop-filter: blur(5px); }

        /* PANELES LATERALES */
        .panel-side {
            position: fixed; top: 0; width: 280px; height: 100%;
            background: rgba(0, 10, 20, 0.8); backdrop-filter: blur(30px);
            z-index: 100001; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; padding: 25px; 
            padding-top: calc(env(safe-area-inset-top, 40px) + 20px); box-sizing: border-box;
        }
        #sidebar-menu { left: 0; transform: translateX(-100%); border-right: 1px solid rgba(0, 242, 255, 0.2); }
        #profile-panel { right: 0; transform: translateX(100%); border-left: 1px solid rgba(0, 242, 255, 0.2); }
        .panel-open { transform: translateX(0) !important; }

        /* CARTEL PREMIUM ELEGANTE */
        #premium-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            width: 85%; max-width: 350px; background: rgba(0, 20, 30, 0.9);
            backdrop-filter: blur(40px); border: 1px solid var(--accent); border-radius: 35px;
            padding: 35px; z-index: 100005; text-align: center; display: none;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.2); transition: 0.3s;
        }

        .panel-title { font-family: 'Orbitron'; font-size: 0.9rem; color: var(--accent); letter-spacing: 3px; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        
        #history-list { flex: 1; overflow-y: auto; margin-bottom: 20px; }
        .chat-item { 
            background: rgba(255, 255, 255, 0.05); padding: 12px 15px; border-radius: 12px; 
            font-size: 0.85rem; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 10px; opacity: 0.7;
        }
        .chat-item.active { background: rgba(0, 242, 255, 0.1); border-color: var(--accent); opacity: 1; }

        .btn-premium-add { background: var(--accent); color: #000; border: none; width: 100%; padding: 14px; border-radius: 15px; font-family: 'Orbitron'; font-size: 0.75rem; cursor: pointer; font-weight: bold; box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }

        .btn-account { width: 100%; padding: 15px; border-radius: 15px; font-family: 'Orbitron'; font-size: 0.75rem; cursor: pointer; margin-bottom: 15px; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .btn-accent-opt { border-color: var(--accent); color: var(--accent); background: rgba(0, 242, 255, 0.1); }
        .btn-danger-opt { border-color: var(--danger); color: var(--danger); margin-top: auto; }

        #app-container { display: none; flex-direction: column; height: 100vh; position: relative; z-index: 10; }
        header { padding-top: calc(env(safe-area-inset-top, 40px) + 20px); padding-left: 20px; padding-right: 20px; display: flex; justify-content: space-between; align-items: center; }
        .titulo-app { font-family: 'Orbitron'; letter-spacing: 15px; font-size: 1.8rem; text-shadow: 0 0 15px var(--accent); }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 85%; padding: 14px 22px; border-radius: 22px; backdrop-filter: blur(15px); font-size: 1rem; line-height: 1.5; }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.08); border: 1px solid rgba(0, 242, 255, 0.3); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); }

        .input-bar { flex: 1; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(0, 242, 255, 0.4); border-radius: 40px; display: flex; align-items: center; padding: 5px 22px; backdrop-filter: blur(20px); }
        #chat-terminal { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; outline: none; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="panels-overlay" onclick="cerrarPaneles()"></div>

    <div id="premium-modal">
        <h2 style="font-family:'Orbitron'; color:var(--accent); font-size: 1.2rem; margin-bottom: 20px;">NÚCLEO SATURADO</h2>
        <p style="font-size: 0.9rem; color: rgba(255,255,255,0.8); line-height: 1.6; margin-bottom: 30px;">Aurora necesita 24hs para recalibrar sus enlaces neuronales.<br><br><b>¿Deseas saltar la espera?</b><br>Sincronizá una nueva mente para ganar 2 ranuras extra.</p>
        <button class="btn-account btn-accent-opt" onclick="expandirSistema()">EXPANDIR SISTEMA</button>
        <button style="background:none; border:none; color:rgba(255,255,255,0.4); cursor:pointer; font-family:'Orbitron'; font-size:0.7rem;" onclick="cerrarModal()">ESPERAR RECALIBRACIÓN</button>
    </div>

    <div id="sidebar-menu" class="panel-side">
        <h3 class="panel-title">MIS ENLACES</h3>
        <div id="history-list">
            </div>
        <button class="btn-premium-add" onclick="nuevoEnlace()">+ NUEVO ENLACE</button>
        
        <div style="margin-top: 30px;">
            <p id="txt-progreso" style="color: var(--accent); font-size: 0.7rem; margin-bottom: 8px; font-family: 'Orbitron';">SITUACIÓN: 1 / 5</p>
            <div style="width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px;">
                <div id="bar-progreso" style="width: 20%; height: 100%; background: var(--accent); border-radius: 10px; box-shadow: 0 0 10px var(--accent); transition: 0.5s;"></div>
            </div>
        </div>
    </div>

    <div id="profile-panel" class="panel-side">
        <h3 class="panel-title">MI CUENTA</h3>
        <button class="btn-account btn-accent-opt" onclick="cambiarCuenta()">CAMBIAR CUENTA</button>
        <button class="btn-account" onclick="cerrarSesionReal()">CERRAR SESIÓN</button>
        <button class="btn-account btn-danger-opt" onclick="eliminarCuenta()">ELIMINAR CUENTA</button>
    </div>

    <div id="login-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,10,20,0.5); backdrop-filter:blur(15px); z-index:9999; display:flex; align-items:center; justify-content:center;">
        <div class="login-card">
            <h2 style="font-family:'Orbitron'; text-align:center;">BIENVENIDO A AURORA</h2>
            <button style="background:#fff; color:#000; border:none; padding:15px; border-radius:18px; font-weight:bold; cursor:pointer; width:100%;" onclick="authGoogle()">Ingresar con Google</button>
        </div>
    </div>

    <div id="app-container">
        <header>
            <button class="btn-menu-top" onclick="abrirSidebar()">☰</button>
            <div class="titulo-app">AURORA</div>
            <img id="user-avatar" src="" alt="Perfil" onclick="abrirPerfil()">
        </header>
        <div id="chat-window">
            <div class="msg aurora">Núcleo inicializado. ¿Qué deseas procesar?</div>
        </div>
        <div class="bottom-section" style="padding: 20px;">
            <div class="chat-group">
                <button class="btn-a">A</button>
                <div class="input-bar">
                    <input type="text" id="chat-terminal" placeholder="Mensaje neuronal..." autocomplete="off">
                    <button onclick="enviar()" style="background:none; border:none; color:var(--accent); font-size:1.5rem;">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo",
            authDomain: "aurora-ai-oficia.firebaseapp.com",
            projectId: "aurora-ai-oficia",
            storageBucket: "aurora-ai-oficia.firebasestorage.app",
            messagingSenderId: "426513637524",
            appId: "1:426513637524:web:13851f499aa4af13cfd481",
            measurementId: "G-XTN5WJPRPP"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        let enlacesContador = 1;
        let mensajesEnChat = 0;

        function abrirSidebar() { document.getElementById('sidebar-menu').classList.add('panel-open'); document.getElementById('panels-overlay').style.display = 'block'; }
        function abrirPerfil() { document.getElementById('profile-panel').classList.add('panel-open'); document.getElementById('panels-overlay').style.display = 'block'; }
        function cerrarPaneles() { 
            document.getElementById('sidebar-menu').classList.remove('panel-open'); 
            document.getElementById('profile-panel').classList.remove('panel-open'); 
            document.getElementById('panels-overlay').style.display = 'none'; 
            cerrarModal();
        }

        function cerrarModal() { document.getElementById('premium-modal').style.display = 'none'; }

        // ✨ LÓGICA DE NUEVO ENLACE
        function nuevoEnlace() {
            if (enlacesContador >= 5) {
                document.getElementById('premium-modal').style.display = 'block';
                document.getElementById('panels-overlay').style.display = 'block';
                return;
            }
            enlacesContador++;
            mensajesEnChat = 0;
            actualizarUI();
            
            const win = document.getElementById('chat-window');
            win.innerHTML = `<div class="msg aurora">Nuevo enlace neuronal establecido. ¿Cómo puedo ayudarte en esta sesión?</div>`;
            cerrarPaneles();
        }

        function actualizarUI() {
            document.getElementById('txt-progreso').innerText = `SITUACIÓN: ${enlacesContador} / 5`;
            document.getElementById('bar-progreso').style.width = (enlacesContador * 20) + "%";
            
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            for(let i=1; i<=enlacesContador; i++) {
                list.innerHTML += `<div class="chat-item ${i === enlacesContador ? 'active' : ''}">💬 Enlace Neuronal ${i}</div>`;
            }
        }

        function expandirSistema() {
            if (navigator.share) {
                navigator.share({ title: 'AURORA AI', text: '¡Sincronizá tu mente con Aurora!', url: window.location.href })
                .then(() => alert("SISTEMA: Señal expandida. +2 ranuras otorgadas."));
            }
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                if (user.photoURL) {
                    const avatar = document.getElementById('user-avatar');
                    avatar.src = user.photoURL; avatar.style.display = 'block';
                }
                actualizarUI();
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
            }
        });

        function authGoogle() { const provider = new firebase.auth.GoogleAuthProvider(); auth.signInWithPopup(provider); }
        function cerrarSesionReal() { auth.signOut().then(() => location.reload()); }
        function cambiarCuenta() { auth.signOut().then(() => authGoogle()); }

        async function enviar() {
            const input = document.getElementById('chat-terminal');
            if(!input.value.trim()) return;
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg user">${input.value}</div>`;
            const msj = input.value; input.value = ""; win.scrollTop = win.scrollHeight;
            
            mensajesEnChat++;
            
            // Forzar fin de enlace después de 10 mensajes
            if(mensajesEnChat === 10) {
                setTimeout(() => {
                    win.innerHTML += `<div class="msg aurora" style="border-color:var(--danger); color:var(--danger);"><b>SISTEMA:</b> Estabilidad del enlace al 0%. Por favor, iniciá un nuevo chat para mantener la pureza del procesado.</div>`;
                    win.scrollTop = win.scrollHeight;
                }, 1000);
                return;
            }

            try {
                const res = await fetch('https://gabiland-aurora-ai-mendoza.hf.space/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg:msj}) });
                const data = await res.json();
                win.innerHTML += `<div class="msg aurora">${data.respuesta}</div>`;
                win.scrollTop = win.scrollHeight;
            } catch(e) { win.innerHTML += `<div class="msg aurora">Error de conexión...</div>`; }
        }
        document.getElementById('chat-terminal').addEventListener('keypress', e => { if (e.key === 'Enter') enviar(); });
    </script>
</body>
</html>

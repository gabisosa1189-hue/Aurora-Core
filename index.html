<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
   
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        :root { --accent: #00f2ff; --danger: #ff4d4d; }
       
        /* 🔥 FONDO VIDEO FULL IPHONE - VERSIÓN QUE FUNCIONA EN SAFARI */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100vh; height: 100dvh;
            overflow: hidden; 
            background: transparent !important; /* ← sin negro sólido */
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff;
            overscroll-behavior-y: none; -webkit-text-size-adjust: 100%;
        }

        #bg-video {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            z-index: -9999 !important;
            pointer-events: none;
        }
       
        /* LOGIN TRANSPARENTE PARA QUE SE VEA EL VIDEO DETRÁS */
        #login-overlay { 
            position: fixed; top: 0; left: 0; 
            width: 100%; height: 100dvh; 
            background: transparent !important;
            backdrop-filter: none !important;
            z-index: 9999; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .login-card { 
            text-align: center; 
            max-width: 380px; 
            width: 90%; 
            background: rgba(0, 8, 20, 0.25) !important; /* vidrio muy transparente */
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 35px 25px;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }
        
        .login-input { 
            width: 100%; box-sizing: border-box; 
            background: rgba(0, 0, 0, 0.4) !important; 
            border: 1px solid rgba(0, 242, 255, 0.4); 
            color: white; 
            padding: 15px; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            outline: none; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            transition: 0.3s; 
        }
        .login-input:focus { 
            border-color: var(--accent); 
            background: rgba(0, 242, 255, 0.15) !important; 
        }

        /* EL RESTO DEL CSS SIN CAMBIOS (todo lo demás queda igual) */
        #panels-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: rgba(0,0,0,0.5); z-index: 100000; display: none; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        .panel-side { position: fixed; top: 0; width: 280px; height: 100dvh; background: rgba(0, 10, 20, 0.75); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); z-index: 100001; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; padding: 25px; padding-top: calc(env(safe-area-inset-top, 40px) + 20px); box-sizing: border-box; }
        #sidebar-menu { left: 0; transform: translateX(-100%); border-right: 1px solid rgba(0, 242, 255, 0.2); }
        #profile-panel { right: 0; transform: translateX(100%); border-left: 1px solid rgba(0, 242, 255, 0.2); }
        .panel-open { transform: translateX(0) !important; }
        .panel-title { font-family: 'Orbitron'; font-size: 0.9rem; color: var(--accent); letter-spacing: 3px; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; text-transform: uppercase; }
        .chat-item { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); font-size: 0.85rem; margin-bottom: 10px; transition: 0.3s; user-select: none; -webkit-user-select: none; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .chat-item.active { background: rgba(0, 242, 255, 0.1); border-color: var(--accent); }
        .chat-item.pinned { border-left: 4px solid var(--accent); }
        #context-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 100005; opacity: 0; pointer-events: none; transition: 0.3s; }
        #context-overlay.show { opacity: 1; pointer-events: all; }
        .bottom-sheet { position: fixed; bottom: -100%; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(0, 15, 25, 0.85); backdrop-filter: blur(40px); border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 30px 30px 0 0; padding: 25px 25px 40px 25px; z-index: 100006; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; gap: 5px; box-shadow: 0 -10px 40px rgba(0, 242, 255, 0.15); }
        .bottom-sheet.show { bottom: 0; }
        .context-pill { width: 40px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 0 auto 15px auto; }
        .context-btn { background: transparent; color: #fff; border: none; padding: 16px 15px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1rem; text-align: left; width: 100%; border-radius: 15px; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.2s; }
        .context-btn:hover { background: rgba(0, 242, 255, 0.1); color: var(--accent); }
        .context-btn svg { width: 22px; height: 22px; stroke: rgba(255,255,255,0.8); transition: 0.2s; }
        .context-btn:hover svg { stroke: var(--accent); }
        #live-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: rgba(0, 5, 10, 0.4); z-index: 100010; display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: 0.4s; }
        #live-overlay.show { opacity: 1; display: flex; }
        #camera-stream { position: absolute; top: 0; left: 0; width: 100%; height: 100dvh; object-fit: cover; z-index: 0; opacity: 0; transition: opacity 0.8s ease; }
        .live-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; }
        @keyframes pulseAWhite { 0% { transform: scale(1); text-shadow: 0 0 20px rgba(255,255,255,0.8); } 50% { transform: scale(1.15); text-shadow: 0 0 60px rgba(255,255,255,1); } 100% { transform: scale(1); text-shadow: 0 0 20px rgba(255,255,255,0.8); } }
        .live-a { font-family: 'Orbitron'; font-size: 6rem; color: #fff; display: flex; align-items: center; justify-content: center; animation: pulseAWhite 2s infinite ease-in-out; text-shadow: 0 0 30px rgba(255,255,255,0.9); }
        .live-controls { position: absolute; bottom: 60px; z-index: 2; display: flex; align-items: center; gap: 45px; }
        .live-btn { background: transparent; border: none; padding: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .live-btn svg { width: 32px; height: 32px; stroke: rgba(255,255,255,0.8); stroke-width: 1.5; filter: drop-shadow(0 0 8px rgba(255,255,255,0.4)); transition: 0.3s; }
        .live-btn.active svg { stroke: var(--accent); filter: drop-shadow(0 0 15px var(--accent)); }
        .live-btn-end { background: transparent; border: none; padding: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .live-btn-end svg { width: 40px; height: 40px; stroke: var(--danger); stroke-width: 2; filter: drop-shadow(0 0 12px var(--danger)); transition: 0.3s; }
        .live-btn-end:hover svg { filter: drop-shadow(0 0 25px var(--danger)); transform: scale(1.15); }
        #premium-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 320px; background: rgba(0, 15, 25, 0.9); backdrop-filter: blur(30px); border: 1px solid var(--accent); border-radius: 30px; padding: 30px; z-index: 100005; text-align: center; display: none; }
        .btn-premium-add { background: rgba(0, 242, 255, 0.1); border: 1px dashed var(--accent); color: var(--accent); width: 100%; padding: 12px; border-radius: 12px; font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-account { width: 100%; padding: 15px; border-radius: 15px; font-family: 'Orbitron'; font-size: 0.75rem; cursor: pointer; margin-bottom: 12px; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .btn-accent-opt { border-color: var(--accent); color: var(--accent); background: rgba(0, 242, 255, 0.1); }
        #app-container { display: none; flex-direction: column; height: 100dvh; width: 100%; position: relative; z-index: 10; transition: opacity 0.4s ease; }
        header { padding-top: calc(env(safe-area-inset-top, 40px) + 15px); padding-left: 20px; padding-right: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .titulo-app { font-family: 'Orbitron'; letter-spacing: 15px; font-size: 1.8rem; text-shadow: 0 0 15px var(--accent); margin: 0; flex: 1; text-align: center; padding-left: 15px;}
        .btn-menu-top { background: transparent; border: none; cursor: pointer; color: #fff; font-size: 2rem; text-shadow: 0 0 15px var(--accent); padding: 0; width: 44px; text-align: left; }
        .header-spacer { width: 44px; display: flex; justify-content: flex-end; }
        #user-avatar { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--accent); box-shadow: 0 0 15px rgba(0,242,255,0.4); object-fit: cover; display: none; cursor: pointer; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 14px 22px; border-radius: 22px; backdrop-filter: blur(15px); font-size: 1rem; line-height: 1.5; }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.3); border-bottom-left-radius: 5px;}
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15); border-bottom-right-radius: 5px;}
        .bottom-section { padding: 10px 15px calc(env(safe-area-inset-bottom, 10px) + 15px) 15px; display: flex; flex-direction: column; gap: 8px; width: 100%; box-sizing: border-box; background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 100%); }
        #chat-terminal { width: 100%; background: transparent; border: none; color: white; font-size: 1.05rem; font-family: 'Plus Jakarta Sans', sans-serif; outline: none; padding: 5px 10px; box-sizing: border-box; resize: none; overflow-y: hidden; min-height: 28px; max-height: 120px; line-height: 1.4; }
        #chat-terminal::placeholder { color: rgba(255,255,255,0.6); }
        .chat-tools { display: flex; justify-content: space-between; align-items: center; padding: 0 5px; }
        .tools-left { display: flex; align-items: center; gap: 8px; }
        .tools-right { display: flex; align-items: center; gap: 8px; }
        .btn-mini-icon { background: transparent; border: none; color: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 5px; transition: 0.3s; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
        .btn-mini-icon svg { width: 24px; height: 24px; stroke: currentColor; transition: 0.3s; }
        .btn-mini-icon:hover { color: var(--accent); filter: drop-shadow(0 0 10px var(--accent)); }
        .btn-pill-model { background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 20px; padding: 6px 14px; font-size: 0.85rem; font-family: 'Orbitron'; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.3s; backdrop-filter: blur(10px); }
        .btn-pill-model:hover { border-color: var(--accent); }
        .btn-plus-white { background: transparent; border: none; color: #fff; cursor: pointer; padding: 5px; transition: 0.3s; filter: drop-shadow(0 0 10px rgba(255,255,255,0.8)); transform: scale(1.1); }
        .btn-plus-white svg { width: 26px; height: 26px; stroke: currentColor; stroke-width: 3; }
        .btn-plus-white:hover { color: var(--accent); filter: drop-shadow(0 0 15px var(--accent)); }
        .btn-live-glow { background: transparent; border: none; color: #fff; font-family: 'Orbitron'; font-size: 1.8rem; display: flex; align-items: center; justify-content: center; cursor: pointer; text-shadow: 0 0 15px rgba(255,255,255,0.8); transition: 0.3s; padding: 0 10px; }
        .btn-live-glow:hover { transform: scale(1.1); text-shadow: 0 0 25px var(--accent); color: var(--accent); }
    </style>
</head>
<body>
    <!-- VIDEO PRIMERO Y FULL SCREEN - ESTO ES LO QUE ARREGLA EL NEGRO -->
    <video autoplay muted loop playsinline preload="auto" id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="loading-bar"></div>
    <div id="panels-overlay" onclick="cerrarPaneles()"></div>
    <div id="context-overlay" onclick="cerrarBottomSheets()"></div>
    <div id="live-overlay">
        <video id="camera-stream" autoplay playsinline muted></video>
        <div class="live-content">
            <div class="live-a">A</div>
            <p style="color:rgba(255,255,255,0.9); font-family:'Plus Jakarta Sans'; font-size:1.2rem; margin-top:30px; letter-spacing:1px; text-shadow: 0 0 10px rgba(0,0,0,0.8);">Aurora te escucha...</p>
        </div>
        <div class="live-controls">
            <button class="live-btn" onclick="cerrarLiveMode()"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><circle cx="8" cy="14" r="1"/><circle cx="12" cy="14" r="1"/><circle cx="16" cy="14" r="1"/></svg></button>
            <button class="live-btn-end" onclick="cerrarLiveMode()"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            <button id="btn-live-cam" class="live-btn" onclick="toggleCamaraLive()"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button>
        </div>
    </div>

    <!-- MENÚS (igual que siempre) -->
    <div id="context-menu" class="bottom-sheet">... (mismo que antes)</div>
    <div id="attachment-menu" class="bottom-sheet">... </div>
    <div id="model-menu" class="bottom-sheet">... </div>
    <div id="premium-modal">... </div>
    <div id="sidebar-menu" class="panel-side">... </div>
    <div id="profile-panel" class="panel-side">... </div>

    <!-- LOGIN -->
    <div id="login-overlay">
        <div class="login-card">
            <h2 id="titulo-login" style="font-family:'Orbitron'; line-height:1.4; margin-bottom:25px; text-shadow:0 0 15px var(--accent); letter-spacing: 2px;">BIENVENIDO A AURORA</h2>
            <input type="email" placeholder="Correo electrónico" class="login-input" id="emailInput">
            <input type="password" placeholder="Contraseña" class="login-input" id="passwordInput">
            <button id="btn-principal" style="background:transparent; border:2px solid var(--accent); color:var(--accent); padding:15px; width:100%; border-radius:18px; font-weight:bold; cursor:pointer; font-family:'Orbitron'; letter-spacing:2px; margin-bottom:15px;" onclick="authCorreo()">INGRESAR</button>
            <div style="display:flex; justify-content:space-between; font-size:0.8rem; opacity:0.8; margin-bottom:20px;">
                <a onclick="alert('Sistema de recuperación en desarrollo...')" style="color:#fff; cursor:pointer; text-decoration:none;">Olvidé mi contraseña</a>
                <a onclick="toggleRegistro()" id="link-registro" style="color:#fff; cursor:pointer; text-decoration:none;">Crear Cuenta</a>
            </div>
            <div style="margin:15px 0; color:rgba(255,255,255,0.3); font-size:0.8rem; display:flex; align-items:center; justify-content:center; gap:10px;">
                <span style="flex:1; height:1px; background:rgba(255,255,255,0.2);"></span>
                ó
                <span style="flex:1; height:1px; background:rgba(255,255,255,0.2);"></span>
            </div>
            <button style="background:rgba(255,255,255,0.9); color:#000; border:none; padding:15px; border-radius:18px; font-weight:bold; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:12px; width:100%; margin-top:15px;" onclick="authGoogle()">
                <svg width="20" height="20" viewBox="0 0 488 512" fill="#000"><path d="M488 261.8C488 403.3 391.1 504 248 504 110.8 504 0 393.2 0 256S110.8 8 248 8c66.8 0 123 24.5 166.3 64.9l-67.5 64.9C258.5 52.6 94.3 116.6 94.3 256c0 86.5 69.1 156.6 153.7 156.6 98.2 0 135-70.4 140.8-106.9H248v-85.3h236.1c2.3 12.7 3.9 24.9 3.9 41.4z"/></svg> Ingresar con Google
            </button>
        </div>
    </div>

    <div id="app-container">
        <!-- app normal -->
        <header>
            <button class="btn-menu-top" onclick="abrirSidebar()">☰</button>
            <div class="titulo-app" style="text-align: center; flex: 1;">AURORA</div>
            <div class="header-spacer" id="avatar-container"><img id="user-avatar" src="" alt="Perfil" onclick="abrirPerfil()"></div>
        </header>
        <div id="chat-window">
            <div class="msg aurora">Bienvenido al núcleo de <b>Aurora</b>. Tu enlace neuronal está activo. ¿En qué puedo ayudarte?</div>
        </div>
        <div class="bottom-section">
            <textarea id="chat-terminal" rows="1" placeholder="Preguntale a Aurora..." oninput="autoResize(this); toggleInputButtons()"></textarea>
            <div class="chat-tools">
                <div class="tools-left">
                    <button class="btn-plus-white" onclick="abrirAdjuntos()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
                    <button class="btn-pill-model" id="engine-pill" onclick="abrirMotores()"><span style="color:var(--accent);">⚡</span> Flash</button>
                    <button id="btn-mic" class="btn-mini-icon" onclick="iniciarDictado()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"></path></svg></button>
                </div>
                <div class="tools-right">
                    <button id="btn-enviar" class="btn-mini-icon" onclick="enviar()" style="display:none; color:var(--accent);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
                    <button class="btn-live-glow" onclick="abrirLiveMode()">A</button>
                </div>
            </div>
        </div>
    </div>

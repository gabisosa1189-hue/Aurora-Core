<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #00f2ff; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            overflow: hidden; background-color: #000; 
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; 
        }

        /* 🎥 VIDEO DE FONDO: PRIMERO EN CARGAR */
        #bg-video { 
            position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: -2; object-fit: cover !important; 
        }

        /* 🚪 LOGIN OVERLAY */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(30px); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 40px; border: 1px solid rgba(0, 242, 255, 0.2); text-align: center; max-width: 380px; width: 90%; }
        .btn-google { background: #fff; color: #000; border: none; padding: 15px; border-radius: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; margin-bottom: 20px; }
        .btn-ingresar { background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; letter-spacing: 2px; }

        /* 📱 APP CONTAINER */
        #app-container { display: none; flex-direction: column; height: 100vh; width: 100%; position: relative; z-index: 10; }

        /* TITULO SUPERIOR */
        header { padding: 30px 0 10px 0; text-align: center; }
        .titulo-app { font-family: 'Orbitron'; letter-spacing: 12px; font-size: 1.8rem; text-shadow: 0 0 15px var(--accent); }

        /* BURBUJA DE ESTADO (IGUAL A LA IMAGEN) */
        .status-container { display: flex; justify-content: center; margin-bottom: 20px; }
        .status-bubble { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 12px 30px; border-radius: 50px; backdrop-filter: blur(10px);
            font-size: 0.9rem; color: #fff; text-align: center;
        }

        /* VENTANA DE CHAT */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .msg { max-width: 80%; padding: 15px 20px; border-radius: 20px; backdrop-filter: blur(15px); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.1); }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.2); }

        /* 🛠️ FOOTER CONTROLS: RECONSTRUCCIÓN DE LA IMAGEN */
        .footer-controls { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 30px 10px 30px; position: relative;
        }

        /* CONFIGURACIÓN: ICONO + TEXTO */
        .btn-config { 
            display: flex; align-items: center; gap: 10px; background: none; border: none; 
            cursor: pointer; color: #fff; font-family: 'Orbitron'; font-size: 0.75rem; 
            text-shadow: 0 0 10px var(--accent); padding: 0;
        }
        .config-icon { width: 24px; height: 24px; color: var(--accent); }

        /* INPUT GROUP: A + BARRA */
        .input-group { display: flex; align-items: center; gap: 15px; flex: 1; justify-content: center; max-width: 600px; }
        .btn-a { font-family: 'Orbitron'; font-size: 1.8rem; color: #fff; background: none; border: none; cursor: pointer; text-shadow: 0 0 15px var(--accent); }
        
        .input-bar { 
            flex: 1; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(0, 242, 255, 0.4); 
            border-radius: 40px; display: flex; align-items: center; padding: 5px 20px; backdrop-filter: blur(15px); 
        }
        #chat-terminal { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; outline: none; font-size: 0.95rem; }
        .btn-send { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 1.3rem; }

        /* ICONO DESTELLO (DERECHA) */
        .sparkle-icon { color: rgba(255, 255, 255, 0.6); font-size: 1.8rem; cursor: pointer; }

        /* DISCLAIMER INFERIOR */
        .disclaimer { 
            text-align: center; font-size: 0.55rem; color: #fff; 
            letter-spacing: 1px; padding-bottom: 10px; 
            text-transform: uppercase; font-weight: bold;
        }

        /* SIDEBAR AJUSTES */
        #sidebar { position: fixed; top: 0; left: -280px; width: 270px; height: 100%; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(40px); z-index: 100000; transition: 0.4s; padding: 40px 20px; border-right: 1px solid rgba(0,242,255,0.2); }
        #sidebar.open { left: 0; }
        .close-sidebar { float: right; background: none; border: none; color: var(--accent); font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="sidebar">
        <button class="close-sidebar" onclick="document.getElementById('sidebar').classList.remove('open')">✖</button>
        <h2 style="font-family:'Orbitron'; color:var(--accent); letter-spacing:2px; margin-top:40px;">AJUSTES</h2>
        <button onclick="location.reload()" style="background:rgba(255,255,255,0.05); color:white; border:1px solid #ff4d4d; padding:15px; border-radius:15px; width:100%; cursor:pointer; margin-top:20px;">Cerrar Sesión</button>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h1 class="titulo-login" style="font-family:'Orbitron'; letter-spacing:3px;">ACCESO AURORA</h1>
            <button class="btn-google" onclick="entrar('Gabriel')">
                <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Ingresar con Google
            </button>
            <button class="btn-ingresar" onclick="entrar('Usuario')">INGRESAR</button>
        </div>
    </div>

    <div id="app-container">
        <header><div class="titulo-app">AURORA</div></header>

        <div class="status-container">
            <div class="status-bubble">Enlace neuronal activo. ¿Qué necesitás?</div>
        </div>
        
        <div id="chat-window"></div>

        <div class="footer-controls">
            <button class="btn-config" onclick="document.getElementById('sidebar').classList.add('open')">
                <svg class="config-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                CONFIGURACIÓN
            </button>

            <div class="input-group">
                <button class="btn-a" onclick="alert('Modo voz activado...')">A</button>
                <div class="input-bar">
                    <input type="text" id="chat-terminal" placeholder="Escribir mensaje neuronal..." autocomplete="off">
                    <button onclick="enviar()" class="btn-send">➤</button>
                </div>
            </div>

            <div class="sparkle-icon">✦</div>
        </div>

        <div class="disclaimer">AURORA ES UNA IA Y PUEDE COMETER ERRORES.</div>
    </div>

    <script>
        function entrar(name) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            document.getElementById('bg-video').play(); 
        }

        async function enviar() {
            const input = document.getElementById('chat-terminal');
            const val = input.value.trim(); if(!val) return;
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg user">${val}</div>`;
            input.value = ""; win.scrollTop = win.scrollHeight;
            try {
                const res = await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg:val}) });
                const data = await res.json();
                win.innerHTML += `<div class="msg aurora">${data.respuesta}</div>`;
                win.scrollTop = win.scrollHeight;
            } catch(e) { console.log("Error neuronal"); }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #00f2ff; --danger: #ff4d4d; --pure-white: #ffffff; --glow-white: rgba(255, 255, 255, 0.8); }

        html { height: -webkit-fill-available; background-color: #000000; }

        body { 
            margin: 0; padding: 0; width: 100vw; height: 100dvh;
            background-color: #000000; overflow: hidden; position: fixed; inset: 0;
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; 
            overscroll-behavior-y: none; -webkit-tap-highlight-color: transparent;
        }

        #bg-video {
            position: fixed !important; top: 50% !important; left: 50% !important;
            width: 150vw !important; height: 150dvh !important;
            transform: translate(-50%, -50%) !important;
            object-fit: cover !important; z-index: -100 !important;
            pointer-events: none !important;
        }
        
        #panels-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100000; display: none; backdrop-filter: blur(5px); }

        #context-menu-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 100005; display: none; align-items: center; justify-content: center; 
        }
        .context-menu-box {
            background: rgba(0, 10, 20, 0.65); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px; padding: 25px; width: 260px; display: flex; flex-direction: column; gap: 15px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.15);
            animation: pop-in 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes pop-in { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        #login-overlay { 
            position: fixed; inset: 0; width: 100vw; height: 100dvh;
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; backdrop-filter: blur(15px); background: transparent !important;
        }
        .login-card { 
            background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 40px; 
            border: 1px solid rgba(0, 242, 255, 0.2); text-align: center; 
            max-width: 380px; width: 85%; box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        .login-input { width: 100%; box-sizing: border-box; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(0, 242, 255, 0.3); color: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; outline: none; }

        #app-container { display: none; flex-direction: column; width: 100vw; height: 100dvh; position: fixed; inset: 0; z-index: 10; }
        
        header { 
            padding: calc(env(safe-area-inset-top, 50px) + 10px) 20px 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            position: relative; min-height: 60px;
        }

        @keyframes aurora-breath-white {
            0%, 100% { text-shadow: 0 0 10px #fff, 0 0 20px #fff; opacity: 0.9; }
            50% { text-shadow: 0 0 25px #fff, 0 0 40px #fff; opacity: 1; transform: translate(-50%, -50%) scale(1.02); }
        }

        .titulo-app { 
            font-family: 'Orbitron'; letter-spacing: 12px; font-size: 1.6rem; color: #fff;
            margin: 0; position: absolute; left: 50%; top: 55%; 
            transform: translate(-50%, -50%); white-space: nowrap; pointer-events: none;
            animation: aurora-breath-white 4s infinite ease-in-out;
        }

        #user-avatar { 
            width: 42px; height: 42px; border-radius: 50%; 
            border: 2px solid var(--pure-white); box-shadow: 0 0 15px rgba(255,255,255,0.5); 
            object-fit: cover; display: none; cursor: pointer; z-index: 20; transition: 0.3s;
        }
        #user-avatar:hover { transform: scale(1.1); box-shadow: 0 0 25px #fff; }

        .btn-menu-lateral { background: transparent; border: none; color: #fff; font-size: 1.8rem; cursor: pointer; z-index: 20; text-shadow: 0 0 10px #fff; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 14px 22px; border-radius: 22px; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); font-size: 1rem; line-height: 1.5; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.08); border: 1px solid rgba(0, 242, 255, 0.2); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); }

        .unified-panel { background: rgba(0, 10, 20, 0.45); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-radius: 35px 35px 0 0; padding: 20px 20px calc(env(safe-area-inset-bottom, 20px) + 20px) 20px !important; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.4); }
        
        /* ✨ INDICADOR DE MEMORIA EN VIVO */
        .live-memory-indicator {
            font-family: 'Orbitron'; font-size: 0.75rem; color: #fff; opacity: 0.8;
            text-shadow: 0 0 10px rgba(255,255,255,0.5); margin-left: 10px;
        }

        #chat-terminal { width: 100%; background: transparent; border: none; color: white; font-size: 1.05rem; outline: none; transition: 0.3s; }

        .panel-side { 
            position: fixed; top: 0; width: 290px; height: 100%; 
            background: rgba(0, 0, 0, 0.15); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 100001; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px; 
            padding-top: calc(env(safe-area-inset-top, 50px) + 20px); 
            box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; 
        }
        #sidebar-menu { left: 0; transform: translateX(-100%); border-right: 1px solid rgba(255, 255, 255, 0.15); }
        #profile-panel { right: 0; transform: translateX(100%); border-left: 1px solid rgba(255, 255, 255, 0.15); }
        .panel-open { transform: translateX(0) !important; box-shadow: 0 0 30px rgba(0,0,0,0.5); }

        .shiny-white-text {
            color: #fff; text-shadow: 0 0 15px #fff, 0 0 30px #fff;
            font-family: 'Orbitron'; font-size: 1.3rem; text-align: center;
            letter-spacing: 3px; margin-bottom: 20px;
        }

        #lista-chats-container {
            display: flex; flex-direction: column; gap: 10px; overflow-y: auto; flex: 1; margin-bottom: 15px;
        }
        .chat-item {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px; border-radius: 15px; cursor: pointer; color: #fff; font-family: 'Plus Jakarta Sans';
            font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s; user-select: none; -webkit-user-select: none;
        }
        .chat-item:active { transform: scale(0.97); }
        
        /* ✨ ESTILOS PARA CHAT FIJADO (Elegante) */
        .chat-item.pinned { 
            background: rgba(255, 255, 255, 0.1); border-color: rgba(255,255,255,0.4);
            box-shadow: inset 0 0 10px rgba(255,255,255,0.1), 0 0 15px rgba(255,255,255,0.2); 
        }
        .chat-item.active-chat { border-left: 3px solid #fff; }

        .energy-container { margin-top: auto; display: flex; flex-direction: column; gap: 8px; padding: 10px 0; }
        .shiny-counter {
            color: #fff; text-shadow: 0 0 10px #fff, 0 0 20px #fff;
            font-family: 'Orbitron'; font-size: 0.85rem; text-align: center; letter-spacing: 2px;
        }
        .energy-bar-bg { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; overflow: hidden; }
        .energy-bar-fill {
            height: 100%; width: 0%; background: #fff; box-shadow: 0 0 10px #fff, 0 0 20px #fff;
            border-radius: 10px; transition: width 0.4s ease-in-out, background 0.4s ease;
        }

        .shiny-disclaimer {
            color: #fff; text-shadow: 0 0 10px #fff, 0 0 20px #fff;
            font-family: 'Orbitron'; font-size: 0.7rem; text-align: center;
            padding: 15px 0 10px 0; letter-spacing: 1px; line-height: 1.4;
            border-top: 1px solid rgba(255, 255, 255, 0.2); margin-top: auto;
        }

        .panel-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px);
            color: #fff; padding: 16px; border-radius: 16px; cursor: pointer;
            font-family: 'Plus Jakarta Sans'; font-size: 0.95rem; text-align: left;
            transition: all 0.3s ease; display: flex; align-items: center; gap: 14px; width: 100%;
        }
        .panel-btn:hover { background: rgba(255, 255, 255, 0.15); border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.3); transform: translateX(5px); }
        .panel-btn.danger { color: #ff6b6b; border-color: rgba(255, 107, 107, 0.3); }
        .panel-btn.danger:hover { background: rgba(255, 107, 107, 0.15); border-color: #ff6b6b; box-shadow: 0 0 15px rgba(255,107,107,0.4); }
        
        #btn-compartir {
            background: rgba(0, 242, 255, 0.1); border-color: var(--accent); color: #fff;
            box-shadow: 0 0 15px rgba(0,242,255,0.3); font-weight: bold; animation: pulse-border 2s infinite;
        }
        @keyframes pulse-border { 0% { box-shadow: 0 0 5px var(--accent); } 50% { box-shadow: 0 0 20px var(--accent); } 100% { box-shadow: 0 0 5px var(--accent); } }

        .panel-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="panels-overlay" onclick="cerrarPaneles()"></div>

    <div id="context-menu-overlay" onclick="cerrarMenuSecreto()">
        <div class="context-menu-box" onclick="event.stopPropagation()">
            <div class="shiny-white-text" style="font-size:1rem; margin-bottom:10px;">OPCIONES</div>
            <button class="panel-btn" onclick="accionRenombrar()">
                <svg viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                Cambiar Nombre
            </button>
            <button class="panel-btn" onclick="accionFijar()">
                <svg viewBox="0 0 24 24"><path d="M12 17v5"></path><path d="M9 10.5V7a3 3 0 0 1 6 0v3.5l2 3.5H7l2-3.5z"></path></svg>
                Fijar Chat
            </button>
            <button class="panel-btn" onclick="accionCompartirChat()">
                <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                Compartir Chat
            </button>
            <button class="panel-btn danger" onclick="accionEliminar()">
                <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                Eliminar Chat
            </button>
        </div>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="font-family:'Orbitron'; letter-spacing: 5px; color:#fff; text-shadow: 0 0 15px #fff;">AURORA</h2>
            <input type="email" placeholder="Email" class="login-input" id="emailInput">
            <input type="password" placeholder="Contraseña" class="login-input" id="passwordInput">
            <button style="background:transparent; border:2px solid var(--accent); color:var(--accent); padding:15px; width:100%; border-radius:18px; font-weight:bold; cursor:pointer; font-family:'Orbitron'; margin-bottom:15px;" onclick="authCorreo()">INGRESAR</button>
            <button style="background:rgba(255,255,255,0.9); color:#000; border:none; padding:15px; border-radius:18px; font-weight:bold; cursor:pointer; width:100%;" onclick="authGoogle()">Google Login</button>
        </div>
    </div>

    <div id="app-container">
        <header>
            <button class="btn-menu-lateral" onclick="abrirSidebar()">☰</button>
            <div class="titulo-app">AURORA</div>
            <img id="user-avatar" src="" alt="Perfil" onclick="abrirPerfil()">
        </header>
        
        <div id="chat-window">
            <div class="msg aurora">Sistema sincronizado, Gabriel. Tenés un límite de 100 mensajes por chat. Observá el indicador de memoria.</div>
        </div>

        <div class="bottom-section">
            <div class="unified-panel">
                <div class="live-memory-indicator" id="memoria-vivo">Memoria Neuronal: 0/100</div>
                
                <input type="text" id="chat-terminal" placeholder="Preguntale a Aurora..." autocomplete="off" oninput="toggleInputButtons()">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <button style="background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.4); color: #fff; border-radius: 20px; padding: 8px 16px; font-size: 0.85rem; font-family: 'Orbitron'; cursor: pointer;">⚡ Flash</button>
                    <button id="btn-enviar" style="background:transparent; border:none; color:#fff; cursor:pointer; display:none;" onclick="enviar()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="sidebar-menu" class="panel-side">
        <div class="shiny-white-text">MIS CHATS</div>
        
        <div id="lista-chats-container"></div>
        
        <button class="panel-btn" onclick="crearNuevoChat()" style="margin-bottom:10px;">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2-2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path><line x1="12" y1="9" x2="12" y2="15"></line><line x1="9" y1="12" x2="15" y2="12"></line></svg>
            Nuevo Chat
        </button>

        <div class="energy-container">
            <div class="shiny-counter" id="chat-counter">CHATS: 0/5</div>
            <div class="energy-bar-bg">
                <div class="energy-bar-fill" id="energy-bar"></div>
            </div>
        </div>

        <button class="panel-btn" id="btn-compartir" onclick="compartirApp()" style="display: none; margin-bottom: 10px;">
            <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
            Desbloquear Acceso
        </button>
    </div>
    
    <div id="profile-panel" class="panel-side">
        <div class="shiny-white-text">MI CUENTA</div>
        
        <button class="panel-btn" onclick="auth.signOut().then(() => location.reload())">
            <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
            Cerrar Sesión
        </button>
        
        <button class="panel-btn" onclick="cambiarCuenta()">
            <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M8 7a4 4 0 0 1 4-4M20 8v6M23 11h-6"/></svg>
            Cambiar Cuenta
        </button>
        
        <button class="panel-btn danger" onclick="eliminarCuenta()">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            Eliminar Cuenta
        </button>

        <div class="shiny-disclaimer">
            AURORA ES UNA IA Y PUEDE COMETER ERRORES.
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo", authDomain: "aurora-ai-oficia.firebaseapp.com", projectId: "aurora-ai-oficia", storageBucket: "aurora-ai-oficia.firebasestorage.app", messagingSenderId: "426513637524", appId: "1:426513637524:web:13851f499aa4af13cfd481", measurementId: "G-XTN5WJPRPP" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth();

        let misChats = [{ id: Date.now(), nombre: 'Chat 1', pinned: false, mensajes: 0 }];
        let chatActivoId = misChats[0].id;
        let chatActivoParaMenu = null;
        let timerToqueLargo;
        const LIMITE_MENSAJES = 100;
        let ilimitado = false;
        let isLongPress = false;
        
        // ✨ LÓGICA ANTI-TRAMPAS
        let chatsCreadosHistoricos = 0; // Arranca en 0

        function actualizarIndicadorMemoria() {
            let chatActual = misChats.find(c => c.id === chatActivoId);
            if (chatActual) {
                document.getElementById('memoria-vivo').innerText = `Memoria Neuronal: ${chatActual.mensajes}/${LIMITE_MENSAJES}`;
            }
        }

        function renderizarChats() {
            const container = document.getElementById('lista-chats-container');
            container.innerHTML = '';
            
            let chatsOrdenados = [...misChats].sort((a, b) => (a.pinned === b.pinned) ? 0 : a.pinned ? -1 : 1);

            chatsOrdenados.forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${chat.pinned ? 'pinned' : ''} ${chat.id === chatActivoId ? 'active-chat' : ''}`;
                
                // ✨ ICONO SVG ELEGANTE PARA EL PIN
                let pinIcon = chat.pinned ? `<svg viewBox="0 0 24 24" width="16" height="16" stroke="var(--pure-white)" stroke-width="2" fill="none" style="opacity:0.9;"><path d="M12 17v5"/><path d="M9 10.5V7a3 3 0 0 1 6 0v3.5l2 3.5H7l2-3.5z"/></svg>` : '';
                
                div.innerHTML = `<span style="display:flex; align-items:center; gap:8px;">${chat.nombre} ${pinIcon}</span>`;
                
                div.oncontextmenu = function(e) { e.preventDefault(); return false; };
                
                const startPress = (e) => {
                    isLongPress = false;
                    timerToqueLargo = setTimeout(() => {
                        isLongPress = true;
                        chatActivoParaMenu = chat.id;
                        document.getElementById('context-menu-overlay').style.display = 'flex';
                        if(navigator.vibrate) navigator.vibrate(50); 
                    }, 500); 
                };

                const cancelPress = () => { clearTimeout(timerToqueLargo); };

                div.addEventListener('touchstart', startPress, {passive: true});
                div.addEventListener('touchend', (e) => {
                    clearTimeout(timerToqueLargo);
                    if(isLongPress && e.cancelable) { e.preventDefault(); }
                });
                div.addEventListener('touchmove', cancelPress, {passive: true});
                
                div.addEventListener('mousedown', startPress);
                div.addEventListener('mouseup', cancelPress);
                div.addEventListener('mouseleave', cancelPress);
                
                div.addEventListener('click', (e) => {
                    if(isLongPress) { e.preventDefault(); return; }
                    
                    chatActivoId = chat.id; 
                    cerrarPaneles();
                    document.getElementById('chat-window').innerHTML = `<div class="msg aurora">Cambiando al ${chat.nombre}...</div>`;
                    renderizarChats();
                    actualizarIndicadorMemoria();
                });
                container.appendChild(div);
            });
            actualizarIndicadorMemoria();
        }

        function crearNuevoChat() {
            if(!ilimitado && chatsCreadosHistoricos >= 5) {
                alert("Límite máximo de chats alcanzado. Compartí la app para desbloquear la creación ilimitada.");
                return;
            }
            
            let nuevoChat = { id: Date.now(), nombre: `Chat ${misChats.length + 1}`, pinned: false, mensajes: 0 };
            misChats.push(nuevoChat);
            chatActivoId = nuevoChat.id;
            
            if(!ilimitado) chatsCreadosHistoricos++; // Incrementa el contador anti-trampa
            
            actualizarBarra();
            renderizarChats();
            cerrarPaneles();
            document.getElementById('chat-window').innerHTML = `<div class="msg aurora">Nuevo canal neuronal abierto (${nuevoChat.nombre}). ¿De qué hablamos?</div>`;
        }

        function cerrarMenuSecreto() { document.getElementById('context-menu-overlay').style.display = 'none'; chatActivoParaMenu = null; }

        function accionRenombrar() {
            const nuevoNombre = prompt("Escribí el nuevo nombre para este chat:");
            if(nuevoNombre && nuevoNombre.trim() !== "") {
                let chat = misChats.find(c => c.id === chatActivoParaMenu);
                if(chat) chat.nombre = nuevoNombre;
                renderizarChats();
            }
            cerrarMenuSecreto();
        }

        function accionFijar() {
            let chat = misChats.find(c => c.id === chatActivoParaMenu);
            if(chat) chat.pinned = !chat.pinned;
            renderizarChats();
            cerrarMenuSecreto();
        }

        function accionEliminar() {
            if(misChats.length === 1) {
                alert("No podés eliminar tu única conexión activa.");
            } else if(confirm("¿Seguro que querés borrar este chat?")) {
                misChats = misChats.filter(c => c.id !== chatActivoParaMenu);
                if(chatActivoId === chatActivoParaMenu) { chatActivoId = misChats[0].id; }
                
                // NOTA: NO ACTUALIZAMOS 'chatsCreadosHistoricos' PARA EVITAR TRAMPAS
                renderizarChats();
            }
            cerrarMenuSecreto();
        }

        function accionCompartirChat() {
            if (navigator.share) {
                let chat = misChats.find(c => c.id === chatActivoParaMenu);
                navigator.share({ title: 'AURORA - Chat', text: `Mirá mi conversación en Aurora: ${chat.nombre}`, url: window.location.href });
            } else {
                alert("Enlace del chat copiado al portapapeles.");
            }
            cerrarMenuSecreto();
        }

        function actualizarBarra() {
            const bar = document.getElementById('energy-bar');
            const counter = document.getElementById('chat-counter');
            const btnCompartir = document.getElementById('btn-compartir');
            
            if (ilimitado) {
                bar.style.width = '100%';
                bar.style.background = 'var(--accent)';
                bar.style.boxShadow = '0 0 15px var(--accent)';
                counter.innerText = "ACCESO: ILIMITADO";
                btnCompartir.style.display = 'none'; 
            } else {
                let porcentaje = (chatsCreadosHistoricos / 5) * 100;
                bar.style.width = porcentaje + '%';
                counter.innerText = `CHATS: ${chatsCreadosHistoricos}/5`;
                
                if(chatsCreadosHistoricos >= 5) {
                    bar.style.background = '#ff4d4d'; 
                    bar.style.boxShadow = '0 0 15px #ff4d4d';
                    btnCompartir.style.display = 'flex'; 
                } else {
                    bar.style.background = '#fff';
                    bar.style.boxShadow = '0 0 10px #fff, 0 0 20px #fff';
                    btnCompartir.style.display = 'none'; 
                }
            }
        }

        function compartirApp() {
            if (navigator.share) {
                navigator.share({
                    title: 'AURORA - IA',
                    text: 'Descubrí Aurora, el acceso neuronal.',
                    url: window.location.href
                }).then(() => {
                    ilimitado = true;
                    actualizarBarra();
                    alert("¡Misión cumplida! Desbloqueaste la creación ilimitada de chats.");
                }).catch(console.error);
            } else {
                alert("Copiá este enlace y compartilo con un amigo: " + window.location.href);
                ilimitado = true;
                actualizarBarra();
            }
        }

        function abrirSidebar() { const menu = document.getElementById('sidebar-menu'); if(menu) { menu.classList.add('panel-open'); document.getElementById('panels-overlay').style.display = 'block'; renderizarChats(); } }
        function abrirPerfil() { const prof = document.getElementById('profile-panel'); if(prof) { prof.classList.add('panel-open'); document.getElementById('panels-overlay').style.display = 'block'; } }
        function cerrarPaneles() { document.querySelectorAll('.panel-side').forEach(p => p.classList.remove('panel-open')); document.getElementById('panels-overlay').style.display = 'none'; }

        auth.onAuthStateChanged((user) => {
            if (user) { document.getElementById('login-overlay').style.display = 'none'; document.getElementById('app-container').style.display = 'flex'; if (user.photoURL) { const av = document.getElementById('user-avatar'); av.src = user.photoURL; av.style.display = 'block'; } } else { document.getElementById('login-overlay').style.display = 'flex'; document.getElementById('app-container').style.display = 'none'; }
        });

        function cambiarCuenta() { auth.signOut().then(() => { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }); }
        function eliminarCuenta() { if(confirm("¿Estás seguro de eliminar tu cuenta?")) { const user = auth.currentUser; user.delete().then(() => { alert("Cuenta eliminada."); location.reload(); }).catch(() => { alert("Para eliminar, debés haber iniciado sesión recientemente."); }); } }

        function toggleInputButtons() { const val = document.getElementById('chat-terminal').value.trim(); document.getElementById('btn-enviar').style.display = val ? 'flex' : 'none'; }

        async function enviar() {
            const input = document.getElementById('chat-terminal'); 
            if(!input.value.trim()) return;

            let chatActual = misChats.find(c => c.id === chatActivoId);

            if (chatActual && chatActual.mensajes >= LIMITE_MENSAJES) {
                alert("Memoria neuronal al máximo en este chat (100/100). Creá un 'Nuevo Chat' para seguir.");
                return;
            }

            const msj = input.value;
            document.getElementById('chat-window').innerHTML += `<div class="msg user">${msj}</div>`;
            input.value = ""; toggleInputButtons();
            
            if(chatActual) {
                chatActual.mensajes++;
                renderizarChats(); 
            }

            try { 
                const res = await fetch('https://gabiland-aurora-ai-mendoza.hf.space/chat', { 
                    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg:msj}) 
                }); 
                const data = await res.json(); 
                document.getElementById('chat-window').innerHTML += `<div class="msg aurora">${data.respuesta}</div>`;
                const win = document.getElementById('chat-window'); win.scrollTop = win.scrollHeight;
            } catch(e) { console.log(e); }
        }

        function authGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        
        actualizarBarra();
        renderizarChats();
    </script>
</body>
</html>

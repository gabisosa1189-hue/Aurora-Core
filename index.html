<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="display" content="standalone">
    
    <title>AURORA - Acceso Neuronal</title>
    <link rel="manifest" href="manifest.json">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #00f2ff; --danger: #ff4d4d; --pure-white: #ffffff; --glow-white: rgba(255, 255, 255, 0.8); }
        html { height: -webkit-fill-available; background-color: #000000; }
        body { margin: 0; padding: 0; width: 100vw; height: 100dvh; background-color: #000000; overflow: hidden; position: fixed; inset: 0; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; overscroll-behavior-y: none; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; -webkit-user-select: none; }
        #bg-video { position: fixed !important; top: 50% !important; left: 50% !important; width: 150vw !important; height: 150dvh !important; transform: translate(-50%, -50%) !important; object-fit: cover !important; z-index: -100 !important; pointer-events: none !important; }
        #panels-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100000; display: none; backdrop-filter: blur(5px); }
        #multimedia-menu-overlay { position: fixed; inset: 0; z-index: 100002; display: none; }
        .multimedia-box { position: absolute; bottom: 95px; left: 20px; background: rgba(0, 0, 0, 0.35); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; padding: 8px; display: flex; flex-direction: column; gap: 5px; width: 230px; box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 0 15px rgba(255,255,255,0.05); animation: slide-up-menu 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: bottom left; }
        @keyframes slide-up-menu { 0% { transform: scale(0.9) translateY(20px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
        .multi-item { background: transparent; border: none; color: #fff; padding: 14px 16px; border-radius: 14px; display: flex; align-items: center; gap: 15px; font-family: 'Plus Jakarta Sans'; font-size: 0.95rem; cursor: pointer; transition: 0.2s; text-align: left; width: 100%; }
        .multi-item:hover, .multi-item:active { background: rgba(255, 255, 255, 0.15); box-shadow: inset 0 0 10px rgba(255,255,255,0.1); }
        .multi-item svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; opacity: 0.9; }
        #voice-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); z-index: 200000; display: none; animation: pop-in 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .voice-center-container { position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        .voice-controls { position: absolute; bottom: 45px; display: flex; gap: 25px; align-items: center; justify-content: center; width: 100%; }
        .voice-btn { background: transparent; border: none; display: flex; align-items: center; justify-content: center; color: #fff; cursor: pointer; transition: 0.3s; padding: 10px; }
        .voice-btn:active { transform: scale(0.9); text-shadow: 0 0 20px #fff; }
        .voice-btn svg { filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
        .voice-btn.danger { color: #ff4d4d; }
        .voice-btn.danger svg { filter: drop-shadow(0 0 5px rgba(255,77,77,0.3)); }
        .voice-btn.danger:active { transform: scale(0.9); text-shadow: 0 0 20px #ff4d4d; }
        #context-menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 100005; display: none; align-items: center; justify-content: center; }
        .context-menu-box { background: rgba(0, 10, 20, 0.65); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 25px; padding: 25px; width: 260px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 0 30px rgba(255, 255, 255, 0.15); animation: pop-in 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #login-overlay { position: fixed; inset: 0; width: 100vw; height: 100dvh; display: flex; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(15px); background: #000; }
        .login-card { background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 40px; border: 1px solid rgba(0, 242, 255, 0.2); text-align: center; max-width: 380px; width: 85%; box-shadow: 0 0 30px rgba(0, 0, 0, 0.5); }
        .login-input { width: 100%; box-sizing: border-box; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(0, 242, 255, 0.3); color: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; outline: none; }
        #app-container { display: none; flex-direction: column; width: 100vw; height: 100dvh; position: fixed; inset: 0; z-index: 10; }
        header { padding: calc(env(safe-area-inset-top, 20px) + 5px) 20px 10px; display: flex; justify-content: space-between; align-items: center; position: relative; min-height: 50px; z-index: 50; }
        @keyframes aurora-breath-title { 0%, 100% { text-shadow: 0 0 10px #fff, 0 0 20px #fff; opacity: 0.9; transform: translate(-50%, -50%) scale(1); } 50% { text-shadow: 0 0 25px #fff, 0 0 45px #fff; opacity: 1; transform: translate(-50%, -50%) scale(1.05); } }
        .titulo-app { font-family: 'Orbitron'; letter-spacing: 12px; font-size: 1.6rem; color: #fff; margin: 0; position: absolute; left: 50%; top: 55%; transform: translate(-50%, -50%); white-space: nowrap; pointer-events: none; animation: aurora-breath-title 4s infinite ease-in-out; }
        #user-avatar { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--pure-white); box-shadow: 0 0 15px rgba(255,255,255,0.5); object-fit: cover; display: none; cursor: pointer; z-index: 20; transition: 0.3s; pointer-events: auto; }
        .btn-menu-lateral { background: transparent; border: none; color: #fff; font-size: 1.8rem; cursor: pointer; z-index: 20; text-shadow: 0 0 10px #fff; margin-top: -5px; pointer-events: auto; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 140px; display: flex; flex-direction: column; gap: 20px; scrollbar-width: none; touch-action: pan-y; }
        .msg { max-width: 85%; padding: 14px 22px; border-radius: 22px; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); font-size: 1rem; line-height: 1.5; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); user-select: text; -webkit-user-select: text; }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.08); border: 1px solid rgba(0, 242, 255, 0.2); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); }
        .limite-alcanzado { align-self: center; background: rgba(255, 77, 77, 0.15); border: 1px solid rgba(255, 77, 77, 0.4); text-align: center; max-width: 90%; box-shadow: 0 0 20px rgba(255, 77, 77, 0.2); }
        .bottom-section { position: absolute; bottom: 0; left: 0; width: 100vw; background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%); padding: 20px 20px calc(env(safe-area-inset-bottom, 15px) + 20px); box-sizing: border-box; z-index: 100; display: flex; flex-direction: column; gap: 15px; }
        #chat-terminal { width: 100%; background: transparent; border: none; color: white; font-size: 1.15rem; font-family: 'Plus Jakarta Sans'; outline: none; padding: 5px 0; touch-action: pan-x pan-y; user-select: text; -webkit-user-select: text; }
        #chat-terminal::placeholder { color: rgba(255,255,255,0.9); text-shadow: 0 0 10px rgba(255,255,255,0.6); font-weight: 400; }
        .chat-controls-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .controls-group { display: flex; align-items: center; gap: 18px; }
        .floating-icon-btn { background: transparent; border: none; color: #fff; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; padding: 5px; }
        .floating-icon-btn svg { width: 26px; height: 26px; stroke: #fff; stroke-width: 2; fill: none; filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
        .pill-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--accent); backdrop-filter: blur(10px); color: #fff; padding: 10px 18px; border-radius: 25px; font-family: 'Orbitron'; font-size: 0.85rem; letter-spacing: 1px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; min-width: 90px; justify-content: center; }
        .glowing-A-btn { font-family: 'Orbitron'; font-size: 2rem; color: #fff; background: transparent; border: none; text-shadow: 0 0 15px #fff, 0 0 30px #fff; cursor: pointer; transition: 0.2s; padding: 0 5px; font-weight: bold; }
        .panel-side { position: fixed; top: 0; width: 290px; height: 100%; background: rgba(0, 0, 0, 0.15); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 100001; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px; padding-top: calc(env(safe-area-inset-top, 50px) + 20px); box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; }
        #sidebar-menu { left: 0; transform: translateX(-100%); border-right: 1px solid rgba(255, 255, 255, 0.15); }
        #profile-panel { right: 0; transform: translateX(100%); border-left: 1px solid rgba(255, 255, 255, 0.15); }
        .panel-open { transform: translateX(0) !important; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .shiny-white-text { color: #fff; text-shadow: 0 0 15px #fff, 0 0 30px #fff; font-family: 'Orbitron'; font-size: 1.3rem; text-align: center; letter-spacing: 3px; margin-bottom: 20px; }
        #lista-chats-container { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; flex: 1; margin-bottom: 15px; touch-action: pan-y; }
        .chat-item { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 14px; border-radius: 15px; cursor: pointer; color: #fff; font-family: 'Plus Jakarta Sans'; font-size: 0.95rem; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; user-select: none; -webkit-user-select: none; }
        .chat-item.active-chat { border-left: 3px solid #fff; }
        .energy-container { margin-top: auto; display: flex; flex-direction: column; gap: 8px; padding: 10px 0; }
        .shiny-counter { color: #fff; text-shadow: 0 0 10px #fff, 0 0 20px #fff; font-family: 'Orbitron'; font-size: 0.85rem; text-align: center; letter-spacing: 2px; }
        .energy-bar-bg { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; overflow: hidden; }
        .energy-bar-fill { height: 100%; width: 0%; background: #fff; box-shadow: 0 0 10px #fff, 0 0 20px #fff; border-radius: 10px; transition: width 0.4s ease-in-out, background 0.4s ease; }
        .panel-btn-account { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px); color: #fff; padding: 20px; border-radius: 16px; cursor: pointer; font-family: 'Plus Jakarta Sans'; font-size: 1rem; text-align: center; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }
        .panel-btn-menu { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; padding: 14px; border-radius: 14px; cursor: pointer; font-family: 'Plus Jakarta Sans'; font-size: 0.95rem; text-align: left; display: flex; align-items: center; gap: 14px; width: 100%; }
        .panel-btn-menu svg, .panel-btn-account svg { stroke: #fff !important; width: 24px; height: 24px; fill: none; }
        .shiny-disclaimer { color: #fff; text-shadow: 0 0 10px #fff, 0 0 20px #fff; font-family: 'Orbitron'; font-size: 0.7rem; text-align: center; padding: 15px 0 10px 0; letter-spacing: 1px; line-height: 1.4; border-top: 1px solid rgba(255, 255, 255, 0.2); margin-top: auto; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <input type="file" id="upload-docs" accept=".pdf,.doc,.docx,.txt" style="display:none" onchange="manejarArchivo(event)">
    <input type="file" id="upload-photos" accept="image/*" style="display:none" onchange="manejarArchivo(event)">
    <input type="file" id="upload-camera" accept="video/*,image/*" capture="environment" style="display:none" onchange="manejarArchivo(event)">

    <div id="panels-overlay" onclick="cerrarPaneles()"></div>

    <div id="multimedia-menu-overlay" onclick="cerrarMultimedia()">
        <div class="multimedia-box" onclick="event.stopPropagation()">
            <button class="multi-item" onclick="document.getElementById('upload-docs').click(); cerrarMultimedia();">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                <span>Conocimiento</span>
            </button>
            <button class="multi-item" onclick="document.getElementById('upload-docs').click(); cerrarMultimedia();">
                <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                <span>Archivos</span>
            </button>
            <button class="multi-item" onclick="document.getElementById('upload-photos').click(); cerrarMultimedia();">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <span>Fotos</span>
            </button>
            <button class="multi-item" onclick="document.getElementById('upload-camera').click(); cerrarMultimedia();">
                <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                <span>Cámara en Vivo</span>
            </button>
        </div>
    </div>

    <div id="voice-overlay">
        <div class="voice-center-container">
            <div class="glowing-A-btn" style="font-size: 8rem; margin-bottom: 30px; animation: aurora-breath-white 1.5s infinite;">A</div>
            <div id="voice-status" style="font-family:'Orbitron'; font-size:1.1rem; color:#fff; text-shadow:0 0 10px #fff; letter-spacing:4px; text-align:center;">ESCUCHANDO...</div>
        </div>
        <div class="voice-controls">
            <button class="voice-btn" onclick="document.getElementById('upload-camera').click(); cerrarModoVoz();">
                <svg viewBox="0 0 24 24" width="30" height="30" stroke="currentColor" stroke-width="1.5" fill="none"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            </button>
            <button class="voice-btn" onclick="alert('Micrófono Silenciado')">
                <svg viewBox="0 0 24 24" width="30" height="30" stroke="currentColor" stroke-width="1.5" fill="none"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
            </button>
            <button class="voice-btn danger" onclick="cerrarModoVoz()">
                <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="font-family:'Orbitron'; letter-spacing: 5px; color:#fff; text-shadow: 0 0 15px #fff;">AURORA</h2>
            <input type="email" placeholder="Email" class="login-input" id="emailInput">
            <input type="password" placeholder="Contraseña" class="login-input" id="passwordInput">
            <button style="background:transparent; border:2px solid var(--accent); color:var(--accent); padding:15px; width:100%; border-radius:18px; font-weight:bold; cursor:pointer; font-family:'Orbitron'; margin-bottom:15px;" onclick="authCorreo()">INGRESAR</button>
            <button style="background:rgba(255,255,255,0.9); color:#000; border:none; padding:15px; border-radius:18px; font-weight:bold; cursor:pointer; width:100%;" onclick="authGoogle()">Google Login</button>
        </div>
    </div>

    <div id="app-container">
        <header>
            <button class="btn-menu-lateral" onclick="abrirSidebar()">☰</button>
            <div class="titulo-app">AURORA</div>
            <img id="user-avatar" src="" alt="Perfil" onclick="abrirPerfil()">
        </header>
        
        <div id="chat-window">
            <div class="msg aurora">Sistema sincronizado, Gabriel. La memoria neuronal está activa y el sistema Anti-Trampas configurado desde la base del dispositivo.</div>
        </div>

        <div class="bottom-section" id="bottom-bar-container">
            <div class="chat-input-row">
                <input type="text" id="chat-terminal" placeholder="Preguntale a Aurora..." autocomplete="off" oninput="toggleInputButtons()" onkeydown="if(event.key==='Enter') enviar()">
            </div>
            
            <div class="chat-controls-row">
                <div class="controls-group">
                    <button class="floating-icon-btn" onclick="abrirMultimedia()">
                        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                    <button class="pill-btn" id="btn-model-selector" onclick="cambiarModelo()">Flash</button>
                </div>
                
                <div class="controls-group" id="normal-controls">
                    <button class="floating-icon-btn" onclick="iniciarDictado()">
                        <svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                    </button>
                    <button class="glowing-A-btn" onclick="abrirModoVoz()">A</button>
                </div>
                
                <div class="controls-group" id="send-controls" style="display:none; pointer-events: auto;">
                    <button class="floating-icon-btn" onclick="enviar()" style="cursor: pointer;">
                        <svg viewBox="0 0 24 24" style="stroke: #fff;"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="sidebar-menu" class="panel-side">
        <div class="shiny-white-text">MIS CHATS</div>
        <div id="lista-chats-container"></div>
        <button class="panel-btn-menu" id="btn-nuevo-chat" onclick="crearNuevoChat()" style="margin-bottom:10px;">
            <svg viewBox="0 0 24 24" style="stroke: #fff;"><path d="M21 15a2 2 0 0 1-2-2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path><line x1="12" y1="9" x2="12" y2="15"></line><line x1="9" y1="12" x2="15" y2="12"></line></svg>
            Nuevo Chat
        </button>
        <div class="energy-container">
            <div class="shiny-counter" id="chat-counter">CHATS: 0/5</div>
            <div class="energy-bar-bg"><div class="energy-bar-fill" id="energy-bar"></div></div>
        </div>
        <button class="panel-btn-menu" id="btn-compartir" onclick="compartirApp()" style="display: none; margin-bottom: 10px;">
            <svg viewBox="0 0 24 24" style="stroke: #fff;"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
            Desbloquear Acceso
        </button>
    </div>
    
    <div id="profile-panel" class="panel-side">
        <div class="shiny-white-text">MI CUENTA</div>
        <button class="panel-btn-account" onclick="auth.signOut().then(() => location.reload())">
            <svg viewBox="0 0 24 24" style="stroke: #fff;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
            Cerrar Sesión
        </button>
        <button class="panel-btn-account" onclick="cambiarCuenta()">
            <svg viewBox="0 0 24 24" style="stroke: #fff;"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M8 7a4 4 0 0 1 4-4M20 8v6M23 11h-6"/></svg>
            Cambiar Cuenta
        </button>
        <button class="panel-btn-account danger" onclick="eliminarCuenta()">
            <svg viewBox="0 0 24 24" style="stroke: #ff4d4d;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            Eliminar Cuenta
        </button>
        <div class="shiny-disclaimer">AURORA ES UNA IA Y PUEDE COMETER ERRORES.</div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo", authDomain: "aurora-ai-oficia.firebaseapp.com", projectId: "aurora-ai-oficia", storageBucket: "aurora-ai-oficia.firebasestorage.app", messagingSenderId: "426513637524", appId: "1:426513637524:web:13851f499aa4af13cfd481", measurementId: "G-XTN5WJPRPP" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth();

        // CIRUGÍA LÁSER: EL LÍMITE DE MENSAJES YA EXISTE DEFINITIVO
        const LIMITE_MENSAJES = 100;
        
        let misChats = JSON.parse(localStorage.getItem('aurora_chats')) || [{ id: Date.now(), nombre: 'Chat 1', pinned: false, mensajes: 0, historial: [] }];
        let chatsCreadosHistoricos = parseInt(localStorage.getItem('aurora_historico')) || 0;
        let ilimitado = localStorage.getItem('aurora_ilimitado') === 'true';
        let chatActivoId = misChats.length > 0 ? misChats[0].id : Date.now();
        let currentModel = 'flash';
        let currentImageData = null;

        const NEXUS_URL = "https://gabiland-aurora-ai-mendoza.hf.space/chat";

        function guardarMemoria() {
            localStorage.setItem('aurora_chats', JSON.stringify(misChats));
            localStorage.setItem('aurora_historico', chatsCreadosHistoricos);
            localStorage.setItem('aurora_ilimitado', ilimitado);
        }

        function cambiarModelo() {
            const btn = document.getElementById('btn-model-selector');
            if(currentModel === 'flash') { currentModel = 'quantum'; btn.innerText = 'Quantum'; btn.style.borderColor = '#ff00ff'; btn.style.color = '#ff00ff'; }
            else if(currentModel === 'quantum') { currentModel = 'nebula'; btn.innerText = 'Nebula'; btn.style.borderColor = '#fff'; btn.style.color = '#fff'; }
            else { currentModel = 'flash'; btn.innerText = 'Flash'; btn.style.borderColor = 'var(--accent)'; btn.style.color = 'var(--accent)'; }
        }

        function manejarArchivo(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                currentImageData = e.target.result.split(',')[1];
                document.getElementById('chat-window').innerHTML += `<div class="msg user">📸 Analizando entorno...</div>`;
                enviar();
            };
            reader.readAsDataURL(file);
        }

        async function enviar() {
            const input = document.getElementById('chat-terminal');
            const msg = input.value.trim();
            if(!msg && !currentImageData) return;
            
            let chatActual = misChats.find(c => c.id === chatActivoId);
            
            if (chatActual && chatActual.mensajes >= 100) {
                document.getElementById('bottom-bar-container').style.display = 'none';
                document.getElementById('chat-window').innerHTML += `<div class="msg aurora limite-alcanzado">Memoria neuronal al máximo (100/100). Creá un 'Nuevo Chat'.</div>`;
                return;
            }

            if(msg) document.getElementById('chat-window').innerHTML += `<div class="msg user">${msg}</div>`;
            input.value = ""; toggleInputButtons();
            const win = document.getElementById('chat-window'); win.scrollTop = win.scrollHeight;
            
            if(chatActual) { chatActual.mensajes++; guardarMemoria(); }

            try { 
                const res = await fetch(NEXUS_URL, { 
                    method:'POST', 
                    headers:{'Content-Type':'application/json'}, 
                    body:JSON.stringify({ 
                        msg: msg, 
                        model: currentModel, 
                        image: currentImageData,
                        user_id: auth.currentUser ? auth.currentUser.uid : 'anon'
                    }) 
                });
                const data = await res.json(); 
                document.getElementById('chat-window').innerHTML += `<div class="msg aurora">${data.respuesta}</div>`;
                win.scrollTop = win.scrollHeight;
                currentImageData = null; 
                if(modoVozActivo) { auroraHabla(data.respuesta); modoVozActivo = false; }
            } catch(e) { 
                console.error("Error de conexión:", e);
                document.getElementById('chat-window').innerHTML += `<div class="msg aurora">Hubo una interferencia en el Nexus. Verifica tu conexión, Gabriel.</div>`;
            }
        }

        function abrirMultimedia() { document.getElementById('multimedia-menu-overlay').style.display = 'block'; }
        function cerrarMultimedia() { document.getElementById('multimedia-menu-overlay').style.display = 'none'; }
        
        function renderizarChats() {
            const container = document.getElementById('lista-chats-container'); container.innerHTML = '';
            let chatsOrdenados = [...misChats].sort((a, b) => (a.pinned === b.pinned) ? 0 : a.pinned ? -1 : 1);
            chatsOrdenados.forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${chat.pinned ? 'pinned' : ''} ${chat.id === chatActivoId ? 'active-chat' : ''}`;
                div.innerHTML = `<span>${chat.nombre}</span>`;
                div.onclick = () => { chatActivoId = chat.id; document.getElementById('bottom-bar-container').style.display = 'flex'; cerrarPaneles(); renderizarChats(); };
                container.appendChild(div);
            });
            actualizarBarra();
        }
        
        function crearNuevoChat() {
            if(!ilimitado && chatsCreadosHistoricos >= 5) return alert("Compartí la app para recargar.");
            let n = { id: Date.now(), nombre: `Chat ${misChats.length + 1}`, pinned: false, mensajes: 0, historial: [] };
            misChats.push(n); chatActivoId = n.id; chatsCreadosHistoricos++; guardarMemoria(); renderizarChats(); cerrarPaneles();
        }
        
        function actualizarBarra() {
            let p = (chatsCreadosHistoricos / 5) * 100; document.getElementById('energy-bar').style.width = Math.min(p, 100) + '%';
            document.getElementById('chat-counter').innerText = `CHATS: ${chatsCreadosHistoricos}/5`;
            document.getElementById('btn-compartir').style.display = chatsCreadosHistoricos >= 5 ? 'block' : 'none';
        }
        
        function compartirApp() { if (navigator.share) { navigator.share({title:'AURORA', url:window.location.href}).then(() => { ilimitado = true; actualizarBarra(); }); } else { ilimitado = true; actualizarBarra(); } }
        function abrirSidebar() { document.getElementById('sidebar-menu').classList.add('panel-open'); document.getElementById('panels-overlay').style.display = 'block'; renderizarChats(); }
        function abrirPerfil() { document.getElementById('profile-panel').classList.add('panel-open'); document.getElementById('panels-overlay').style.display = 'block'; }
        function cerrarPaneles() { document.querySelectorAll('.panel-side').forEach(p => p.classList.remove('panel-open')); document.getElementById('panels-overlay').style.display = 'none'; }
        auth.onAuthStateChanged((user) => { if (user) { document.getElementById('login-overlay').style.display = 'none'; document.getElementById('app-container').style.display = 'flex'; if (user.photoURL) document.getElementById('user-avatar').src = user.photoURL; document.getElementById('user-avatar').style.display = 'block'; } });
        function authGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function toggleInputButtons() { const val = document.getElementById('chat-terminal').value.trim(); document.getElementById('send-controls').style.display = val ? 'flex' : 'none'; document.getElementById('normal-controls').style.display = val ? 'none' : 'flex'; }
        let modoVozActivo = false;
        function abrirModoVoz() { modoVozActivo = true; document.getElementById('voice-overlay').style.display = 'flex'; iniciarDictado(); }
        function cerrarModoVoz() { modoVozActivo = false; document.getElementById('voice-overlay').style.display = 'none'; }
        function auroraHabla(t) { let s = new SpeechSynthesisUtterance(t); s.lang = 'es-ES'; window.speechSynthesis.speak(s); }
        function iniciarDictado() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition; if(!Speech) return;
            const rec = new Speech(); rec.lang = 'es-AR';
            rec.onresult = (e) => { document.getElementById('chat-terminal').value = e.results[0][0].transcript; toggleInputButtons(); if(modoVozActivo) { cerrarModoVoz(); enviar(); } };
            rec.start();
        }
        renderizarChats();
    </script>
</body>
</html>

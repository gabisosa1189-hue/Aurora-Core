<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora AI - Mendoza</title>
    <style>
        /* EL DISEÑO (CSS) ESTÁ ACÁ ADENTRO AHORA */
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; background-color: #000; }
        
        /* El fondo de video */
        #bg-video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; object-fit: cover; opacity: 0.8; }
        
        /* El panel de chat (Estilo cristal oscuro) */
        .chat-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 450px; height: 85vh; background: rgba(0, 0, 0, 0.6); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2); display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(10px); box-shadow: 0 15px 30px rgba(0,0,0,0.8); }
        
        /* La cabecera con la tuerca */
        .header { background: rgba(255, 255, 255, 0.1); padding: 15px; text-align: center; color: white; font-size: 1.3rem; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);}
        .tuerca { animation: girar 4s linear infinite; display: inline-block; }
        @keyframes girar { 100% { transform: rotate(360deg); } }
        
        /* La zona de los mensajes */
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg { padding: 12px 16px; border-radius: 15px; max-width: 80%; word-wrap: break-word; color: white; line-height: 1.5; font-size: 0.95rem; }
        .user-msg { background: #007bff; align-self: flex-end; border-bottom-right-radius: 2px; box-shadow: 0 4px 10px rgba(0,123,255,0.3); }
        .ai-msg { background: rgba(255, 255, 255, 0.15); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid rgba(255,255,255,0.1); }
        
        /* La zona para escribir */
        .input-area { padding: 15px; background: rgba(0, 0, 0, 0.4); display: flex; gap: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
        input { flex: 1; padding: 12px 15px; border-radius: 25px; border: none; outline: none; background: rgba(255, 255, 255, 0.9); font-size: 1rem; }
        button { background: #6f42c1; color: white; border: none; padding: 0 20px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 1rem; }
        button:hover { background: #5a32a3; transform: scale(1.05); }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video" poster="poster.jpg">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div class="chat-container">
        <div class="header">
            <span class="tuerca">⚙️</span> Aurora AI
        </div>
        <div id="chat-box">
            <div class="msg ai-msg">¡Hola! Soy Aurora. ¿Todo bien por San Martín? Escribime lo que necesites. 🍷</div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Escribile a Aurora..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const msg = input.value.trim();
            if (!msg) return;

            // Mostrar el mensaje del usuario
            chatBox.innerHTML += `<div class="msg user-msg">${msg}</div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // Mostrar que Aurora está escribiendo...
            const typingId = "typing-" + Date.now();
            chatBox.innerHTML += `<div class="msg ai-msg" id="${typingId}">Pensando... ⚙️</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            // Enviar a Python (Vercel lo maneja)
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ msg: msg })
                });
                const data = await response.json();
                
                // Reemplazar "Pensando..." con la respuesta real
                document.getElementById(typingId).remove();
                chatBox.innerHTML += `<div class="msg ai-msg">${data.respuesta}</div>`;
            } catch (error) {
                document.getElementById(typingId).remove();
                chatBox.innerHTML += `<div class="msg ai-msg" style="color:#ff6b6b;">Mmm, algo falló en la conexión.</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>

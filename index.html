<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURORA AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; }
        
        body { 
            margin: 0; padding: 0; height: 100vh; background: #000; 
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; overflow: hidden; 
        }
        
        /* MÁSCARA NEGRA PARA TAPAR EL ÍCONO FANTASMA DE ANDROID */
        #telon-negro {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; pointer-events: none;
            animation: desvanecerTelon 1.5s ease-in-out 0.5s forwards;
        }
        @keyframes desvanecerTelon { to { opacity: 0; visibility: hidden; } }

        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.4); }
        
        #app-container { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; position: relative; }
        
        header { 
            padding: 15px; display: flex; justify-content: space-between; align-items: center;
            opacity: 0.9; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .titulo { font-family: 'Orbitron'; letter-spacing: 6px; font-size: 1.2rem; flex: 1; text-align: center; margin-left: 30px;}
        
        /* BOTÓN DE SILENCIO (STOP AUDIO) */
        .btn-header {
            background: transparent; border: none; color: rgba(255,255,255,0.6); cursor: pointer;
            padding: 5px; transition: 0.3s;
        }
        .btn-header:active { color: var(--accent); transform: scale(0.9); }
        .btn-header svg { width: 24px; height: 24px; fill: currentColor; }
        
        #chat-window { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; 
            scrollbar-width: none; padding-bottom: 20px;
        }
        #chat-window::-webkit-scrollbar { display: none; }

        .msg-wrapper { display: flex; flex-direction: column; max-width: 85%; animation: slideUp 0.3s ease-out; }
        .aurora-wrapper { align-self: flex-start; }
        .user-wrapper { align-self: flex-end; align-items: flex-end; }

        .msg { 
            padding: 14px 20px; border-radius: 20px; font-size: 1rem; line-height: 1.5;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05); position: relative;
        }
        .aurora { background: rgba(255, 255, 255, 0.02); border-bottom-left-radius: 2px; }
        .user { background: rgba(0, 242, 255, 0.05); border-bottom-right-radius: 2px; border-color: rgba(0, 242, 255, 0.1); }

        /* BOTÓN DE COPIAR EN MENSAJES DE AURORA */
        .btn-copiar {
            background: transparent; border: none; color: rgba(255,255,255,0.4); cursor: pointer;
            font-size: 0.8rem; margin-top: 5px; align-self: flex-start; display: flex; align-items: center; gap: 5px;
            transition: 0.2s; font-family: inherit;
        }
        .btn-copiar:active { color: var(--accent); }
        .btn-copiar svg { width: 14px; height: 14px; fill: currentColor; }

        .input-area { padding: 15px 20px 25px 20px; background: transparent; }
        .input-container { 
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); 
            display: flex; align-items: center; padding: 5px 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 1rem; font-family: inherit; }
        input::placeholder { color: rgba(255,255,255,0.4); }
        
        .btn-icon { 
            background: transparent; border: none; color: rgba(255,255,255,0.7); cursor: pointer; 
            padding: 8px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            transition: 0.2s; 
        }
        .btn-icon.send { color: var(--accent); }
        .btn-icon:active { transform: scale(0.9); }
        .btn-icon.recording { color: #ff4757; animation: pulse 1s infinite; }
        .btn-icon svg { width: 22px; height: 22px; fill: currentColor; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div id="telon-negro"></div>

    <video autoplay muted loop playsinline id="bg-video"><source src="fondo.mp4" type="video/mp4"></video>

    <div id="app-container">
        <header>
            <div class="titulo">AURORA</div>
            <button class="btn-header" onclick="detenerVoz()" title="Silenciar Aurora">
                <svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
            </button>
        </header>

        <div id="chat-window">
            <div class="msg-wrapper aurora-wrapper">
                <div class="msg aurora">Bienvenido. Soy Aurora, su asistente virtual. ¿En qué puedo ayudarle hoy?</div>
            </div>
        </div>
        
        <div class="input-area">
            <div class="input-container">
                <button class="btn-icon" id="btn-mic" onclick="iniciarDictado()" title="Hablar">
                    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
                </button>
                <input type="text" id="user-input" placeholder="Escriba aquí o use el micrófono..." autocomplete="off">
                <button class="btn-icon send" onclick="enviar()" title="Enviar">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatWin = document.getElementById('chat-window');
        const input = document.getElementById('user-input');
        const btnMic = document.getElementById('btn-mic');
        let vozFemenina = null;

        // --- SISTEMA DE VOZ ---
        function cargarVoces() {
            if (!('speechSynthesis' in window)) return;
            const voces = window.speechSynthesis.getVoices();
            vozFemenina = voces.find(v => v.lang.startsWith('es') && 
                (v.name.includes('Google') || v.name.includes('Helena') || v.name.includes('Lucia') || 
                 v.name.includes('Paulina') || v.name.includes('Sabina') || v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('mujer')));
        }
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = cargarVoces;
            cargarVoces();
        }

        function hablar(texto) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(texto);
            if (vozFemenina) u.voice = vozFemenina;
            u.pitch = 1.05; 
            u.rate = 0.95; 
            u.lang = 'es-MX'; 
            window.speechSynthesis.speak(u);
        }

        function detenerVoz() {
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        }

        // --- DICTADO POR VOZ (MICRÓFONO) ---
        function iniciarDictado() {
            if (!('webkitSpeechRecognition' in window)) {
                alert("Su navegador no soporta el dictado por voz.");
                return;
            }
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'es-AR';
            recognition.interimResults = false;
            
            recognition.onstart = function() {
                btnMic.classList.add('recording');
                input.placeholder = "Escuchando...";
            };
            
            recognition.onresult = function(event) {
                input.value = event.results[0][0].transcript;
                enviar(); // Envía automáticamente al terminar de hablar
            };
            
            recognition.onerror = function() {
                btnMic.classList.remove('recording');
                input.placeholder = "Escriba aquí o use el micrófono...";
            };
            
            recognition.onend = function() {
                btnMic.classList.remove('recording');
                input.placeholder = "Escriba aquí o use el micrófono...";
            };
            
            recognition.start();
        }

        // --- ENVIAR Y RENDERIZAR MENSAJES ---
        async function enviar() {
            const msg = input.value.trim();
            if(!msg) return;
            
            addMsgUser(msg);
            input.value = '';
            
            try {
                const res = await fetch('/chat', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({msg}) 
                });
                const data = await res.json();
                if(data.respuesta) {
                    addMsgAurora(data.respuesta);
                    hablar(data.respuesta);
                }
            } catch {
                addMsgAurora("Disculpe, mi conexión se interrumpió.");
            }
        }

        function addMsgUser(t) {
            const wrapper = document.createElement('div');
            wrapper.className = 'msg-wrapper user-wrapper';
            wrapper.innerHTML = `<div class="msg user">${t}</div>`;
            chatWin.appendChild(wrapper);
            scrollToBottom();
        }

        function addMsgAurora(t) {
            const wrapper = document.createElement('div');
            wrapper.className = 'msg-wrapper aurora-wrapper';
            
            // Creamos un ID único para poder copiar este mensaje específico
            const msgId = 'msg-' + Date.now();
            
            wrapper.innerHTML = `
                <div class="msg aurora" id="${msgId}">${t}</div>
                <button class="btn-copiar" onclick="copiarAlPortapapeles('${msgId}')">
                    <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                    Copiar
                </button>
            `;
            chatWin.appendChild(wrapper);
            scrollToBottom();
        }

        function copiarAlPortapapeles(id) {
            const texto = document.getElementById(id).innerText;
            navigator.clipboard.writeText(texto).then(() => {
                // Pequeño feedback visual (opcional)
            });
        }

        function scrollToBottom() {
            setTimeout(() => { chatWin.scrollTo({top: chatWin.scrollHeight, behavior: 'smooth'}); }, 50);
        }

        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') enviar(); });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #00f2ff; }
        
        /* 1. EL FONDO QUE NO FALLA */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        #bg-video {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1; object-fit: cover;
            transform: scale(1.1); /* Este zoom pisa la barra negra sí o sí */
        }

        /* 2. LOGIN CENTRADO (COMO ANTES) */
        #login-overlay {
            position: fixed; inset: 0; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(15px);
        }
        .login-card { width: 85%; max-width: 350px; text-align: center; }
        .titulo-login { font-family: 'Orbitron'; color: #fff; letter-spacing: 10px; margin-bottom: 40px; text-shadow: 0 0 15px var(--accent); }
        .login-input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--accent); background: rgba(0,0,0,0.5); color: #fff; outline: none; }
        .btn-login { width: 100%; padding: 15px; border-radius: 12px; background: var(--accent); border: none; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; }

        /* 3. INTERFAZ DE CHAT SIMPLE */
        #app-container { display: none; flex-direction: column; height: 100vh; width: 100%; position: relative; z-index: 10; }
        header { padding: 60px 20px 10px; text-align: center; }
        .titulo-app { font-family: 'Orbitron'; letter-spacing: 15px; font-size: 1.8rem; color: #fff; text-shadow: 0 0 15px var(--accent); }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 20px; color: #fff; backdrop-filter: blur(10px); font-size: 0.95rem; border: 1px solid rgba(255,255,255,0.1); }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.1); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.1); }

        .bottom-section { padding: 10px 20px calc(env(safe-area-inset-bottom) + 20px); }
        .input-box { display: flex; align-items: center; background: rgba(0,0,0,0.5); border: 1px solid var(--accent); border-radius: 30px; padding: 5px 15px; backdrop-filter: blur(10px); }
        #chat-terminal { flex: 1; background: transparent; border: none; color: #fff; padding: 10px; outline: none; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline webkit-playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="login-overlay">
        <div class="login-card">
            <h2 class="titulo-login">AURORA</h2>
            <input type="email" id="email" class="login-input" placeholder="Email">
            <input type="password" id="pass" class="login-input" placeholder="Contraseña">
            <button onclick="login()" class="btn-login">INGRESAR</button>
            <button onclick="authGoogle()" style="margin-top:15px; background:#fff; color:#000;" class="btn-login">GOOGLE</button>
        </div>
    </div>

    <div id="app-container">
        <header><div class="titulo-app">AURORA</div></header>
        <div id="chat-window"><div class="msg aurora">Enlace restaurado, Gabriel. Estamos en la versión pura.</div></div>
        <div class="bottom-section">
            <div class="input-box">
                <input type="text" id="chat-terminal" placeholder="Escribí...">
                <button onclick="enviar()" style="background:none; border:none; color:var(--accent); font-size:1.5rem;">➤</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo", authDomain: "aurora-ai-oficia.firebaseapp.com", projectId: "aurora-ai-oficia", storageBucket: "aurora-ai-oficia.firebasestorage.app", messagingSenderId: "426513637524", appId: "1:426513637524:web:13851f499aa4af13cfd481", measurementId: "G-XTN5WJPRPP" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function login() { const e=document.getElementById('email').value, p=document.getElementById('pass').value; auth.signInWithEmailAndPassword(e,p).catch(err=>alert(err.message)); }
        function authGoogle() { auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider()); }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
            }
        });

        async function enviar() {
            const input = document.getElementById('chat-terminal'), msg = input.value; if(!msg) return;
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg user">${msg}</div>`;
            input.value = ""; win.scrollTop = win.scrollHeight;
            try {
                const res = await fetch('https://gabiland-aurora-ai-mendoza.hf.space/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({msg: msg}) });
                const data = await res.json();
                win.innerHTML += `<div class="msg aurora">${data.respuesta}</div>`;
                win.scrollTop = win.scrollHeight;
            } catch(e) { }
        }
    </script>
</body>
</html>

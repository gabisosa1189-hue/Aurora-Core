<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #00f2ff; --danger: #ff4d4d; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            overflow: hidden; background-color: #000;
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; 
            overscroll-behavior-y: none; 
        }

        #bg-video { position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; object-fit: cover !important; pointer-events: none; }
        
        #panels-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 100000; display: none; }

        /* PANELES LATERALES SIMÉTRICOS */
        .panel-side {
            position: fixed; top: 0; width: 280px; height: 100%;
            background: rgba(0, 10, 20, 0.75); backdrop-filter: blur(25px);
            z-index: 100001; transition: 0.3s ease;
            display: flex; flex-direction: column; padding: 25px; 
            padding-top: calc(env(safe-area-inset-top, 40px) + 20px); box-sizing: border-box;
        }
        #sidebar-menu { left: 0; transform: translateX(-100%); border-right: 1px solid rgba(0, 242, 255, 0.2); }
        #profile-panel { right: 0; transform: translateX(100%); border-left: 1px solid rgba(0, 242, 255, 0.2); }
        .panel-open { transform: translateX(0) !important; }

        .panel-title { font-family: 'Orbitron'; font-size: 0.9rem; color: var(--accent); letter-spacing: 3px; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        
        /* ITEMS DE CHAT CON BOTONES */
        .chat-item { 
            background: rgba(255, 255, 255, 0.05); padding: 12px 15px; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; margin-bottom: 10px; 
            display: flex; align-items: center; justify-content: space-between; transition: 0.3s;
        }
        .chat-item.active { background: rgba(0, 242, 255, 0.1); border-color: var(--accent); }
        .chat-item.pinned { border-left: 4px solid var(--accent); }
        
        .chat-actions { display: flex; gap: 8px; font-size: 0.9rem; }
        .chat-actions span { cursor: pointer; opacity: 0.6; transition: 0.2s; }
        .chat-actions span:hover { opacity: 1; transform: scale(1.2); }

        .btn-premium-add { background: rgba(0, 242, 255, 0.1); border: 1px dashed var(--accent); color: var(--accent); width: 100%; padding: 12px; border-radius: 12px; font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; margin-top: 10px; }

        .btn-account { width: 100%; padding: 15px; border-radius: 15px; font-family: 'Orbitron'; font-size: 0.75rem; cursor: pointer; margin-bottom: 12px; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .btn-accent-opt { border-color: var(--accent); color: var(--accent); background: rgba(0, 242, 255, 0.1); }
        .btn-danger-opt { border-color: var(--danger); color: var(--danger); margin-top: auto; }

        #app-container { display: none; flex-direction: column; height: 100vh; width: 100%; position: relative; z-index: 10; }

        /* HEADER RESPETANDO CAPTURA */
        header { 
            padding-top: calc(env(safe-area-inset-top, 40px) + 15px); 
            padding-left: 20px; padding-right: 20px; padding-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; 
        }
        .titulo-app { font-family: 'Orbitron'; letter-spacing: 15px; font-size: 1.8rem; text-shadow: 0 0 15px var(--accent); margin: 0; }
        .btn-menu-top { background: transparent; border: none; cursor: pointer; color: #fff; font-size: 2rem; text-shadow: 0 0 15px var(--accent); padding: 0; }
        #user-avatar { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; display: none; cursor: pointer; box-shadow: 0 0 15px rgba(0,242,255,0.3); }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 14px 22px; border-radius: 22px; backdrop-filter: blur(15px); font-size: 1rem; line-height: 1.5; }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.3); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15); }

        /* INPUT RESPETANDO CAPTURA */
        .bottom-section { padding: 10px 20px 30px 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .chat-group { display: flex; align-items: center; gap: 15px; width: 100%; max-width: 500px; }
        .btn-a { font-family: 'Orbitron'; font-size: 1.8rem; color: #fff; background: none; border: none; cursor: pointer; text-shadow: 0 0 15px var(--accent); }
        .input-bar { flex: 1; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(0, 242, 255, 0.4); border-radius: 40px; display: flex; align-items: center; padding: 5px 22px; backdrop-filter: blur(20px); }
        #chat-terminal { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; outline: none; font-size: 1rem; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="panels-overlay" onclick="cerrarPaneles()"></div>

    <div id="sidebar-menu" class="panel-side">
        <h3 class="panel-title">MIS ENLACES</h3>
        <div id="history-list" style="flex:1; overflow-y:auto;">
            </div>
        <button class="btn-premium-add" onclick="nuevoEnlace()">+ NUEVO ENLACE</button>
        <div style="margin-top:25px;">
            <p id="txt-progreso" style="color:var(--accent); font-size:0.7rem; margin-bottom:8px; font-family:'Orbitron';">SITUACIÓN: 1 / 5</p>
            <div style="width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:10px;">
                <div id="bar-progreso" style="width:20%; height:100%; background:var(--accent); border-radius:10px;"></div>
            </div>
        </div>
    </div>

    <div id="profile-panel" class="panel-side">
        <h3 class="panel-title">MI CUENTA</h3>
        <button class="btn-account btn-accent-opt" onclick="cambiarCuenta()">CAMBIAR CUENTA</button>
        <button class="btn-account" onclick="cerrarSesionReal()">CERRAR SESIÓN</button>
        <button class="btn-account btn-danger-opt" onclick="eliminarCuenta()">ELIMINAR CUENTA</button>
    </div>

    <div id="app-container">
        <header>
            <button class="btn-menu-top" onclick="abrirSidebar()">☰</button>
            <div class="titulo-app">AURORA</div>
            <img id="user-avatar" src="" alt="Perfil" onclick="abrirPerfil()">
        </header>

        <div id="chat-window">
            <div class="msg aurora">Bienvenido al núcleo de <b>Aurora</b>. Tu enlace neuronal está activo. ¿En qué puedo ayudarte?</div>
        </div>

        <div class="bottom-section">
            <div class="chat-group">
                <button class="btn-a">A</button>
                <div class="input-bar">
                    <input type="text" id="chat-terminal" placeholder="Mensaje neuronal..." autocomplete="off">
                    <button onclick="enviar()" style="background:none; border:none; color:var(--accent); font-size:1.5rem; cursor:pointer;">➤</button>
                </div>
            </div>
        </div>
    </div>

    <div id="login-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,10,20,0.5); backdrop-filter:blur(20px); z-index:9999; display:flex; align-items:center; justify-content:center;">
        <div style="background:rgba(255,255,255,0.03); padding:40px; border-radius:40px; border:1px solid rgba(0,242,255,0.2); text-align:center;">
            <h2 style="font-family:'Orbitron'; color:#fff;">AURORA AI</h2>
            <button style="background:#fff; color:#000; border:none; padding:15px; border-radius:18px; font-weight:bold; cursor:pointer;" onclick="authGoogle()">Ingresar con Google</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo",
            authDomain: "aurora-ai-oficia.firebaseapp.com",
            projectId: "aurora-ai-oficia",
            storageBucket: "aurora-ai-oficia.firebasestorage.app",
            messagingSenderId: "426513637524",
            appId: "1:426513637524:web:13851f499aa4af13cfd481",
            measurementId: "G-XTN5WJPRPP"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        let chats = [{ id: 1, nombre: "Chat Actual", pinned: false }];
        let enlacesContador = 1;

        document.body.addEventListener('touchmove', function(e) {
            if (!e.target.closest('#chat-window') && !e.target.closest('.panel-side')) e.preventDefault();
        }, { passive: false });

        function abrirSidebar() { document.getElementById('sidebar-menu').classList.add('panel-open'); document.getElementById('panels-overlay').style.display = 'block'; }
        function abrirPerfil() { document.getElementById('profile-panel').classList.add('panel-open'); document.getElementById('panels-overlay').style.display = 'block'; }
        function cerrarPaneles() { 
            document.getElementById('sidebar-menu').classList.remove('panel-open'); 
            document.getElementById('profile-panel').classList.remove('panel-open'); 
            document.getElementById('panels-overlay').style.display = 'none'; 
        }

        function nuevoEnlace() {
            if (enlacesContador >= 5) { alert("SISTEMA: Capacidad agotada. Compartí para expandir."); return; }
            enlacesContador++;
            chats.push({ id: enlacesContador, nombre: `Enlace Neuronal ${enlacesContador}`, pinned: false });
            actualizarUI();
            cerrarPaneles();
        }

        function actualizarUI() {
            document.getElementById('txt-progreso').innerText = `SITUACIÓN: ${enlacesContador} / 5`;
            document.getElementById('bar-progreso').style.width = (enlacesContador * 20) + "%";
            
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            
            // Ordenar: primero los fijados
            const ordenados = [...chats].sort((a,b) => b.pinned - a.pinned);
            
            ordenados.forEach(c => {
                list.innerHTML += `
                    <div class="chat-item ${c.id === enlacesContador ? 'active' : ''} ${c.pinned ? 'pinned' : ''}">
                        <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:140px;">${c.nombre}</span>
                        <div class="chat-actions">
                            <span onclick="fijarChat(${c.id})">${c.pinned ? '📌' : '📍'}</span>
                            <span onclick="renombrarChat(${c.id})">✎</span>
                            <span onclick="compartirChat(${c.id})">📤</span>
                        </div>
                    </div>`;
            });
        }

        function renombrarChat(id) {
            const nuevo = prompt("Nuevo nombre del enlace:");
            if(nuevo) {
                const chat = chats.find(c => c.id === id);
                chat.nombre = nuevo;
                actualizarUI();
            }
        }

        function fijarChat(id) {
            const chat = chats.find(c => c.id === id);
            chat.pinned = !chat.pinned;
            actualizarUI();
        }

        function compartirChat(id) {
            const chat = chats.find(c => c.id === id);
            if (navigator.share) {
                navigator.share({ title: 'Resumen Aurora', text: `Conversación: ${chat.nombre}\nGenerado por Aurora AI.`, url: window.location.href });
            }
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                document.getElementById('bg-video').play();
                if (user.photoURL) {
                    const avatar = document.getElementById('user-avatar');
                    avatar.src = user.photoURL; avatar.style.display = 'block';
                }
                actualizarUI();
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
            }
        });

        function authGoogle() { const provider = new firebase.auth.GoogleAuthProvider(); auth.signInWithPopup(provider); }
        function cerrarSesionReal() { auth.signOut().then(() => location.reload()); }
        function cambiarCuenta() { auth.signOut().then(() => authGoogle()); }

        async function enviar() {
            const input = document.getElementById('chat-terminal');
            if(!input.value.trim()) return;
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg user">${input.value}</div>`;
            const msj = input.value; input.value = ""; win.scrollTop = win.scrollHeight;
            try {
                const res = await fetch('https://gabiland-aurora-ai-mendoza.hf.space/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg:msj}) });
                const data = await res.json();
                win.innerHTML += `<div class="msg aurora">${data.respuesta}</div>`;
                win.scrollTop = win.scrollHeight;
            } catch(e) { win.innerHTML += `<div class="msg aurora">Error...</div>`; }
        }
        document.getElementById('chat-terminal').addEventListener('keypress', e => { if (e.key === 'Enter') enviar(); });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #00f2ff; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; background-color: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; }

        /* 🎥 VIDEO DE FONDO - FORZADO AL MÁXIMO */
        #bg-video { 
            position: fixed !important; top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            z-index: -1; object-fit: cover !important; 
            opacity: 1; background-color: #000;
        }

        /* LOGIN */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(30px); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 40px; border: 1px solid rgba(0, 242, 255, 0.3); text-align: center; width: 85%; max-width: 400px; }
        .titulo-login { font-family: 'Orbitron', sans-serif; letter-spacing: 5px; font-size: 1.2rem; margin-bottom: 30px; }
        
        .btn-auth { width: 100%; padding: 16px; border-radius: 20px; border: none; font-weight: 600; cursor: pointer; font-size: 1rem; margin-bottom: 15px; transition: 0.3s; }
        .btn-google { background: #fff; color: #000; }

        /* APP CONTAINER */
        #app-container { display: none; flex-direction: column; height: 100vh; width: 100%; max-width: 600px; margin: 0 auto; position: relative; z-index: 10; }
        header { padding: 40px 15px 20px 15px; text-align: center; }
        .titulo-app { font-family: 'Orbitron', sans-serif; letter-spacing: 12px; font-size: 1.5rem; text-shadow: 0 0 20px var(--accent); }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 15px 20px; border-radius: 22px; backdrop-filter: blur(15px); line-height: 1.4; font-size: 0.95rem; }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.08); border: 1px solid rgba(0, 242, 255, 0.2); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }

        /* ⚙️ BARRA INFERIOR - TUERCA FIJA */
        .input-area { 
            position: relative; padding: 10px 15px 30px 15px; 
            background: transparent; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-config-final {
            width: 50px; height: 50px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.4);
            color: var(--accent); font-size: 1.5rem; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(20px); flex-shrink: 0;
        }

        .input-container { 
            flex: 1; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.3); 
            border-radius: 35px; display: flex; align-items: center; padding: 5px 15px; backdrop-filter: blur(20px);
        }

        #chat-terminal { flex: 1; background: transparent; border: none; color: white; padding: 12px 5px; outline: none; font-size: 1rem; }
        .btn-send-final { background: none; border: none; color: var(--accent); font-size: 1.6rem; cursor: pointer; }

        /* SIDEBAR */
        #sidebar {
            position: fixed; top: 0; left: -270px; width: 260px; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(40px);
            border-right: 1px solid rgba(0,242,255,0.2);
            z-index: 100000; transition: 0.4s; padding: 40px 20px; display: flex; flex-direction: column; gap: 15px;
        }
        #sidebar.open { left: 0; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="sidebar">
        <h2 style="font-family:'Orbitron'; color:var(--accent);">⚙️ AJUSTES</h2>
        <button onclick="location.reload()" style="background:rgba(255,255,255,0.05); color:white; border:1px solid #ff4d4d; padding:15px; border-radius:15px; cursor:pointer;">Cerrar Sesión</button>
        <button onclick="document.getElementById('sidebar').classList.remove('open')" style="margin-top:20px; background:none; border:none; color:white; cursor:pointer;">CERRAR ✖</button>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h1 class="titulo-login">AURORA</h1>
            <button onclick="entrar('Gabriel')" class="btn-auth btn-google">G | Ingresar con Google</button>
            <button onclick="entrar('Usuario')" class="btn-auth" style="background:rgba(255,255,255,0.1); color:white;">Acceso Invitado</button>
        </div>
    </div>

    <div id="app-container">
        <header><div class="titulo-app">AURORA</div></header>
        <div id="chat-window"><div class="msg aurora">Conexión establecida. ¿En qué te ayudo?</div></div>

        <div class="input-area">
            <button class="btn-config-final" onclick="document.getElementById('sidebar').classList.add('open')">⚙️</button>
            <div class="input-container">
                <input type="text" id="chat-terminal" placeholder="Escribe a Aurora..." autocomplete="off">
                <button onclick="enviar()" class="btn-send-final">➤</button>
            </div>
        </div>
    </div>

    <script>
        // --- MOTOR DE ARRANQUE PARA EL VIDEO ---
        function arrancarVideo() {
            var v = document.getElementById('bg-video');
            v.play().catch(function(e) {
                console.log("Esperando interacción para el video...");
            });
        }

        window.onload = arrancarVideo;

        function entrar(name) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            arrancarVideo(); // Re-intento manual al hacer click
        }

        async function enviar() {
            const input = document.getElementById('chat-terminal');
            const val = input.value.trim();
            if(!val) return;

            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg user">${val}</div>`;
            input.value = "";
            win.scrollTop = win.scrollHeight;

            try {
                const res = await fetch('/chat', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ msg: val }) 
                });
                const data = await res.json();
                win.innerHTML += `<div class="msg aurora">${data.respuesta}</div>`;
                win.scrollTop = win.scrollHeight;
            } catch(e) {
                console.log("Error de conexión neuronal");
            }
        }
    </script>
</body>
</html>

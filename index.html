<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURORA AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; }
        body { margin: 0; background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; overflow: hidden; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.3); }
        
        /* BOTÓN "A" MÁGICO */
        #btn-modo-voz {
            position: fixed; top: 15px; left: 15px; width: 40px; height: 40px;
            border-radius: 50%; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
            color: var(--accent); font-family: 'Orbitron'; font-size: 1.2rem;
            cursor: pointer; z-index: 1000; display: flex; align-items: center; justify-content: center;
        }

        /* PANEL DE VOZ (TIPO GEMINI LIVE) */
        #panel-voz {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center;
            animation: fadeIn 0.5s ease;
        }
        .circulo-pulso {
            width: 150px; height: 150px; border-radius: 50%;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            animation: pulso 2s infinite; margin-bottom: 30px;
        }
        @keyframes pulso { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 0.8; } 100% { transform: scale(0.8); opacity: 0.5; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #app-container { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; }
        header { padding: 15px; text-align: center; font-family: 'Orbitron'; letter-spacing: 5px; font-size: 1.1rem; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .aurora { align-self: flex-start; background: rgba(255,255,255,0.05); }
        .user { align-self: flex-end; background: rgba(0, 242, 255, 0.1); }
        
        .input-area { padding: 20px; }
        .input-container { background: rgba(255,255,255,0.05); border-radius: 30px; display: flex; padding: 5px 15px; border: 1px solid rgba(255,255,255,0.1); }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; }
        .btn { background: transparent; border: none; color: var(--accent); font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video"><source src="fondo.mp4" type="video/mp4"></video>
    
    <button id="btn-modo-voz" onclick="abrirModoVoz()">A</button>

    <div id="panel-voz">
        <div class="circulo-pulso"></div>
        <h2 id="estado-voz" style="font-family: 'Orbitron'; color: var(--accent);">AURORA LIVE</h2>
        <p id="subtitulo-voz">Escuchando...</p>
        <button class="btn" onclick="cerrarModoVoz()" style="margin-top: 50px; border: 1px solid; padding: 10px 20px; border-radius: 20px;">CERRAR</button>
    </div>

    <div id="app-container">
        <header>AURORA</header>
        <div id="chat-window"></div>
        <div class="input-area">
            <div class="input-container">
                <input type="text" id="user-input" placeholder="Pregunte algo...">
                <button class="btn" onclick="enviar()">➤</button>
            </div>
        </div>
    </div>

    <script>
        const chatWin = document.getElementById('chat-window');
        const input = document.getElementById('user-input');
        let vozFemenina = null;

        function cargarVoces() {
            const voces = window.speechSynthesis.getVoices();
            vozFemenina = voces.find(v => v.lang.startsWith('es') && v.name.includes('Google'));
        }
        window.speechSynthesis.onvoiceschanged = cargarVoces;

        function hablar(texto, callback) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(texto);
            if(vozFemenina) u.voice = vozFemenina;
            u.rate = 0.95;
            u.onend = callback;
            window.speechSynthesis.speak(u);
        }

        async function enviar(textoOverride) {
            const msg = textoOverride || input.value;
            if(!msg) return;
            if(!textoOverride) {
                addMsg(msg, 'user');
                input.value = '';
            }
            
            const res = await fetch('/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({msg}) });
            const data = await res.json();
            
            if(data.respuesta) {
                if(!textoOverride) addMsg(data.respuesta, 'aurora');
                hablar(data.respuesta, () => {
                    if(textoOverride) iniciarEscuchaInfinita(); // Si está en modo voz, vuelve a escuchar
                });
                if(textoOverride) document.getElementById('subtitulo-voz').innerText = data.respuesta;
            }
        }

        function addMsg(t, cl) {
            const d = document.createElement('div');
            d.className = `msg ${cl}`;
            d.innerText = t;
            chatWin.appendChild(d);
            chatWin.scrollTo(0, chatWin.scrollHeight);
        }

        // --- LÓGICA MODO VOZ ---
        function abrirModoVoz() {
            document.getElementById('panel-voz').style.display = 'flex';
            iniciarEscuchaInfinita();
        }
        function cerrarModoVoz() {
            document.getElementById('panel-voz').style.display = 'none';
            window.speechSynthesis.cancel();
        }

        function iniciarEscuchaInfinita() {
            if(!('webkitSpeechRecognition' in window)) return;
            const rec = new webkitSpeechRecognition();
            rec.lang = 'es-AR';
            rec.onstart = () => { document.getElementById('subtitulo-voz').innerText = "Escuchando..."; };
            rec.onresult = (e) => {
                const txt = e.results[0][0].transcript;
                document.getElementById('subtitulo-voz').innerText = "Procesando...";
                enviar(txt);
            };
            rec.start();
        }

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #00f2ff; }
        /* 🎥 FONDO TRANSPARENTE PARA QUE EL VIDEO SE VEA SÍ O SÍ */
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; background-color: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; }

        #bg-video { 
            position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: -1; object-fit: cover !important; opacity: 1; 
        }

        /* 🚪 LOGIN ELEGANTE */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(25px); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255, 255, 255, 0.03); padding: 40px 25px; border-radius: 40px; border: 1px solid rgba(0, 242, 255, 0.3); text-align: center; max-width: 380px; width: 90%; }
        .welcome-text { font-family: 'Orbitron'; font-size: 0.8rem; letter-spacing: 3px; color: var(--accent); margin-bottom: 10px; }
        .titulo-login { font-family: 'Orbitron'; font-size: 1.5rem; letter-spacing: 5px; margin-bottom: 30px; }

        .btn-google { background: #fff; color: #000; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .divider { display: flex; align-items: center; color: rgba(255,255,255,0.3); margin: 20px 0; font-size: 0.7rem; }
        .divider::after, .divider::before { content: ""; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.1); margin: 0 10px; }

        .login-input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 15px; width: 100%; border-radius: 15px; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        .btn-ingresar { background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; letter-spacing: 2px; }

        /* 📱 APP CONTAINER */
        #app-container { display: none; flex-direction: column; height: 100vh; width: 100%; max-width: 600px; margin: 0 auto; position: relative; z-index: 10; }
        
        /* ⚙️ CONFIGURACIÓN: SOLA, ARRIBA Y MINIMALISTA */
        .top-nav { position: absolute; top: 20px; right: 20px; z-index: 100; }
        .btn-config-link { background: none; border: none; color: rgba(255,255,255,0.4); font-family: 'Orbitron'; font-size: 0.7rem; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .btn-config-link:hover { color: var(--accent); }

        header { padding: 50px 15px 10px 15px; text-align: center; }
        .titulo-app { font-family: 'Orbitron'; letter-spacing: 15px; font-size: 1.6rem; text-shadow: 0 0 20px var(--accent); }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 15px 20px; border-radius: 22px; backdrop-filter: blur(15px); line-height: 1.4; font-size: 0.95rem; }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.08); border: 1px solid rgba(0, 242, 255, 0.2); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }

        /* 🎤 BARRA DE CHAT CON LA "A" */
        .input-area { padding: 10px 15px 30px 15px; display: flex; align-items: center; gap: 12px; }
        .btn-a { font-family: 'Orbitron'; font-size: 1.8rem; color: var(--accent); background: none; border: none; cursor: pointer; text-shadow: 0 0 10px var(--accent); }
        .input-container { flex: 1; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 35px; display: flex; align-items: center; padding: 5px 15px; backdrop-filter: blur(20px); }
        #chat-terminal { flex: 1; background: transparent; border: none; color: white; padding: 12px 5px; outline: none; font-size: 1rem; width: 100%; }
        .btn-send { background: none; border: none; color: var(--accent); font-size: 1.5rem; cursor: pointer; }

        /* ⚙️ PANEL DE CONFIGURACIÓN (SIDEBAR) */
        #sidebar { position: fixed; top: 0; right: -280px; width: 270px; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(40px); border-left: 1px solid rgba(0,242,255,0.2); z-index: 100000; transition: 0.4s; padding: 40px 20px; display: flex; flex-direction: column; }
        #sidebar.open { right: 0; }
        .close-sidebar { align-self: flex-start; background: none; border: none; color: var(--accent); font-size: 1.8rem; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="sidebar">
        <button class="close-sidebar" onclick="toggleSidebar()">✖</button>
        <h2 style="font-family:'Orbitron'; color:var(--accent); letter-spacing:2px;">AJUSTES</h2>
        <button onclick="location.reload()" style="background:rgba(255,255,255,0.05); color:white; border:1px solid #ff4d4d; padding:15px; border-radius:15px; width:100%; cursor:pointer; margin-top:20px;">Cerrar Sesión</button>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <p class="welcome-text">BIENVENIDO A AURORA</p>
            <h1 class="titulo-login">COMO DESEA REGISTRARSE</h1>
            
            <button class="btn-google" onclick="entrar('Gabriel')">
                <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Ingresar con Google
            </button>

            <div class="divider">O POR CORREO</div>
            <input type="email" class="login-input" placeholder="Email">
            <input type="password" class="login-input" placeholder="Contraseña">
            <button class="btn-ingresar" onclick="entrar('Usuario')">INGRESAR</button>
        </div>
    </div>

    <div id="app-container">
        <div class="top-nav">
            <button class="btn-config-link" onclick="toggleSidebar()">CONFIGURACIÓN</button>
        </div>

        <header><div class="titulo-app">AURORA</div></header>
        <div id="chat-window"><div class="msg aurora">Enlace neuronal activo. ¿Qué necesitás?</div></div>

        <div class="input-area">
            <button class="btn-a" onclick="alert('Modo voz activado...')">A</button>
            <div class="input-container">
                <input type="text" id="chat-terminal" placeholder="Escribe a Aurora..." autocomplete="off">
                <button onclick="enviar()" class="btn-send">➤</button>
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        
        function entrar(name) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            document.getElementById('bg-video').play(); 
        }

        async function enviar() {
            const input = document.getElementById('chat-terminal');
            const val = input.value.trim(); if(!val) return;
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg user">${val}</div>`;
            input.value = ""; win.scrollTop = win.scrollHeight;
            try {
                const res = await fetch('/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ msg: val }) });
                const data = await res.json();
                win.innerHTML += `<div class="msg aurora">${data.respuesta}</div>`;
                win.scrollTop = win.scrollHeight;
            } catch(e) { console.log("Error"); }
        }
    </script>
</body>
</html>

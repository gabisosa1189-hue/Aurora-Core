<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #00f2ff; --danger: #ff4d4d; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            overflow: hidden; background-color: #000;
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; 
            overscroll-behavior-y: none; 
        }

        /* ✨ INYECCIÓN V27: BARRA DE CARGA GLOW */
        #loading-bar { position: fixed; top: 0; left: 0; width: 0%; height: 3px; background: var(--accent); box-shadow: 0 0 15px var(--accent); transition: 0.3s; z-index: 1000000; }

        #bg-video { position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; object-fit: cover !important; pointer-events: none; }
        
        #panels-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 100000; display: none; backdrop-filter: blur(5px); }

        /* ✨ PANELES LATERALES (REGLA DE ORO) */
        .panel-side {
            position: fixed; top: 0; width: 280px; height: 100%;
            background: rgba(0, 10, 20, 0.75); backdrop-filter: blur(25px);
            z-index: 100001; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; padding: 25px; 
            padding-top: calc(env(safe-area-inset-top, 40px) + 20px); box-sizing: border-box;
        }
        #sidebar-menu { left: 0; transform: translateX(-100%); border-right: 1px solid rgba(0, 242, 255, 0.2); }
        #profile-panel { right: 0; transform: translateX(100%); border-left: 1px solid rgba(0, 242, 255, 0.2); }
        .panel-open { transform: translateX(0) !important; }

        .panel-title { font-family: 'Orbitron'; font-size: 0.9rem; color: var(--accent); letter-spacing: 3px; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        
        .chat-item { 
            background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1); font-size: 0.85rem; margin-bottom: 10px; 
            transition: 0.3s; user-select: none; -webkit-user-select: none; cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
        }
        .chat-item.active { background: rgba(0, 242, 255, 0.1); border-color: var(--accent); }
        .chat-item.pinned { border-left: 4px solid var(--accent); }

        /* ✨ BOTTOM SHEETS */
        #context-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 100005; opacity: 0; pointer-events: none; transition: 0.3s; }
        #context-overlay.show { opacity: 1; pointer-events: all; }
        
        .bottom-sheet {
            position: fixed; bottom: -100%; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(0, 15, 25, 0.85);
            backdrop-filter: blur(40px); border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 30px 30px 0 0; padding: 25px 25px 40px 25px;
            z-index: 100006; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; gap: 5px;
            box-shadow: 0 -10px 40px rgba(0, 242, 255, 0.15);
        }
        .bottom-sheet.show { bottom: 0; }
        .context-pill { width: 40px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 0 auto 15px auto; }
        
        .context-btn {
            background: transparent; color: #fff; border: none; padding: 16px 15px;
            font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1rem;
            text-align: left; border-radius: 15px; display: flex; align-items: center; gap: 15px;
            cursor: pointer; transition: 0.2s;
        }
        .context-btn:hover { background: rgba(0, 242, 255, 0.1); color: var(--accent); }
        .context-btn svg { width: 22px; height: 22px; stroke: rgba(255,255,255,0.8); transition: 0.2s; }
        .context-btn:hover svg { stroke: var(--accent); }

        /* ✨ MODO LIVE OVERLAY */
        #live-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 5, 10, 0.4); z-index: 100010; display: none; flex-direction: column;
            align-items: center; justify-content: center; opacity: 0; transition: 0.4s;
        }
        #live-overlay.show { opacity: 1; display: flex; }
        
        #camera-stream {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 0; opacity: 0; transition: opacity 0.8s ease;
        }

        .live-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; }

        @keyframes pulseAWhite { 0% { transform: scale(1); text-shadow: 0 0 20px rgba(255,255,255,0.8); } 50% { transform: scale(1.15); text-shadow: 0 0 60px rgba(255,255,255,1); } 100% { transform: scale(1); text-shadow: 0 0 20px rgba(255,255,255,0.8); } }
        .live-a { font-family: 'Orbitron'; font-size: 6rem; color: #fff; display: flex; align-items: center; justify-content: center; animation: pulseAWhite 2s infinite ease-in-out; text-shadow: 0 0 30px rgba(255,255,255,0.9); }

        .live-controls { position: absolute; bottom: 60px; z-index: 2; display: flex; align-items: center; gap: 45px; }
        
        .live-btn { background: transparent; border: none; padding: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .live-btn svg { width: 32px; height: 32px; stroke: rgba(255,255,255,0.8); stroke-width: 1.5; filter: drop-shadow(0 0 8px rgba(255,255,255,0.4)); transition: 0.3s; }
        .live-btn:hover svg { stroke: #fff; filter: drop-shadow(0 0 15px #fff); transform: scale(1.1); }
        .live-btn.active svg { stroke: var(--accent); filter: drop-shadow(0 0 15px var(--accent)); }
        
        .live-btn-end { background: transparent; border: none; padding: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .live-btn-end svg { width: 40px; height: 40px; stroke: var(--danger); stroke-width: 2; filter: drop-shadow(0 0 12px var(--danger)); transition: 0.3s; }

        #premium-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 320px; background: rgba(0, 15, 25, 0.9); backdrop-filter: blur(30px); border: 1px solid var(--accent); border-radius: 30px; padding: 30px; z-index: 100005; text-align: center; display: none; }
        .btn-premium-add { background: rgba(0, 242, 255, 0.1); border: 1px dashed var(--accent); color: var(--accent); width: 100%; padding: 12px; border-radius: 12px; font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-account { width: 100%; padding: 15px; border-radius: 15px; font-family: 'Orbitron'; font-size: 0.75rem; cursor: pointer; margin-bottom: 12px; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); }

        #app-container { display: none; flex-direction: column; height: 100vh; width: 100%; position: relative; z-index: 10; transition: opacity 0.4s ease; }

        header { padding-top: calc(env(safe-area-inset-top, 40px) + 15px); padding-left: 20px; padding-right: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .titulo-app { font-family: 'Orbitron'; letter-spacing: 15px; font-size: 1.8rem; text-shadow: 0 0 15px var(--accent); margin: 0; }
        .btn-menu-top { background: transparent; border: none; cursor: pointer; color: #fff; font-size: 2rem; text-shadow: 0 0 15px var(--accent); padding: 0; }
        #user-avatar { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--accent); box-shadow: 0 0 15px rgba(0,242,255,0.4); object-fit: cover; display: none; cursor: pointer; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 14px 22px; border-radius: 22px; backdrop-filter: blur(15px); font-size: 1rem; line-height: 1.5; }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.3); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15); }

        .unified-panel {
            width: 100%; max-width: 100%;
            background: rgba(0, 10, 20, 0.45); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 35px 35px 0 0;
            padding: 25px 20px calc(env(safe-area-inset-bottom, 20px) + 20px) 20px; 
            display: flex; flex-direction: column; gap: 15px;
            box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.4);
        }

        #chat-terminal { width: 100%; background: transparent; border: none; color: white; font-size: 1.05rem; font-family: 'Plus Jakarta Sans', sans-serif; outline: none; padding: 0; }
        .panel-actions { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .action-group { display: flex; align-items: center; gap: 12px; }
        .btn-mini-icon { background: transparent; border: none; color: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 5px; transition: 0.3s; }
        .btn-mini-icon svg { width: 24px; height: 24px; stroke: currentColor; }
        
        /* ✨ ESTILO MOTOR ACTIVO */
        .btn-pill-model { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 20px; padding: 8px 16px; font-size: 0.85rem; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 6px; }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 10, 20, 0.4); backdrop-filter: blur(15px); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 40px; border: 1px solid rgba(0, 242, 255, 0.2); text-align: center; max-width: 380px; width: 90%; }
        .login-input { width: 100%; box-sizing: border-box; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(0, 242, 255, 0.3); color: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; outline: none; }
    </style>
</head>
<body>

    <div id="loading-bar"></div>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="panels-overlay" onclick="cerrarPaneles()"></div>
    <div id="context-overlay" onclick="cerrarBottomSheets()"></div>

    <div id="live-overlay">
        <video id="camera-stream" autoplay playsinline muted></video>
        <div class="live-content">
            <div class="live-a">A</div>
            <p style="color:rgba(255,255,255,0.9); font-family:'Plus Jakarta Sans'; font-size:1.2rem; margin-top:30px; letter-spacing:1px; text-shadow: 0 0 10px rgba(0,0,0,0.8);">Aurora te escucha...</p>
        </div>
        <div class="live-controls">
            <button class="live-btn" onclick="cerrarLiveMode()"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><circle cx="8" cy="14" r="1"/><circle cx="12" cy="14" r="1"/><circle cx="16" cy="14" r="1"/></svg></button>
            <button class="live-btn-end" onclick="cerrarLiveMode()"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            <button id="btn-live-cam" class="live-btn" onclick="toggleCamaraLive()"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button>
        </div>
    </div>

    <div id="context-menu" class="bottom-sheet">
        <div class="context-pill"></div>
        <button class="context-btn" onclick="fijarChatActual()"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg> Fijar Chat</button>
        <button class="context-btn" onclick="renombrarChatActual()"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Cambiar Nombre</button>
        <button class="context-btn" onclick="compartirChatActual()"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> Compartir Conversación</button>
    </div>

    <div id="attachment-menu" class="bottom-sheet">
        <div class="context-pill"></div>
        <button class="context-btn" onclick="cerrarBottomSheets()"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Cámara</button>
        <button class="context-btn" onclick="cerrarBottomSheets()"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg> Galería</button>
        <button class="context-btn" onclick="cerrarBottomSheets()"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> Documento</button>
    </div>

    <div id="model-menu" class="bottom-sheet">
        <div class="context-pill"></div>
        <h4 style="font-family:'Orbitron'; color:#fff; text-align:center; margin-bottom:20px; letter-spacing:10px;">AURORA</h4>
        <button class="context-btn" style="border-color:var(--accent); background:rgba(0,242,255,0.05);" onclick="seleccionarMotor('flash')"><span style="color:var(--accent); font-size:1.2rem;">⚡</span> Núcleo Flash (Rápido)</button>
        <button class="context-btn" onclick="seleccionarMotor('quantum')"><span style="font-size:1.2rem;">🧠</span> Núcleo Quántum (Profundo)</button>
    </div>

    <div id="premium-modal">
        <h2 style="font-family:'Orbitron'; color:var(--accent); font-size: 1.1rem; margin-bottom: 15px;">NÚCLEO SATURADO</h2>
        <p style="font-size: 0.85rem; color: rgba(255,255,255,0.7); line-height: 1.5; margin-bottom: 25px;">Aurora necesita 24hs para recalibrar sus enlaces.<br><br><b>¿Deseas saltar la espera?</b></p>
        <button class="btn-account btn-accent-opt" onclick="invitarAmigo()">EXPANDIR SISTEMA</button>
        <button style="background:none; border:none; color:rgba(255,255,255,0.3); cursor:pointer; font-family:'Orbitron'; font-size:0.6rem; margin-top:15px;" onclick="cerrarModal()">ESPERAR RECALIBRACIÓN</button>
    </div>

    <div id="sidebar-menu" class="panel-side">
        <h3 class="panel-title">MIS CHATS</h3>
        <div id="history-list" style="flex:1; overflow-y:auto; scrollbar-width:none;"></div>
        <button class="btn-premium-add" onclick="nuevoEnlace()">+ NUEVO CHAT</button>
        <div style="margin-top:25px;">
            <p id="txt-progreso" style="color:var(--accent); font-size:0.7rem; margin-bottom:8px; font-family:'Orbitron';">CHATS: <span id="span-contador">1</span> / 5</p>
            <div style="width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:10px;"><div id="bar-progreso" style="width:20%; height:100%; background:var(--accent); border-radius:10px; box-shadow:0 0 10px var(--accent); transition:0.5s;"></div></div>
        </div>
    </div>

    <div id="profile-panel" class="panel-side">
        <h3 class="panel-title">MI CUENTA</h3>
        <button class="btn-account" style="border-color:var(--accent); color:var(--accent);" onclick="cambiarCuenta()">CAMBIAR CUENTA</button>
        <button class="btn-account" onclick="cerrarSesionReal()">CERRAR SESIÓN</button>
        <button class="btn-account" style="margin-top:auto; color:var(--danger); border-color:var(--danger);" onclick="eliminarCuenta()">ELIMINAR CUENTA</button>
    </div>

    <div id="login-overlay">
        <div class="login-card">

            <input type="email" placeholder="Email" class="login-input" id="emailInput">
            <input type="password" placeholder="Contraseña" class="login-input" id="passwordInput">
            <button id="btn-principal" style="background:transparent; border:2px solid var(--accent); color:var(--accent); padding:15px; width:100%; border-radius:18px; font-weight:bold; cursor:pointer; font-family:'Orbitron';" onclick="authCorreo()">INGRESAR</button>
            <div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:20px; margin-top:10px;"><a onclick="toggleRegistro()" id="link-registro" style="color:#fff; cursor:pointer;">Crear Cuenta</a></div>
            <button style="background:rgba(255,255,255,0.9); color:#000; border:none; padding:15px; border-radius:18px; font-weight:bold; cursor:pointer; width:100%;" onclick="authGoogle()">Ingresar con Google</button>
        </div>
    </div>

    <div id="app-container">
        <header>
            <button class="btn-menu-top" onclick="abrirSidebar()">☰</button>
            <div class="titulo-app">AURORA</div>
            <img id="user-avatar" src="" alt="Perfil" onclick="abrirPerfil()">
        </header>

        <div id="chat-window">
            <div class="msg aurora">Bienvenido al núcleo de <b>Aurora</b>. Tu enlace neuronal está activo. ¿En qué puedo ayudarte?</div>
        </div>

        <div class="bottom-section">
            <div class="unified-panel">
                <input type="text" id="chat-terminal" placeholder="Preguntale a Aurora..." autocomplete="off" oninput="toggleInputButtons()">
                <div class="panel-actions">
                    <div class="action-group">
                        <button class="btn-mini-icon" onclick="abrirAdjuntos()"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
                        <button class="btn-pill-model" id="engine-pill" onclick="abrirMotores()">⚡ Flash</button>

                        <button id="btn-enviar" class="btn-mini-icon" onclick="enviar()" style="display:none; color:var(--accent);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
                        <button class="btn-live-glow" onclick="abrirLiveMode()" style="background:none; border:none; color:white; font-family:'Orbitron'; font-size:1.5rem;">A</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo", authDomain: "aurora-ai-oficia.firebaseapp.com", projectId: "aurora-ai-oficia", storageBucket: "aurora-ai-oficia.firebasestorage.app", messagingSenderId: "426513637524", appId: "1:426513637524:web:13851f499aa4af13cfd481", measurementId: "G-XTN5WJPRPP" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth();

        let motorActual = 'flash'; // ✨ VARIABLE V27
        let enlacesContador = parseInt(localStorage.getItem('aurora_limite_celular')) || 1;
        let chats = []; for(let i=1; i<=enlacesContador; i++) { chats.push({ id: i, nombre: `Chat ${i}`, pinned: false }); }
        let chatSeleccionado = null; let timerLongPress; let cameraStream = null;

        // ✨ INYECCIÓN V27: SELECTOR DE MOTOR
        function seleccionarMotor(tipo) {
            motorActual = tipo;
            document.getElementById('engine-pill').innerHTML = tipo === 'flash' ? '⚡ Flash' : '🧠 Quantum';
            if (window.navigator.vibrate) window.navigator.vibrate(10);
            cerrarBottomSheets();
        }

        // ✨ FIX LOGIN GOOGLE (MÁS ESTABLE EN IPHONE)
        function authGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithRedirect(provider);
        }
        auth.getRedirectResult().catch(e => console.error(e));

        // TUS FUNCIONES ORIGINALES (SIN TOCAR)
        function abrirSidebar() { document.getElementById('sidebar-menu').classList.add('panel-open'); document.getElementById('panels-overlay').style.display = 'block'; }
        function abrirPerfil() { document.getElementById('profile-panel').classList.add('panel-open'); document.getElementById('panels-overlay').style.display = 'block'; }
        function cerrarPaneles() { document.getElementById('sidebar-menu').classList.remove('panel-open'); document.getElementById('profile-panel').classList.remove('panel-open'); document.getElementById('panels-overlay').style.display = 'none'; cerrarModal(); }
        function cerrarModal() { document.getElementById('premium-modal').style.display = 'none'; }
        function cerrarBottomSheets() { document.querySelectorAll('.bottom-sheet').forEach(sheet => sheet.classList.remove('show')); document.getElementById('context-overlay').classList.remove('show'); }
        function abrirMenu(id) { document.getElementById('context-overlay').classList.add('show'); document.getElementById(id).classList.add('show'); }
        function abrirAdjuntos() { abrirMenu('attachment-menu'); } function abrirMotores() { abrirMenu('model-menu'); }
        
        function bindLongPress() {
            const items = document.querySelectorAll('.chat-item');
            items.forEach(item => {
                item.addEventListener('touchstart', (e) => { timerLongPress = setTimeout(() => { chatSeleccionado = parseInt(item.getAttribute('data-id')); if (navigator.vibrate) navigator.vibrate(50); abrirMenu('context-menu'); }, 500); });
                item.addEventListener('touchend', () => clearTimeout(timerLongPress)); item.addEventListener('touchmove', () => clearTimeout(timerLongPress));
            });
        }

        function renombrarChatActual() { const nuevo = prompt("Nuevo nombre:"); if(nuevo && nuevo.trim() !== "") { chats.find(c => c.id === chatSeleccionado).nombre = nuevo; actualizarUI(); } cerrarBottomSheets(); }
        function fijarChatActual() { const c = chats.find(c => c.id === chatSeleccionado); c.pinned = !c.pinned; actualizarUI(); cerrarBottomSheets(); }
        function compartirChatActual() { const c = chats.find(c => c.id === chatSeleccionado); if (navigator.share) { navigator.share({ title: 'AURORA AI', text: `Revisá mi chat: ${c.nombre}`, url: window.location.href }); } cerrarBottomSheets(); }

        function nuevoEnlace() {
            if (enlacesContador >= 5) { document.getElementById('premium-modal').style.display = 'block'; document.getElementById('panels-overlay').style.display = 'block'; return; }
            enlacesContador++; localStorage.setItem('aurora_limite_celular', enlacesContador); chats.push({ id: enlacesContador, nombre: `Chat ${enlacesContador}`, pinned: false });
            actualizarUI(); document.getElementById('chat-window').innerHTML = `<div class="msg aurora">Nuevo chat establecido. ¿En qué te ayudo?</div>`; cerrarPaneles();
        }

        function actualizarUI() {
            document.getElementById('span-contador').innerText = enlacesContador; document.getElementById('bar-progreso').style.width = (enlacesContador * 20) + "%";
            const list = document.getElementById('history-list'); list.innerHTML = "";
            const ordenados = [...chats].sort((a,b) => b.pinned === a.pinned ? 0 : b.pinned ? 1 : -1);
            ordenados.forEach(c => { list.innerHTML += `<div class="chat-item ${c.id === enlacesContador ? 'active' : ''} ${c.pinned ? 'pinned' : ''}" data-id="${c.id}"><span>${c.nombre}</span><span style="opacity: ${c.pinned ? '1' : '0.3'}; font-size: 0.8rem;">${c.pinned ? '📌' : ''}</span></div>`; });
            bindLongPress();
        }

        function toggleInputButtons() { const val = document.getElementById('chat-terminal').value.trim(); document.getElementById('btn-mic').style.display = val ? 'none' : 'flex'; document.getElementById('btn-enviar').style.display = val ? 'flex' : 'none'; }
        
        function iniciarDictado() {
            if(!('webkitSpeechRecognition' in window)) return;
            const rec = new webkitSpeechRecognition(); rec.lang = 'es-AR';
            rec.onstart = () => { document.getElementById('btn-mic').style.color = "var(--danger)"; };
            rec.onresult = (e) => { document.getElementById('chat-terminal').value = e.results[0][0].transcript; };
            rec.onend = () => { document.getElementById('btn-mic').style.color = "#fff"; if(document.getElementById('chat-terminal').value.trim()) enviar(); };
            rec.start();
        }

        function abrirLiveMode() { document.getElementById('live-overlay').classList.add('show'); document.getElementById('app-container').style.opacity = '0'; }
        function cerrarLiveMode() { document.getElementById('live-overlay').classList.remove('show'); document.getElementById('app-container').style.opacity = '1'; if(cameraStream) cameraStream.getTracks().forEach(t => t.stop()); }
        async function toggleCamaraLive() {
            const vid = document.getElementById('camera-stream');
            if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; vid.style.opacity = '0'; }
            else { try { cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }); vid.srcObject = cameraStream; vid.style.opacity = '0.4'; } catch(e) {} }
        }

        auth.onAuthStateChanged((user) => { if (user) { document.getElementById('login-overlay').style.display = 'none'; document.getElementById('app-container').style.display = 'flex'; if (user.photoURL) document.getElementById('user-avatar').src = user.photoURL; document.getElementById('user-avatar').style.display = 'block'; actualizarUI(); } else { document.getElementById('login-overlay').style.display = 'flex'; } });
        
        function authCorreo() { 
            const email = document.getElementById('emailInput').value; 
            const password = document.getElementById('passwordInput').value;
            if(!email || !password) return alert("Completa los datos");
            if(modoRegistro) {
                auth.createUserWithEmailAndPassword(email, password).catch(e => alert(e.message));
            } else {
                auth.signInWithEmailAndPassword(email, password).catch(e => alert("Verifica tus datos"));
            }
        }
        
        let modoRegistro = false;
        function toggleRegistro() { 
            modoRegistro = !modoRegistro; 
            document.getElementById('titulo-login').innerHTML = modoRegistro ? "CREAR CUENTA" : "BIENVENIDO A AURORA";
            document.getElementById('btn-principal').innerText = modoRegistro ? "REGISTRARSE" : "INGRESAR";
            document.getElementById('link-registro').innerText = modoRegistro ? "Ya tengo cuenta" : "Crear Cuenta";
        }

        function cerrarSesionReal() { auth.signOut().then(() => location.reload()); }
        function eliminarCuenta() { const user = firebase.auth().currentUser; if (user && confirm("⚠️ ¿Eliminar?")) user.delete().then(() => location.reload()); }

        // ✨ INYECCIÓN V27: FUNCIÓN ENVIAR REFORZADA
        async function enviar() {
            const input = document.getElementById('chat-terminal');
            const win = document.getElementById('chat-window');
            const bar = document.getElementById('loading-bar');
            
            if(!input.value.trim()) return;

            const msj = input.value;
            win.innerHTML += `<div class="msg user">${msj}</div>`;
            input.value = ""; toggleInputButtons();
            win.scrollTop = win.scrollHeight;

            // ✨ GLOW START
            bar.style.width = "75%";

            try {
                const res = await fetch('https://gabiland-aurora-ai-mendoza.hf.space/chat', { 
                    method:'POST', 
                    headers:{'Content-Type':'application/json'}, 
                    body:JSON.stringify({
                        msg: msj,
                        model: motorActual 
                    }) 
                });
                const data = await res.json();
                
                win.innerHTML += `<div class="msg aurora">${data.respuesta}</div>`;
                win.scrollTop = win.scrollHeight;

                // ✨ GLOW END
                bar.style.width = "100%";
                setTimeout(() => bar.style.width = "0%", 400);

                // ✨ VIBRACIÓN
                if (window.navigator.vibrate) window.navigator.vibrate(15);

                // ✨ VOZ
                const leer = new SpeechSynthesisUtterance(data.respuesta);
                leer.lang = 'es-AR';
                window.speechSynthesis.speak(leer);

            } catch(e) {
                bar.style.width = "0%";
                win.innerHTML += `<div class="msg aurora" style="color:red;">Fallo de conexión...</div>`;
            }
        }
        document.getElementById('chat-terminal').addEventListener('keypress', e => { if (e.key === 'Enter') enviar(); });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Enlace Neuronal</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #00f2ff; --danger: #ff4d4d; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            overflow: hidden; background: #000 !important; 
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; 
        }

        #bg-video { 
            position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: -1; object-fit: cover !important; 
        }

        /* 🚪 LOGIN TRASLÚCIDO */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(25px); z-index: 9999; 
            display: flex; align-items: center; justify-content: center; 
        }
        .login-card { 
            background: rgba(255, 255, 255, 0.02); padding: 40px; border-radius: 40px; 
            border: 1px solid rgba(0, 242, 255, 0.2); text-align: center; max-width: 380px; width: 90%; 
        }

        .login-card h2 { font-family: 'Orbitron'; font-size: 1.5rem; margin-bottom: 25px; text-shadow: 0 0 10px var(--accent); }
        .login-input {
            width: 100%; box-sizing: border-box; background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 242, 255, 0.3); color: white; padding: 15px;
            border-radius: 15px; margin-bottom: 15px; outline: none; font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* 📱 APP CONTAINER */
        #app-container { display: none; flex-direction: column; height: 100vh; width: 100%; position: relative; z-index: 10; }

        header { padding: 50px 0 10px 0; text-align: center; }
        .titulo-app { font-family: 'Orbitron'; letter-spacing: 12px; font-size: 1.6rem; text-shadow: 0 0 15px var(--accent); }

        #chat-window { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 20px; 
            scrollbar-width: none; width: 100%; max-width: 700px; margin: 0 auto; 
        }
        
        .msg { 
            max-width: 85%; padding: 14px 22px; border-radius: 22px; 
            backdrop-filter: blur(15px); font-size: 0.95rem; line-height: 1.4;
            animation: slideUp 0.3s ease-out; z-index: 5;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .aurora { background: rgba(0, 242, 255, 0.1); border: 1px solid rgba(0, 242, 255, 0.3); align-self: flex-start; border-bottom-left-radius: 4px; }
        .user { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); align-self: flex-end; border-bottom-right-radius: 4px; }

        /* ARREGLO BOTÓN CONFIGURACIÓN */
        .btn-config-fixed { 
            position: fixed; left: 20px; bottom: 85px; 
            background: none; border: none; cursor: pointer; color: #fff; 
            font-family: 'Orbitron'; font-size: 0.75rem; 
            letter-spacing: 2px; text-shadow: 0 0 10px var(--accent);
            display: flex; align-items: center; gap: 8px; z-index: 999 !important; 
        }

        .bottom-section { padding: 10px 20px 30px 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .chat-group { display: flex; align-items: center; gap: 15px; width: 100%; max-width: 500px; }
        .btn-a { font-family: 'Orbitron'; font-size: 1.8rem; color: #fff; background: none; border: none; cursor: pointer; text-shadow: 0 0 15px var(--accent); }
        
        .input-bar { 
            flex: 1; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(0, 242, 255, 0.4); 
            border-radius: 40px; display: flex; align-items: center; padding: 2px 20px; backdrop-filter: blur(20px); 
        }
        #chat-terminal { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; outline: none; font-size: 1rem; }

        /* ✨ INTERFAZ DE VOZ (MEJORADA) */
        #voice-interface {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 10, 20, 0.5); backdrop-filter: blur(45px);
            z-index: 10000; display: none; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .voice-status { font-family: 'Orbitron'; font-size: 1.1rem; color: var(--accent); margin-bottom: 40px; letter-spacing: 3px; text-shadow: 0 0 20px var(--accent); text-align: center; }
        
        .visualizer { display: flex; align-items: center; gap: 8px; height: 80px; }
        .bar { width: 5px; height: 15px; background: var(--accent); border-radius: 10px; animation: pulse 1s ease-in-out infinite; box-shadow: 0 0 10px var(--accent); }
        @keyframes pulse { 0%, 100% { height: 15px; } 50% { height: 60px; } }

        .btn-hangup {
            margin-top: 60px; background: rgba(255, 77, 77, 0.15); border: 1px solid var(--danger);
            color: var(--danger); padding: 16px 45px; border-radius: 50px;
            font-family: 'Orbitron'; font-size: 0.85rem; letter-spacing: 2px;
            cursor: pointer; z-index: 10001;
        }

        #config-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(40px); z-index: 100000; display: none; align-items: center; justify-content: center; }
        .config-card { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 35px; border: 1px solid var(--accent); text-align: center; width: 80%; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="voice-interface">
        <div class="voice-status" id="voice-txt">INICIALIZANDO...</div>
        <div class="visualizer">
            <div class="bar"></div><div class="bar" style="animation-delay:0.2s"></div><div class="bar" style="animation-delay:0.4s"></div><div class="bar" style="animation-delay:0.6s"></div><div class="bar" style="animation-delay:0.8s"></div>
        </div>
        <button class="btn-hangup" onclick="cerrarVoz()">COLGAR ENLACE</button>
    </div>

    <button class="btn-config-fixed" onclick="document.getElementById('config-panel').style.display='flex'">
        <span style="font-size:1.4rem">⚙️</span> CONFIGURACIÓN
    </button>

    <div id="config-panel">
        <div class="config-card">
            <h2 style="font-family:'Orbitron';">SISTEMA</h2>
            <button onclick="location.reload()" style="background:rgba(255,255,255,0.1); color:white; border:none; padding:15px; width:100%; border-radius:15px; cursor:pointer;">CERRAR SESIÓN</button>
            <button style="background:none; color:var(--accent); margin-top:30px; border:none; cursor:pointer;" onclick="document.getElementById('config-panel').style.display='none'">VOLVER</button>
        </div>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h2 id="titulo-login">Acceso Neuronal</h2>
            <input type="email" placeholder="Email" class="login-input" id="emailInput">
            <input type="password" placeholder="Contraseña" class="login-input" id="passwordInput">
            <button id="btn-principal" style="background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 15px; width: 100%; border-radius: 18px; cursor: pointer; font-family: 'Orbitron';" onclick="authCorreo()">INGRESAR</button>
            <div class="form-links" style="margin-top:15px">
                <a onclick="toggleRegistro()" id="link-registro">Crear Cuenta</a>
            </div>
            <div class="separator">ó</div>
            <button style="background: #fff; color: #000; border: none; padding: 15px; border-radius: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%;" onclick="authGoogle()">Ingresar con Google</button>
        </div>
    </div>

    <div id="app-container">
        <header><div class="titulo-app">AURORA</div></header>
        <div id="chat-window">
            <div class="msg aurora">Bienvenido al núcleo de <b>Aurora</b>. Hablame o escribime para comenzar.</div>
        </div>
        <div class="bottom-section">
            <div class="chat-group">
                <button class="btn-a" id="btn-voz" onclick="activarVoz()">A</button>
                <div class="input-bar">
                    <input type="text" id="chat-terminal" placeholder="Mensaje neuronal..." autocomplete="off">
                    <button onclick="enviar()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-size:1.5rem;">➤</button>
                </div>
            </div>
            <div class="disclaimer">SISTEMA IA NEURONAL EN VIVO.</div>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG (TUS CREDENCIALES)
        const firebaseConfig = {
            apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo",
            authDomain: "aurora-ai-oficia.firebaseapp.com",
            projectId: "aurora-ai-oficia",
            storageBucket: "aurora-ai-oficia.firebasestorage.app",
            messagingSenderId: "426513637524",
            appId: "1:426513637524:web:13851f499aa4af13cfd481",
            measurementId: "G-XTN5WJPRPP"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // 🎙️ CORE DE VOZ (PARCHE iPHONE / iOS)
        const synth = window.speechSynthesis;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;
        if (recognition) { recognition.lang = 'es-AR'; recognition.continuous = false; }

        function hablar(texto) {
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(texto);
            const voices = synth.getVoices();
            const femaleVoice = voices.find(v => v.lang.includes('es') && (v.name.includes('female') || v.name.includes('Google') || v.name.includes('Helena')));
            if (femaleVoice) utter.voice = femaleVoice;
            utter.pitch = 1.05; utter.rate = 1.0;
            
            utter.onstart = () => { document.getElementById('voice-txt').innerText = "AURORA HABLANDO..."; };
            utter.onend = () => { 
                if(document.getElementById('voice-interface').style.display === 'flex') {
                    document.getElementById('voice-txt').innerText = "ESCUCHANDO...";
                    try { recognition.start(); } catch(e) {}
                }
            };
            synth.speak(utter);
        }

        function activarVoz() {
            // HACK iPHONE: "Despertar" el audio con un clic del usuario
            const sss = new SpeechSynthesisUtterance("");
            synth.speak(sss);

            if (navigator.vibrate) navigator.vibrate(50);
            document.getElementById('voice-interface').style.display = 'flex';
            document.getElementById('voice-txt').innerText = "ESCUCHANDO...";
            try { recognition.start(); } catch(e) { console.log("Micro ocupado"); }
        }

        function cerrarVoz() {
            synth.cancel();
            try { recognition.stop(); } catch(e) {}
            document.getElementById('voice-interface').style.display = 'none';
        }

        if(recognition) {
            recognition.onresult = (e) => { enviarVoz(e.results[0][0].transcript); };
            recognition.onerror = () => { if(document.getElementById('voice-interface').style.display === 'flex') recognition.start(); };
        }

        async function enviarVoz(texto) {
            document.getElementById('voice-txt').innerText = "PROCESANDO...";
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg user">${texto}</div>`;
            win.scrollTop = win.scrollHeight;
            try {
                const res = await fetch('https://gabiland-aurora-ai-mendoza.hf.space/chat', { 
                    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg:texto}) 
                });
                const data = await res.json();
                win.innerHTML += `<div class="msg aurora">${data.respuesta}</div>`;
                win.scrollTop = win.scrollHeight;
                hablar(data.respuesta);
            } catch(e) { cerrarVoz(); }
        }

        // AUTH Y OTROS
        function authCorreo() {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            auth.signInWithEmailAndPassword(email, password).then(() => entrar()).catch(e => alert("Error"));
        }
        function authGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(() => entrar());
        }
        function entrar() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            document.getElementById('bg-video').play(); 
        }
        async function enviar() {
            const input = document.getElementById('chat-terminal');
            const val = input.value.trim(); if(!val) return;
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg user">${val}</div>`;
            input.value = ""; win.scrollTop = win.scrollHeight;
            try {
                const res = await fetch('https://gabiland-aurora-ai-mendoza.hf.space/chat', { 
                    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg:val}) 
                });
                const data = await res.json();
                win.innerHTML += `<div class="msg aurora">${data.respuesta}</div>`;
                win.scrollTop = win.scrollHeight;
            } catch(e) {}
        }
        document.getElementById('chat-terminal').addEventListener('keypress', e => { if (e.key === 'Enter') enviar(); });
    </script>
</body>
</html>

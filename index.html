<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURORA AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; }
        
        /* --- ENTRADA CINEMÁTICA --- */
        body { 
            margin: 0; padding: 0; height: 100vh; background: #000; 
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; overflow: hidden; 
            animation: entradaSuave 1.5s ease-in-out forwards;
        }
        @keyframes entradaSuave {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        
        /* EL VIDEO SIN EL ÍCONO FANTASMA */
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.4); }
        
        #app-container { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; position: relative; }
        header { padding: 15px; text-align: center; font-family: 'Orbitron'; letter-spacing: 6px; opacity: 0.9; font-size: 1.2rem; }
        
        #chat-window { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; 
            scrollbar-width: none; padding-bottom: 20px;
        }
        #chat-window::-webkit-scrollbar { display: none; }

        .msg { 
            max-width: 85%; padding: 14px 20px; border-radius: 20px; font-size: 1rem; line-height: 1.5;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05); animation: slideUp 0.3s ease-out;
        }
        .aurora { align-self: flex-start; background: rgba(255, 255, 255, 0.02); border-bottom-left-radius: 2px; }
        .user { align-self: flex-end; background: rgba(0, 242, 255, 0.05); border-bottom-right-radius: 2px; border-color: rgba(0, 242, 255, 0.1); }

        /* BARRA DE TEXTO 100% INVISIBLE (CRISTAL PURO) */
        .input-area { padding: 15px 20px 25px 20px; background: transparent; }
        .input-container { 
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); 
            display: flex; align-items: center; padding: 5px 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 1rem; font-family: inherit; }
        input::placeholder { color: rgba(255,255,255,0.4); }
        
        .btn { 
            background: transparent; border: none; color: var(--accent); cursor: pointer; 
            padding: 8px 10px; border-radius: 20px; font-weight: 600; font-size: 1.2rem;
            transition: 0.2s; font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .btn:active { transform: scale(0.9); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video"><source src="fondo.mp4" type="video/mp4"></video>

    <div id="app-container">
        <header>AURORA</header>
        <div id="chat-window">
            <div class="msg aurora">Bienvenido. Soy Aurora, su asistente virtual. ¿En qué puedo ayudarle hoy?</div>
        </div>
        
        <div class="input-area">
            <div class="input-container">
                <input type="text" id="user-input" placeholder="Escriba aquí..." autocomplete="off">
                <button class="btn" onclick="enviar()">➤</button>
            </div>
        </div>
    </div>

    <script>
        const chatWin = document.getElementById('chat-window');
        const input = document.getElementById('user-input');
        let vozFemenina = null;

        function cargarVoces() {
            if (!('speechSynthesis' in window)) return;
            const voces = window.speechSynthesis.getVoices();
            vozFemenina = voces.find(v => v.lang.startsWith('es') && 
                (v.name.includes('Google') || v.name.includes('Helena') || v.name.includes('Lucia') || 
                 v.name.includes('Paulina') || v.name.includes('Sabina') || v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('mujer')));
        }

        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = cargarVoces;
            cargarVoces();
        }

        function hablar(texto) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            
            const u = new SpeechSynthesisUtterance(texto);
            if (vozFemenina) {
                u.voice = vozFemenina;
            }
            u.pitch = 1.05; 
            u.rate = 0.95; 
            u.lang = 'es-MX'; 
            window.speechSynthesis.speak(u);
        }

        async function enviar() {
            const msg = input.value.trim();
            if(!msg) return;
            
            addMsg(msg, 'user');
            input.value = '';
            
            try {
                const res = await fetch('/chat', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({msg}) 
                });
                const data = await res.json();
                if(data.respuesta) {
                    addMsg(data.respuesta, 'aurora');
                    hablar(data.respuesta);
                }
            } catch {
                addMsg("Disculpe, mi conexión se interrumpió.", 'aurora');
            }
        }

        function addMsg(t, cl) {
            const d = document.createElement('div');
            d.className = `msg ${cl}`;
            d.innerText = t;
            chatWin.appendChild(d);
            setTimeout(() => { chatWin.scrollTo({top: chatWin.scrollHeight, behavior: 'smooth'}); }, 50);
        }

        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') enviar(); });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #00f2ff; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            overflow: hidden; background: none !important; 
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; 
        }

        /* 🎥 VIDEO DE FONDO: EL ALMA DE LA APP */
        #bg-video { 
            position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: -1; object-fit: cover !important; 
        }

        /* 🚪 LOGIN TRASLÚCIDO */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(20px); z-index: 9999; 
            display: flex; align-items: center; justify-content: center; 
        }
        .login-card { 
            background: rgba(255, 255, 255, 0.02); padding: 40px; border-radius: 40px; 
            border: 1px solid rgba(0, 242, 255, 0.2); text-align: center; max-width: 380px; width: 90%; 
        }

        /* ✨ ESTILOS NUEVOS PARA EL LOGIN ELEGANTE */
        .login-card h2 { font-family: 'Orbitron'; font-size: 1.5rem; margin-bottom: 25px; text-shadow: 0 0 10px var(--accent); }
        .login-input {
            width: 100%; box-sizing: border-box; background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 242, 255, 0.3); color: white; padding: 15px;
            border-radius: 15px; margin-bottom: 15px; outline: none; font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .login-input:focus { border-color: var(--accent); background: rgba(0, 242, 255, 0.05); }
        .form-links { display: flex; justify-content: space-between; font-size: 0.8rem; opacity: 0.8; margin-bottom: 20px; }
        .form-links a { color: #fff; text-decoration: none; cursor: pointer; transition: 0.3s; }
        .form-links a:hover { color: var(--accent); text-shadow: 0 0 5px var(--accent); }
        .separator { margin: 15px 0; color: rgba(255,255,255,0.3); font-size: 0.8rem; }

        /* 📱 APP CONTAINER */
        #app-container { display: none; flex-direction: column; height: 100vh; width: 100%; position: relative; z-index: 10; }

        header { padding: 40px 0 10px 0; text-align: center; }
        .titulo-app { font-family: 'Orbitron'; letter-spacing: 15px; font-size: 1.8rem; text-shadow: 0 0 15px var(--accent); }

        /* 🏁 CHAT: COLUMNA CENTRAL (Nivel Gemini/ChatGPT) */
        #chat-window { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 20px; 
            scrollbar-width: none;
            width: 100%; max-width: 700px; 
            margin: 0 auto; 
        }
        
        .msg { 
            max-width: 80%; padding: 14px 22px; border-radius: 22px; 
            backdrop-filter: blur(15px); font-size: 1rem; line-height: 1.5;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Aurora: Izquierda */
        .aurora { 
            align-self: flex-start; background: rgba(0, 242, 255, 0.08); 
            border: 1px solid rgba(0, 242, 255, 0.3); border-bottom-left-radius: 4px;
        }
        /* Usuario: Derecha */
        .user { 
            align-self: flex-end; background: rgba(255, 255, 255, 0.08); 
            border: 1px solid rgba(255, 255, 255, 0.15); border-bottom-right-radius: 4px;
        }

        /* ⚙️ CONFIGURACIÓN: CLAVADA AL RINCÓN IZQUIERDO */
        .btn-config-fixed { 
            position: fixed; left: 25px; bottom: 58px; 
            background: none; border: none; cursor: pointer; color: #fff; 
            font-family: 'Orbitron'; font-size: 0.85rem; 
            letter-spacing: 2px; text-shadow: 0 0 15px var(--accent);
            display: flex; align-items: center; gap: 10px; z-index: 50;
        }

        /* 🏁 BARRA DE CHAT: CENTRADA */
        .bottom-section { 
            padding: 10px 20px 20px 20px; 
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .chat-group { display: flex; align-items: center; gap: 15px; width: 100%; max-width: 500px; }
        .btn-a { font-family: 'Orbitron'; font-size: 1.8rem; color: #fff; background: none; border: none; cursor: pointer; text-shadow: 0 0 15px var(--accent); }
        .input-bar { 
            flex: 1; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(0, 242, 255, 0.4); 
            border-radius: 40px; display: flex; align-items: center; padding: 5px 22px; backdrop-filter: blur(20px); 
        }
        #chat-terminal { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; outline: none; font-size: 1rem; }

        /* 💎 WARNING: CENTRADO TOTAL */
        .disclaimer { 
            text-align: center; font-size: 0.6rem; color: #fff; 
            text-shadow: 0 0 10px var(--accent); letter-spacing: 1px; width: 100%;
        }

        /* PANEL CONFIG MODAL */
        #config-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(35px); z-index: 100000; display: none; align-items: center; justify-content: center; }
        .config-card { background: rgba(255, 255, 255, 0.04); padding: 40px; border-radius: 35px; border: 1px solid var(--accent); text-align: center; width: 85%; max-width: 400px; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <button class="btn-config-fixed" onclick="document.getElementById('config-panel').style.display='flex'">
        <span style="font-size:1.5rem">⚙️</span> CONFIGURACIÓN
    </button>

    <div id="config-panel">
        <div class="config-card">
            <h2 style="font-family:'Orbitron';">CONFIGURACIÓN</h2>
            <p style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 30px;">CONFIGURACIÓN DE AURORA</p>
            <button onclick="location.reload()" style="background:rgba(255,255,255,0.1); color:white; border:none; padding:15px; width:100%; border-radius:15px; cursor:pointer; font-weight:bold;">CERRAR SESIÓN</button>
            <button style="background:transparent; color:#ff4d4d; border:1px solid #ff4d4d; padding:10px; width:100%; border-radius:15px; cursor:pointer; margin-top:15px; font-size:0.7rem;" onclick="confirm('¿Eliminar cuenta?')">ELIMINAR CUENTA</button>
            <br>
            <button style="margin-top:30px; background:none; border:none; color:var(--accent); cursor:pointer;" onclick="document.getElementById('config-panel').style.display='none'">VOLVER</button>
        </div>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h2 id="titulo-login">Bienvenido a Aurora</h2>
            
            <input type="email" placeholder="Correo electrónico" class="login-input" id="emailInput">
            <input type="password" placeholder="Contraseña" class="login-input" id="passwordInput">
            
            <button id="btn-principal" style="background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 15px; width: 100%; border-radius: 18px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; letter-spacing: 2px; margin-bottom: 15px;" onclick="authCorreo()">INGRESAR</button>
            
            <div class="form-links">
                <a onclick="recuperarContrasena()">Olvidé mi contraseña</a>
                <a onclick="toggleRegistro()" id="link-registro">Crear Cuenta</a>
            </div>
            
            <div class="separator">──────── ó ────────</div>
            
            <button style="background: #fff; color: #000; border: none; padding: 15px; border-radius: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%;" onclick="authGoogle()">
                <svg width="18" height="18" viewBox="0 0 488 512" fill="#000"><path d="M488 261.8C488 403.3 391.1 504 248 504 110.8 504 0 393.2 0 256S110.8 8 248 8c66.8 0 123 24.5 166.3 64.9l-67.5 64.9C258.5 52.6 94.3 116.6 94.3 256c0 86.5 69.1 156.6 153.7 156.6 98.2 0 135-70.4 140.8-106.9H248v-85.3h236.1c2.3 12.7 3.9 24.9 3.9 41.4z"/></svg>
                Ingresar con Google
            </button>
        </div>
    </div>

    <div id="app-container">
        <header><div class="titulo-app">AURORA</div></header>
        
        <div id="chat-window">
            <div class="msg aurora">Hola, bienvenido. Soy <b>Aurora</b>. ¿En qué puedo ayudarte hoy?</div>
        </div>

        <div class="bottom-section">
            <div class="chat-group">
                <button class="btn-a" onclick="alert('Voz activa')">A</button>
                <div class="input-bar">
                    <input type="text" id="chat-terminal" placeholder="Escribir mensaje neuronal..." autocomplete="off">
                    <button onclick="enviar()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-size:1.5rem;">➤</button>
                </div>
            </div>
            <div class="disclaimer">AURORA ES UNA IA Y PUEDE COMETER ERRORES.</div>
        </div>
    </div>

    <script>
        // 1. TU CONFIGURACIÓN EXACTA DE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo",
            authDomain: "aurora-ai-oficia.firebaseapp.com",
            projectId: "aurora-ai-oficia",
            storageBucket: "aurora-ai-oficia.firebasestorage.app",
            messagingSenderId: "426513637524",
            appId: "1:426513637524:web:13851f499aa4af13cfd481",
            measurementId: "G-XTN5WJPRPP"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // 2. VARIABLES Y FUNCIONES DE LOGIN
        let modoRegistro = false;

        // Esta función cambia la vista entre "Ingresar" y "Crear Cuenta"
        function toggleRegistro() {
            modoRegistro = !modoRegistro;
            const titulo = document.getElementById('titulo-login');
            const btnPrincipal = document.getElementById('btn-principal');
            const linkRegistro = document.getElementById('link-registro');

            if(modoRegistro) {
                titulo.innerText = "Crear Cuenta";
                btnPrincipal.innerText = "REGISTRARSE";
                linkRegistro.innerText = "Ya tengo cuenta (Ingresar)";
            } else {
                titulo.innerText = "Bienvenido a Aurora";
                btnPrincipal.innerText = "INGRESAR";
                linkRegistro.innerText = "Crear Cuenta";
            }
        }

        // Función principal del botón (Ingresa o Registra según el modo)
        function authCorreo() {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            
            if(!email || !password) {
                alert("Por favor, ingresa correo y contraseña.");
                return;
            }

            if(modoRegistro) {
                // Crear cuenta nueva
                auth.createUserWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        alert("¡Cuenta creada con éxito! Bienvenido.");
                        entrar();
                    })
                    .catch((error) => { alert("Error al registrarse: " + error.message); });
            } else {
                // Ingresar con cuenta existente
                auth.signInWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        entrar(); // Si todo sale bien, entra a la app
                    })
                    .catch((error) => { alert("Error al ingresar. Revisa tus datos."); });
            }
        }

        // Ingreso con Google
        function authGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then((result) => {
                    entrar(); // Si todo sale bien, entra a la app
                }).catch((error) => {
                    alert('Error con Google: ' + error.message);
                });
        }

        // Recuperar Contraseña
        function recuperarContrasena() {
            const email = document.getElementById('emailInput').value;
            if(!email) {
                alert("Por favor, ingresa tu correo electrónico en el casillero de arriba y luego toca 'Olvidé mi contraseña'.");
                return;
            }
            auth.sendPasswordResetEmail(email)
                .then(() => { alert("Te enviamos un correo para restablecer tu contraseña. ¡Revisa tu bandeja de entrada!"); })
                .catch((error) => { alert("Error: " + error.message); });
        }

        // 3. FUNCIONES DE TU APP (Intactas)
        document.getElementById('chat-terminal').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { enviar(); }
        });

        function entrar() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            document.getElementById('bg-video').play(); 
        }

        async function enviar() {
            const input = document.getElementById('chat-terminal');
            const val = input.value.trim(); if(!val) return;
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg user">${val}</div>`;
            input.value = ""; win.scrollTop = win.scrollHeight;
            try {
                // AQUÍ ESTÁ EL ÚNICO CAMBIO: LA CONEXIÓN AL SERVIDOR DE RENDER
                const res = await fetch('https://aurora-ai-mendoza.onrender.com/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg:val}) });
                const data = await res.json();
                win.innerHTML += `<div class="msg aurora">${data.respuesta}</div>`;
                win.scrollTop = win.scrollHeight;
            } catch(e) { 
                win.innerHTML += `<div class="msg aurora">Error de conexión neuronal...</div>`;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #00f2ff; --danger: #ff4d4d; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            overflow: hidden; background-color: #000;
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; 
            overscroll-behavior-y: none; 
        }

        #bg-video { position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; object-fit: cover !important; pointer-events: none; }
        
        #panels-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100000; display: none; backdrop-filter: blur(5px); }

        /* PANELES LATERALES SIMÉTRICOS */
        .panel-side {
            position: fixed; top: 0; width: 280px; height: 100%;
            background: rgba(0, 10, 20, 0.75); backdrop-filter: blur(25px);
            z-index: 100001; transition: 0.3s ease;
            display: flex; flex-direction: column; padding: 25px; 
            padding-top: calc(env(safe-area-inset-top, 40px) + 20px); box-sizing: border-box;
        }
        #sidebar-menu { left: 0; transform: translateX(-100%); border-right: 1px solid rgba(0, 242, 255, 0.2); }
        #profile-panel { right: 0; transform: translateX(100%); border-left: 1px solid rgba(0, 242, 255, 0.2); }
        .panel-open { transform: translateX(0) !important; }

        /* ✨ MENÚ DE CONTEXTO (LONG PRESS) */
        #context-menu {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            width: 240px; background: rgba(0, 20, 30, 0.9); backdrop-filter: blur(30px);
            border: 1px solid var(--accent); border-radius: 25px; padding: 15px;
            z-index: 100006; display: none; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }
        .context-btn {
            width: 100%; padding: 12px; border-radius: 12px; margin-bottom: 8px;
            background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1);
            font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .context-btn:last-child { margin-bottom: 0; }

        .chat-item { 
            background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1); font-size: 0.85rem; margin-bottom: 10px; 
            user-select: none; -webkit-user-select: none; /* Prevenir selección al mantener */
        }
        .chat-item.pinned { border-left: 4px solid var(--accent); }
        .chat-item.active { background: rgba(0, 242, 255, 0.1); border-color: var(--accent); }

        /* HEADER Y INPUT (REGLA DE ORO) */
        header { padding: calc(env(safe-area-inset-top, 40px) + 15px) 20px 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .titulo-app { font-family: 'Orbitron'; letter-spacing: 15px; font-size: 1.8rem; text-shadow: 0 0 15px var(--accent); margin: 0; }
        #user-avatar { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; display: none; cursor: pointer; }

        .bottom-section { padding: 10px 20px 30px 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .input-bar { flex: 1; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(0, 242, 255, 0.4); border-radius: 40px; display: flex; align-items: center; padding: 5px 22px; backdrop-filter: blur(20px); }

        /* LOGIN ORIGINAL (REGLA DE ORO) */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 10, 20, 0.4); backdrop-filter: blur(15px); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 40px; border: 1px solid rgba(0, 242, 255, 0.2); text-align: center; max-width: 380px; width: 90%; }
        .login-input { width: 100%; box-sizing: border-box; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(0, 242, 255, 0.3); color: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; outline: none; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="panels-overlay" onclick="cerrarPaneles()"></div>

    <div id="context-menu">
        <button class="context-btn" onclick="fijarChatActual()">📍 FIJAR ENLACE</button>
        <button class="context-btn" onclick="renombrarChatActual()">✎ RENOMBRAR</button>
        <button class="context-btn" onclick="compartirChatActual()">📤 COMPARTIR</button>
        <button class="context-btn" style="color:var(--danger); margin-top:10px;" onclick="cerrarPaneles()">VOLVER</button>
    </div>

    <div id="sidebar-menu" class="panel-side">
        <h3 style="font-family:'Orbitron'; font-size:0.9rem; color:var(--accent); letter-spacing:3px; margin-bottom:25px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px;">MIS ENLACES</h3>
        <div id="history-list" style="flex:1; overflow-y:auto;"></div>
        <button style="background:rgba(0,242,255,0.1); border:1px dashed var(--accent); color:var(--accent); width:100%; padding:12px; border-radius:12px; font-family:'Orbitron'; font-size:0.7rem; cursor:pointer;" onclick="nuevoEnlace()">+ NUEVO ENLACE</button>
    </div>

    <div id="profile-panel" class="panel-side">
        <h3 style="font-family:'Orbitron'; font-size:0.9rem; color:var(--accent); letter-spacing:3px; margin-bottom:25px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px;">MI CUENTA</h3>
        <button class="btn-account" style="border-color:var(--accent); color:var(--accent);" onclick="cambiarCuenta()">CAMBIAR CUENTA</button>
        <button class="btn-account" onclick="cerrarSesionReal()">CERRAR SESIÓN</button>
        <button class="btn-account" style="margin-top:auto; color:var(--danger); border-color:var(--danger);" onclick="eliminarCuenta()">ELIMINAR CUENTA</button>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="font-family:'Orbitron'; line-height:1.4;">BIENVENIDO A AURORA<br><span style="font-size:0.8rem; font-family:'Plus Jakarta Sans'; color:rgba(255,255,255,0.7);">¿CÓMO DESEA REGISTRARSE?</span></h2>
            <input type="email" placeholder="Email" class="login-input" id="emailInput">
            <input type="password" placeholder="Contraseña" class="login-input" id="passwordInput">
            <button style="background:transparent; border:2px solid var(--accent); color:var(--accent); padding:15px; width:100%; border-radius:18px; font-weight:bold; font-family:'Orbitron';" onclick="authCorreo()">INGRESAR</button>
            <div style="margin: 15px 0; color:rgba(255,255,255,0.4); font-size:0.8rem;">──────── ó ────────</div>
            <button style="background:#fff; color:#000; border:none; padding:15px; border-radius:18px; font-weight:bold; cursor:pointer; width:100%;" onclick="authGoogle()">Ingresar con Google</button>
        </div>
    </div>

    <div id="app-container">
        <header>
            <button style="background:transparent; border:none; color:#fff; font-size:2rem;" onclick="abrirSidebar()">☰</button>
            <div class="titulo-app">AURORA</div>
            <img id="user-avatar" src="" alt="Perfil" onclick="abrirPerfil()">
        </header>

        <div id="chat-window" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:20px;">
            <div class="msg aurora">Bienvenido al núcleo de <b>Aurora</b>. Tu enlace neuronal está activo.</div>
        </div>

        <div class="bottom-section">
            <div class="chat-group">
                <button class="btn-a">A</button>
                <div class="input-bar">
                    <input type="text" id="chat-terminal" placeholder="Mensaje neuronal..." autocomplete="off">
                    <button onclick="enviar()" style="background:none; border:none; color:var(--accent); font-size:1.5rem;">➤</button>
                </div>
            </div>
            <div class="disclaimer" style="text-align:center; font-size:0.6rem; color:rgba(255,255,255,0.4);">AURORA ES UNA IA Y PUEDE COMETER ERRORES.</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo",
            authDomain: "aurora-ai-oficia.firebaseapp.com",
            projectId: "aurora-ai-oficia",
            storageBucket: "aurora-ai-oficia.firebasestorage.app",
            messagingSenderId: "426513637524",
            appId: "1:426513637524:web:13851f499aa4af13cfd481",
            measurementId: "G-XTN5WJPRPP"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        let chats = [{ id: 1, nombre: "Enlace Neuronal 1", pinned: false }];
        let chatSeleccionado = 1;
        let timerLongPress;

        // ✨ LÓGICA LONG PRESS
        function bindLongPress() {
            const items = document.querySelectorAll('.chat-item');
            items.forEach(item => {
                item.addEventListener('touchstart', (e) => {
                    timerLongPress = setTimeout(() => {
                        chatSeleccionado = parseInt(item.getAttribute('data-id'));
                        abrirContextMenu();
                    }, 800); // 800ms para disparar
                });
                item.addEventListener('touchend', () => clearTimeout(timerLongPress));
                item.addEventListener('touchmove', () => clearTimeout(timerLongPress));
            });
        }

        function abrirContextMenu() {
            document.getElementById('context-menu').style.display = 'block';
            document.getElementById('panels-overlay').style.display = 'block';
        }

        function abrirSidebar() { document.getElementById('sidebar-menu').classList.add('panel-open'); document.getElementById('panels-overlay').style.display = 'block'; }
        function abrirPerfil() { document.getElementById('profile-panel').classList.add('panel-open'); document.getElementById('panels-overlay').style.display = 'block'; }
        function cerrarPaneles() { 
            document.getElementById('sidebar-menu').classList.remove('panel-open'); 
            document.getElementById('profile-panel').classList.remove('panel-open'); 
            document.getElementById('context-menu').style.display = 'none';
            document.getElementById('panels-overlay').style.display = 'none'; 
        }

        function actualizarUI() {
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            chats.sort((a,b) => b.pinned - a.pinned).forEach(c => {
                list.innerHTML += `<div class="chat-item ${c.pinned ? 'pinned' : ''}" data-id="${c.id}">${c.nombre} ${c.pinned ? '📌' : ''}</div>`;
            });
            bindLongPress();
        }

        function renombrarChatActual() {
            const nuevo = prompt("Nuevo nombre:");
            if(nuevo) { chats.find(c => c.id === chatSeleccionado).nombre = nuevo; actualizarUI(); cerrarPaneles(); }
        }
        function fijarChatActual() {
            const c = chats.find(c => c.id === chatSeleccionado);
            c.pinned = !c.pinned; actualizarUI(); cerrarPaneles();
        }
        function compartirChatActual() {
            if (navigator.share) { navigator.share({ title: 'Aurora AI', text: 'Conversación guardada.' }); }
            cerrarPaneles();
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                if (user.photoURL) { document.getElementById('user-avatar').src = user.photoURL; document.getElementById('user-avatar').style.display = 'block'; }
                actualizarUI();
            } else { document.getElementById('login-overlay').style.display = 'flex'; }
        });

        function authGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function cerrarSesionReal() { auth.signOut().then(() => location.reload()); }
        function cambiarCuenta() { auth.signOut().then(() => authGoogle()); }

        async function enviar() {
            const input = document.getElementById('chat-terminal');
            if(!input.value.trim()) return;
            document.getElementById('chat-window').innerHTML += `<div class="msg user">${input.value}</div>`;
            input.value = ""; 
        }
    </script>
</body>
</html>

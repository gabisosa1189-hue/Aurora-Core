<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">
   
    <style>
        :root { --accent: #00f2ff; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; background-color: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; }
        
        /* VIDEO DE FONDO CORREGIDO */
        #bg-video { 
            position: fixed !important; 
            top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            object-fit: cover !important; 
            z-index: -1; 
        }

        /* BOTÓN CONFIGURACIÓN (rueda a la izquierda) */
        .btn-config-final {
            position: fixed;
            bottom: calc(42px + env(safe-area-inset-bottom));
            left: 18px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(0,242,255,0.5);
            color: var(--accent);
            width: 58px; height: 58px;
            border-radius: 50%;
            font-size: 1.85rem;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(20px);
            z-index: 1000;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0,242,255,0.3);
        }

        /* SIDEBAR */
        #sidebar {
            position: fixed; top: 0; left: -280px; width: 260px; height: 100%;
            background: rgba(0,0,0,0.92); backdrop-filter: blur(40px);
            border-right: 1px solid rgba(0,242,255,0.3);
            z-index: 100000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1);
            padding: 40px 20px; display: flex; flex-direction: column; gap: 15px;
        }
        #sidebar.open { left: 0; }
        #sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.65); z-index: 99999;
            display: none; opacity: 0; transition: 0.3s;
        }
        #sidebar-overlay.active { display: block; opacity: 1; }

        .menu-btn { 
            background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); 
            padding: 16px; border-radius: 15px; text-align: left; cursor: pointer; font-size: 1rem;
        }
        .menu-btn.danger { background: rgba(255,50,50,0.2); color: #ff6666; font-weight: bold; }

        #app-container { display: none; flex-direction: column; height: 100vh; max-width: 600px; margin: 0 auto; position: relative; z-index: 10; }
        header { padding: 45px 15px 15px 15px; text-align: center; }
        .titulo-app { font-family: 'Orbitron', sans-serif; letter-spacing: 12px; font-size: 1.5rem; text-shadow: 0 0 20px var(--accent); }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 15px 20px; border-radius: 22px; backdrop-filter: blur(15px); }
        .aurora { align-self: flex-start; background: rgba(0,242,255,0.08); border: 1px solid rgba(0,242,255,0.2); }
        .user { align-self: flex-end; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }

        .input-area { padding: 10px 15px calc(30px + env(safe-area-inset-bottom)) 15px; }
        .input-container {
            margin-left: 75px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(0,242,255,0.3);
            border-radius: 35px; display: flex; align-items: center; padding: 5px 15px; backdrop-filter: blur(20px);
        }
        #chat-terminal { flex: 1; background: transparent; border: none; color: white; padding: 12px 5px; outline: none; font-size: 1rem; }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar">
        <button onclick="toggleSidebar()" style="background:none;border:none;color:white;font-size:1.9rem;align-self:flex-end;cursor:pointer;">✖</button>
        <h2 style="font-family:'Orbitron';color:var(--accent);letter-spacing:2px;">⚙️ AJUSTES</h2>
        <button class="menu-btn" onclick="alert('Aurora v7.6\nCreada por Gabriel Sosa Scriboni\nSan Martín, Mendoza')">🧠 Sistema Aurora</button>
        <button class="menu-btn" onclick="cerrarSesionApp()">🚪 Cerrar Sesión</button>
        <button class="menu-btn danger" onclick="eliminarCuentaApp()">⚠️ ELIMINAR CUENTA</button>
    </div>

    <div id="app-container">
        <header><div class="titulo-app">AURORA</div></header>
        <div id="chat-window"><div class="msg aurora" id="saludo-ia">Estableciendo enlace neuronal...</div></div>
        
        <div class="input-area">
            <button class="btn-config-final" onclick="toggleSidebar()">⚙️</button>
            <div class="input-container">
                <input type="text" id="chat-terminal" placeholder="Escribe a Aurora..." readonly>
                <button onclick="enviar()" style="background:none;border:none;color:var(--accent);font-size:1.7rem;cursor:pointer;">➤</button>
            </div>
            <p style="font-size:0.65rem;color:rgba(255,255,255,0.35);text-align:center;margin-top:12px;letter-spacing:1px;">
                AURORA ES UNA IA Y PUEDE COMETER ERRORES.
            </p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo", authDomain: "aurora-ai-oficia.firebaseapp.com", projectId: "aurora-ai-oficia", storageBucket: "aurora-ai-oficia.firebasestorage.app", messagingSenderId: "426513637524", appId: "1:426513637524:web:13851f499aa4af13cfd481" };
        firebase.initializeApp(firebaseConfig);

        // VOZ SUAVE Y LINDA (la que más te gustó)
        function hablar(t) {
            if (!t || !('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            const voices = window.speechSynthesis.getVoices();
            let voz = voices.find(v => (v.lang.includes('es') || v.lang.includes('AR')) && 
                (v.name.toLowerCase().includes('lucia') || v.name.toLowerCase().includes('paulina') || 
                 v.name.toLowerCase().includes('camila') || v.name.toLowerCase().includes('sofia')));
            if (!voz) voz = voices.find(v => v.lang.includes('es') && !v.name.toLowerCase().includes('male'));
            if (voz) u.voice = voz;
            u.lang = 'es-AR';
            u.pitch = 1.48;
            u.rate = 0.96;
            u.volume = 0.94;
            window.speechSynthesis.speak(u);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('active');
        }

        function cerrarSesionApp() {
            if(confirm("¿Cerrar sesión?")) firebase.auth().signOut().then(() => location.reload());
        }

        function eliminarCuentaApp() {
            if(confirm("¿Eliminar cuenta permanentemente? Esta acción no se puede deshacer.")) {
                const user = firebase.auth().currentUser;
                if(user) user.delete().then(() => location.reload());
            }
        }

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('app-container').style.display = 'flex';
                const nombre = user.displayName ? user.displayName.split(' ')[0] : "Gabriel";
                document.getElementById('saludo-ia').innerText = `Hola ${nombre}, ¿en qué te ayudo hoy?`;
                document.getElementById('chat-terminal').removeAttribute('readonly');
            }
        });

        async function enviar() {
            const inp = document.getElementById('chat-terminal');
            const msg = inp.value.trim();
            if (!msg) return;
            // Aquí va tu fetch('/chat')...
            inp.value = '';
        }

        document.getElementById('chat-terminal').addEventListener('keypress', e => {
            if (e.key === 'Enter') enviar();
        });
    </script>
</body>
</html>

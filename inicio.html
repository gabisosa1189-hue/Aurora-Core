<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURORA - Sistema Neuronal</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00f2ff; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; background-image: url('poster.jpg'); background-size: cover; background-position: center; background-color: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; }
        #bg-video { position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover !important; z-index: 1; opacity: 0; transition: opacity 2s ease; }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(25px); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: all 0.6s ease; }
        .login-card { background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 40px; border: 1px solid rgba(0, 242, 255, 0.25); text-align: center; max-width: 380px; width: 85%; box-shadow: 0 0 60px rgba(0, 242, 255, 0.15); }

        #app-container { display: none; flex-direction: column; height: 100vh; max-width: 600px; margin: 0 auto; position: relative; z-index: 10; opacity: 0; transition: 1s; }
        header { padding: 30px 15px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); position: relative; }
        .titulo { font-family: 'Orbitron', sans-serif; letter-spacing: 12px; font-size: 1.5rem; text-shadow: 0 0 15px var(--accent); }
        .btn-logout { position: absolute; right: 20px; top: 35px; background: none; border: none; color: rgba(255,255,255,0.4); font-size: 0.7rem; cursor: pointer; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 15px 20px; border-radius: 20px; backdrop-filter: blur(15px); animation: slide 0.3s ease; }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.3); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); }

        .input-area { padding: 25px 20px; }
        .input-container { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(0, 242, 255, 0.4); border-radius: 35px; display: flex; align-items: center; padding: 5px 20px; backdrop-filter: blur(20px); }
        
        /* Input estilo terminal - Sin ID de 'email' para que el navegador no se confunda */
        #aurora-core-terminal { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 1rem; }

        @keyframes slide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline preload="auto" poster="poster.jpg" id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="login-overlay">
        <div class="login-card">
            <h1 style="font-family:'Orbitron'; letter-spacing:5px;">AURORA</h1>
            <div id="main-auth">
                <button onclick="loginGoogle()" style="width:100%; padding:16px; border-radius:18px; border:none; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; background:#fff; color:#000;">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Continuar con Google
                </button>
                <button onclick="mostrarFormulario()" style="width:100%; margin-top:15px; padding:16px; border-radius:18px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:#fff; cursor:pointer;">📧 Por Correo</button>
            </div>
            <div id="email-form" style="display:none; flex-direction:column; gap:12px; margin-top:20px;">
                <input type="email" id="email-input" style="background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); padding:15px; border-radius:15px; color:#fff;" placeholder="Email">
                <input type="password" id="pass-input" style="background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); padding:15px; border-radius:15px; color:#fff;" placeholder="Contraseña">
                <button onclick="ejecutarAuth()" style="background:var(--accent); color:#000; padding:16px; border-radius:15px; border:none; font-weight:600; cursor:pointer;">Ingresar</button>
                <p onclick="volverInicio()" style="color:rgba(255,255,255,0.5); font-size:0.8rem; cursor:pointer; margin-top:10px;">← Volver</p>
            </div>
        </div>
    </div>

    <div id="app-container">
        <input type="text" style="display:none" aria-hidden="true">
        <input type="password" style="display:none" aria-hidden="true">

        <header>
            <div class="titulo">AURORA</div>
            <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
        </header>
        <div id="chat-window">
            <div class="msg aurora" id="saludo-ia">Estableciendo conexión...</div>
        </div>
        <div class="input-area">
            <div class="input-container">
                <button style="background:none; border:none; color:var(--accent); font-size:1.2rem;">🎤</button>
                <input type="search" id="aurora-core-terminal" name="aurora_cmd_$(new Date().getTime())" placeholder="Pregúntale a Aurora..." autocomplete="off" spellcheck="false">
                <button onclick="enviar()" style="background:none; border:none; color:var(--accent); font-size:1.6rem; cursor:pointer;">➤</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo",
            authDomain: "aurora-ai-oficia.firebaseapp.com",
            projectId: "aurora-ai-oficia",
            storageBucket: "aurora-ai-oficia.firebasestorage.app",
            messagingSenderId: "426513637524",
            appId: "1:426513637524:web:13851f499aa4af13cfd481"
        };
        firebase.initializeApp(firebaseConfig);

        const bgVideo = document.getElementById('bg-video');
        bgVideo.onplay = () => { bgVideo.style.opacity = "1"; };

        // 🚨 FUNCIÓN DE VOZ MEJORADA (BUSCA VOZ FEMENINA)
        function hablar(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'es-AR';
            
            // Intentar buscar una voz femenina del sistema
            const voices = window.speechSynthesis.getVoices();
            const femaleVoice = voices.find(v => (v.name.includes('Google') || v.name.includes('Female') || v.name.includes('Helena')) && v.lang.includes('es'));
            
            if (femaleVoice) u.voice = femaleVoice;
            u.pitch = 1.4; // Tono un poco más alto para sonar menos "hombre"
            u.rate = 1.0;
            window.speechSynthesis.speak(u);
        }

        function limpiarTerminal() {
            setTimeout(() => {
                const terminal = document.getElementById('aurora-core-terminal');
                if(terminal) terminal.value = '';
            }, 100);
            setTimeout(() => {
                const terminal = document.getElementById('aurora-core-terminal');
                if(terminal) terminal.value = '';
            }, 500);
        }

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                limpiarTerminal();
                document.getElementById('login-overlay').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('login-overlay').style.display = "none";
                    document.getElementById('app-container').style.display = "flex";
                    setTimeout(() => {
                        document.getElementById('app-container').style.opacity = "1";
                        const m = "Bienvenido, Gabriel. Núcleo neuronal de Aurora activo. Estoy lista.";
                        document.getElementById('saludo-ia').innerText = m;
                        hablar(m);
                        limpiarTerminal();
                    }, 50);
                }, 600);
            }
        });

        async function enviar() {
            const inp = document.getElementById('aurora-core-terminal');
            const msg = inp.value.trim(); 
            if(!msg || msg.includes('@')) { inp.value = ''; return; }
            
            addMsg(msg, 'user'); inp.value = '';
            try {
                const res = await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg}) });
                const data = await res.json();
                addMsg(data.respuesta, 'aurora');
                hablar(data.respuesta);
            } catch(e) { addMsg("Error de conexión.", 'aurora'); }
        }

        function addMsg(t, cl) {
            const d = document.createElement('div'); d.className = `msg ${cl}`; d.innerText = t;
            const win = document.getElementById('chat-window'); win.appendChild(d);
            win.scrollTo({ top: win.scrollHeight, behavior: 'smooth' });
        }

        function cerrarSesion() { firebase.auth().signOut().then(() => location.reload()); }
        function mostrarFormulario() { document.getElementById('main-auth').style.display='none'; document.getElementById('email-form').style.display='flex'; }
        function volverInicio() { document.getElementById('main-auth').style.display='flex'; document.getElementById('email-form').style.display='none'; }
        
        document.getElementById('aurora-core-terminal').addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });
        // Precargar voces para que funcionen de entrada
        window.speechSynthesis.getVoices();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURORA - Sistema Neuronal</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00f2ff; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; }
        
        #bg-video { position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover !important; z-index: 1; }

        /* PANTALLA DE LOGIN PROFESIONAL */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(25px); /* Desenfoque profundo */
            z-index: 9999; display: flex; align-items: center; justify-content: center;
            transition: all 0.8s ease-in-out;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03); padding: 50px 30px; border-radius: 40px;
            border: 1px solid rgba(0, 242, 255, 0.25); text-align: center;
            max-width: 420px; width: 85%; box-shadow: 0 0 60px rgba(0, 242, 255, 0.15);
        }

        .titulo-login { font-family: 'Orbitron', sans-serif; letter-spacing: 6px; font-size: 1.3rem; margin-bottom: 10px; color: #fff; }
        .subtitulo-login { font-weight: 300; font-size: 0.95rem; margin-bottom: 40px; color: rgba(255, 255, 255, 0.6); line-height: 1.6; }

        .auth-container { display: flex; flex-direction: column; gap: 15px; }

        /* Botón de Google Estilizado */
        .btn-auth {
            width: 100%; padding: 16px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 500; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-size: 1rem;
        }

        .btn-google { background: #fff; color: #000; }
        .btn-google:hover { background: #f0f0f0; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2); }

        /* Botón de Email/Contraseña (Habilitado en Firebase) */
        .btn-email { background: rgba(0, 242, 255, 0.1); border: 1px solid rgba(0, 242, 255, 0.4); color: #fff; }
        .btn-email:hover { background: rgba(0, 242, 255, 0.2); transform: translateY(-2px); border-color: var(--accent); }

        /* Interfaz Oculta */
        #app-container { display: none; flex-direction: column; height: 100%; max-width: 600px; margin: 0 auto; position: relative; z-index: 10; opacity: 0; transition: 1.2s; }
        header { padding: 30px 15px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .titulo-app { font-family: 'Orbitron', sans-serif; letter-spacing: 15px; font-size: 1.5rem; text-shadow: 0 0 20px rgba(0, 242, 255, 0.5); }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; scrollbar-width: none; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video"><source src="fondo.mp4" type="video/mp4"></video>

    <div id="login-overlay">
        <div class="login-card">
            <h1 class="titulo-login">BIENVENIDO A AURORA</h1>
            <p class="subtitulo-login">Seleccione un método de acceso para iniciar el sistema neuronal.</p>
            
            <div class="auth-container">
                <button onclick="loginGoogle()" class="btn-auth btn-google">
                    <svg width="18" height="18" viewBox="0 0 18 18">
                        <path d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84c-.21 1.12-.84 2.07-1.79 2.7l2.85 2.22c1.67-1.53 2.63-3.8 2.63-6.55z" fill="#4285F4"/>
                        <path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.85-2.22c-.79.53-1.8.85-3.11.85-2.39 0-4.41-1.61-5.14-3.78H.9v2.33C2.38 15.94 5.47 18 9 18z" fill="#34A853"/>
                        <path d="M3.86 10.67c-.19-.56-.3-1.16-.3-1.77s.11-1.21.3-1.77V4.8H.9A8.98 8.98 0 0 0 0 9c0 1.45.35 2.82.9 4.05l2.96-2.38z" fill="#FBBC05"/>
                        <path d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.47.89 11.43 0 9 0 5.47 0 2.38 2.06.9 5.07L3.86 7.4c.73-2.17 2.75-3.82 5.14-3.82z" fill="#EA4335"/>
                    </svg>
                    Ingresar con Google
                </button>

                <button onclick="loginEmail()" class="btn-auth btn-email">
                    <span>📧</span>
                    Correo y Contraseña
                </button>
            </div>
        </div>
    </div>

    <div id="app-container">
        <header><div class="titulo-app">AURORA</div></header>
        <div id="chat-window"><div id="saludo-ia" style="padding: 20px; text-align: center; color: rgba(255,255,255,0.6);">Sincronizando...</div></div>
        </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo",
            authDomain: "aurora-ai-oficia.firebaseapp.com",
            projectId: "aurora-ai-oficia",
            storageBucket: "aurora-ai-oficia.firebasestorage.app",
            messagingSenderId: "426513637524",
            appId: "1:426513637524:web:13851f499aa4af13cfd481"
        };
        firebase.initializeApp(firebaseConfig);

        function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).catch(e => alert("Error Google: " + e.message));
        }

        function loginEmail() {
            const email = prompt("Ingrese su correo:");
            const pass = prompt("Ingrese su contraseña:");
            if(email && pass) {
                firebase.auth().signInWithEmailAndPassword(email, pass).catch(e => alert("Error Email: " + e.message));
            }
        }

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('login-overlay').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('login-overlay').style.display = "none";
                    document.getElementById('app-container').style.display = "flex";
                    setTimeout(() => document.getElementById('app-container').style.opacity = "1", 50);
                    document.getElementById('saludo-ia').innerText = "Bienvenido Gabriel. Acceso concedido.";
                }, 800);
            }
        });
    </script>
</body>
</html>

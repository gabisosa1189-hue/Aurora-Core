<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURORA - Acceso</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00f2ff; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; }
        
        #bg-video { position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover !important; z-index: 1; }

        /* PANTALLA DE LOGIN DE CRISTAL */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
            transition: all 0.8s ease-in-out;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05); padding: 40px 25px; border-radius: 35px;
            border: 1px solid rgba(0, 242, 255, 0.3); text-align: center;
            max-width: 400px; width: 88%; box-shadow: 0 0 50px rgba(0, 242, 255, 0.2);
        }

        .titulo-login { font-family: 'Orbitron', sans-serif; letter-spacing: 4px; font-size: 1.2rem; margin-bottom: 8px; color: #fff; text-transform: uppercase; }
        .subtitulo-login { font-weight: 300; font-size: 1rem; margin-bottom: 35px; color: rgba(255, 255, 255, 0.7); }

        /* Botones Base */
        .btn-auth {
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 18px; border: none;
            font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: 0.3s ease; font-size: 1rem;
        }

        /* Botón de Google */
        .btn-google { background: #ffffff; color: #000; }
        .btn-google:hover { background: #f1f1f1; transform: scale(1.02); }

        /* Botón de Email (Estilo Cristal) */
        .btn-email { 
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            color: #fff; 
        }
        .btn-email:hover { 
            background: rgba(0, 242, 255, 0.2); 
            border-color: var(--accent); 
            transform: scale(1.02);
        }

        /* Resto de la interfaz (oculta al inicio) */
        #app-container { display: none; flex-direction: column; height: 100%; max-width: 600px; margin: 0 auto; position: relative; z-index: 10; opacity: 0; transition: 1s; }
        header { padding: 25px 15px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .titulo { font-family: 'Orbitron', sans-serif; letter-spacing: 12px; font-size: 1.4rem; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 14px 20px; border-radius: 20px; backdrop-filter: blur(10px); animation: slide 0.3s ease; }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.3); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); }
        .input-area { padding: 20px; }
        .input-container { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 30px; display: flex; align-items: center; padding: 5px 20px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; }

        @keyframes slide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video"><source src="fondo.mp4" type="video/mp4"></video>

    <div id="login-overlay">
        <div class="login-card">
            <h1 class="titulo-login">BIENVENIDO A AURORA</h1>
            <p class="subtitulo-login">¿Cómo desea ingresar?</p>
            
            <button onclick="loginGoogle()" class="btn-auth btn-google">
                <svg width="20" height="20" viewBox="0 0 18 18">
                    <path d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84c-.21 1.12-.84 2.07-1.79 2.7l2.85 2.22c1.67-1.53 2.63-3.8 2.63-6.55z" fill="#4285F4"/>
                    <path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.85-2.22c-.79.53-1.8.85-3.11.85-2.39 0-4.41-1.61-5.14-3.78H.9v2.33C2.38 15.94 5.47 18 9 18z" fill="#34A853"/>
                    <path d="M3.86 10.67c-.19-.56-.3-1.16-.3-1.77s.11-1.21.3-1.77V4.8H.9A8.98 8.98 0 0 0 0 9c0 1.45.35 2.82.9 4.05l2.96-2.38z" fill="#FBBC05"/>
                    <path d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.47.89 11.43 0 9 0 5.47 0 2.38 2.06.9 5.07L3.86 7.4c.73-2.17 2.75-3.82 5.14-3.82z" fill="#EA4335"/>
                </svg>
                Continuar con Google
            </button>

            <button onclick="loginEmail()" class="btn-auth btn-email">
                <span>📧</span>
                Correo electrónico
            </button>
        </div>
    </div>

    <div id="app-container">
        <header><div class="titulo">AURORA</div></header>
        <div id="chat-window"><div class="msg aurora" id="saludo-ia">Estableciendo conexión...</div></div>
        <div class="input-area">
            <div class="input-container">
                <button style="background:none; border:none; color:var(--accent); font-size:1.2rem;">🎤</button>
                <input type="text" id="user-input" placeholder="Pregúntale a Aurora..." autocomplete="off">
                <button onclick="enviar()" style="background:none; border:none; color:var(--accent); font-size:1.6rem; cursor:pointer;">➤</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo",
            authDomain: "aurora-ai-oficia.firebaseapp.com",
            projectId: "aurora-ai-oficia",
            storageBucket: "aurora-ai-oficia.firebasestorage.app",
            messagingSenderId: "426513637524",
            appId: "1:426513637524:web:13851f499aa4af13cfd481",
            measurementId: "G-XTN5WJPRPP"
        };
        firebase.initializeApp(firebaseConfig);

        function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).catch(e => alert(e.message));
        }

        function loginEmail() {
            const email = prompt("Ingrese su correo:");
            const pass = prompt("Ingrese su contraseña:");
            if(email && pass) {
                firebase.auth().signInWithEmailAndPassword(email, pass).catch(e => alert("Error: " + e.message));
            }
        }

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('login-overlay').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('login-overlay').style.display = "none";
                    document.getElementById('app-container').style.display = "flex";
                    setTimeout(() => document.getElementById('app-container').style.opacity = "1", 50);
                    if(!window.saludoOk) {
                        window.saludoOk = true;
                        document.getElementById('saludo-ia').innerText = "Bienvenido Gabriel. Acceso concedido a Aurora.";
                        hablar("Bienvenido Gabriel. Acceso concedido a Aurora.");
                    }
                }, 800);
            }
        });

        const chatWin = document.getElementById('chat-window');
        const input = document.getElementById('user-input');

        function hablar(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t); u.lang='es-AR'; u.pitch=1.6;
            window.speechSynthesis.speak(u);
        }

        async function enviar() {
            const msg = input.value.trim(); if(!msg) return;
            addMsg(msg, 'user'); input.value = '';
            const res = await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg}) });
            const data = await res.json(); addMsg(data.respuesta, 'aurora'); hablar(data.respuesta);
        }

        function addMsg(t, cl) {
            const d = document.createElement('div'); d.className = `msg ${cl}`; d.innerText = t;
            chatWin.appendChild(d); chatWin.scrollTo(0, chatWin.scrollHeight);
        }
        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });
    </script>
</body>
</html>

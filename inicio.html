<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00f2ff; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; background-color: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; }
        
        /* 🎥 FONDO BLINDADO (No se mueve) */
        #bg-video { 
            position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; 
            object-fit: cover !important; z-index: -1; opacity: 1; 
        }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(25px); z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255, 255, 255, 0.03); padding: 40px 25px; border-radius: 40px; border: 1px solid rgba(0, 242, 255, 0.3); text-align: center; max-width: 380px; width: 90%; }
        .titulo-login { font-family: 'Orbitron', sans-serif; letter-spacing: 5px; font-size: 1.2rem; margin-bottom: 30px; }
        .btn-auth { width: 100%; padding: 16px; border-radius: 20px; border: none; font-weight: 600; cursor: pointer; font-size: 1rem; margin-bottom: 15px; transition: 0.3s; }
        .btn-google { background: #fff; color: #000; }
        
        /* ⚙️ SIDEBAR AJUSTADO A LA INTERFAZ */
        #sidebar {
            position: fixed; top: 0; left: -255px; width: 245px; height: 100%;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(40px);
            border-right: 1px solid rgba(0,242,255,0.2);
            z-index: 100000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1);
            padding: 50px 20px 80px 20px; /* Padding abajo para que se vea el botón rojo */
            display: flex; flex-direction: column; gap: 15px;
        }
        #sidebar.open { left: 0; }
        .menu-btn { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 15px; text-align: left; font-size: 0.9rem; cursor: pointer; transition: 0.3s; }
        .menu-btn.danger { background: rgba(255, 50, 50, 0.15); border-color: rgba(255,50,50,0.4); color: #ff4d4d; margin-top: auto; font-weight: bold; }

        #sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); z-index: 99999;
            display: none; opacity: 0; transition: 0.3s;
        }
        #sidebar-overlay.active { display: block; opacity: 1; }

        #app-container { display: none; flex-direction: column; height: 100vh; width: 100%; max-width: 600px; margin: 0 auto; position: relative; z-index: 10; }
        
        header { padding: 35px 15px 15px 15px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .titulo-app { font-family: 'Orbitron', sans-serif; letter-spacing: 12px; font-size: 1.4rem; text-shadow: 0 0 20px var(--accent); }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 14px 18px; border-radius: 22px; backdrop-filter: blur(15px); line-height: 1.4; font-size: 0.95rem; }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.08); border: 1px solid rgba(0, 242, 255, 0.2); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* ⚙️ BARRA INFERIOR (Transparencia Total) */
        .input-area { 
            position: relative;
            padding: 10px 15px calc(15px + env(safe-area-inset-bottom)) 15px; 
            background: transparent;
        }

        /* ⚙️ LA TUERCA CLAVADA A LA IZQUIERDA (Lejos del chat) */
        .btn-config-final {
            position: fixed;
            bottom: calc(28px + env(safe-area-inset-bottom));
            left: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.4);
            color: var(--accent);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.6rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(20px);
            z-index: 1000;
            box-shadow: 0 0 15px rgba(0,242,255,0.2);
        }

        .input-container { 
            margin-left: 65px; /* Espacio para que la tuerca no la pise */
            background: rgba(255, 255, 255, 0.04); 
            border: 1px solid rgba(0, 242, 255, 0.3); 
            border-radius: 35px; 
            display: flex; 
            align-items: center; 
            padding: 5px 15px; 
            backdrop-filter: blur(25px);
        }
        
        .btn-voice { 
            background: transparent; color: #fff; border: none; font-family: 'Orbitron', sans-serif; font-size: 1.4rem; 
            text-shadow: 0 0 15px var(--accent); margin-right: 12px; cursor: pointer;
        }
        
        #chat-terminal { flex: 1; background: transparent; border: none; color: white; padding: 12px 5px; outline: none; font-size: 1rem; width: 100%; }

        /* VOZ OVERLAY */
        #voice-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); backdrop-filter: blur(20px);
            z-index: 200000; display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .a-gigante {
            font-family: 'Orbitron', sans-serif; font-size: 4.5rem; color: #fff; text-shadow: 0 0 30px var(--accent);
            width: 140px; height: 140px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 40px var(--accent); animation: pulse 1.5s infinite; margin-bottom: 40px;
        }

        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.5); } 70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(0, 242, 255, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 242, 255, 0); } }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar">
        <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:1.8rem; align-self:flex-end; cursor:pointer; margin-bottom:20px;">✖</button>
        <h2 style="font-family:'Orbitron'; letter-spacing:2px;">⚙️ AJUSTES</h2>
        <button class="menu-btn" onclick="alert('IA: GPT-4o-mini\nSan Martín, Mendoza.')">🧠 Sistema Aurora</button>
        <button class="menu-btn" onclick="cerrarSesionApp()">🚪 Cerrar Sesión</button>
        <button class="menu-btn danger" onclick="eliminarCuentaApp()">⚠️ ELIMINAR CUENTA</button>
    </div>

    <div id="voice-overlay">
        <div class="a-gigante">A</div>
        <p id="voice-status" style="color:#00f2ff; font-family:'Orbitron'; font-size:0.9rem;">ENLACE ACTIVO</p>
        <button onclick="stopVoiceMode()" style="background:rgba(255,255,255,0.05); border:1px solid #00f2ff; color:white; padding:15px 40px; border-radius:30px; margin-top:50px; font-family:'Orbitron'; font-size:0.8rem;">FINALIZAR</button>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h1 class="titulo-login">AURORA ACCESO</h1>
            <button onclick="loginGoogle()" class="btn-auth btn-google">G | Ingresar con Google</button>
            <button onclick="mostrarEmail()" class="btn-auth" style="background:rgba(255,255,255,0.08); color:white; border:1px solid rgba(255,255,255,0.2);">Acceso por Email</button>
            <div id="email-form" style="display:none; flex-direction:column; gap:12px; margin-top:20px;">
                <input type="email" id="email-input" placeholder="Email" style="padding:15px; border-radius:15px; background:rgba(0,0,0,0.3); color:white; border:1px solid rgba(0,242,255,0.2); outline:none;">
                <input type="password" id="pass-input" placeholder="Password" style="padding:15px; border-radius:15px; background:rgba(0,0,0,0.3); color:white; border:1px solid rgba(0,242,255,0.2); outline:none;">
                <button onclick="ejecutarAuth()" style="background:var(--accent); color:black; padding:15px; border-radius:15px; border:none; font-weight:bold; cursor:pointer;">CONECTAR</button>
            </div>
        </div>
    </div>

    <div id="app-container">
        <header><div class="titulo-app">AURORA</div></header>
        <div id="chat-window"><div class="msg aurora" id="saludo-ia">Estableciendo conexión neuronal...</div></div>
        
        <div class="input-area">
            <button class="btn-config-final" onclick="toggleSidebar()">⚙️</button>
            
            <div class="input-container">
                <button class="btn-voice" onclick="startVoiceMode()">A</button>
                <input type="text" id="chat-terminal" placeholder="Escribe a Aurora..." readonly>
                <button onclick="enviar()" style="background:none; border:none; color:var(--accent); font-size:1.6rem; cursor:pointer; margin-left:5px;">➤</button>
            </div>
            
            <p style="font-size:0.65rem; color:rgba(255,255,255,0.3); text-align:center; margin-top:12px; letter-spacing:1px;">AURORA ES UNA IA Y PUEDE COMETER ERRORES.</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo", authDomain: "aurora-ai-oficia.firebaseapp.com", projectId: "aurora-ai-oficia", storageBucket: "aurora-ai-oficia.firebasestorage.app", messagingSenderId: "426513637524", appId: "1:426513637524:web:13851f499aa4af13cfd481" };
        firebase.initializeApp(firebaseConfig);

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        function cerrarSesionApp() { firebase.auth().signOut().then(() => window.location.reload()); }
        
        function eliminarCuentaApp() {
            if(confirm("¿Estás seguro de eliminar tu cuenta permanentemente?")) {
                const user = firebase.auth().currentUser;
                if(user) user.delete().then(() => window.location.reload()).catch(e => alert("Re-autenticación requerida para esta acción."));
            }
        }

        function hablar(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'es-AR'; u.pitch = 1.4; u.rate = 1.0;
            window.speechSynthesis.speak(u);
        }

        function mostrarEmail() { document.getElementById('email-form').style.display='flex'; }
        function loginGoogle() { firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        async function ejecutarAuth() {
            const e = document.getElementById('email-input').value;
            const p = document.getElementById('pass-input').value;
            try { await firebase.auth().signInWithEmailAndPassword(e, p); } catch(err) { alert(err.message); }
        }

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                const m = `Hola ${user.displayName ? user.displayName.split(' ')[0] : "Gabriel"}. ¿Cómo puedo ayudarte hoy?`;
                document.getElementById('saludo-ia').innerText = m;
                document.getElementById('chat-terminal').removeAttribute('readonly');
                hablar(m);
            }
        });

        let recognition;
        function startVoiceMode() {
            document.getElementById('voice-overlay').style.display = 'flex';
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'es-AR';
            recognition.onresult = async e => {
                const msg = e.results[0][0].transcript;
                const res = await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg}) });
                const data = await res.json();
                hablar(data.respuesta);
            };
            recognition.start();
        }
        function stopVoiceMode() {
            if(recognition) recognition.stop();
            window.speechSynthesis.cancel();
            document.getElementById('voice-overlay').style.display = 'none';
        }

        async function enviar() {
            const inp = document.getElementById('chat-terminal');
            const msg = inp.value; if(!msg) return;
            addMsg(msg, 'user'); inp.value = '';
            const res = await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg}) });
            const data = await res.json();
            addMsg(data.respuesta, 'aurora');
            hablar(data.respuesta);
        }

        function addMsg(t, cl) {
            const d = document.createElement('div'); d.className = `msg ${cl}`; d.innerText = t;
            const win = document.getElementById('chat-window'); win.appendChild(d);
            win.scrollTop = win.scrollHeight;
        }

        document.getElementById('chat-terminal').addEventListener('keypress', e => { if(e.key === 'Enter') enviar(); });
    </script>
</body>
</html>

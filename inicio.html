<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURORA - Inteligencia Artificial</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00f2ff; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            overflow: hidden; background: #000; 
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff;
        }
        
        #bg-video { 
            position: fixed !important; top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            object-fit: cover !important; 
            z-index: -1 !important;
            opacity: 1;
        }

        /* --- PANTALLA DE LOGIN DE CRISTAL --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(25px); /* El toque mágico */
            z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 1s ease, visibility 1s;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px 20px; border-radius: 30px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            text-align: center; max-width: 380px; width: 85%;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.15);
        }

        .titulo-login { 
            font-family: 'Orbitron', sans-serif; letter-spacing: 5px; 
            font-size: 1.1rem; margin-bottom: 5px; color: #fff;
        }
        .subtitulo-login { 
            font-weight: 300; font-size: 0.9rem; margin-bottom: 30px; 
            color: rgba(255, 255, 255, 0.6); 
        }

        .btn-auth {
            width: 100%; padding: 14px; margin-bottom: 12px;
            border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.1); color: white;
            font-family: 'Plus Jakarta Sans', sans-serif; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s; font-size: 1rem;
        }

        .btn-google { background: #fff; color: #000; font-weight: 600; }
        .btn-auth:hover { transform: translateY(-2px); border-color: var(--accent); }

        /* --- INTERFAZ DE CHAT (Oculta al inicio) --- */
        #app-container { 
            display: flex; flex-direction: column; height: 100%; 
            max-width: 600px; margin: 0 auto; position: relative; z-index: 10;
            opacity: 0; transition: opacity 1s ease;
        }

        header { padding: 25px 15px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px); }
        .titulo { font-family: 'Orbitron', sans-serif; letter-spacing: 12px; font-size: 1.4rem; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 14px 20px; border-radius: 20px; backdrop-filter: blur(10px); animation: slide 0.3s ease; font-weight: 300; }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.3); border-bottom-left-radius: 2px; }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); border-bottom-right-radius: 2px; }

        .input-area { padding: 20px; }
        .input-container { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 30px; display: flex; align-items: center; padding: 5px 20px; backdrop-filter: blur(15px); }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 1rem; }
        #btn-mic { background: transparent; border: none; color: var(--accent); font-size: 1.2rem; cursor: pointer; }

        @keyframes slide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="login-overlay">
        <div class="login-card">
            <h1 class="titulo-login">BIENVENIDO A AURORA</h1>
            <p class="subtitulo-login">¿Cómo desea ingresar?</p>
            
            <button onclick="loginConGoogle()" class="btn-auth btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
                Ingresar con Google
            </button>
            
            <button onclick="loginConEmail()" class="btn-auth">
                📧 Correo Electrónico
            </button>
        </div>
    </div>

    <div id="app-container">
        <header><div class="titulo">AURORA</div></header>
        <div id="chat-window">
            <div class="msg aurora" id="saludo-ia">Estableciendo conexión...</div>
        </div>
        <div class="input-area">
            <div class="input-container">
                <button id="btn-mic">🎤</button>
                <input type="text" id="user-input" placeholder="Pregúntale a Aurora..." autocomplete="off">
                <button onclick="enviar()" style="background:none; border:none; color:var(--accent); font-size:1.6rem; cursor:pointer;">➤</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        // 🚨 CONFIGURACIÓN FIREBASE (PEGÁ TUS DATOS ACÁ)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_AUTH_DOMAIN",
            projectId: "TU_PROJECT_ID",
            storageBucket: "TU_STORAGE_BUCKET",
            messagingSenderId: "TU_MESSAGING_SENDER_ID",
            appId: "TU_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();

        // FUNCIONES DE LOGIN
        function loginConGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => alert("Error: " + err.message));
        }

        function loginConEmail() {
            const email = prompt("Ingrese su correo:");
            const pass = prompt("Ingrese su contraseña:");
            if(email && pass) auth.signInWithEmailAndPassword(email, pass).catch(err => alert(err.message));
        }

        // DETECTOR DE ESTADO DE LOGIN
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Si está logueado: Escondemos login y mostramos App
                document.getElementById('login-overlay').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('login-overlay').style.visibility = "hidden";
                    document.getElementById('app-container').style.opacity = "1";
                    iniciarAurora();
                }, 1000);
            }
        });

        // LÓGICA DE CHAT
        const chatWin = document.getElementById('chat-window');
        const input = document.getElementById('user-input');

        function hablar(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'es-AR'; u.pitch = 1.6;
            window.speechSynthesis.speak(u);
        }

        function iniciarAurora() {
            if(!window.saludoHecho) {
                window.saludoHecho = true;
                const m = "Bienvenido Gabriel. Acceso concedido a Aurora.";
                document.getElementById('saludo-ia').innerText = m;
                hablar(m);
            }
        }

        async function enviar() {
            const msg = input.value.trim(); if(!msg) return;
            addMsg(msg, 'user'); input.value = '';
            const res = await fetch('/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({msg}) });
            const data = await res.json();
            addMsg(data.respuesta, 'aurora'); hablar(data.respuesta);
        }

        function addMsg(t, cl) {
            const d = document.createElement('div'); d.className = `msg ${cl}`; d.innerText = t;
            chatWin.appendChild(d); chatWin.scrollTo(0, chatWin.scrollHeight);
        }

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });
    </script>
</body>
</html>

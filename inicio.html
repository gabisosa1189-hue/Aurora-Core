<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURORA AI</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00f2ff; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; }
        
        #bg-video { position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover !important; z-index: 1; opacity: 1; }

        /* --- PANTALLA DE LOGIN (Visible por defecto) --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(25px); /* Desenfoque fuerte */
            z-index: 9999; /* SIEMPRE ARRIBA */
            display: flex; align-items: center; justify-content: center;
            transition: all 0.8s ease;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px 20px; border-radius: 30px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            text-align: center; max-width: 380px; width: 85%;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
        }

        .titulo-login { font-family: 'Orbitron', sans-serif; letter-spacing: 5px; font-size: 1.1rem; margin-bottom: 5px; }
        .subtitulo-login { font-weight: 300; font-size: 0.9rem; margin-bottom: 30px; color: rgba(255, 255, 255, 0.6); }

        .btn-auth {
            width: 100%; padding: 14px; margin-bottom: 12px;
            border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.1); color: white;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s; font-size: 1rem;
        }
        .btn-google { background: #fff; color: #000; font-weight: 600; }

        /* --- CONTENEDOR APP (Oculto al inicio) --- */
        #app-container { 
            display: none; /* Se activa por JS */
            flex-direction: column; height: 100%; 
            max-width: 600px; margin: 0 auto; position: relative; z-index: 10;
        }

        header { padding: 25px 15px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .titulo { font-family: 'Orbitron', sans-serif; letter-spacing: 12px; font-size: 1.4rem; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 14px 20px; border-radius: 20px; backdrop-filter: blur(10px); }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.3); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); }
        .input-area { padding: 20px; }
        .input-container { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 30px; display: flex; align-items: center; padding: 5px 20px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video"><source src="fondo.mp4" type="video/mp4"></video>

    <div id="login-overlay">
        <div class="login-card">
            <h1 class="titulo-login">AURORA CORP</h1>
            <p class="subtitulo-login">Inicie sesión para continuar</p>
            <button onclick="loginGoogle()" class="btn-auth btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18">
                Ingresar con Google
            </button>
            <button onclick="loginEmail()" class="btn-auth">📧 Correo Electrónico</button>
        </div>
    </div>

    <div id="app-container">
        <header><div class="titulo">AURORA</div></header>
        <div id="chat-window"><div class="msg aurora" id="saludo-ia">Estableciendo conexión neuronal...</div></div>
        <div class="input-area">
            <div class="input-container">
                <button style="background:none; border:none; color:var(--accent); font-size:1.2rem;">🎤</button>
                <input type="text" id="user-input" placeholder="Pregúntale a Aurora..." autocomplete="off">
                <button onclick="enviar()" style="background:none; border:none; color:var(--accent); font-size:1.6rem;">➤</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        // 🚨 CONFIGURACIÓN FIREBASE (PEGÁ TUS DATOS ACÁ)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_AUTH_DOMAIN",
            projectId: "TU_PROJECT_ID",
            storageBucket: "TU_STORAGE_BUCKET",
            messagingSenderId: "TU_MESSAGING_SENDER_ID",
            appId: "TU_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);

        function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).catch(e => alert(e.message));
        }

        function loginEmail() {
            const email = prompt("Email:"); const pass = prompt("Contraseña:");
            if(email && pass) firebase.auth().signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
        }

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                // SI ESTÁ LOGUEADO: Matamos el Login y mostramos la App
                document.getElementById('login-overlay').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('login-overlay').style.display = "none";
                    document.getElementById('app-container').style.display = "flex";
                    // Saludo inicial
                    if(!window.saludoOk) {
                        window.saludoOk = true;
                        const m = "Hola Gabriel. Sesión iniciada en Aurora.";
                        document.getElementById('saludo-ia').innerText = m;
                        hablar(m);
                    }
                }, 800);
            } else {
                // SI NO ESTÁ LOGUEADO: Aseguramos que el login se vea
                document.getElementById('login-overlay').style.display = "flex";
            }
        });

        // (Resto de funciones de chat y hablar igual que antes...)
        function hablar(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='es-AR'; u.pitch=1.6; window.speechSynthesis.speak(u); }
        async function enviar() {
            const inp = document.getElementById('user-input'); const msg = inp.value.trim(); if(!msg) return;
            addMsg(msg, 'user'); inp.value = '';
            const res = await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg}) });
            const data = await res.json(); addMsg(data.respuesta, 'aurora'); hablar(data.respuesta);
        }
        function addMsg(t, cl) {
            const d = document.createElement('div'); d.className = `msg ${cl}`; d.innerText = t;
            const win = document.getElementById('chat-window'); win.appendChild(d); win.scrollTo(0, win.scrollHeight);
        }
    </script>
</body>
</html>

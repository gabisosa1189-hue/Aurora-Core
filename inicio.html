<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURORA</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00f2ff; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            overflow: hidden; background-color: #000; 
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff;
        }
        
        /* TU VIDEO AL 100% INAMOVIBLE */
        #bg-video {
            position: fixed !important; 
            top: 0 !important; 
            left: 0 !important;
            width: 100vw !important; 
            height: 100vh !important;
            object-fit: cover !important; 
            object-position: center center !important; 
            z-index: -999 !important; 
            opacity: 0.85; 
            pointer-events: none;
        }

        #app-container { display: flex; flex-direction: column; height: 100%; max-width: 600px; margin: 0 auto; position: relative; z-index: 10; }
        
        /* HEADER FORMAL */
        header { padding: 25px 15px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); background: transparent; backdrop-filter: blur(5px); }
        .titulo { font-family: 'Orbitron', sans-serif; letter-spacing: 12px; color: #fff; text-shadow: 0 0 15px rgba(255, 255, 255, 0.5); font-size: 1.4rem; font-weight: 500; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        
        /* BURBUJAS TRANSPARENTES */
        .msg { max-width: 85%; padding: 14px 20px; border-radius: 20px; line-height: 1.5; backdrop-filter: blur(8px); animation: slide 0.3s ease; font-weight: 300; letter-spacing: 0.5px; }
        
        .aurora { align-self: flex-start; background: transparent; border: 1px solid rgba(0, 242, 255, 0.4); border-bottom-left-radius: 2px; box-shadow: 0 4px 15px rgba(0, 242, 255, 0.1); }
        .user { align-self: flex-end; background: transparent; border: 1px solid rgba(255, 255, 255, 0.3); border-bottom-right-radius: 2px; box-shadow: 0 4px 15px rgba(255, 255, 255, 0.05); }

        /* INPUT TRANSPARENTE */
        .input-area { padding: 20px; background: transparent; }
        .input-container { 
            background: transparent; border: 1px solid rgba(0, 242, 255, 0.4); 
            border-radius: 30px; display: flex; align-items: center; padding: 5px 20px;
            backdrop-filter: blur(8px); 
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-container:focus-within { box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); border-color: var(--accent); }
        
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 1rem; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 300; }
        input::placeholder { color: rgba(255, 255, 255, 0.5); }
        
        #btn-mic { 
            background: transparent; border: none; color: var(--accent);
            width: 40px; height: 40px; cursor: pointer; transition: 0.3s; margin-right: 5px; display:flex; justify-content:center; align-items:center; font-size: 1.2rem;
        }
        #btn-mic:hover { transform: scale(1.1); text-shadow: 0 0 10px var(--accent); }

        @keyframes slide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    
    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>
    
    <div id="app-container">
        <header>
            <div class="titulo">AURORA</div>
        </header>
        
        <div id="chat-window">
            <div class="msg aurora" id="saludo-ia">Iniciando sistema...</div>
        </div>
        
        <div class="input-area">
            <div class="input-container">
                <button id="btn-mic">🎤</button>
                <input type="text" id="user-input" placeholder="Escribe tu mensaje..." autocomplete="off">
                <button onclick="enviar()" style="background:none; border:none; color:var(--accent); font-size:1.6rem; cursor:pointer; text-shadow: 0 0 10px var(--accent);">➤</button>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
        const chatWin = document.getElementById('chat-window');
        const input = document.getElementById('user-input');

        let saludoHecho = false;

        function iniciarSaludo() {
            if (saludoHecho) return;
            const voces = window.speechSynthesis.getVoices();
            if (voces.length > 0) {
                saludoHecho = true;
                const nombre = localStorage.getItem('userName') || 'Gabriel';
                const msg = `Hola ${nombre}. Soy Aurora. ¿En qué te puedo ayudar?`;
                document.getElementById('saludo-ia').innerText = msg;
                hablar(msg);
            }
        }

        window.speechSynthesis.onvoiceschanged = iniciarSaludo;
        setTimeout(iniciarSaludo, 1000); 

        function hablar(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            const voces = window.speechSynthesis.getVoices();
            let vozElegida = voces.find(v => v.lang.startsWith('es') && (v.name.includes('female') || v.name.includes('Helena') || v.name.includes('Sabina') || v.name.includes('Paulina')));
            if (!vozElegida) vozElegida = voces.find(v => v.lang.startsWith('es') && v.name.includes('Google'));
            if (!vozElegida) vozElegida = voces.find(v => v.lang.startsWith('es'));

            u.voice = vozElegida;
            u.pitch = 1.6; 
            u.rate = 1.0;
            u.lang = 'es-AR';
            window.speechSynthesis.speak(u);
        }

        async function enviar() {
            const msg = input.value.trim();
            if(!msg) return;
            addMsg(msg, 'user');
            input.value = '';

            try {
                const res = await fetch('/chat?_=' + new Date().getTime(), { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({msg}) 
                });
                const data = await res.json();
                addMsg(data.respuesta, 'aurora');
                hablar(data.respuesta);
            } catch (err) {
                addMsg("Cortocircuito de red. ¿Estás conectado?", 'aurora');
            }
        }

        function addMsg(t, cl) {
            const d = document.createElement('div');
            d.className = `msg ${cl}`;
            d.innerText = t;
            chatWin.appendChild(d);
            chatWin.scrollTo(0, chatWin.scrollHeight);
        }
        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });
    </script>
</body>
</html>

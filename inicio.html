<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURORA</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00f2ff; }
        
        /* CORRECCIÓN 1: Body transparente para que el video respire */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            overflow: hidden; background: transparent; 
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff;
        }
        
        /* CORRECCIÓN 2: Z-index corregido y fondo de respaldo */
        #bg-video { 
            position: fixed !important; top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            object-fit: cover !important; 
            z-index: -1 !important; /* Capa justo detrás de todo */
            opacity: 1; /* Le subí la opacidad para que brille más */
            background: #000; /* Si el video falla, queda negro */
        }

        #app-container { display: flex; flex-direction: column; height: 100%; max-width: 600px; margin: 0 auto; position: relative; z-index: 10; }
        header { padding: 25px 15px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); background: transparent; backdrop-filter: blur(5px); }
        .titulo { font-family: 'Orbitron', sans-serif; letter-spacing: 12px; color: #fff; text-shadow: 0 0 15px rgba(255, 255, 255, 0.5); font-size: 1.4rem; font-weight: 500; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 14px 20px; border-radius: 20px; line-height: 1.5; backdrop-filter: blur(10px); animation: slide 0.3s ease; font-weight: 300; }
        
        /* Burbujas tipo cristal */
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.3); border-bottom-left-radius: 2px; }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); border-bottom-right-radius: 2px; }

        .input-area { padding: 20px; background: transparent; }
        .input-container { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 30px; display: flex; align-items: center; padding: 5px 20px; backdrop-filter: blur(15px); }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 1rem; }
        #btn-mic { background: transparent; border: none; color: var(--accent); width: 40px; cursor: pointer; font-size: 1.2rem; }

        @keyframes slide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div id="app-container">
        <header><div class="titulo">AURORA</div></header>
        <div id="chat-window">
            <div class="msg aurora" id="saludo-ia">Estableciendo conexión neuronal...</div>
        </div>
        <div class="input-area">
            <div class="input-container">
                <button id="btn-mic">🎤</button>
                <input type="text" id="user-input" placeholder="Pregúntale a Aurora..." autocomplete="off">
                <button onclick="enviar()" style="background:none; border:none; color:var(--accent); font-size:1.6rem; cursor:pointer;">➤</button>
            </div>
        </div>
    </div>

    <script>
        // Registrar SW para que funcione como PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(() => console.log("Aurora PWA lista"));
        }

        const chatWin = document.getElementById('chat-window');
        const input = document.getElementById('user-input');

        function hablar(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            const voces = window.speechSynthesis.getVoices();
            u.voice = voces.find(v => v.lang.startsWith('es') && (v.name.includes('female') || v.name.includes('Google'))) || voces.find(v => v.lang.startsWith('es'));
            u.pitch = 1.6; u.lang = 'es-AR';
            window.speechSynthesis.speak(u);
        }

        async function enviar() {
            const msg = input.value.trim(); if(!msg) return;
            addMsg(msg, 'user'); input.value = '';
            
            try {
                const res = await fetch('/chat', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({msg}) 
                });
                const data = await res.json();
                addMsg(data.respuesta, 'aurora'); 
                hablar(data.respuesta);
            } catch (err) {
                addMsg("Lo siento Gabriel, perdí la conexión con el núcleo. ¿Está bien la API Key?", 'aurora');
            }
        }

        function addMsg(t, cl) {
            const d = document.createElement('div'); 
            d.className = `msg ${cl}`; 
            d.innerText = t;
            chatWin.appendChild(d); 
            chatWin.scrollTo(0, chatWin.scrollHeight);
        }

        window.speechSynthesis.onvoiceschanged = () => {
            if(!window.saludoHecho) {
                window.saludoHecho = true;
                const m = "Hola Gabriel. Soy Aurora. Ya estoy en línea.";
                document.getElementById('saludo-ia').innerText = m;
                hablar(m);
            }
        };

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });
    </script>
</body>
</html>

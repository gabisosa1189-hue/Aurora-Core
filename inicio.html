<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURORA - Acceso Neuronal</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">
   
    <style>
        :root { --accent: #00f2ff; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; background-image: url('poster.jpg'); background-size: cover; background-position: center; background-color: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; }
        #bg-video { position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover !important; z-index: 1; opacity: 0; transition: opacity 2s ease; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.45); backdrop-filter: blur(25px); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: all 0.6s ease; }
        .login-card { background: rgba(255, 255, 255, 0.03); padding: 50px 30px; border-radius: 40px; border: 1px solid rgba(0, 242, 255, 0.3); text-align: center; max-width: 400px; width: 88%; box-shadow: 0 0 60px rgba(0, 242, 255, 0.2); }
        .titulo-login { font-family: 'Orbitron', sans-serif; letter-spacing: 5px; font-size: 1.3rem; margin-bottom: 12px; }
        .subtitulo-login { font-weight: 300; font-size: 1rem; margin-bottom: 40px; color: rgba(255, 255, 255, 0.7); }
        .btn-auth { width: 100%; padding: 16px; border-radius: 20px; border: none; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.3s ease; font-size: 1rem; margin-bottom: 15px; }
        .btn-google { background: #fff; color: #000; }
        .btn-email-toggle { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; }
        #app-container { display: none; flex-direction: column; height: 100vh; max-width: 600px; margin: 0 auto; position: relative; z-index: 10; opacity: 0; transition: 1.2s; }
        header { padding: 30px 15px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .titulo-app { font-family: 'Orbitron', sans-serif; letter-spacing: 15px; font-size: 1.5rem; text-shadow: 0 0 20px var(--accent); }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 15px 20px; border-radius: 22px; backdrop-filter: blur(10px); animation: slide 0.3s ease; }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.08); border: 1px solid rgba(0, 242, 255, 0.2); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-area { padding: 20px 20px 15px 20px; }
        .input-container { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 35px; display: flex; align-items: center; padding: 5px 20px; backdrop-filter: blur(20px); }
        #chat-terminal { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 1rem; }
        @keyframes slide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div style="position: absolute; top: -1000px; left: -1000px; opacity: 0; pointer-events: none;">
        <input type="text" name="f1"><input type="password" name="f2">
    </div>
    <video autoplay muted loop playsinline preload="auto" poster="poster.jpg" id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>
    <div id="login-overlay">
        <div class="login-card">
            <h1 class="titulo-login">BIENVENIDO A AURORA</h1>
            <p class="subtitulo-login" id="subtitulo-auth">Seleccione su modalidad de acceso para continuar</p>
            <div id="main-auth">
                <button onclick="loginGoogle()" class="btn-auth btn-google">
                    <svg width="20" height="20" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84c-.21 1.12-.84 2.07-1.79 2.7l2.85 2.22c1.67-1.53 2.63-3.8 2.63-6.55z" fill="#4285F4"/><path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.85-2.22c-.79.53-1.8.85-3.11.85-2.39 0-4.41-1.61-5.14-3.78H.9v2.33C2.38 15.94 5.47 18 9 18z" fill="#34A853"/><path d="M3.86 10.67c-.19-.56-.3-1.16-.3-1.77s.11-1.21.3-1.77V4.8H.9A8.98 8.98 0 0 0 0 9c0 1.45.35 2.82.9 4.05l2.96-2.38z" fill="#FBBC05"/><path d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.47.89 11.43 0 9 0 5.47 0 2.38 2.06.9 5.07L3.86 7.4c.73-2.17 2.75-3.82 5.14-3.82z" fill="#EA4335"/></svg>
                    Ingresar con Google
                </button>
                <button onclick="mostrarEmail()" class="btn-auth btn-email-toggle">📧 Correo electrónico</button>
            </div>
            <div id="email-form" style="display:none; flex-direction:column; gap:12px; margin-top:20px;">
                <input type="email" id="email-input" style="background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); padding:15px; border-radius:15px; color:#fff;" placeholder="Email">
                <input type="password" id="pass-input" style="background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); padding:15px; border-radius:15px; color:#fff;" placeholder="Contraseña">
                <button id="auth-btn-main" onclick="ejecutarAuth()" style="background:var(--accent); color:#000; padding:16px; border-radius:15px; border:none; font-weight:600; cursor:pointer;">Ingresar</button>
                <p id="toggle-auth-text" onclick="cambiarModoAuth()" style="color:rgba(255,255,255,0.4); font-size:0.8rem; cursor:pointer; margin-top:10px;">¿No tienes cuenta? Regístrate aquí</p>
                <p onclick="volverInicio()" style="color:rgba(255,255,255,0.5); font-size:0.8rem; cursor:pointer; margin-top:10px; text-decoration: underline;">← Volver</p>
            </div>
        </div>
    </div>
    <div id="app-container">
        <header><div class="titulo-app">AURORA</div></header>
        <div id="chat-window"><div class="msg aurora" id="saludo-ia">Conectando...</div></div>
        <div class="input-area">
            <div class="input-container">
                <button style="background:none; border:none; color:var(--accent); font-size:1.2rem;">🎤</button>
                <input type="text" id="chat-terminal" readonly placeholder="Iniciando..." autocomplete="new-password">
                <button onclick="enviar()" style="background:none; border:none; color:var(--accent); font-size:1.6rem; cursor:pointer;">➤</button>
            </div>
            <p style="text-align: center; font-size: 0.7rem; color: rgba(255,255,255,0.35); margin-top: 10px; letter-spacing: 0.5px;">
                AURORA es una IA y puede cometer errores.
            </p>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo", authDomain: "aurora-ai-oficia.firebaseapp.com", projectId: "aurora-ai-oficia", storageBucket: "aurora-ai-oficia.firebasestorage.app", messagingSenderId: "426513637524", appId: "1:426513637524:web:13851f499aa4af13cfd481" };
        firebase.initializeApp(firebaseConfig);
        const bgVideo = document.getElementById('bg-video');
        bgVideo.onplay = () => { bgVideo.style.opacity = "1"; };

        // ==================== VOZ FEMENINA MEJORADA ====================
        function hablar(t) {
            if (!t || !('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();

            const u = new SpeechSynthesisUtterance(t);
            const voices = window.speechSynthesis.getVoices();

            // Filtro agresivo para voz femenina
            let vozFemenina = voices.find(v =>
                (v.lang.includes('es') || v.lang.includes('AR') || v.lang.includes('MX')) &&
                (v.name.includes('Google') ||
                 v.name.toLowerCase().includes('lucia') ||
                 v.name.toLowerCase().includes('camila') ||
                 v.name.toLowerCase().includes('sofia') ||
                 v.name.toLowerCase().includes('helena') ||
                 v.name.toLowerCase().includes('paulina') ||
                 v.name.toLowerCase().includes('victoria') ||
                 v.name.toLowerCase().includes('monica') ||
                 v.name.toLowerCase().includes('sabina') ||
                 v.name.toLowerCase().includes('luciana') ||
                 v.name.toLowerCase().includes('female') ||
                 v.name.toLowerCase().includes('alba'))
            );

            // Fallback fuerte
            if (!vozFemenina) {
                vozFemenina = voices.find(v => 
                    v.lang.includes('es') &&
                    !v.name.toLowerCase().includes('male') &&
                    !v.name.toLowerCase().includes('hombre')
                );
            }

            if (vozFemenina) {
                u.voice = vozFemenina;
                console.log("🎤 Aurora usando voz:", vozFemenina.name);
            }

            // Configuración para sonar más femenina
            u.lang = 'es-AR';
            u.pitch = 1.75;      // Agudo → voz claramente femenina
            u.rate = 1.04;
            u.volume = 0.96;

            window.speechSynthesis.speak(u);
        }

        window.speechSynthesis.onvoiceschanged = () => { 
            window.speechSynthesis.getVoices(); 
        };

        function exterminarMail() {
            const input = document.getElementById('chat-terminal');
            let t = setInterval(() => { input.value = ''; }, 50);
            setTimeout(() => { clearInterval(t); }, 3000);
        }

        let modoRegistro = false;
        function cambiarModoAuth() {
            modoRegistro = !modoRegistro;
            const btn = document.getElementById('auth-btn-main');
            const link = document.getElementById('toggle-auth-text');
            if(modoRegistro) { 
                btn.innerText = "Crear Cuenta"; 
                link.innerText = "¿Ya tienes cuenta? Inicia sesión"; 
            } else { 
                btn.innerText = "Ingresar"; 
                link.innerText = "¿No tienes cuenta? Regístrate aquí"; 
            }
        }

        function mostrarEmail() { 
            document.getElementById('main-auth').style.display='none'; 
            document.getElementById('email-form').style.display='flex'; 
        }

        function volverInicio() { 
            document.getElementById('main-auth').style.display='flex'; 
            document.getElementById('email-form').style.display='none'; 
        }

        async function ejecutarAuth() {
            const email = document.getElementById('email-input').value;
            const pass = document.getElementById('pass-input').value;
            try { 
                if(modoRegistro) await firebase.auth().createUserWithEmailAndPassword(email, pass); 
                else await firebase.auth().signInWithEmailAndPassword(email, pass); 
            }
            catch(e) { alert("Error: " + e.message); }
        }

        function loginGoogle() { 
            const provider = new firebase.auth.GoogleAuthProvider(); 
            firebase.auth().signInWithPopup(provider); 
        }

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                exterminarMail();
                document.getElementById('login-overlay').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('login-overlay').style.display = "none";
                    document.getElementById('app-container').style.display = "flex";
                    setTimeout(() => {
                        document.getElementById('app-container').style.opacity = "1";
                        const nombreUsuario = user.displayName ? user.displayName.split(' ')[0] : "Gabriel";
                        const m = `Hola, ${nombreUsuario}. ¿Cómo puedo ayudarte hoy?`;
                        document.getElementById('saludo-ia').innerText = m;
                        hablar(m);  // Ahora usa la voz mejorada también en el saludo
                        
                        const chatInp = document.getElementById('chat-terminal');
                        chatInp.removeAttribute('readonly');
                        chatInp.placeholder = "Escribe a Aurora...";
                        exterminarMail();
                    }, 500);
                }, 600);
            }
        });

        async function enviar() {
            const inp = document.getElementById('chat-terminal');
            const msg = inp.value.trim(); 
            if(!msg || msg.includes('@')) { 
                inp.value = ''; 
                return; 
            }
            addMsg(msg, 'user'); 
            inp.value = '';
            try {
                const res = await fetch('/chat', { 
                    method:'POST', 
                    headers:{'Content-Type':'application/json'}, 
                    body:JSON.stringify({msg}) 
                });
                const data = await res.json();
                addMsg(data.respuesta, 'aurora');
               
                if (data.audio) {
                    const audioReal = new Audio("data:audio/mpeg;base64," + data.audio);
                    audioReal.play();
                } else {
                    hablar(data.respuesta);
                }
            } catch(e) { 
                addMsg("Error en la conexión neuronal.", 'aurora'); 
            }
        }

        function addMsg(t, cl) {
            const d = document.createElement('div'); 
            d.className = `msg ${cl}`; 
            d.innerText = t;
            const win = document.getElementById('chat-window'); 
            win.appendChild(d);
            win.scrollTo({ top: win.scrollHeight, behavior: 'smooth' });
        }

        document.getElementById('chat-terminal').addEventListener('keypress', (e) => { 
            if(e.key === 'Enter') enviar(); 
        });
    </script>
</body>
</html>

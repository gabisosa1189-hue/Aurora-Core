<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00f2ff; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; background-image: url('poster.jpg'); background-size: cover; background-position: center; background-color: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; }
        
        #bg-video { position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover !important; z-index: 1; opacity: 0; transition: opacity 2s ease; }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.45); backdrop-filter: blur(25px); z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255, 255, 255, 0.03); padding: 50px 30px; border-radius: 40px; border: 1px solid rgba(0, 242, 255, 0.3); text-align: center; max-width: 400px; width: 88%; }
        .titulo-login { font-family: 'Orbitron', sans-serif; letter-spacing: 5px; font-size: 1.3rem; margin-bottom: 12px; }
        .btn-auth { width: 100%; padding: 16px; border-radius: 20px; border: none; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 1rem; margin-bottom: 15px; }
        .btn-google { background: #fff; color: #000; }
        
        /* ⚙️ SIDEBAR REFORZADO */
        #sidebar {
            position: fixed; top: 0; left: -260px; width: 260px; height: 100%;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(40px);
            border-right: 1px solid rgba(0,242,255,0.2);
            z-index: 100000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 40px 20px; display: flex; flex-direction: column; gap: 15px;
        }
        #sidebar.open { left: 0; }
        .menu-btn { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 15px; text-align: left; font-size: 1rem; cursor: pointer; }
        .menu-btn.danger { background: rgba(255, 50, 50, 0.1); color: #ff4d4d; margin-top: auto; }

        #sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); z-index: 99999;
            display: none; opacity: 0; transition: 0.3s;
        }
        #sidebar-overlay.active { display: block; opacity: 1; }

        #app-container { display: none; flex-direction: column; height: 100vh; max-width: 600px; margin: 0 auto; position: relative; z-index: 10; }
        
        header { padding: 35px 15px 15px 15px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .titulo-app { font-family: 'Orbitron', sans-serif; letter-spacing: 15px; font-size: 1.5rem; text-shadow: 0 0 20px var(--accent); }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 15px 20px; border-radius: 22px; backdrop-filter: blur(15px); line-height: 1.4; }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.08); border: 1px solid rgba(0, 242, 255, 0.2); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* ⚙️ BARRA INFERIOR REDISEÑADA */
        .input-area { 
            position: relative;
            padding: 10px 15px max(20px, env(safe-area-inset-bottom)) 15px; 
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bottom-controls {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        /* ⚙️ LA TUERCA CLAVADA A LA IZQUIERDA */
        .btn-config-final {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.4);
            color: var(--accent);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 1.8rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(20px);
            z-index: 100;
            box-shadow: 0 0 15px rgba(0,242,255,0.2);
            flex-shrink: 0;
        }

        .input-container { 
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(0, 242, 255, 0.3); 
            border-radius: 35px; 
            display: flex; 
            align-items: center; 
            padding: 5px 15px; 
            backdrop-filter: blur(20px);
        }
        
        .btn-voice { 
            background: transparent; color: #fff; border: none; font-family: 'Orbitron', sans-serif; font-size: 1.5rem; 
            text-shadow: 0 0 15px var(--accent); margin-right: 12px; cursor: pointer;
        }
        
        #chat-terminal { flex: 1; background: transparent; border: none; color: white; padding: 12px 5px; outline: none; font-size: 1rem; width: 100%; }

        /* VOZ OVERLAY */
        #voice-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            z-index: 200000; display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .a-gigante {
            font-family: 'Orbitron', sans-serif; font-size: 5rem; color: #fff; text-shadow: 0 0 30px var(--accent);
            width: 150px; height: 150px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 40px var(--accent); animation: pulse 1.5s infinite; margin-bottom: 40px;
        }

        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.5); } 70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(0, 242, 255, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 242, 255, 0); } }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video"><source src="fondo.mp4" type="video/mp4"></video>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar">
        <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:1.5rem; align-self:flex-end; cursor:pointer;">✖</button>
        <h2 style="font-family:'Orbitron'">⚙️ CONFIGURACIÓN</h2>
        <button class="menu-btn" onclick="alert('Enlace Neural: GPT-4o-mini Activo')">🧠 Estado IA</button>
        <button class="menu-btn" onclick="cerrarSesionApp()">🚪 Cerrar Sesión</button>
        <button class="menu-btn danger" onclick="eliminarCuentaApp()">⚠️ Eliminar Cuenta</button>
    </div>

    <div id="voice-overlay">
        <div class="a-gigante">A</div>
        <p id="voice-status" style="color:#ccc">Escuchando enlace...</p>
        <button onclick="stopVoiceMode()" style="background:rgba(255,255,255,0.1); border:1px solid white; color:white; padding:15px 30px; border-radius:30px; margin-top:30px;">Finalizar</button>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h1 class="titulo-login">BIENVENIDO A AURORA</h1>
            <button onclick="loginGoogle()" class="btn-auth btn-google">Ingresar con Google</button>
            <button onclick="mostrarEmail()" class="btn-auth" style="background:rgba(255,255,255,0.1); color:white;">Correo Electrónico</button>
            <div id="email-form" style="display:none; flex-direction:column; gap:10px; margin-top:15px;">
                <input type="email" id="email-input" placeholder="Email" style="padding:12px; border-radius:10px; background:rgba(255,255,255,0.1); color:white; border:none;">
                <input type="password" id="pass-input" placeholder="Password" style="padding:12px; border-radius:10px; background:rgba(255,255,255,0.1); color:white; border:none;">
                <button onclick="ejecutarAuth()" style="background:var(--accent); color:black; padding:12px; border-radius:10px; border:none; font-weight:bold;">Entrar</button>
            </div>
        </div>
    </div>

    <div id="app-container">
        <header><div class="titulo-app">AURORA</div></header>
        <div id="chat-window"><div class="msg aurora" id="saludo-ia">Iniciando...</div></div>
        <div class="input-area">
            <div class="bottom-controls">
                <button class="btn-config-final" onclick="toggleSidebar()">⚙️</button>
                <div class="input-container">
                    <button class="btn-voice" onclick="startVoiceMode()">A</button>
                    <input type="text" id="chat-terminal" placeholder="Comandos..." readonly>
                    <button onclick="enviar()" style="background:none; border:none; color:var(--accent); font-size:1.6rem;">➤</button>
                </div>
            </div>
            <p style="font-size:0.7rem; color:rgba(255,255,255,0.3); margin-top:8px;">AURORA es una IA y puede cometer errores.</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo", authDomain: "aurora-ai-oficia.firebaseapp.com", projectId: "aurora-ai-oficia", storageBucket: "aurora-ai-oficia.firebasestorage.app", messagingSenderId: "426513637524", appId: "1:426513637524:web:13851f499aa4af13cfd481" };
        firebase.initializeApp(firebaseConfig);

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            const overlay = document.getElementById('sidebar-overlay');
            overlay.classList.toggle('active');
        }

        function cerrarSesionApp() { firebase.auth().signOut().then(() => window.location.reload()); }
        
        function eliminarCuentaApp() {
            if(confirm("¿Eliminar cuenta?")) {
                const user = firebase.auth().currentUser;
                if(user) user.delete().then(() => window.location.reload());
            }
        }

        function hablar(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'es-AR'; u.pitch = 1.3; u.rate = 1.0;
            window.speechSynthesis.speak(u);
        }

        function mostrarEmail() { document.getElementById('email-form').style.display='flex'; }
        function loginGoogle() { firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        async function ejecutarAuth() {
            const e = document.getElementById('email-input').value;
            const p = document.getElementById('pass-input').value;
            try { await firebase.auth().signInWithEmailAndPassword(e, p); } catch(err) { alert(err.message); }
        }

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                const m = `Hola ${user.displayName || "Gabriel"}. ¿En qué te ayudo?`;
                document.getElementById('saludo-ia').innerText = m;
                document.getElementById('chat-terminal').removeAttribute('readonly');
                hablar(m);
            }
        });

        // 🎙️ VOZ Y CHAT
        let recognition;
        function startVoiceMode() {
            document.getElementById('voice-overlay').style.display = 'flex';
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'es-AR';
            recognition.onresult = async e => {
                const msg = e.results[0][0].transcript;
                const res = await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg}) });
                const data = await res.json();
                hablar(data.respuesta);
            };
            recognition.start();
        }
        function stopVoiceMode() {
            if(recognition) recognition.stop();
            window.speechSynthesis.cancel();
            document.getElementById('voice-overlay').style.display = 'none';
        }

        async function enviar() {
            const inp = document.getElementById('chat-terminal');
            const msg = inp.value; if(!msg) return;
            addMsg(msg, 'user'); inp.value = '';
            const res = await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg}) });
            const data = await res.json();
            addMsg(data.respuesta, 'aurora');
            hablar(data.respuesta);
        }

        function addMsg(t, cl) {
            const d = document.createElement('div'); d.className = `msg ${cl}`; d.innerText = t;
            const win = document.getElementById('chat-window'); win.appendChild(d);
            win.scrollTop = win.scrollHeight;
        }

        document.getElementById('chat-terminal').addEventListener('keypress', e => { if(e.key === 'Enter') enviar(); });
    </script>
</body>
</html>

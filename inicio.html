<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURORA AI</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        :root { --accent: #00f2ff; --aurora: #008080; }
        
        /* 🚨 SOLUCIÓN: Fondo Transparente para ver el video 🚨 */
        body { margin: 0; padding: 0; height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; overflow: hidden; background: transparent; background-color: transparent; }
        
        /* 🌌 TU VIDEO MP4: Vuelve a ser automático e inamovible */
        #bg-video {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -10; object-fit: cover;
            background-color: #000; /* Fondo de respaldo */
            opacity: 0.7; /* Brillo controlado */
        }

        /* DISEÑO DE CRISTAL (Glassmorphism) */
        #app-container { display: flex; flex-direction: column; height: 100vh; max-width: 600px; margin: 0 auto; position: relative; z-index: 10; }
        
        /* CAMBIO 1: HEADER DETALLADO */
        header { padding: 15px; text-align: center; border-bottom: 1px solid rgba(0, 242, 255, 0.2); background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px); }
        .titulo { font-family: 'Orbitron'; letter-spacing: 5px; color: var(--accent); text-shadow: 0 0 10px var(--accent); font-size: 1.1rem; margin-bottom: 2px; }
        .subtitulo { font-size: 0.7rem; color: rgba(255, 255, 255, 0.7); letter-spacing: 2px; text-transform: uppercase; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 14px 20px; border-radius: 20px; line-height: 1.5; backdrop-filter: blur(10px); animation: slide 0.3s ease; }
        
        /* CAMBIO 2: MENSAJES DISTINTIVOS */
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.1); border: 1px solid rgba(0, 242, 255, 0.3); border-bottom-left-radius: 2px; }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-bottom-right-radius: 2px; }

        /* CAMBIO 3: INPUT CON GLOW NEÓN */
        .input-area { padding: 20px; background: transparent; }
        .input-container { 
            background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(0, 242, 255, 0.4); 
            border-radius: 30px; display: flex; align-items: center; padding: 5px 20px;
            backdrop-filter: blur(10px); 
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            transition: box-shadow 0.3s ease;
        }
        .input-container:focus-within {
            box-shadow: 0 0 25px var(--accent);
            border: 1px solid var(--accent);
        }
        
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 1rem; }
        
        #btn-mic { 
            background: rgba(0, 242, 255, 0.1); border: 1px solid var(--accent); color: var(--accent);
            border-radius: 50%; width: 44px; height: 44px; cursor: pointer; transition: 0.3s; margin-right: 10px; display:flex; justify-content:center; align-items:center;
        }
        #btn-mic:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--accent); }

        @keyframes slide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    
    <video autoplay muted loop playsinline id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>
    
    <div id="app-container">
        <header>
            <div class="titulo">AURORA AI</div>
            <div class="subtitulosubtitulo">San Martín, Mendoza</div>
        </header>
        
        <div id="chat-window">
            <div class="msg aurora" id="saludo-ia">Iniciando sistema de voz...</div>
        </div>
        
        <div class="input-area">
            <div class="input-container">
                <button id="btn-mic">🎤</button>
                <input type="text" id="user-input" placeholder="Escribí aquí..." autocomplete="off">
                <button onclick="enviar()" style="background:none; border:none; color:var(--accent); font-size:1.8rem; cursor:pointer;">➤</button>
            </div>
        </div>
    </div>

    <script>
        // ¡Registra el Service Worker!
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
        const chatWin = document.getElementById('chat-window');
        const input = document.getElementById('user-input');

        let saludoHecho = false;

        function iniciarSaludo() {
            if (saludoHecho) return;
            const voces = window.speechSynthesis.getVoices();
            if (voces.length > 0) {
                saludoHecho = true;
                const nombre = localStorage.getItem('userName') || 'Gabriel';
                const msg = `Hola ${nombre}. Soy Aurora. ¿En qué puedo ayudarte hoy?`;
                document.getElementById('saludo-ia').innerText = msg;
                hablar(msg);
            }
        }

        window.speechSynthesis.onvoiceschanged = iniciarSaludo;
        setTimeout(iniciarSaludo, 1000); 

        function hablar(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            const voces = window.speechSynthesis.getVoices();
            // Voz Femenina/Google Candado
            let vozElegida = voces.find(v => v.lang.startsWith('es') && (v.name.includes('female') || v.name.includes('Helena') || v.name.includes('Sabina') || v.name.includes('Paulina')));
            if (!vozElegida) vozElegida = voces.find(v => v.lang.startsWith('es') && v.name.includes('Google'));
            if (!vozElegida) vozElegida = voces.find(v => v.lang.startsWith('es'));

            u.voice = vozElegida;
            u.pitch = 1.6; 
            u.rate = 1.0;
            u.lang = 'es-AR';
            window.speechSynthesis.speak(u);
        }

        async function enviar() {
            const msg = input.value.trim();
            if(!msg) return;
            addMsg(msg, 'user');
            input.value = '';

            try {
                // Anti-Caché del navegador
                const res = await fetch('/chat?_=' + new Date().getTime(), { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({msg}) 
                });
                const data = await res.json();
                addMsg(data.respuesta, 'aurora');
                hablar(data.respuesta);
            } catch (err) {
                addMsg("Cortocircuito de red. ¿Estás conectado?", 'aurora');
            }
        }

        function addMsg(t, cl) {
            const d = document.createElement('div');
            d.className = `msg ${cl}`;
            d.innerText = t;
            chatWin.appendChild(d);
            chatWin.scrollTo(0, chatWin.scrollHeight);
        }
        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });
    </script>
</body>
</html>

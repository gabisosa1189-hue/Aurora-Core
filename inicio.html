<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURORA AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --aurora-bg: #000b0b; }
        body { margin: 0; padding: 0; height: 100vh; background: var(--aurora-bg); font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; overflow: hidden; }
        
        /* FONDO OPTIMIZADO: Sin filtros pesados para que cargue rápido */
        .aurora-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: linear-gradient(135deg, #001a1a 0%, #000 100%); }
        .aurora-light { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(0, 242, 255, 0.05) 0%, transparent 50%); animation: rotate 20s infinite linear; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #app-container { display: flex; flex-direction: column; height: 100vh; max-width: 600px; margin: 0 auto; position: relative; }
        header { padding: 15px; text-align: center; border-bottom: 1px solid rgba(0, 242, 255, 0.1); backdrop-filter: blur(5px); }
        .titulo { font-family: 'Orbitron'; letter-spacing: 5px; font-size: 1.1rem; color: var(--accent); }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 18px; line-height: 1.4; font-size: 0.95rem; animation: slide 0.3s ease-out; }
        
        /* CAMBIO 1: COLOR MENSAJE AURORA */
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.1); border: 1px solid rgba(0, 242, 255, 0.2); border-bottom-left-radius: 2px; }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-bottom-right-radius: 2px; }

        /* CAMBIO 2: CAJA CON GLOW */
        .input-area { padding: 15px; background: transparent; }
        .input-container { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.3); 
            border-radius: 25px; display: flex; align-items: center; padding: 5px 15px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; }

        /* CAMBIO 3: MICRÓFONO INTERACTIVO */
        #btn-mic { 
            width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--accent); 
            background: rgba(0, 242, 255, 0.1); color: var(--accent); cursor: pointer;
            transition: all 0.2s; margin-right: 10px; display: flex; align-items: center; justify-content: center;
        }
        #btn-mic:hover { transform: scale(1.15); box-shadow: 0 0 15px var(--accent); }

        @keyframes slide { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="aurora-bg"><div class="aurora-light"></div></div>
    <div id="app-container">
        <header><div class="titulo">AURORA</div></header>
        <div id="chat-window">
            <div class="msg aurora" id="txt-saludo">...</div>
        </div>
        <div class="input-area">
            <div class="input-container">
                <button id="btn-mic">🎤</button>
                <input type="text" id="user-input" placeholder="Escribí aquí..." autocomplete="off">
                <button onclick="enviar()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-size:1.2rem;">➤</button>
            </div>
        </div>
    </div>

    <script>
        const chatWin = document.getElementById('chat-window');
        const input = document.getElementById('user-input');

        window.onload = () => {
            const nombre = localStorage.getItem('userName') || 'Gabriel';
            const saludo = `Hola ${nombre}. Soy Aurora. ¿En qué puedo ayudarte?`;
            document.getElementById('txt-saludo').innerText = saludo;
            hablar(saludo);
        };

        function hablar(texto) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(texto);
            const voces = window.speechSynthesis.getVoices();
            u.voice = voces.find(v => v.lang.startsWith('es') && v.name.includes('Google')) || voces[0];
            u.pitch = 1.6;
            u.lang = 'es-AR';
            window.speechSynthesis.speak(u);
        }

        async function enviar() {
            const msg = input.value.trim();
            if(!msg) return;
            addMsg(msg, 'user');
            input.value = '';

            try {
                const res = await fetch('/chat', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({msg}) 
                });
                const data = await res.json();
                addMsg(data.respuesta, 'aurora');
                hablar(data.respuesta);
            } catch (err) {
                addMsg("Se cortó la señal.", 'aurora');
            }
        }

        function addMsg(t, cl) {
            const d = document.createElement('div');
            d.className = `msg ${cl}`;
            d.innerText = t;
            chatWin.appendChild(d);
            chatWin.scrollTo(0, chatWin.scrollHeight);
        }

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });
    </script>
</body>
</html>

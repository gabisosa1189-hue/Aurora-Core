<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURORA - Acceso Neuronal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; }
        
        /* 🎥 FONDO BLINDADO */
        #bg-video { 
            position: fixed !important; top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            object-fit: cover !important; 
            z-index: -1; 
            background: #000;
        }

        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100vh; 
            overflow: hidden; background: transparent !important; 
            font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; 
        }
        
        /* ⚙️ SIDEBAR CRISTAL */
        #sidebar {
            position: fixed; top: 0; left: -270px; width: 250px; height: 100%;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(40px);
            border-right: 1px solid rgba(0,242,255,0.2);
            z-index: 100000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1);
            padding: 50px 20px; display: flex; flex-direction: column; gap: 15px;
        }
        #sidebar.open { left: 0; }
        .menu-btn { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 15px; text-align: left; cursor: pointer; }
        .menu-btn.danger { background: rgba(255, 50, 50, 0.2); color: #ff6666; margin-top: auto; font-weight: bold; }
        #sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: 99999; display: none; }
        #sidebar-overlay.active { display: block; }

        #app-container { display: flex; flex-direction: column; height: 100vh; max-width: 600px; margin: 0 auto; position: relative; z-index: 10; }
        header { padding: 45px 15px 15px 15px; text-align: center; }
        .titulo-app { font-family: 'Orbitron', sans-serif; letter-spacing: 12px; font-size: 1.5rem; text-shadow: 0 0 20px var(--accent); }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 15px 20px; border-radius: 22px; backdrop-filter: blur(15px); }
        .aurora { align-self: flex-start; background: rgba(0, 242, 255, 0.08); border: 1px solid rgba(0, 242, 255, 0.2); }
        .user { align-self: flex-end; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        .input-area { position: relative; padding: 10px 15px calc(30px + env(safe-area-inset-bottom)) 15px; background: transparent; }

        /* ⚙️ TUERCA FIJA */
        .btn-config-final {
            position: fixed; bottom: calc(42px + env(safe-area-inset-bottom)); left: 18px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.4);
            color: var(--accent); width: 55px; height: 55px; border-radius: 50%;
            font-size: 1.8rem; cursor: pointer; display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(20px); z-index: 1000;
        }

        .input-container { 
            margin-left: 70px; background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 35px; 
            display: flex; align-items: center; padding: 5px 15px; backdrop-filter: blur(20px);
        }
        
        .btn-voice { background: transparent; color: #fff; border: none; font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: bold; text-shadow: 0 0 10px var(--accent); margin-right: 12px; cursor: pointer; }
        #chat-terminal { flex: 1; background: transparent; border: none; color: white; padding: 12px 5px; outline: none; font-size: 1rem; }

        #voice-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); backdrop-filter: blur(30px); z-index: 200000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .a-gigante { font-family: 'Orbitron', sans-serif; font-size: 5rem; color: #fff; text-shadow: 0 0 30px var(--accent); width: 150px; height: 150px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 40px var(--accent); animation: pulse 1.5s infinite; margin-bottom: 40px; }
        @keyframes pulse { 0% { transform: scale(0.95); } 70% { transform: scale(1); } 100% { transform: scale(0.95); } }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video"><source src="fondo.mp4" type="video/mp4"></video>
    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar">
        <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:1.8rem; align-self:flex-end;">✖</button>
        <h2 style="font-family:'Orbitron'; color:var(--accent);">⚙️ AJUSTES</h2>
        <button class="menu-btn" onclick="alert('Aurora\nGabriel Sosa Scriboni')">🧠 Sistema Aurora</button>
        <button class="menu-btn danger" onclick="confirm('¿Eliminar cuenta?')">⚠️ ELIMINAR CUENTA</button>
    </div>
    <div id="voice-overlay">
        <div class="a-gigante">A</div>
        <button onclick="stopVoiceMode()" style="background:none; border:1px solid #fff; color:white; padding:10px 30px; border-radius:20px; margin-top:30px;">CERRAR</button>
    </div>
    <div id="login-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); backdrop-filter:blur(30px); z-index:9999; display:flex; align-items:center; justify-content:center;">
        <div style="background:rgba(255,255,255,0.03); padding:40px; border-radius:40px; border:1px solid rgba(0,242,255,0.3); text-align:center; width:85%; max-width:400px;">
            <h1 style="font-family:'Orbitron'; letter-spacing:5px;">AURORA</h1>
            <button onclick="loginGoogle()" style="width:100%; padding:16px; border-radius:20px; border:none; font-weight:bold; cursor:pointer; margin-top:30px; background:#fff; color:#000;">Ingresar con Google</button>
            <button onclick="mostrarEmail()" style="width:100%; padding:16px; border-radius:20px; border:1px solid #fff; font-weight:bold; cursor:pointer; margin-top:15px; background:transparent; color:#fff;">Email</button>
            <div id="email-form" style="display:none; flex-direction:column; gap:10px; margin-top:20px;">
                <input type="email" id="email-input" placeholder="Email" style="padding:15px; border-radius:15px; background:rgba(0,0,0,0.3); border:1px solid #00f2ff; color:white;">
                <input type="password" id="pass-input" placeholder="Password" style="padding:15px; border-radius:15px; background:rgba(0,0,0,0.3); border:1px solid #00f2ff; color:white;">
                <button onclick="ejecutarAuth()" style="background:#00f2ff; color:black; padding:15px; border-radius:15px; font-weight:bold; border:none;">CONECTAR</button>
            </div>
        </div>
    </div>
    <div id="app-container">
        <header><div class="titulo-app">AURORA FINAL</div></header>
        <div id="chat-window"><div class="msg aurora">Enlace neuronal listo.</div></div>
        <div class="input-area">
            <button class="btn-config-final" onclick="toggleSidebar()">⚙️</button>
            <div class="input-container">
                <button class="btn-voice" onclick="startVoiceMode()">A</button>
                <input type="text" id="chat-terminal" placeholder="Escribe a Aurora..." readonly>
                <button onclick="enviar()" style="background:none; border:none; color:var(--accent); font-size:1.6rem;">➤</button>
            </div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDhLaoI89AsGoEh23bvjraFUztHtgUkLAo", authDomain: "aurora-ai-oficia.firebaseapp.com", projectId: "aurora-ai-oficia", storageBucket: "aurora-ai-oficia.firebasestorage.app", messagingSenderId: "426513637524", appId: "1:426513637524:web:13851f499aa4af13cfd481" };
        firebase.initializeApp(firebaseConfig);
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('active'); }
        function hablar(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'es-AR'; u.pitch = 1.4; window.speechSynthesis.speak(u); }
        firebase.auth().onAuthStateChanged(user => { if (user) { document.getElementById('login-overlay').style.display = 'none'; document.getElementById('chat-terminal').removeAttribute('readonly'); } });
        let rec;
        function startVoiceMode() { document.getElementById('voice-overlay').style.display = 'flex'; rec = new webkitSpeechRecognition(); rec.lang = 'es-AR'; rec.onresult = async e => { const msg = e.results[0][0].transcript; const res = await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg}) }); const data = await res.json(); hablar(data.respuesta); }; rec.start(); }
        function stopVoiceMode() { if(rec) rec.stop(); window.speechSynthesis.cancel(); document.getElementById('voice-overlay').style.display = 'none'; }
        async function enviar() { const inp = document.getElementById('chat-terminal'); const msg = inp.value; if(!msg) return; addMsg(msg, 'user'); inp.value = ''; const res = await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg}) }); const data = await res.json(); addMsg(data.respuesta, 'aurora'); }
        function addMsg(t, cl) { const d = document.createElement('div'); d.className = `msg ${cl}`; d.innerText = t; const win = document.getElementById('chat-window'); win.appendChild(d); win.scrollTop = win.scrollHeight; }
        function mostrarEmail() { document.getElementById('email-form').style.display='flex'; }
        function loginGoogle() { firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        async function ejecutarAuth() { const e = document.getElementById('email-input').value; const p = document.getElementById('pass-input').value; try { await firebase.auth().signInWithEmailAndPassword(e, p); } catch(err) { alert(err.message); } }
    </script>
</body>
</html>
